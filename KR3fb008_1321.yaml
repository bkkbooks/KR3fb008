body:
  text: 搃加數大為加減數六為減求時差行以三千六百科為一率二小時為太陰平行一千九百七十六秒四五九二一五七為二率時差搃化秒為三率求淂四率為秒以分妝之淂時差行時差搃為加者則為減時並搃為減者則為加求用時太陰平行置太陰平行加減時差淂用裏太陰平行太陰平行獨求用時者因太陰行度甚疾必加減時差行方為子正初刻之平行度其餘諸平行所差微可以不計也求引數置用時太陰平行減月孛減月孛平行淂引數
