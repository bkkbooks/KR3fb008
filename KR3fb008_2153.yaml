body:
  text: 秒一十二分所對之太陽平行為二十九秒三十四微二十四秒所對之太陽平行為五十九微零八纎合計三数得一十二分四十九秒三十三微零八纎即所求之太陽平行也又或有太陽平行一十二分四十九秒三十三微零八纎求時分秒則察太陽平行表內與一十二分四十九秒相近畧小之數為一十二分一十九秒其所對為五時乃以一十二分一十九秒與設数相減餘三十秒三十三微零八纎又察太陽平行表內與三十秒三十三微相近畧小之
