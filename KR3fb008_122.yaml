body:
  text: 形元形有乙角甲乙邊次形有戊角癸戊邊也若所有一邊為丙甲與乙角相對求乙丙乙甲丙邊及丙角法如左求乙丙邊法乙角之正弦與全數若甲丙之正弦與丙乙之正弦淂丙乙邊用甲乙丙本形求乙甲邊法乙角之餘切即戊丁正切與甲丙之餘切即戊丙正切若全數與乙甲之餘割線即戊角己甲割線淂乙甲邊用戊丁丙次形求丙角甲丙之餘弦即戊丙之正弦與乙角之餘弦即戊丁正弦若全數與丙角之正弦淂丙角亦用戊丙丁次形第五法有三角求三邊甲乙丙形有甲直角有乙角四十四度六分有丙角六十九度三十八分求甲丙甲乙丙乙三邊求乙丙邊法為丙角之切線即交角戊丙丁角之切線與全數若乙角之餘切即戊丁正切與乙丙之餘弦即丁丙正弦淂乙丙邊此用戊丁丙次形丁為直角元形有乙丙兩角次形有戊丁邊及丙角也一率丙角切線二度六九四五八二率全數三率乙角餘切一度三二一二四率乙丙餘弦三八三二求弧減象限淂六十七度二十九分為乙丙邊
