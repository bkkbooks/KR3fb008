body:
  text: 淂甲乙邊此用子丑寅次形丑為直角元形有丙乙兩角次形有寅角及子丑邊也第六法有三邊求三角甲乙丙直角形有丙甲邊四十度有甲乙邊六十度有乙丙邊六十七度二十九分求乙丙兩角甲直角不用算法曰甲乙丙形既有其三邊是合甲直角而有四件矣即任取兩邊用前第一第二假法以求乙丙兩角之度分謹按弧角形八線之比例論其本形八線淂連為四率者不過數法可盡若用次形則相生不窮以次形之邊角悉與本形相當而諸大圈相交所生次形又非一種故也上算術中于次形之用每條各具一二則餘當類見曲線鈍角形算法鋭角同理曲線鈍角之骵勢各形不同其三角有兩鈍兩直三邊或兩邊三邊在九十度外今立算以一鈍兩鋭而兩邊在九十度內者為式如遇他形以前易形法用之其布算亦用垂弧分線或補成直角或分為直角然後依直角形法推之皆與直線鈍角形同理也第一法有一鈍角兩邊其一邊對鈍角求餘角餘邊乙丙丁鈍角形有乙鈍角一百一十八度七分有乙丁邊五十一度四十二有丙丁九十六度在象限外求乙丙邊及乙丁兩角
