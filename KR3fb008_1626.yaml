body:
  text: 求𢃄食分秒以太陽半徑倍之為一率十分為二率并徑內減𢃄食兩心相距為三率求淂四率即𢃄食分秒𢃄食分秒者太陽出入地平時典太陰相掩之分数為太陽全徑十分中之幾分也
