body:
  text: 仍至已復與太陽合伏滿歲輪一周凡星行邜巳醜上半周順行故見疾行醜庚邜下半周運行自東而西故見遲其周上之行為星距日之度距合伏也如月之離日度又星當巳與庚合伏退沖正初均乙戊線內故無次均居醜與邜兩留際次均最火餘星行輪周以生各度次均如太陽距合伏為辛癸申弧巳遇半周沖度日在申求次均法於歲輪上取巳庚辰弧與之等為星歲輪上行度星骵在辰作辰乙辰戊二線成辰乙戊三角形辰乙線恆與申戊平行形有乙辰歲輪半徑有乙戊邊有之次均戊角距日度減半周之餘求辰戊乙角淂亥午弧即星在辰之次均數也用以減酉亥實經度淂酉午為星視經度又求辰戊邊淂歲輪上星骵距地心線
