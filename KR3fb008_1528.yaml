body:
  text: 置積日減𦍤應二十六日三八五二六六淂通𦍤上考往古則置積日加𦍤應得通求積𦍤及首置通𦍤以朔策二十九日五三五九三除之淂数加一為積朔餘数典朔策相減為首朔上考往古則置通朔以朔策除之淂数為積朔餘数為首朔求首朔太陽平行以積朔典太陽平行朔策一十萬四千七百八十四秒三四三二四相乘滿周天一百二十九萬六千秒去之餘為積朔太陽平行加首朔太陽平行應初宮二十六度二十分四十二秒五十七
