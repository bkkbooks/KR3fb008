body:
  text: 辛庚辰辛庚兩對之兩內角并次乙辛辰三角形其乙辛辰角既得四十六分四八乙辛為切線與垂線所作角必直角此直角與乙辛邊若乙辛辰角與乙辰地半徑即得乙辛短線長于地半徑七十三倍若論地之全影乙庚線尚長三四倍也夫月食于地影必依其影之體勢顯其食之貌象今全影之中既以地影兼蒙氣之影則并有初影有滿影月入于中隨其可至變昜光色無足異矣夫從古論月食者全屬地影今云不止地影而更加之氣影此為全影方之地影必且愈長愈廣則古之以地徑推地影算月食者悉皆乖舛而當更定新率乎曰不然所論蒙氣之影謂太陽之交因此氣能令全影之中分別厚薄變易影中之色象非謂地之徑因
