body:
  text: 黃道甚逺其黃經未酉赤經未癸又一已星距黃道近黃經為未夘赤經為未子論其赤經丁星在已星之前次丁星漸向戊順行已星亦向庚順行如丁星行黃道上十度至辛酉亥弧其黃經為未亥赤經為未寅丁星行黃道十度至辛巳星亦必行黃道十度午夘弧至壬其黃經為未午赤經為未丑夫前丁星原設在已星之前已星之黃赤經度皆在丁星之後及一行至辛一行至壬其黃經原先辛而後壬其赤道經度則壬星為未丑丁星為未寅而丁星反在已星之後矣是則數百年前丁在前而已在後越數百年反丁在後而已在前此參觜二宿之所以變易也他星亦皆有之因其相距甚逺未之覺耳此差亦不係子星行而係于赤道極所出之升度圈與黃道極所出之圈相遇有踈有宻随在不等故也論恒星赤道緯度恒星距赤道之緯度與距黃道之緯度大異何則星距黃道之緯終古如一距赤道之緯時逺時近各為不等如外屏星堯時在赤道南今則赤道北餘星亦然其故亦以恒星本行以黃道極為極故也如啚乙為黃極丁為赤極設一星庚正在黃道距赤道南二十三度半行一周必至分節甲即正在赤道無距度然其随黃道行
