body:
  text: 天骵靜天太虛之中於穆無為號曰靜天靜天者常靜不動無端之可窺無數之可紀語其髙則髙出于無上語其大則大至于無外即所謂無極是也宗動天靜天之內曰宗動天宗動者為衆動之所宗指恆星日月五星而言蓋外寄兩極于靜天即赤極而丙挈諸天以從之語其髙則至髙語其大則至大所謂太極是也宗動以下各天宗動天以下則為恆星七政諸天其間毫無空隙譬如蔥本重重包裹其分數幾何則自下命之地居天中為最內第一為地水補其缺共為一球地外為氣氣之外為七政之天七政之外為恆星之天恆星之外為宗動之天宗動之外為常靜之天所謂九重天也恆星天恆星天居宗動天之下七政之上何以知之其驗有二一七政能掩恆星恆星不能掩七政必掩之者在下所掩者在上也一七政循黃道行皆速惟恆星極遲因知其最上也七政各天
