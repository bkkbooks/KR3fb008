body:
  text: 五星七曜序次五星麗天位置有高卑包函有內外去地有遠近古定第一重為太陰天第二水星天三金星四太陽五火星六木星七土星八恆星九為宗動天各天皆以地為心重重包裹如疊多環至其高下之序或驗以行度之遲疾或測其視差之大小或察以掩食之高低皆反覆比論而無可疑者後萬曆間第谷用遠鏡窺金星如月有晦朔弧望因知金星有時在太陽之上有時在下又見火星對沖太陽時其體大視差較太陽為多知此時必卑于太陽而在太
