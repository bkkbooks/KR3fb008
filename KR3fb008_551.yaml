body:
  text: 心差設太陽距最高平行為丙丁弧日止丁作乙丁甲丁亥諸線成乙丁甲三角形乙丁甲角為加减差求之形有乙丁半徑全数有乙甲两心差十萬分之三五八四有丁乙甲角距最高引数之餘求丁角得壬亥弧即加减差也用以减已庚壬黄道平行淂已庚㐪為太陽寔經度而淂㐪點為太陽骵所在也太陰朔望本天加减差太陰朔望時無次輪之行故不用次均止用本天高之均数如啚甲為地心庚癸圈為太陰平行天庚甲為半徑十萬庚為月天
