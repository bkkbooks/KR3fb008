body:
  text: 浮新製以水出壺而時牌轉壺骵并不開孔似為勝之也曆學源流曆法一事貴隨時改測求合天行故治曆明時大易獨取象于革也然而治曆難矣何者曆有法有用法者測各重天之運行骵勢以審諸曜出入隱現以求本行軌道以定準則也用者取本法測定之分數隨方隨時以推步日月五星次舍沖照交食凌犯順逆等情也二者缺一不可然立法最難語云毫釐之差千里之謬在曆學為尤甚前代自漢迄明造曆者七十餘輩立法者僅十有三家且皆不免幸違掛一漏萬後人難憑致用有謂得一冬至之正時即為近密者非也測冬至之于曆術未及百分之一何能概定諸曜之行有謂得一歲實一朔實及轉終交終等策為已定者非也此皆諸曜平行之率何由遽定視行有謂得四應可以無忒者非也此不過推算平行之界而已有謂多測交食稽其某法先天某法後天而後彚計籌策折中取之者亦非也曆家法數繁瑣用以算步交食不下四十餘條究竟何項何欵可以折中取半者因知古來修改門戶雖岐實則互相依傍間有出一二新意亦未能洞曉本源跡其大端猶不過截前至後通計所差加減乘除分派各歲之下便為修改已耳即使偶合一時豈能施諸永久惟授時曆悉本測驗庶稱精密顧其法亦未盡善在當日已有推食不食食而失推之弊何況沿襲至今他若回回曆其曆元為西域所定使
