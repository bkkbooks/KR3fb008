body:
  text: 浮新製以水出壺而時牌轉壺骵并不開孔似為勝之也暦學源流暦法一事貴随時改測求合天行故治暦明時大易獨取象于革也然而治暦難矣何者暦有法有用法者測各重天之運行骵勢以審諸曜出入隱現以求本行軌道以定準則也用者取本法測定之分數随方随時以推步日月五星次舍沖炤交食凌犯順逆等情也二者缺一不可然立法最難語云毫釐之差千里之謬在暦學為尤甚前代自漢迄明造暦者七十餘輩立法者僅十有三家且皆不免幸違掛一漏萬後人難憑致用有謂得一冬至之正時即為近宻者非也測冬至之于暦術未及百分之一何能概定諸曜之行有謂得一歲實一朔實及轉終交終等策為已定者非也此皆諸曜平行之率何由遽定視行有謂得四應可以無忒者非也此不過推算平行之界而已有謂多測交食稽其某法先天某法後天而後彚計籌策折中取之者亦非也暦家法數繁瑣用以算步交食不下四十餘條究竟何項何欵可以折中取半者因知古來修改門戶雖岐實則互相依傍間有出一二新意亦未能洞曉本源跡其大端猶不過截前至後通計所差加減乘除分派各歲之下便為修改已耳即使偶合一時豈能施諸永乆惟授時暦悉本測騐庶稱精宻顧其法亦未盡善在當日已有推食不食食而失推之弊何況沿襲至今他若囬囬暦其暦元為西域所定使
