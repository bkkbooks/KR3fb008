body:
  text: 愈近地平差必愈甚此差恒降高為華以月骵降下数十分如日月同度在近交之南並在正地平上髙二十度則太陽于視地平為十九度五十八分祗降下二分太陰于視地平則為十九度直降一度而日月二差之較為五十八分故以笑論雖二曜仝髙仝度而人目視之太陰恒下于太陽一度弱不掩日光而不食矣若二曜在地平上髙七十度則太陽無視差太陰視差止二十分其降于太陽亦止二十分勢必相切或至掩数分而成日食若二曜在交北又當以太陰笑在太陽之上庶因視差所降而掩太陽以為食也顧此二地平之差又變易太陰之經緯度一以加減交食分数謂之氣差其差在南北一以加減食時刻謂之時差其差在東
