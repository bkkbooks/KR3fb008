body:
  text: 隨孔形得徑數少則光底必因之愈少故測食者恆設孔最小而圓乃可遠近無差因以牆上所缺之形徵太陽所食之分法以規器於紙上先畫大小不等數圓圈各以徑分之其徑以十或更密平分之臨測室中以圈受光不拘遠近任用大小圈全以吻合于光為準既合便轉紙使其圈徑橫遇餘光形中平分兩角則光缺之界即所食分數方光與圈合時遂以筆于光影間微識三四小點求心因之作圈略得太陰掩太陽大小之比例如圖甲乙丙丁為太陽食外之餘光正與甲乙丙圈界相合其心在戊其徑與丁以直角交影而平分甲及丙兩光角則得太陽食七分有奇更取三點為甲
