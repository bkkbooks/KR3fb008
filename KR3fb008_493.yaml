body:
  text: 淂實會仍須推其視會若僅據實會則是地心之見食非地靣之見食凡有無多寡加時先後悉皆垂失矣如圖丁為月或正居于兩交或在交之左右日月二徑之各半合之小于距度分則月䏻掩日日為之食不然則不食也所謂實會視會兼推則合者地靣所見先後大小遲疾漸次不同如人在地靣癸依丁月之徑適滿太陽之庚辛徑則見為全食若人在地在地靣豫依丁月之徑乃見兩切線所
