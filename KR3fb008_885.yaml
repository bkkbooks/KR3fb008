body:
  text: 真骵所也如平行至醜本輪上即自丁至甲丁甲弧與子等均輪上即自乙至巳乙巳弧三倍于丁甲平行如至寅本輪至甲均輪至乙乙巳亦三倍于丁甲在邜在辰仿此均輪上各巳點為水星骵所歷之迹作線連之成一撱形圈何則試以已酉最高卑兩距地線相並折半淂氐為圈心而兩端巳氐與氐巳兩半徑極長中腰氐巳巳氐兩半徑極短其餘星距最高卑左右等各巳點距氐心左右亦等則此圈為撱形與古圖不異其所生均數寅酉巳等角亦復相等水星自行均數演算法甲為地心乙癸為平行天乙為最高所在設乙丙為引數丙為心作丁戊本輪丁為最高從丁取丁醜弧與
