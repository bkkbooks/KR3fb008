body:
  text: 中遇地心作徑線名之曰大距線其次輪面之東西徑線恒當本道之平面而與交線平行者曰樞線次輪面之南北徑線恒與本道斜交而與黃道平行者曰次輪大距線其樞線之兩端恒與本道相當遂成兩交點今名之曰次交點而金水二星次輪面之東西徑線亦曰樞線南北徑線亦曰次輪大距線其樞線之兩端亦與本道即黃道相當今亦名之曰次交點而與樞線平行之本道徑線仍名之曰交線交線在兩端仍名之曰交周金水二星本無交周因次輪最遠距次輪兩交點之度即次輪心距交線兩端之度故仍名之曰交周又土木火三星之次輪面不與本道平行而金水二星之次輪面亦不與本道平行此五星之所同次輪心行至本道之兩交點則樞線與交線合次輪心行至本
  hash: sha256:ad1920be1e461b17e21b9701da90f59799e4d45013984ecb437e8f90f03a6555
