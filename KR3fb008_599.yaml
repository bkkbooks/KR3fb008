body:
  text: 徑三十一分二十秒四分之為巳丁令減去巳丁所餘為甲巳視半影四十分四十秒或以距度與食分相較則食差三分與距度之差七分五十秒若食一十二分與月全徑三十一分二十秒亦以距度之差推淂其影也如两距度一大于半影一小于半影亦用前比例法以求地影如圖誤初食三分淂距度四十七分五十四秒次食十分距度二十九分三十七秒食分之差七分距度之差十八分十七秒則七分與十八分十七秒若全食一十二分與全月徑三十一分二十秒今既食三分即全月徑四分之一為七分五十秒以減距度餘四十分四秒為地半影又次食淂十分即月心至地影之周淂
