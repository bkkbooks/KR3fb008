body:
  text: 始交會者日與月會也轉終者自行一周復在元䖏也計其中積凡為交會者四千二百六十七次為轉終者四千五百七十三次法以中積十二萬六千七日四刻為寔交會數四千二百六十七為法而一淂會望策二十九日五十刻十四分三秒次以天周三百六十度為寔會望策為法而一淂一十二度十一分二十六秒四十一微二十纎十八芒為太隂一日平行距太陽之度加太陽一日平行五十九分八秒一九四九古測數淂十三度十分三十五秒一微為太隂一日距某宮次或某節氣之平行也又以中積十二萬六千七百四刻為寔轉終數四千五百七十三為法而一得二十七日五十二刻十一分五十秒為轉終分次以天周度為寔轉終分為法而一淂十三度三分五十三秒五十六微一十七纎五十一芒五十九末為太隂一日距最髙之行度也其測距交行度依巴谷亦如前法用兩月食測其前後各率均齊如太隂或同在陽暦同在隂暦太陽之自行同度去兩交之兩㸃或前或後同限食分等加時等即太隂之轉分所至亦等因以定兩交行天周若干而復于故䖏其原測之中積為交會五千四百五十八次其兩交行天周該五千九百二十三次法以交會數以前會望策乘之淂十六萬二千一百七十七日五十八分西古法六十分為一日五十八秩三微二十五纎為中積日次以中積會數五千九百二十三乘天周三百六十度淂二百十三萬二千二百八十度為寔以中
