body:
  text: 角如甲乙丙以中乙字為所指之角餘倣此二垂線所作角必為直角反之若是直角中間必為垂線觀上圖自明三兩線相遇不作直角必一大一小于直角大者為鈍角小者為鋭角如甲丙兩線相遇于乙必作甲乙丙甲乙丁兩角而甲乙丙角大于戊乙丙直角為鈍角甲乙丁角小于戊乙丁直角為鋭角四兩線相交直角止有一不淂有二鋭角鈍角大小不等乃至無盡五直角皆相等俱為全圈四分之一六一直線至他直線上所作兩角即非直角并之必等于兩直角如啚甲線與丙丁線交于乙作甲乙丙甲乙丁兩角一鋭一鈍不為直角但并之必等于戊乙丙戊乙丁兩直角七一直線至他直線上所作兩角若非直角必一鈍一鋭八凡兩直線相交作四角每兩交角必等如甲丁與丙乙兩線交于戊其甲戊丙乙戊丁兩交角甲戊乙丙戊丁兩交角必各相等九兩平行線有他直線交加其上則內相對兩角必等外角與同
