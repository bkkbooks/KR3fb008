body:
  text: 一分水星極遠亦為二分極近為六分土木火三星皆不滿一分惟火星沖日時有十五分以此時在太陽天之下故也五星視經人目視五星之骵金星最大木次之水次之火又次之土最小今測各星在中距時視徑金星為三分十五秒木星二分四十五秒水星二分十秒火星二分弱土星一分五十秒五星寔徑依上各星視徑分秒用法求其寔徑及本骵大小之容算淂水星寔徑比地徑為三與八則其骵小於地球之容為十九分之一金星寔徑為地球徑十一分之六則其容為地球六分之一亦小於
