body:
  text: 線與戊甲一千九百八十五度乃金星極遠之距地也若極近時淂三百度中距即一千一百四十二度依法水星極遠距地為一千六百五十九度極近六百二十五度中距與太陽同五星視差五星視差之理即地半徑差與太陰太陽同祗因距地甚遠差數極微且不嘗用故不設表算淂金星極遠時視差為二分弱極近為十
