body:
  text: 月離步七政次月離者何也曰其故有六月與日視骵相若雖偕恆星五緯同借日光而獨能繼照古人以之配日稱為二曜則尊於諸星一也太陽以定春夏秋冬而成歲太隂以定晦朔弦望而成月歲與月錯綜損益曆法興焉以知天時以授民事二也日食于定朔月食于定望恆用日躔月離諸行以求食分加時日食之煩倍于月食其三視差皆從月生三也太陽五緯恆星漸次髙逺差數微減大小髙下難可遽淂惟月去人最近差數為大易見易測故測候諸曜皆用月差較量由顯入微悉能推見四也日與星不並見欲測大陽躔度距某星幾何無法可淂古法于晝時測日月之距至夜測月星之距并之淂日星之距五也大圓之中百昌庶物生長之緣有二日以暄之月以潤之諸風雲雨露霜雪等皆係于月其在物也各有盈虗消息亦係月之虧復進退其與太陽經緯諸星或會或沖或三合四合六合各有順逆承制之理測候推算之法醫家藉此以工治療農家藉此以藝稼穡商旅藉此以行舟泛海此條另有專書兹不載六也有此諸端故推步之法宜求密合而欲求密合政復未易如日躔之行止有三種月離則有七種參錯之中欲求齊一非明理無以立法非立法無以致用其曲折繁重十倍日躔矣乃歷代以來推步月離諸術頗為踈漏今新法闡明理數
