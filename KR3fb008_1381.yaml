  text: 宮則減六宮察其所對之太陽高卑差數即太陽高卑差求次輪寔半徑置本天次輪半徑加太陽高卑差淂次輪寔半徑求初寔行置火星平行加減初均數淂初寔行求星距日次引置本日太陽寔行減初寔行淂星距日次引求半外角星距日次引不遇半周者折半淂半外角遇半周者與全周相減餘數折半淂半外角
