body:
  text: 用表之法以距交實行之宮對距交實行之度其縱橫相遇卽所求之星距黃道線也設木星距交實行為初宮八度求星距黃道線則察初宮八度所對之數為三二二四九卽所求之木星距黃道線也若距交實行有零分者亦按中比例法求之
