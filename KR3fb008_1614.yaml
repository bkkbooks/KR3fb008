body:
  text: 置復圓寔緯加減復圓南北差淂復圓視緯加減之法亦典食甚視緯同求初杅緯差角用交食緯差角表以并徑分及初杅視緯分察其所對之度分淂初杅緯差角求復圓緯差角用交食緯差角表以并徑分及復圓視緯分察其所對之度分得復圓緯差角求初杅定交角初杅月距限東者初杅視緯在南則以初杅緯差角典初杅黃道高弧交角相加初杅視緯在北則以初杅緯差角典初杅黃道高
