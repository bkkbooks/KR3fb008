body:
  text: 光不失为次光也一最光所不及為初影次光所不及則為次影影與光并行光漸㣲則影漸厚故次影與最光相反若初影即次光也一冣光全不及之處則為㣲滿影若受正炤之㣲光即為缺影影與光正相反無影之極則為満光無光之極則為滿影如甲乙為施光之物丙為暗球從甲出正炤之光過丙球左右其切丙之界者淂甲戊及甲已徙乙出光又淂乙戊及乙丁其庚戊辛為最光全不及之處則滿影也若庚戊辛戊以外則甲乙光骵之多分漸炤之至乙丁甲已乃全光之界即自戊
