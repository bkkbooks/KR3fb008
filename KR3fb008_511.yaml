body:
  text: 光不失爲次光也一最光所不及為初影次光所不及則為次影影與光并行光漸微則影漸厚故次影與最光相反若初影即次光也一最光全不及之處則為微滿影若受正照之微光即為缺影影與光正相反無影之極則為滿光無光之極則為滿影如甲乙為施光之物丙為暗球從甲出正照之光過丙球左右其切丙之界者淂甲戊及甲已徙乙出光又淂乙戊及乙丁其庚戊辛為最光全不及之處則滿影也若庚戊辛戊以外則甲乙光骵之多分漸照之至乙丁甲已乃全光之界即自戊
