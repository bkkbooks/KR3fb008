body:
  text: 五圓線直線此為有法之線自上至下無一可曲如物之墜于地為直線自此至彼旋轉不已無窮盡為圓線如上啚甲乙為直線丙為圓線六両線不相離不相近任引長之終不相遇為平行線如上啚甲乙二線任引長之終不相交名曰平行線也此線為用最廣七両線相交止于一㸃如甲乙二線止能相交于丙㸃自此兩端俱漸展開雖引至極逺終不復相遇八兩線相遇即作角直曲襍平面兩直線相遇為直線角球面兩圈線相遇為曲線角凢作角不外三種一直線角二曲線角三雜線角論角十二則直線垂于橫直線之上若所作左右兩角等為直角或名正角而直線下垂者謂之橫線之垂線如甲線至丙丁線上相遇于乙其乙之左右作甲乙丙甲乙丁両角等必為直角而甲乙為丙丁之垂線凡三角形以三字指一
