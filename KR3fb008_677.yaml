body:
  text: 朔在辛丑日未初八分四十秒此時順天府得東西差三分五十秒太陰一小時實行為三十三分二十秒以此算得六分五十四秒為時差因食在九十度東應減得未初一分四十六秒即相近視會時也次以相近視會時求其午位黃道度為大火宮十七度一十二分中限在午西二十三度三十五分比日月距午更遠七度四十四分三十八秒又以太陽高三十六度十四分得高弧交黃道角八十四度十七分則以餘角復得東西差四分五十秒兩差不等之數為一分因後得之差大故先得差內減一定實得二分五十秒為太陰遇太陽之視行也前時差六分五十四秒今以三率法依本視行得前東西差三分五十秒應九
