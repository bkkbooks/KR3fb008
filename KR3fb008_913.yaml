body:
  text: 巳丁壬線定庚為最高壬為最卑巳丁為兩心差數又庚壬線截丙戊弦于丁求戊丁丁丙弦之分法甲戊丁形之甲戊邊與甲戊弦若後戊丁邊與戊丁弦一七一二四以減戊丙弦淂丁丙弦九二六一八求乙丁以丙丁弦與丁戊弦相乘又全數自之庚已也兩數相減餘為丁巳上方積開方淂八九二即木星兩心之差也九戊丙弧平分于辛作辛巳垂線必平分戊丙弦于癸成已癸丁直角形癸為直角形有巳丁有丁癸以戊丙線半之與戊丁相減淂癸丁求丁
