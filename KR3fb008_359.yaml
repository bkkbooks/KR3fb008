body:
  text: 三度三一三求丙丁邊以減九十度淂丁戊黃緯求巳丙丁角黃戊弧以減半周淂丁丙庚角壬戊弧黃道經度若星在赤道南如卯則從子丑兩極作弧淂丑子卯角為黃經壬午卯午為黃緯用丑卯子形求之若先有黃道經緯求赤道經緯理同有兩星之黃道經緯求他星之黃道經緯前用太白求恆星因未知星之經緯故用太陽比測若既淂數星之經緯度即可借以推他星之經緯如啚丁為黃極外圈為黃道丙為王良西星距乙北河南星為七十七度二十五分丙乙距甲婁宿北星為四十一度二四五丙甲甲已乙戊為婁宿北河之黃道緯度已戊弧為婁宿與北河之兩經度差今用此求丙星之黃道經緯度法先用甲丁乙形有甲丁乙丁兩星緯之餘有丁角求甲乙邊淂七十四度四五八求乙角淂八十一度二七一五次用甲乙丙形有丙甲丙乙兩星之距有甲乙邊求甲乙丙角淂四十二度三四一八與丁乙甲角相減存丙乙丁角三十一度五二五七末用乙丙丁形有丁乙有乙角有乙丙求丁丙邊以減象限淂丙庚五十一度一四三八為王良西星黃道緯度又求丁角淂戊庚弧七十八度八三
