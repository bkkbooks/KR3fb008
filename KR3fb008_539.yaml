body:
  text: 及巳戊入隂曆為日食限二十度四十一分甲庚及乙辛入陽曆淂十一度二十二分多祿某所定率則限外弧已丙戊淂一百三十九度庚丁辛淂一百五十七度十六分越六月之中積交周一百八十四度有竒先去全周則大于已丙戊及庚丁辛兩弧故初月在食限內與正交相近者六月後則近中交亦在食限內而日能再食若月食不論陰陽曆其限皆一十五度十二分則已丙戊及庚丁辛兩弧皆一百四十九度三十六分皆小于中積交周度故初月交周度入巳甲庚食限內後六月又在戊乙辛食限內而月能再食矣太陽越五月或七月皆能再食太隂越五月能再食越七月
