body:
  text: 之蒙差髙下不等測月者未知距地若干即無差數可減所測髙則非實髙其四月骵恆虧缺不全若用太陽法令其光過窺表即虗淡難見光骵不圓亦無從得其中心之光若目察窺表見月骵不全無從測其心其五若測以地平經緯儀或黃赤道經緯儀縱淂其經緯度分又以三視差故測淂之數無一合者其六依測日星法以恆星測驗推算而淂其經緯度以為可用亦因三視差故無一真度可見然則何如按西曆古今立法測月離度分必于月食時簡知其經度晉史薑岌亦以月食沖簡知太陽所在不知考太陽之躔度易考太隂之離度難而薑岌倒用之兩準皆踈矣今法于月食時推太陽之躔度其對沖即太隂之經度日食則不可用以日食因于視差隨地隨時皆無定率故故任用一月食皆足以簡知行度然求月之平行率若用前後兩月食取中積平分之如推日平行法又大不然何者月或全食或不全食或食于南或食于北或食于遲限或食于疾限各各不等一不等即所淂非真率故止用前後兩食其致差之故又有三緣三緣者其二在月其一不在月不在月者日躔經度是也夫前論以月食簡知月離經度謂食甚時二曜經度正相對耳然日躔有盈縮自非恆乎何能定月離之平何者日纏有最髙最卑其去地也時逺時近是生地影古名暗虗時大時小時長時短若日躔最髙其影則長而大月之過影加時則多日躔最卑其影則短而小月之過影加時則少此第一差之緣也二在月者一為
