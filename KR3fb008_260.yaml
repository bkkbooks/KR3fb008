body:
  text: 是其地平而辛為頂極矣餘倣此推之地平經緯度定本方地平經緯先以水衡準地平以垂線定天頂地平經從卯酉起南北至子午止從子午起亦可地平緯從地平起上至天頂止下至天頂沖求地平經緯有三資一極出地髙二赤道緯度三距午時度如啚甲為天頂大圈為地平子午為南北正線卯酉為東西正線卯丙酉為赤道圈戊為北極子戊為本方極出地之髙與丙甲赤道距天頂等設大陽月星同在赤道北未過正午如乙即從戊作戊乙庚弧淂乙庚為距赤道緯度庚點為赤經所在庚丙為赤道上距午時度每一小時赤道上為十五度每一刻赤道為三度四十五分詳見後又從甲過乙作甲乙已圈得乙已為太陽地平上之髙即地平緯度也其卯已即地平經度也求之用甲乙戊弧線斜角形形有乙戊赤緯之餘以庚乙減庚戊九十度即淂有甲戊乙角距午時度即丙庚弧有甲戊極出地之餘即北極距天頂求甲乙邊以減甲已九十度得
