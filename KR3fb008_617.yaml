body:
  text: 乙為子午圈士子為赤道戊為北極戊為丁極出地度與壬庚赤道距頂等戊庚為極出地之餘與壬乙赤道高等春秋分日太陽自甲出地平為卯正漸高距甲三十度至未為辰正六十度正己為己正九十度至忍為午至而壬乙即太陽赤道上午正時高弧自比又漸低距壬三十度已點為未正六十度未點為申正九十度甲點為酉正而酉正而入地平比春秋兩分書夜所以相等也求赤道上某刻高弧設戊丁極高為三十八度則壬乙赤道而必五十二度取其壬災正弦度七八八一次設距午八刻末正時在已化度潯壬己弧三十度做己辛線即未正時高弧正
