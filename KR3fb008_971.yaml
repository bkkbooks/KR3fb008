body:
  text: 測土木二星次均五星行天既用不同心圈及諸小輪齊其本行可行實經度矣但惟合伏與退沖則合餘則見其近日時行則順而疾厥骵見小沖日時行則逆而遲厥骵見大距日一象限度則不動而留厥骵見中所躔視經度悉與推算逈殊因知星本行之外復有一種順逆進退之行皆生於距日之遠近似為太陽所攝恆成圍日之象則自必有一輪運動乎其間如太陰二三均數之理當沖合時星必在輪之上下兩留際必在輪之兩旁以生最大均角於是本輪行度而外復用一次輪以求其視經度第此輪五星各不同土木為一類金水為一類火星自為一類今先論土木二星土木火三星名為歲輪金水名
