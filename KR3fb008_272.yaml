body:
  text: 極亦隨天尤旋以七曜運行觀之則以黃極為宗每日循黃道各行其度而黃極為運行之樞亦不動也二者各有其天各宗其極並行而不背非一天而有四極也赤道與地平相交常靜天上有天元赤道天元南北極恆定不動就人目所視又有天元地平圈今以二圈相交論之則六合之內共有三球一為正球二為欹球二為平球正有一平有一欹者無數也正球者天元赤道之二極在地平則天元赤道與地平為直角而其左右緯圈各半在地平上半在地平下如啚甲戊丙已為天甲乙丙丁為地平甲丙即天元赤道之兩極戊乙丁已為地平之東西圈亦即天元赤道庚辛壬癸則地平之經圈是正球也欹球者天元赤道之二極一在地平上一在地平下赤道與地平為斜角而天元赤道與地平之各經緯圈伏見多寡各不等其極出地之度為測候所必需赤道緯圈之中隨地各有一緯圈為用甚大名為常見緯圈凡極出地若干度即有一去極若干度之緯圈其底點常切地平者是也
