body:
  text: 至丁至已丙球之影漸薄以趨于盡矣一影之所居與光正相反暗骵淂光與此面射影于彼面是影之中心與光光之心暗骵之心參相對如一直線則暗骵隔光于影使原光之心恆居一線之末界其正相反之彼界則影之心在為故論暗其受光之面必向光所出之原界其生影之面必向影所射之彼界恆正相反也故日與月獨至兩交而有食亦以此耳日月食限食限者日月行兩道各推其經度距交若干為有食之始也而日與月不全月食則太陰與地影相遇兩周相切以其兩視半徑較
  hash: sha256:5283e09762cb611fbe969c598a19506fb5eb41a9b316507f9d38f038e9b89b7a
