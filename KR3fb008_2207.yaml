body:
  text: 交食月行表交食月行表以兩徑和較及食甚距緯縱橫列之食甚距緯列於前兩徑和較列於上兩徑和者太陽與太陰或太陰與地影兩半徑之和兩徑較者太陰與地影兩半徑之較日食惟用兩徑和月食十分以上兼用兩徑較中列逐分初虧至食甚或食旣至食甚之月行分秒初虧至食甚與食甚至復圓同食既至食甚與食甚至生光同其有空格者蓋兩徑之和大於距緯方有食小於距緯或僅與距緯等則不食即無月行分秒矣用表之法以兩徑和較之分對食甚距緯之分其縱
