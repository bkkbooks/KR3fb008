body:
  text: 第一食漢順帝陽嘉二年癸酉西五月初六日子正後十八刻十分順天府時刻月全食此時日躔大梁宮十三度十四分月寔經在其沖大大十三度十四分其平行十二度二十一分第二食陽嘉三年甲戊西十月二十四日子正後順天府一十七刻十分月食十二分之十此時日躔壽星宮二十五度十分月在其沖降婁二十五度十分其平行二十六度四十三分第三食永和元年丙子西三月初六日子正後三十七刻五分順天府為在畫不見月食十二分之六此時日躔娵訾宮十四度十二分月在其沖鶉尾十四度十二分其平行十一度十四分前二會月黃道上視經度相減淂一百六十一度五十五分為黃道上兩會相距之視經度前一會至二會積日為五百三十一日九十三刻若平日為九十三刻七分為兩會之積日以月平行乘之淂一百六十九度三十七分為兩會相距中間之平行度與視經相減淂七度四十二分為前二會視平兩行之差平行大視行小月必在本輪上半周逆行又以月自行乘積日淂一百十度二十一分為兩會本輪上自行相距之度二會至三會黃道上相距之視經度為一百三十八度五十五分積日為五百二日二十刻若平日為二十二刻中間之平行度一百三十七度三十三分與視行相減淂一度二十一分為視
