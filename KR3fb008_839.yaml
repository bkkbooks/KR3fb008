body:
  text: 十一度四十七分子初九分子初三刻四分缺太陰圈之半周子初一十九分子正一分太陰心至正午其餘光邊高十九度七分子初二十四分子正六分向位距一十五度子初四十三分子正一刻十分餘光兩角正垂下距地平等食六分三十秒子正二分子正一刻十四分兩角與木星皆居一直線其一角畧高向西因知食甚已遇子正二十三分丑初五分向位偏西距高弧下一十八度三十分子正四十七分丑初二刻向位距三十度丑初三分丑初三刻距西三十二度丑初十四分丑初三刻十一分尚距三十二度將復圓其邊有次影因用土星測向位然必定土星之經緯乃無遺漏當測時其本星距氐宿北星十七度二十二分距天江北第六星十三度二十分因是知其遇子
