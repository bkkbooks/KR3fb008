body:
  text: 測太陰食分算食而不測食則無以考其法之疏密故必隨測隨算了然于心目之間則視差視徑時分俱準而法亦得矣測食常法全賴目力因分太陽徑為一十分太陰徑亦如之食甚時則以所見不食之徑約略不能見之餘分設并見失光之體庻幾所食有半者依此以測猶可此外則多謬舃何也太陰未食以前欲用器測全徑食甚時又測光所存之餘徑此際甚難其光微又無從定中線故且不正合于法今補此缺用太陰地影兩徑之比例及太陰見缺之邊如啚地影心在丙得乙戊辛弧為邊太陰心在甲以其乙丁辛邊弧入影中為所
