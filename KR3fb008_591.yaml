body:
  text: 乙戊最卑距地線相減淂戊辛與午壬略等所差極微非數可計次用午乙壬形有乙角有午壬及乙壬二邉求淂壬角為公共用之數如設月距地為乙卯求視影半徑則以乙卯距地與乙辛相減淂卯辛即丁壬也所差極微用丁乙壬形有乙壬有丁壬有壬角求淂乙角為差較用加壬乙辛最高影角淂丁乙卯角為月乙卯距地相當之視影半徑也餘倣此地影實差月食時影極之大小固由于月距地之遠近然地影為太陽所生而太陽有高卑之行距地遠近不一則其下照地球所生之影長短大小又各不同前法置太陽在最高算月各距地之影令大陽
