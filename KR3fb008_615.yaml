body:
  text: 其視差甚㣲故淂太陽高度不必復求太陰高度必求細率則以太陽高度查太陰高差先加于太陽高弧淂太陰真高度也會朔時欲淂太陽高度用定會之寔時及本時之太陽躔度求之盖量高弧以天頂為宗下至地平為直角但高弧之多寡其故有三一日北極出地各方北極高下不同極出地多則高弧少極出地少則高弧多一日距午時刻太陽自東升漸高至午正而極自北漸降以至西入中間時刻不等高弧亦不等一日緯度南北太陽距赤道南北遠近日日不同在赤道北則高弧多在赤道南則高弧少緯度不等高弧亦不等故欲淂高度之真必合三者立筽乃淂寔會時各方高弧度分以求視差也求太陽赤道上高弧春秋二分無距度者如圖乙丁為地平庚為天頂庚
