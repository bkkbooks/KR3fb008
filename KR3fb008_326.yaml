body:
  text: 十四刻如前法得本圈上子午亥平行弧一百八十四度五分二十四秒加亥庚弧得子亥庚弧減全周得子庚弧一百三十一度二十二分一十秒半之取其正弦倍之得庚子線一八二二五八六八又於庚子弧加子丑得庚丑弧一百七十六度四九四四取其全弦得丑庚線一九九九二三四二諸線俱以本圈半徑戊丑為同類之比例即各弧之全弦也求之先用已子庚直角形形有已直角有子庚邊有子角求已庚邊全數與子角之正弦若子庚邊與已庚六九七一六八次用壬已庚直角形形有已直角有已庚邊有已壬庚角四十五度與丑壬子為交角故求壬庚全數與已庚若壬角之餘割線與壬庚九七六八二乙次從本圈心戊向丑庚作垂線為戊丁必平分丑庚于丁見幾何二卷得丁庚為九九九六一七一內減去壬庚存丁壬二二七九六一又以庚子丑弧反減全周得丑午庚弧內減去丑午卯半周一百八十度困丑卯線過戊心必分本圈為兩平分存卯庚弧三度十分一六半之得戊丑壬角一度三十五分八秒取其正弦二七六四五即戊丁線也因丁為直角戊丑又即圈之半徑故以戊丁壬直角形形有戊丁壬丁兩邊用勾股術求戊壬得三五八四一六即兩心之差也與戊丑本天半徑為同類約為戊丑十萬分中之三千五百八十四一六末以戊壬丁形求戊壬丁角法壬丁與戊丁若全數與壬角之切
