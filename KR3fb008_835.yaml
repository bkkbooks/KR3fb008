body:
  text: 初虧食甚復圓為限而食既生光則大陰所獨測法湏先求時對食分及食所向方位與距恒星度分乃一可得矣常法測恒星高度若未見星先測太陰自高度乃以升度求時第谷用自鳴鐘或刻漏將渾夫紀限等儀屢太陰余光邊距恒星若干或太陰恒星至正午俱以刻漏識之若太陰正在黃道九十度限則從恒星之近者起算為昜得其本心及地影心升度可知恒星距太陽度因以取準時刻有用界尺測太陰兩角或對地平圈平行或對恒星居一直線上或尺線遇兩角之中對月景兩心皆以求太陰視處定其經緯以推時刻如明萬曆癸邜四月西測月食預偹刻漏取其能細指時至分秒者試以數日令遲速脗與天合于太陰未
