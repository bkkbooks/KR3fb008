body:
  text: 算所淂會望時刻亦必是平日分之時而人目所見必為視時故須以實會時刻加減平視差分乃淂人目所見為視會也理詳五卷日躔內如啚癸庚為赤道丙庚為黃道甲為赤極設癸丁為赤道上一度則癸為今日午正丁為明日午正而太陽一平日行黃道上一度丙巳當赤道上之壬夫依平日丁為午正而視時實在壬尚居午東其較為丁壬升差則應以丁壬化時分減丁點平時而淂人目于午前某刻見太陽躔黃道上已也若依平時必俟午正太陽方躔已點安淂合天算法以黃赤兩道升度差化為時分視赤道大于黃道用加小于黃道用減又本表與月離日差表同而加減相反
