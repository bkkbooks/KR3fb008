body:
  text: 骵在午無次均兩弦時距日九十度倍離為一百八十度則月骵在己有午癸己角最大之次均若距日一百八十度望時則倍離三百六十度復在于午而無次均餘日各多寡不等今設倍離為午乙弧月骵在次輪午即作乙壬乙戊乙癸等線成乙壬戊乙癸戊二斜角形先算乙壬戊形形有乙壬次輪半徑有戊壬一萬一千三有乙壬戊角倍離度求淂壬戊乙角午亥弧及乙戊邊以壬戊乙角減壬戊癸角引數之餘淂乙戊癸角次算乙癸戊形形有乙戊有戊癸全數有乙戊癸角求淂戊癸乙角或戊丑弧為初次二均之總內減去戊癸午初均角存午癸乙角或辛丑弧為次均因乙癸線在初均午癸線之左應用減以減申庚辛寔行淂申庚丑白道視經度又求乙癸邊為月骵寔距地心線次均新啚上求次均乃西史古法後第谷詳加宻測以為未足盡月行之理為太隂之第一均數用丙夘一圈推算未盡宜用小均輪依此推算寔為合天其初均既用均輪次輪則置在下不復在自行圈上次輪半徑又定為二千一百七十四分用此推兩弦均數更宻如啚癸為地心取全數中之二千一七四為戊癸半徑作癸亥已圈為次輪行法月從癸右旋向申歴已亥而復于癸為一周其周上之弧即倍離度朔望時月在癸兩弦時在已一月二周俱與前同如上弦後倍離為癸己亥弧月止亥即取亥為心全數為度作甲丑大圈為月本天又作庚沖過亥心線定庚為最髙
