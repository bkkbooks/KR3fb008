body:
  text: 缺自乙至辛作直線更一直線聯其兩心及兩邊交切之界于乙或辛為甲乙乙丙及甲丙而甲丙及乙辛以直角相交于已使太陰入影邊乙丁辛為六十度因半之于丁得乙丁對乙甲已用為三十度必餘角甲乙已為六十度已為直角故也甲乙割線二萬乙已一萬則以甲乙與乙丙之比例乙丙得六萬為丙乙已角之割線查弧八十度二十四分本角之切線五九一二三六為丙已而甲已為甲乙巳角之切線一七三二五兩切線為甲乙及丙戊所減甲丁與甲乙丙戊與丙乙自相等余丁已二六七九五戊已八七六四并之得三五五五九為甲乙二萬分比例之分因以推太陰之食全蓋設太陰半徑得一十六分與之相乘用二萬除得食二分五十一
