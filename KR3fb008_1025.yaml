body:
  text: 五百餘日一周水星一日順行三度六分一百十五日一周凡星在丙距地極遠為合伏晨伏自丙右行至子為畄夕畄行半周至申距地極近為退合伏夕伏以日骵在戊未之間人目在甲故不能沖太陽而為合伏伏後上行至醜又留晨畄至丙再合伏晨伏滿伏見輪一周生在醜丙子上半周順行在子申醜下半周逆行在醜子兩
