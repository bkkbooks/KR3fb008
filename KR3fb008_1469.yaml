  text: 求寔望置平望加減寔距時淂寔望加滿二十四時則是寔望進一日不足減者借一日作二十四時則寔望退一日推寔交周苐五求交周距弧用交食周日諸平行表以寔距時之時分秒各察其典太隂交周相對之数而并之淂交周距弧寔距時為加者亦為加寔距時為減者亦為減求寔望平交周置平望太隂交周加減交周距弧淂寔望平交周
