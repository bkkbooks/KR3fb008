body:
  text: 甲為度作子辛中白道圈兩交黃道于壬于辛為正交壬為中交而壬辛兩點即兩交平行度所至也表所列正交宮度皆以辛點所至為限壬辛每日逆行三分十一秒恆平行其子卯之相距即五度八分為兩平交之大距也既定兩平交之距求各度之交均與距限如啚甲為黃極卯未圈為黃道丁為平白道極子壬戊圈為平白道壬為正交平行所在子卯相距五度八分與甲丁等次以二道最小之距四度五十八分三十秒與最大之距五度十七分三十秒相減淂大小之較十九分即用為乙丙徑以丁平白道極為極作丙辰乙小圈丁乙半徑為九分三十秒此圈繞平白道極環行如黃極之繞赤極凡正白道之極旋居于小輪周上而輪上之行度從乙最近起算最近甲黃道極也右旋向戊過丙而復于乙滿一周為十四日有竒一日行二十四度餘即月距日之倍離也朔望時月在乙距甲黃極最近故為最小之距乙即為朔望時之正白道極作丑壬正白道圈其大距為丑卯四度五八三即乙甲也兩弦時月在丙倍離一百八十度距甲黃極最逺故為最大之距丙即兩弦時之正白道極作癸申正白道其大距為癸卯五度十七分三即丙甲也而子丑子癸為與中白道子卯之差即丙丁半徑之數至于效均當朔望與兩
