body:
  text: 地十八度起至四十二度中國見食地面寶日食之限則最廣者太隂距南其交常七度三十一分太隂距北其交常度一十七度三十五分為可食之限最狹者太隂距南交常七度距北交常一十六度五十三分為必食之限其所由廣狹者因二徑折半有大有小即相會時所當距度不同故所限交周度亦異也太隂分南北而寶日食之限有二義其一論地搃本界中有一方馬距北之最大者以十七度為限又有一方馬距南之最大者以七度為限非謂一方所見距北可十七距南又可尋七也其一論黄道度謂本界中有地有時太隂或南或北距天頂最遠則其視距度最大以加于太隂寔距度尋其最大限在北可至十七度在南可尋七度亦非
