body:
  text: 與次日一周線相離甚近以次漸逺迄春分而甚逺過此漸近迄夏至而甚近過此又漸逺如是循環無窮又冬至初日之線螺圈甚小次日漸大至春分甚大過此漸小迄夏至而甚小以太陽緯行冬夏至皆小圈赤道為大圈故也但螺旋之行自東而西每日不及一度雖于理甚合而無法可推今曆家立算分計每日所行各行于赤道侶圈皆在兩赤道極之間又總計每歲所行皆行于黃道在兩黃道極之間其一日一周則為自西而東每日東行一度共三百六十五日有竒而行黃道一周為右旋之度其隨宗動一周出沒晝夜于以分焉太陽出沒在正球春分日太陽出于東方而赤道即東西圈漸升至頂極至子午圈為最髙之弧此地平上之半晝分也亦謂之東半晝弧午正後漸降至地平謂之西半晝弧東西合則為全弧行晝全弧為一晝正球一日之中地平上立表即淂影日出時則為無窮之西影漸短至頂僅得一點午正後影漸長至西地平復為無窮之東影日既入地平下則朦朧分行地平下十八度餘光俱盡為夜如啚甲乙為赤道即東西圈丙甲丁為子午圈甲髙九十度滿一象限已戊為表日出辛表端影在庚至壬影在癸至庚則在辛也至甲影止一點丙丁即地平入地平下十八度為丁丑而光乃盡
