body:
  text: 小欹球之朦極大在夏至而極小不在冬至其極小者約在分後至前然亦隨地不同如極出地四十度夏至之朦八刻十六分為極大冬至則七刻最小者六刻二十六分在寒露之中候五日也里差刻分凡太陽出沒及節氣朔望交食等時刻皆隨地所居不同如人在一處見太陽為午正時若往東二萬五千里則見為酉正往西二萬五千里則為卯正以地為圓骵故也其比例天周十二時與地周九萬里若距元里數與所差刻分今以京師為里差之元在東者加在西者減每加減四分為經度一度一刻為經度三度四十五分盛京加二刻朝鮮加二刻十分浙江福建加十二分江南加八分山東加五分以上地在京師之東皆加江西減十分河南湖廣減一刻廣東山西減一刻五分
