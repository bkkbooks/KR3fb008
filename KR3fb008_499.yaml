body:
  text: 乙視角為小而入遂見丙丁大于甲乙寔則两物之骵等也故凢物未㝎其遠近目不䏻㝎其寔大小一两物大小不等若大遠小近視之若等如甲乙两物甲骵夲大于乙骵因甲遠乙近目視甲之丙目丁角與視乙之己目戊角竟若相等則目㝎两物之大小亦等而不䏻見甲之寔大于乙也測日月視徑凢視大小之度在瞳心之視角角之度分即對弧之度分夫人目在大圜之中則天上度分為人目所㝎視大小之度分故論日月視徑皆用周天度今用儀測淂太陽視徑度冬至
