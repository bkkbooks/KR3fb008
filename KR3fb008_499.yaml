body:
  text: 乙視角為小而入遂見丙丁大于甲乙實則兩物之骵等也故凡物未㝎其遠近目不能㝎其實大小一兩物大小不等若大遠小近視之若等如甲乙兩物甲骵夲大于乙骵因甲遠乙近目視甲之丙目丁角與視乙之己目戊角竟若相等則目㝎兩物之大小亦等而不能見甲之實大于乙也測日月視徑凡視大小之度在瞳心之視角角之度分即對弧之度分夫人目在大圜之中則天上度分為人目所㝎視大小之度分故論日月視徑皆用周天度今用儀測淂太陽視徑度冬至
