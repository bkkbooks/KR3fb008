body:
  text: 丙如前法作鬥弧距最高一百五十度至辰本天心復行至癸作牛弧距最高一百八十度至申本天心復行至壬作戊弧平行滿半周用半圈省法水星骵所歷巳丁庚辛諸點以線連之成巳辛戊撱形圈上下寬而中腰窄乃水星本天象也其最卑左右距地心線如牛甲鬥甲皆若相等故星伏見輪心到此其與太陽大距度不見有大小若土木火金四星則不然矣新法水星本天象不用不同心圈仍用兩小輪立算一本輪一均輪然其均輪上之行亦三倍于自行而以均輪上星所歷各點連之亦成一撱形圈與古圖無異蓋用不同心圈與用小輪為異名同理也如啚酉為地心子寅辰圈為水星平行天子為最高所在設星平
