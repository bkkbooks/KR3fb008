body:
  text: 對角作甲丁線分為甲乙丁甲丙丁兩形此兩形必等何則試作戊巳線與乙丙平行則両形為平行線內三角形等髙丁乙丁丙兩底又等則兩形自等十八等髙之三角形方形自相與為比例與其底之比例等如甲乙丙丁戊巳兩角形等髙在兩平行線内其底為乙丙戊巳庚丙辛戊兩方形等髙其底亦用乙丙戊巳此兩三角形與兩方形之比例皆若乙丙與戊巳盖言甲乙丙形與丁戊已形之比例丙庚方與戊辛方之比例皆若乙丙邉與戊巳邉大小之比例也十九兩平等方形等一角又等即等角旁之兩邉為互相似之邉依顯両三角形其形等有一角等其等角旁之兩邉亦為互相似之邉如甲乙丙辛與巳戊巳庚兩平行方形其形等甲乙丙庚乙戊兩角又等則此兩方形之邉為互相似之比例甲乙與乙庚之比例若戊乙與乙丙之比例又両三角形其形等有一角等而邉為互相似者如丙甲庚戊兩方形內試作丙甲庚戍兩對角線各分方形為兩平分則成乙戊庚丙乙甲兩三
