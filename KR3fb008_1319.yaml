  text: 置正交年根減正交日數不足減者加十二宮減之淂正交平行正交廷行故減求均數時差用日躔均數時差表以本太陽引數宮度察其所對之分秒淂均數時差並記加減號求升度時差用日躔升度時差表以本日太陽黃道經度察其所對之分秒淂升度時差並高加減號求時差搃均數時差與升度時差同為加者則相加為時差搃仍為加同為減者亦相加為時差搃仍為減一為加一為減者則相減為時差
