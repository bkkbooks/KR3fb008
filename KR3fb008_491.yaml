body:
  text: 不食者半食于夜日食則此方所見他方所不見耳日骵恆居一直線之此界其彼界則月骵地骵疊居焉若月居末界即月靣之日光食于地影矣地居末界即地靣之日光食于月影矣如圖甲為地已為日卯辰圖為黃道乙丙為白道其大距五度弱丁戊為兩交論月食日照地球其光自庚辛至地切兩旁過之而復合于壬自甲至壬角骵之形為地影地影之心恆隨太陽而行黃道中線若躔處去兩交遠二徑折半小于兩道之距度分月行本道徔旁相過不能逮及則不食矣若正遇于西交或交之左右二徑折半大于二道之距度分則兩相涉入月為之食其食分多寡在距度廣狹距度廣狹在去交遠近也論日食則人目所見恆在地靣推
