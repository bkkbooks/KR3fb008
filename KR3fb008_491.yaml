body:
  text: 不食者半食于夜日食則此方所見他方所不見耳日骵恒居一直線之此界其彼界則月骵地骵叠居焉若月居末界即月靣之日光食于地影矣地居末界即地靣之日光食于月影矣如圖甲為地已為日夘辰圖為黄道乙丙為白道其大距五度弱丁戊為两交論月食日炤地球其光自庚辛至地切两旁過之而復合于壬自甲至壬角骵之形為地影地影之心恒随太陽而行黄道中線若躔䖏去两交遠二徑折半小于两道之距度分月行本道徔旁相過不能逮及則不食矣若正遇于西交或交之左右二徑折半大于二道之距度分則两相涉入月為之食其食分多寡在距度廣狹距度廣狹在去交遠近也論日食則人目所見恒在地靣推
