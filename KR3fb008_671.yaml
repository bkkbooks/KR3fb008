body:
  text: 六分四十二秒用二十四小時分之潯三十分二十八秒三十七微為一小時平行距月度次以太隂一日自行度赤以二十四時而一潯一小時自行三十二分四十秒次以所設月自行度入加減差表查其相當一度內之均數再用中比例法求其一小時自行之均數以加減小于一小時距平行潯一小時距日寔行如月自行四宫二十七度求潯三十二分五十三秒乃一小時寔行也九子行在最貴左右三宮均數用減最畀左右三宮用加求視會復筭視差之故寔會與視會不同為有地半徑之差則依前法求視會與寔會之時差以加減于寔會時刻可潯日月正視會之時刻然日食與九
