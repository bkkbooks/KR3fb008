body:
  text: 本輪壬丙甲壬角為均數其實度亦在黃道辛而淂日月地三骵參居甲壬辛一直線以為實會顧此時二曜之實行則同度而平行反不同日在庚月在癸其庚癸兩平行之距即中會時月距日之弧蓋中會平行同度而實行不同實會則實行同度而平行不同也而求中會與實會無異者惟日月皆在最高卑之一點其差之最大者日月各在兩留餘際時中會時日月之距至七度二分加時為一十四時也日最大加減差二度三分月最大加減差四度五十九分設二差為一加一減冝相并共淂七度餘為最大距日弧復求實會時刻日月之行天變動不居故須先用平行以漸推其實行而實行又
