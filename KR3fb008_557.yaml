body:
  text: 本輪壬丙甲壬角為均数其寔度亦在黄道辛而淂日月地三骵叅居甲壬辛一直線以為寔會頋此時二曜之寔行則同度而平行反不同日在庚月在癸其庚癸两平行之距即中會時月距日之弧盖中會平行同度而寔行不同寔會則寔行同度而平行不同也而求中會與寔會無異者惟日月皆在最高𤰞之一點其差之最大者日月各在两㽞餘際時中會時日月之距至七度二分加時為一十四時也日最大加减差二度三分月最大加减差四度五十九分設二差為一加一减冝相并共淂七度餘為最大距日弧復求寔會時刻日月之行天變动不居故湏先用平行以漸推其寔行而寔行又
