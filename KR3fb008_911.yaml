body:
  text: 丁一六九四二九即甲丁甲戊戊丁乙四線為同類四甲乙戊形有戊角四十九度五十七分半乘甲乙弧為前二測中積之木星平行又有甲戊甲乙兩邊依法求甲乙邊淂一三七七四一五甲乙線有兩數一為甲乙弧九十九度五十五分之全弦一五三一一六一為前推淂之一三七七四一以兩率通之求甲戊線與甲乙弦為同類淂甲戊弦六九六五四求弧淂甲戊弧四十度四十六分六戊甲甲乙乙丙三弧並之淂一百七十四度七分求其全弦淂一九九七三四戊丙線也七戊甲丙弧不滿半周即圈之心必在戊丙弦外試置在巳作庚
