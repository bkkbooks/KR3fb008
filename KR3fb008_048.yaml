body:
  text: 三角形各角之正弦與其對邊之比例等甲乙丙鈍角形其各角正弦與對邊能為比例者試以乙甲邊為半徑三邊可任用作甲戊為乙角正弦次引丙甲至辛令與乙甲等作辛巳為丙甲正弦凡取正弦必齊同其半徑始可較正弦之大小以正弦從半徑而生故也又作乙壬為鈍角正弦凡鈍角以外角正弦為正弦乙壬亦以乙甲為半徑或取丙庚與乙丙等作庚丁與辛巳平行亦即甲角正弦必與乙壬等故則三正弦所成甲戊丙辛巳丙乙壬丙庚丁丙諸形俱相似而比例等故乙角正弦甲戊與甲丙對邊若丙角正弦辛巳與對邊辛丙即乙甲或亦若甲角正弦乙壬庚丁同與對邊庚丙即乙丙若竟以庚丁代乙壬則形之三邊盡為弦甲而三角正弦為股同角丙角而為同比例無疑矣又如次啚甲乙丙鈍角形于形外作圈令甲乙丙三角俱切圈界則是各角之對邊即各角對弧之通弦也故三邊之比例即三正弦之比例正弦為通弦之半角正弦即用對弧之半以負圈角必大于分圈角也三角形有三角即有三邊之比例如丙角六十度其正弦為八六六三甲角四十五度其正弦七七一四則乙甲邊與乙丙邊之大小若八六六三與七七一四也其丙甲與甲乙若乙角七十五度之正弦與八六六三甲丙與丙乙同理而甲乙
