body:
  text: 何其甲與乙若戊與巳又此之後乙與他率丙若彼之他率丁與前戊是錯也今平推甲與丙若丁與巳也十四凡三角形相當之各角等其各等角旁兩線之比例俱等甲乙丙丁戊已兩三角形甲丁兩角相等乙與戊丙與巳亦各等而兩形相似則甲角旁之兩邉甲乙與甲丙大小之比若丁角旁兩邉丁戊與丁巳大小之比而乙角旁之乙甲乙丙與戊角旁之戊丁戊巳丙角旁之丙甲丙乙與巳角旁之巳丁巳戊其比例亦同夫甲丙與甲乙既若丁巳與丁戊則甲丙甲乙丁已丁戊四邉成四率斷比例如有三率即可淂四率丁戊邉已已可依顯凡直線相似形其三角三邉皆能為比例用三率法可推其不知之邉或角其用至大也十五兩相似形其邉相與為比例有斷比例有連比例如一啚甲戊丁形以甲丁邉平分子丙作乙丙線與戊丁平行即甲乙丙甲戊丁兩形相似其邉之比例甲丙與甲乙若丁丙即甲丙與乙戊為連比例也如二啚丙甲丁直角形後甲作甲乙垂線分元形為甲乙丙甲乙丁兩直角形此兩形自相似亦與元形相似則其邉丙丁與丁甲若丁甲與丁乙亦為連比例而甲丁為中率若三
