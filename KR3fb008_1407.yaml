body:
  text: 求金水日數以所設日數與金水每日平行金星三千五百四十八秒三三五一六九水星同相乘淂數為秒以宮度分收之淂金水日數求最高日數以所設日數與金水最高每日平行金星為十分秒之二又二七一九五水星十分秒之二又八八一一九三相乘淂數為秒以分收之淂最高日數求伏見日數以所設日數與金水伏見每日平行金星為二千二百一十九秒四三一一八八六水星一萬一千一百八十四秒一一六五二四八相乘淂數為秒以宮度分收之淂伏見日數求金水平行
