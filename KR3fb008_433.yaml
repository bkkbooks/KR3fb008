body:
  text: 于次輪周上生亥午癸次均角以甲平最髙為加減之界夫古法置次輪在上新法置次輪在下啚式逈異蓋以新法算初均既用小均輪則有均輪上子丑午角之差而次輪不能復置在上用不同心圈術也然欲置在上亦有法焉如啚依前法癸地心癸己圈為次輪癸亥弧為倍離庚卑丑為月自行作本輪均輪月居午淂丑亥午角為初均次輪月居亥淂亥午癸角為次均今以午為最近置次輪在上法從午取乙午與癸戊等為次輪半徑與申丑平行次乙為心午為界作午壬次輪圈午為最近辰為最逺則此圈上所生之次均與在下癸己次輪之次均等午為朔望辰為兩弦周上為倍離亦悉與癸己圈同試取午未倍離度與癸亥等作午未未亥二線則午亥未次均角必與亥午癸次均角等以亥未午癸為斜方形午亥為對角線則未亥午角必與亥午癸角等所以然者以辰午次輪徑恆設與申丑平行亦即與己癸平行故也辰午既與己癸午行而等則未午癸亥同為倍離之全弦亦必平行而等故亥未午癸成斜方形而兩兩相等也惟辰午次輪徑不能如古法與午丑為一直線恆與申丑為平行以均輪上有子丑午角之差其勢相拗第
