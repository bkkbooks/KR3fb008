  text: 距日寔行求食甚距時以月距日寔行化秒為一率三千六百秒為二率交周升度差化秒為三率求淂四率為秒以分收之淂食甚距時交周升度差加者亦為加交周升度差減者亦為減求食甚用時置寔朔用時加減食甚距時淂食甚用時推食甚近時苐九求用時春分距午時分用交食北極高四十度黃平象限表以太陽黃道經度察黃道宮
