body:
  text: 圜中太氣無不受日之焒光在壬癸者遇于蒙氣即內斂至于邜辰此為初折從邜辰切地而遇若遂以直線引之即復合于辛成邜辰辛雜線三角形為地之滿影自此以外全影之中皆得太陽折焒之光與朦朧次光相類而實為初影能食望月之滿光也欲求滿影之長姑先依初折之光引直線復出于蒙氣之外姑先云者不宜遽引直線也蓋初折之光至于辰邜既抵地面又復內斂謂之次折則兩線之交尚在辛點之內今云然者姑先明初折之理約定乙辛之數如太陰之言交泛言平朔言本輪也其次折光之理後詳言之乃求辛點以內之定距率矣而借第谷所測清蒙差與多祿某所定地影角之大得辛辰庚角三十四分近地平氣差太率如此得邜庚奈何全形一十五分三十六秒半之為辛庚辰角一十二分四十八秒其相對之外角乙辛辰為四十六分四十八秒
