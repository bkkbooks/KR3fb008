body:
  text: 求視緯以星距地用數為一率星距黃道線為二率半徑一千萬為三率求淂四率為視緯之正弦檢表淂視緯求黃道宿度依日躔求宿度法求淂本年黃道宿鈴察黃道實行足減本年黃道宿鈴內某宿度分則減之餘為黃道宿度推五星伏見及交宮同度法求土木火三星合伏時刻土木火三星黃道寔行與太陽寔行同宮同度為合伏皆乙太陽
