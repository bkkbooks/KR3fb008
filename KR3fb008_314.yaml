body:
  text: 太陽暦象以齊七政首日躔者所以齊之也日躔曷為能齊七政者凡測量之法必自其根始如度樹之長短地為其根度舟行之逺近水次為其根度天行之根有二其一在天行之內歲首是也古法以今歲之十一月冬至為來年之天正歲首冬至者日軌髙度分之極少日躔赤道緯之極南也其一在天行之外暦元是也自昔推暦元者必求上古之積年後來歲實稍宻即無數可論故至授時而廢不用授時以至元辛已為暦元以其氣應為根而求通積以歲寔而一得冬至然此所得者皆平年之冬至非定冬至也今法以天聪戊辰年冬至後一日子正初刻為暦元依恒年表求其根數為平冬至因以法加減之為定冬至定冬至者歲歲加減初無通積可求盖日軌度之真極少日緯度之真極南也是則天行之兩根舎日躔皆無從取之矣然此兩根六曜皆有行度皆可用以為歲首為暦元獨取日躔者其故亦有二其一七曜之中獨日躔之行為甚順其一以他曜測不若以日躔測為甚便何謂甚順太陽之行與本天之行相合為一由黃道帶之最中無出入歲月日時各平行有恒度分無永短如是者皆終古不易他曜之行于本天本行之外各有小輪各有距緯度各有遲疾留送時時不等雖有定法而似無法焉能為他行之準何謂甚便日光甚大用
