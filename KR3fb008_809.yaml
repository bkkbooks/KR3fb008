body:
  text: 本圈上方餘光先至而左右尚未及必圈小宜換大若左右先與光齊而上方未及則圈大宜換小總以正合為準如明萬曆辛丑冬至後兩日西測日食用本器大方中圈設一百二十分小方圈七十五分兩數總而半之得九十二分三十秒即初虧時太陰與太陽以中心相距之分任取無度數之分故至食甚時所見食之分略得八分此中必減去餘分乃兩心相距之分第先定太陰視徑因小方圈正食于影而設徑有七十五分二十八秒以加孔徑一十六分三十秒總得九十二分以此求度數之分得太陰在最高本徑三十分三十秒若求食之分因當時形中得食八分徑平分十二分之十分以比例法算得七十四分任取分之分與兩心初虧相距之分相減餘一
