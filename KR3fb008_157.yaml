body:
  text: 切線在圓界外四曰割線在圓界之內外弦者直線在圈內彼此點至彼點分圈為兩分凡弦皆對兩弧一上一下如啚甲乙為弦分甲丙乙丁圈為兩分甲丁乙為大分甲丙乙為小分則甲乙弦上當甲丙乙小弧下當甲丁乙大弧正弦者從弧作垂線至全徑上如啚從丁作甲乙之垂線若從丁直至戊則為通弦故丁丙為半弦半弦又有二種有正弦有倒弦正半弦是直線在半圈內從弧作垂線至徑上分半圈為不等之兩分一大弧一小弧比半弦者當小弧亦當大弧如啚從已弧下至甲乙全徑上作已庚垂線分甲丙乙半圈為不等兩分乙已弧為小分已丙甲弧為大分則已庚為已乙小弧之半弦又為已丙甲大弧之半弦正半弦從一點作兩半弦第一為前半弦第二為後半弦又為餘弧弦又為較弦如前啚設已庚為前半弦其已戊即為後半弦又為餘為較者乙已丙弧九十度乙已不足九十度則已丙為餘弧亦為較弧故已
