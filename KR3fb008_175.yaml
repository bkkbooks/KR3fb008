body:
  text: 上方減子辛上方子辛即戊率餘開方得已辛八百九萬一百七十已辛已庚相減餘辛庚三百九萬一百七十辛庚即戊癸也次以戊癸為勾乙癸為股求得乙戊弦四百一十五萬八千二百三十四為十五邊等形之一邊其乙戊弧為全圈十五分之一得二十四度則乙戊為二十四度相當之弦新增十八邊形圈內作十八等邊內切形求邊數法曰半徑上作連比例四率使一率與四率并與三倍二率等其二率即十八等邊形之一邊如圖乙丙弧十八分圈之一為二十度即從甲心作甲丙甲乙兩半徑乙丙為十八邊形之邊又從乙作乙庚線與甲乙半徑相等則丙乙庚角必與丙甲乙角等何則乙庚既與甲乙等則乙丙庚弧必為六十度以乙庚為乙丙庚弧之通弦故因淂丙庚為四十度倍大于乙丙而丙乙庚為乘圈角乘丙庚弧必與丙甲乙角等夫乙丙戊形之乙角既等于甲乙丙形之甲角又同用甲丙乙角則其餘丙戊乙角亦必與甲乙丙角等而兩形為相似形其乙戊邊亦與乙丙邊等因顯乙庚辛形之庚已邊與辛庚亦等次從丙作丙丁線與甲辛平行則丁丙戊形之戊丙丁角與辛甲丙角等亦即與戊乙丙角等又與丙乙戊形同用戊角則丙戊丁亦為兩腰等形與戊丙乙形相似亦即與甲丙乙形相似是戊丙
