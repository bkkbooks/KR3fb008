body:
  text: 庚一線內直指黃道淂丙則為日月實相望之度若太陽在辛太隂在癸則日月兩平行雖同度子甲壬一線而實度一在辛一在丑壬辛為太陽減均壬丑為太隂加均總淂丑辛為平會時月距日之弧則宜以月行丑辛弧相當之時分減平會時刻淂丑月退至辛而與日同度于辛甲一線為實會也兒丑辛弧所曆時刻月在日前則減月在日後則加總以月後日由月行疾于日故也太陽本天加減差太陽行度有本天之高早以生加減則中會時平行度分尚非實骵所在法冝推其加減之差以求實度如圖甲為地心外圈為黃道已為冬至內圈為日本天丙為最高隱為本天之心甲乙為兩
