body:
  text: 弦則無加減何則弦望時兩正白道之乙丙二極與甲丁二極同在甲癸弧內則丙極之癸夘距度與乙極之丑夘距度亦必在甲癸弧內而其兩交黃道之一㸃必仍在辛與壬以兩交左右距大距䖏必各為九十度故也而辛壬即正交平行之度故朔望及兩弦有距限而無交均也如倍離為乙戊弧度止戊即戊為正白道之極作午寅正白道圈次從甲過戊作甲午過白極圈淂午未為大距度與甲戊等而此午寅圈必一交黃道于己一交于庚不能仍在壬辛二㸃與平交之差為壬己庚辛即交均也而壬己弧與未夘等為丁甲戊角之度甲為黃極故凡正白道之極在乙戊丙前半周己定交恒在平交之後交均應減在丙辰乙後半周己定交恒在平交之前交均應加求之用丁甲戊曲線斜角形形有丁甲邊五度八分有丁戊半徑九分三十秒有甲子戊角倍離度依法求甲戊弧淂午未距限求丁甲戊角淂壬己交均皆乙戊倍離相當之數也列表以距日度為引數求之求黃白二道同升度黃白兩道之升度理與黃赤二道之升度同但黃白道之交角甚小其升差亦甚微今以中數五度八分為主求同升差列表如
