body:
  text: 兩角并為均數第谷以辛甲戊角為均數而所淂又等其圖式逈異者何故試觀丁甲己辛形丁辛與己甲等又兩平行辛甲與丁己等以俱為全數故亦兩平行丁己丑與辛甲酉兩角之引數等則辛甲丁己兩線必平行是丁甲辛己為兩邊等斜方形而丁甲為對角線丁甲既為對角線己丁甲丁甲辛兩角必等則第谷之以丁甲辛角并丁甲戊為均數與歌白泥之以己丁甲角并丁甲戊角為均數必相等矣盖第谷用庚壬本輪上之辛甲丁角代不同心圈之己甲丁角而小均輪上之丁甲戊角則兩家同用其七政骵俱在戊若以兩家最髙卑距地心線折半必俱在午共淂午為大均圈心以七政骵所歴各戊㸃聯之亦共成癸成亥大均圈故用均小輪寔與前異名而同理也第谷小均輪上行度己戊弧必倍于庚丁自行度者何故曰歌白泥置七政骵在戊第谷均輪之行從乙最近起算則乙戊弧必淂庚丁之倍何則丁己與庚甲平行其庚辛丁辛丁己兩角必等即庚丁引與乙未弧等而未戊弧原設與庚丁等是乙戊弧為庚丁之倍數矣而庚丁本與酉辛等故均輪之行必倍于自行以七政骵仍在戊㸃故耳第各兩小輪全圖甲為地心丙癸丁為引數平行圈與地同心或即本天平行圈丙為最髙經度所在癸為沖如七政自行在最高丙即以丙為心取前兩心差八之六為乙丙半徑作乙夘本輪以代不同心圈乙為最高夘為最卑七政平行在丙則在本輪上
