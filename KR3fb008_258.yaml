body:
  text: 交之分則一中圈天元赤道是也足矣然地在中心不能透明明為地隔隨人所居所見止有半天其分明分暗處有一大圈即地平圈也地球之大人居其面明暗所分處處各異故隨在有一地平圈地平圈分四象限定天下之東西南北四象限分三百六十度是為地平之經度地平之兩端一在人頂為頂極一在人對足之下為底極地平之左右各有距等小圈從大圈至極各九十為地平之緯度其算以大圈為初度次小圈為一度其最髙為九十度即頂極下亦如之其最下為九十度即底極也從平地經度每度出一過頂大圈凡一百八十以定方維之數其用最大者有二一曰地平東西圈即正卯酉一曰地平南北圈即正子午如天元赤道上之有極分極至二圈也如啚甲乙為地平丙為頂極丁為底極丙戊丁南北圈也甲丙乙丁東西圈也丙子丁丙丑丁皆經圈庚寅辛壬卯癸皆緯圈算地平之經度或從東西圈起或從南北圈起其緯度或從地平起或從頂極起理同地骵渾圓故球之上第一㸃各有一地平圈從人所居極目四望者即是其多無數諸曜出沒之限于此分焉如啚戊已為地甲乙丙丁為天人在戊即甲丙是其地平而庚為頂極人在已即乙丁
  hash: sha256:f5690d1c5f750d61ce6258657a6ecf18b05cd5b080b5d6af165a012083381de4
