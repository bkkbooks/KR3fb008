body:
  text: 角形乙己庚形三角皆銳為三邊銳角形凡球上形三角之銳鈍上十種可盡其變九曲線形之三邊有十種一九十度正二九十度大三九十度小四二邊正一邊大五二邊正一邊小六一正二大七一正二小八一正一小一大九二小餘一邊大十二大餘一邊小如前一啚甲戊丙形甲戊邊小丙甲丙戊二邊大二啚甲戊乙形三邊俱正己戊丁形戊己戊丁二邊正己丁邊大甲戊己形甲己邊小餘二邊正三啚之乙己庚形三邊俱小乙甲丙形甲丙邊大餘二邊小甲戊丙形三邊皆大四啚之甲戊丙形戊丙邊正餘二邊大丁甲乙形丁乙邊正餘二邊小乙丙甲形甲丙邊大乙丙邊正甲乙邊小凢球上形三邊之大小此十種亦盡其變十兩曲線形或邊或角有三件等則兩形之餘三件必等為等形十一兩曲線形兩形之三角等則兩形之三邊必等為等形十二曲線形以三邊三角各引之成全圈必成多形皆與元形相當或淂其邊或淂其角或邊易為角角易為邊此條詳後論曲直線形異同十二則一直線形三角為弧三邊為直線曲線形三角為弧三邊亦為弧二直線直角形有兩邊可用勾股法求其三曲線形否
