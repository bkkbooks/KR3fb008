body:
  text: 古則置中積分減氣應淂通積分通積分者乃所求本年天正冬至距曆無甲子年天正冬至前甲子日子正初刻之日分也求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考徃古則以所餘轉與紀法六址相減餘為天正冬至日分自初日甲子起算淂天正冬至干支以一千四百四十分通其小餘淂天正冬至時分秒天正冬至者乃所求本年天正平冬至距冬至前甲子日子正初刻之日分也求年根以周日一萬分為一率太陽每日平行三千五百四十八秒三三零五一六九為二率以天正冬至分不用日與周日一萬分相減餘
