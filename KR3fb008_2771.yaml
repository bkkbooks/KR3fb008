  text: 暦象考成金星均數表金星均數表以引數宮度求初均及中分以伏見實行宮度求次均及較分初宮至五宮依次順列扵前六宮至十一宮依次逆列扵後表名初均者乃金星本輪均輪所生之均數順度為減逆度為加中分者則逐宮逐度次輪心距地心與最高距地心之較為六十分中之幾分也求中分之法以金星次輪心在最高距地心之一一四三一
