body:
  text: 方相對之內角亦等同方兩內角并亦與兩直角等如啚有甲乙丙丁二平行線加他直線戊已交于庚于辛其所作甲庚辛與丁辛已內相對兩角必等戊庚甲外角與同方相對之巳辛丙內角亦必等其甲庚辛丙辛已両內角并亦必與兩直角等盖凢平行線所作角俱両兩相等十兩直線有他直線交加其上若內相對兩角等即兩直線必平行十一凡量角之尺度以角㸃為心作全圈次以角相連兩邉引出之抵圈界所限圈周之度分即此角之大如乙線與辛已線相遇于甲作乙甲辛乙甲已銳鈍兩角欲知此兩角之度則以甲㸃為心取甲乙為半徑作乙丁丙全圈先以乙丙圈平分為若干度分數見下次以甲已引之至庚甲辛截之于丁而乙甲甲庚兩線所限乙庚弧即乙甲巳銳角之大也其乙丁弧即乙甲辛鈍角之大也左右兩甲角并之必為半圈分若直角如戊甲丁戊甲庚其度必全圈四分之一兩直角并之恰成半圈與銳鈍兩角并等或用甲辛為半徑作圈理同十二凢圈周不論大小立算皆平分三百六十度以為角之量直角九十度鈍角大銳角不及
