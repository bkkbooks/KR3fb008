body:
  text: 也定望時地在日月之間人在地平無兩見之理而恆得兩見或日未西沒而已見月食于東日已東出而尚見月食于西或髙山之上見日月出入以較曆家算定時刻每先升而後墜此升卑為髙也但此氣有厚薄有髙下氣盛則厚而髙氣減則薄而下厚且髙則映像愈大升像愈髙薄且下則映像不甚大升像亦不甚髙其所由厚且髙者若海若江湖水氣多也或水少而土虗浮此氣能令輕塵上升亦厚且髙也地勢不等氣勢亦不等故受蒙者其勢亦不等又早晚之間蒙氣亦不等蓋晝則太陽能消濕氣至暮而晝夜則復生漸生漸盛及晨而多故蒙氣又有晝夜早晚之差然其本性止能升物像令髙于實在之所不能偏左偏右故其差恆在緯度而不在經度凡欲定日月五星列宿之髙度宜先定本地之蒙氣差今本表定京師地面地平上為三十四分日軌髙至四十五度則無差矣測法先算得某時刻太陽髙度內減去地半徑差淂數次用器測之必大于所推之髙相較即清蒙差如啚甲乙丙為子午圈甲戊丙為地平之一弧丁為北極乙為天頂己為太陽作乙辛戊為髙弧圈過太陽之實高已亦過太陽之視髙辛次從北極丁作丁已弧為太陽距北極之度成丁已乙曲線三角形有丁乙邊為北極髙之餘有丁已日距極度有丁乙已角
