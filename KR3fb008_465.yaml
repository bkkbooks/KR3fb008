body:
  text: 所致夫晦在朔後晦失也朔在晦前朔失也曆則失之而歸咎于政誣甚矣蓋月見之有疾遲其因有三一由于赤道上之黃道升降度有斜有正正升則斜降斜升則正降正升斜降者秋半周六宮是也秋分左右各三宮斜升正降者春半周六宮是也春分左右各三宮正升者亦道之升度多黃道之升度少正降者赤道之降數多黃道之降數少斜升斜降則反是皆論斜球非正平球若太隂離正降六宮則朔後疾見若離斜降六宮則朔後遲見其在晦前亦如之離正升六宮則遲隱離斜升六宮則疾隱也一由于緯度之南北月在緯北則入地後黃道為疾見若在緯南則入先黃道為遲見也一由于視行度之遲疾若月視行為遲假則朔後見月遲若疾假則朔後見月疾也今定月之見界以十五度為限若三因并合如合朔在亥子間又不待此晦日太陽未出亦見東方朔入太陽己入亦見西方又極出地度甚髙朔後恆數日不見如月距黃道南五度極出地六十二度則晝夜不見矣外此更有朦朧分及清濁氣差亦能稍變遲速之限總之月見伏之遲疾由乎天度因乎地度皆有理可明有數可推也論月骵月骵為圓球何以知之凡圖骵于諸骵中為最尊如天地日星皆為圓球又凡物之初骵皆圓諸大皆始造之初骵故應圓又月之骵半為明半為魄其明魄之界時為弦直線時為弧曲線若平
