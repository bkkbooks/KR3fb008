body:
  text: 別法求時刻而于衡之末以直角加橫平方其甲乙直線及渾衡亦合于高弧圈之面若不用量方兩尺依前第二法用兩方形有圈者以上方進入下方之中圈直至形前掩影周圍與光齊而左右小條當方尺與兩餘光之角或相積或平行其外銳亦指本影所向之方與前同如太陽初虧測方向得偏高弧距三十度太陽出東地平高四十一度三十四分躔降婁宮初度因得已時高弧距正東四十八度四分或查表或三角形算減食方向距高弧度餘十八度四分即初虧向西北度若太陽復圓其方向高度時分皆如前則十八度四分為復圓向東南度又設方向距高弧遇象限三十度角上左高弧時刻俱同前則與高弧距正東相加得七十八
