body:
  text: 黃白距度表黃白距度表按兩交前後分順逆列之兩交後之各宮列于上初宮至二宮係正交後為北緯六宮至八宮係中交後為南緯其數同兩交前之各宮列于下三宮至五宮係中交前為北緯北宮至十一宮係正交前為南緯其数同太陰距交實行在上六宮者用順度太陰距交實行在下六宮者用逆度用表之法以距交實行之宮對距交實行之度其縱橫相遇卽所求之距度也表分六限依距限相近者
