body:
  text: 最髙卑之有行分者盖縁本輪心之行微速于均輪心之行本輪心循本天東行已滿一周而均輪心循本輪两轉尚未滿一周其本輪心與均輪心两行之差即最髙之行分也但其行甚微積久始著康熙永年表戊午年測淂最髙在夏至後七度四分四秒至丁酉年則最髙在夏至後七度四十三分四十九秒約每年東行一分一秒一十微又此最髙點邇年殚精推測覺最髙之髙于本天半径與最卑之卑于本天半径者非两心差之全数而止及其半因悟太陽本天之周有本輪而本輪之周又有均輪乃以两心差三十五萬八千四百一十六四分之取其三分淂二十六萬八千八百一十二為本輪半径取其一分淂八萬九千六百四
