body:
  text: 既淂各星一日之平行以二十四時除之淂星一時一分之平行列表巳上諸測古多祿某所定與今測大同小異求土木金火四星自行均數舊名盈縮差既淂五星之平行則當求其最高及自行之度公蓋五星行天絶無一日平行時疾時遲參差不等於是知星亦有不同心圈及本輪均輪諸行度所謂自行均數也其理已詳太陰論說中但此自行均土木火金四星皆同惟水星獨異今先依第穀新法用兩小輪解四星之同者如圖甲為地心甲邜為全數邜午為星平行天邜為最高經度所在設星距最高自邜右行至乙乙邜為引數即乙為心取乙醜為半徑數具後四星各不同作子醜本輪圈子為最高醜為最卑次從子
