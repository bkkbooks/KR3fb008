body:
  text: 分為縮差秋分至春分半周本為盈差因前春分至秋分半周之縮秋分時已積至四度六分此後之盈差止能消去前數至春分而過平故此用及減仍為縮差此時之升差二度三十分依法亦宜相并共六度十分化時得二十三分為日差亦視先于平號為加餘倣此推之謹按平日者以天度為準有㝎率三百六十一度視日者以人目為準無定數太陽隨天左旋一周人見其復于故處也或子午或卯酉蓋歲實以有加減而為㝎歲平朔以有加減而為㝎朔平日亦有加減而為㝎日其理一也但此表未可久用以最髙每年有移動則均數有多寡黃赤大距度有廣狹則升度有大小須隨時設算之曆元時太陽諸根數戊辰年天正冬至後第一子正為曆元太陽平行初宮度五十三分三十五秒三十九微初宮起丑宮初度最髙沖初宮六度五十九分五十九秒紀日干支已卯日值宿井宿黃赤大距度二十三度三十一分三十秒太陽本天半徑十萬兩心之差三千五百八十四最髙行每年東行一分一秒十微太陽平行每日五十九分八秒十九微四十九纎三十六芒新法推算日躔諸表康熙永年表二百恆年表甲子平行永表六十寒年表
