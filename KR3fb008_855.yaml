body:
  text: 古圖中心為諸天及地球之心第一小圈內函容地球水附焉次氣次火是為四元行月圈巳上各有本名各星本天中又有不同心圈有小輪因論天為實體不相通而相切也新圖地球居中其心為日月恆星三星之天又日為心作兩小圈為金星水星兩天又一大圈
