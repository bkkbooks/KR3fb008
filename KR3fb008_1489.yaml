body:
  text: 求食既時刻置食甚時刻減食既生光距時淂食既時刻不足減者加二十四時減之食既即在前一日命時之法典平望同求生光時刻置食甚時刻加食既生光距時淂生光時刻加滿二十四時去之生光即在次日命時之法典平望同推太隂經緯宿度苐十二求黃白升度差用月離黃白升度差表以食甚交周宮度察其所對之分秒淂黃白升度差并記加減號
