body:
  text: 五星距地五星之距地各遠近不同土最高木次之火次之金又次之水星最下今求其遠近之距亦如太陽太陰法以地半徑為度如圖庚壬為太陽天外圈為土星本天乙甲為全數十萬設星在本輪最高歲輪最遠如戊求戊甲最遠距地法丁戊歲輪半徑一四二六與庚甲太陽天距地一千一百四十二度太陽中距之數因歲輪與日天等大故也若丁甲本輪最高距地心線一度五八五四與丁甲若干以加戊丁淂戊甲一萬二千九
