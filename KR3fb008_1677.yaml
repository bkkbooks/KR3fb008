body:
  text: 運動寔循黃道東行與七政相𩔗而非黃道之西移頋其東行之数古今所定不同新法暦書載第谷以前或云百年而行一度或云七十餘年而行一度或云六十餘年而行一度與古暦累改歲差之意同迨第谷殚精推測方㝎恒星每歲東行五十一秒約七十年有餘而行一度而元郭守敬所㝎亦為近之至今一百四十餘年驗之于天雖無差忒但星行微渺必多歴年其差乃見然則第谷所定之数亦未可泥為定率也至恒星赤道上絰緯度則逐歲不同雖以列表儀象志用加分算法固簡㨗而理則未精盖二分之後黃道度多赤道度少二至之後黃道度少赤道度多恒星既依黃道東行則升度差亦有增減况黃道與赤道斜交夏至後赤道
