body:
  text: 則非地上清蒙之氣而在空中之本氣如月體當食顯赤色是氣影所生其理一也見後條如圖甲為太陽其實邊乙丙太陰在癸其實邊丁戊人居地面在已辛之間不能以直線見太陽所以得見者太陽全輪既受掩于月體為壬庚所餘庚乙實環皆為原光而以庚壬丙規之光正焒丁戊月邊遇丁戊則折而內向以至于地面已辛其所由內折者欲就于甲癸垂線也說見後已辛以向內皆為月影得界丁辛及戊已成三角形戊丁為底圖未盡影末又太陽乙丙外規之光正焒太陰近處為子丑遇子丑又折入影中
