body:
  text: 丑㸃為朦朧之界日至于子午圈下為半夜迨近東地平下十八度復為朦朧分太陽體中心至地平㸃為日出又日出入時人見日骵恒大或長圓色或深紫微紅皆清蒙之氣濃厚人目橫視以至變易至日中則以垂線炤地人直視之積氣甚少日不受蒙故也其春分次日太陽離赤道即不出于東西圈之初度而在其稍北之濶度即地平之經度其相去也與其日之距度等為正球則赤道與地平為直角故也欹球則否太陽既稍北則其表影亦稍南其晝分與初日等其子午圈下之最髙度則稍減于九十度距北地平又次日則濶度愈大髙弧愈小以迄夏至其濶為二十三度有竒其距北髙弧為六十六度從赤道南迄冬至亦如之其方之晝與夜恒等何者赤道與地平為直角即一切經緯圈其隐見恒相半也論欹球一歲中獨春秋分兩日淂晝夜平何者春秋二分太陽在赤道下赤道與地平皆大圈交而相分即所分之圈分等若赤道之距等圈大小不等以地平分之其圈分上下皆不等如啚甲乙為南北極丙丁為赤道丑寅為地平春秋分両日日在戊為黃赤道之交則地平上下圈分等戊丙晝弧與戊丁夜弧等過春分日漸北如至辛壬距等圈則丑寅地平分晝夜于子子辛晝弧大于子壬夜弧過秋分日漸南如至已庚距等圈則地平分晝夜于癸癸巳晝弧小于癸庚夜弧上下圈
