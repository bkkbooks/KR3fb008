body:
  text: 乙丙等作醜丙線恆與乙甲平行又以醜為心作壬邜均輪邜最近壬最遠於均輪上取丁醜三倍之為壬巳從最遠壬右旋星止已作已丙諸線成醜丙巳丙巳甲二形先用巳醜丙形有巳醜丙醜兩邊有丑角求醜丙巳角及巳丙邊次用巳丙甲形有巳丙有丙甲全數有巳丙甲角以此數之餘醜丙甲角加巳丙丑角淂已丙甲角求丙甲乙角或丙子弧即乙丙引數相當之自行均也應減又求巳甲邊為
