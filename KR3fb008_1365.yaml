body:
  text: 推火星用數康熙二十三年甲子天正冬至為暦元周天三百六十度入算化作一百二十九萬兩千秒周日一萬分周歲三百六十五日二四二一八七五紀法六十火星每日平行一千八百八十六秒小餘六七三五八火星每日平行三十一分二十六秒四十微一十二纎七忽四十四芒以秒法通之即淂火星最高每日平行十分秒之一又八三四三九九火星最高每歲平行一分七秒以周歲除之淂最高每日平行一十一微二十三忽以秒法通之即淂
