body:
  text: 之度分各有其數即分秒己下之弧亦各有其八線八經割圓不過一象限古用全弦則須半周如啚用全弦則乙丙弧必淂乙丙弦乃至乙庚弧必淂乙庚弦故百八十度之弧必淂百八十度之弦也因此術甚繁蹟今以半弦當之為各半弦可當上下兩弧不過一象而已足如二圖丁辛半弦當乙丁小弧亦當丁己甲大弧庚己半弦當乙己小弧亦當已甲大弧一象限之外無切線亦無割線故用半圈之全不如象限之半今立割圓表以一象限九十度為界求割圓之八線先定半徑為若干分愈多愈細割圓八線大抵皆不盡之數無論全數不能盡即以畸零法命其分亦不能盡故作表中半徑必用極大之數假如半徑為千萬表中諸線不差至千萬分之一分自一以內或半或太或少雖不能無差而微乎微矣故半徑之數最少者一萬以上或至百萬千萬或萬萬可也七位即千萬八位即萬萬定半徑之全數即可求一象限內各弧各度分之半弦以此半弦用三率法可求其切線割線凡半徑用數少即差多如用千則差千之一用萬則差萬之一用極大之數即難推如用萬萬以上數極繁矣今折中取數之半徑命為一千萬分其全徑為二
