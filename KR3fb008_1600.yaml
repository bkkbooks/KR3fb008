body:
  text: 用交食北極高四十度黄平象限表以太陽黃道經度察黃道宮度取其典時分所對之数為太陽距春分後時分又以復圓用時加減十二時不及十二時則加十二時過十二時則減十二時為太陽距午後時分两数相加加滿二十四時去之用其餘淂復圓春分距午時分求復圓月距限用交食北極高四十度黃平象限表以復圓春分距午時分察表內時分相近者取其典黃平象限相對之数的復圓黃平象限宮度又置太陽黃道經度加初杅復圓距弧復加減真時東西差真時距分加者亦為加真時距分減者亦為減淂復圓太陽黃道經度两数相減餘為復圓月距限度太陽黃道經度大于復圓黃平象限宮度者為限東小
