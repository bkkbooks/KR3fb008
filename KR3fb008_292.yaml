body:
  text: 丑形形有丑直角有子丑緯度即辛戊有子午丑赤道與地平交角即極髙之餘法午角之切線與全數若子丑之切線與午丑之正弦得午丑弧以加午戊九十度得戊丑卯辛子為晝長弧減午已得丑已即子庚為夜短弧緯南用未午卯形如前求得未午弧以減戊午九十度得戊未淂壬卯為晝短加午已得未已即卯癸為夜長朦朧分太陽未出之先東方已明既入之後餘光未盡謂之朦朧分其界以地平下前後十八度為限此十八度乃太陽地平下髙弧非黃道之度十八度已後全屬冥晦矣此朦朧分太陽距二至左右度等其朦亦等以距至等則同在一距等圈故也若距二分左右等朦則不等以緯度一南一北故北則大南則小凡北極出地處北六宮之朦大于南六宮南極出地反是又北極出地處太陽在北六宮愈近夏至朦愈大夏至時極大過夏至漸小南方南極出地處也近冬至愈大冬至則極大過冬至漸小又北極出地處冬至不極小極小者在赤道冬至之間若南方夏至不極小極小者在赤道夏至之間平球之處太陽入地最多不過二十三度去朦度之十八未逺故其晨昏最長一年之中明多于晦幾乎不夜矣正球之地太陽距赤道不論或南或北如緯度等其朦亦等緯度不等其朦亦不等其朦愈逺赤道愈大故二至之朦甚大二分甚
