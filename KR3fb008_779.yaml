body:
  text: 午而平分時刻故月食時必本地之日未東升或已西沉乃得見之若在其畫時刻不可得見也如明天啟癸亥九月十五夜望月食順天儲太南北同經之地則初虧在酉初一刻十二分食甚在戊初刻復圓在戊正二刻十三分各算外高農太其同經之地即初虧在酉末戌初而西洋意大亞里諸國日尚在於頂為午正則不見月食以里差推之西洋之初虧在巳正三刻四分食甚在午正一刻七分復圓在未初三刻一十分各算外雖月入影七分五十六秒所居宮度彼此遠近皆仝而以圼差故彼地彼時太陽在午正二十二分太陰反在子正二十二分食甚正在日中何從見之又壬申年九月十五夜望月食初虧在邜初三刻其陝西
