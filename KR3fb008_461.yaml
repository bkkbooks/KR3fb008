body:
  text: 四法用月食恒星如啚甲地心乙地面人目庚天頂丙月心未恒星自乙出視線切月下周己至未淂月與星相切其庚乙未角為視髙之餘恒星絕髙其視髙與寔髙同自甲出線過月心丙至午淂庚甲午角為寔髙之餘又加丙己月視半徑即午甲丁角本是子乙未角然所差極微因淂庚甲丁角為月下周寔髙于是用甲乙己形求甲己邊為月距地之高附求日距地之髙用測月第一法或于午正時測淂日之視髙随推其本時經緯度淂其寔髙兩髙相減淂視差若太陽在地平時用其最大視差最髙二分五四中距三分最卑三分七秒依法求淂一千一百四十五地半徑為日距地心之度其正法則用月食也測月之寔徑日月有視徑有寔徑視徑為人日所見之度分寔徑為二曜本骵之大小既淂視徑及距地即可用三角術求其寔徑如啚丁為地心乙甲丙為月徑三十二分二十八秒丁甲為中距時月距地六十地半徑又四之一歌白泥術成甲丁丙三角形有角有邊求乙丙淂千分地全徑之二百七十六弱為月全徑約之淂月一地三倍
