body:
  text: 始得真髙今用勾陳大星冬至日酉時測得最低三十七度强夘時測之得四十三度强其差六度平分之得四十度强是順天府北極出地之數也此測北極正法如啚乙丙為勾陳大星乙地為最低丙地為最髙其較為乙丙平分于甲以加乙地得甲地為北極髙度甲不動䖏為極二法作夘酉線視恒星東出地平當夘㸃者記之俟其行至子午線上測其距天頂之度分即極髙度分此星郎赤道上星也三法用距元里數順天府為元定諸方北極髙法以北極髙下全差二萬二千五百里地周九萬里四之一為一率天周九十度為二率南北距元若干里數為三率得四率南北里差度分以南加北減于元極髙得各方極髙各省北極髙度京師三十九度五十五分盛京四十二度山西三十八度山東三十六度河南三址四度陜西三十四度江南三十二度半湖廣三十一度四川三十度浙江二十九度
