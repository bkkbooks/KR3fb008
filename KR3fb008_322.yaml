body:
  text: 心甲則日行本輪天雖恆為平行而人目所見者辛戊庚半圈大辛已庚半圈小所以歷時冬少而夏多也日在戊去甲地逺故骵見小行度遲在已去甲地近故骵見大行度疾所以冬為疾為大夏為小為遲也其兩心之差為壬甲戊點名為最髙已點名為髙沖太陽行天既有最高最卑之二點但此點不在冬夏二至何則使不同心最髙之一點恆在夏至如甲則太陽從春分辛至戊立夏行四十五經度之弧與從已立秋至秋分壬行四十五經度之弧其時日必等蓋兩心在甲乙線內與丁丙為直角而丁甲丙與辛甲壬兩弧俱兩平分於甲則所分各兩弧之行度等其所須時日必等乃春分後行四十五度至立夏立秋前行四十五度至秋分其行度等而時日恆不等則丙庚丑丁兩弧度必不等而不同圈之心必不在甲乙線內與夏至同而最髙點亦必不在夏至甲矣今測算最髙所在法於春分後四十餘日即每日測午正日軌髙求其四十五度以定天正立夏春分至立夏當行四十五經度其緯十六度二十三分三十九秒加本地赤道高約五十度得六十六度二三三九若曰軌髙適滿其數即正得四十五度為立夏若逼或不及用比例如求春分法得本時刻遡春分迄立夏總計中間積日時刻以日平行五十九分八秒一九五而一得太陽平行之總度分乃非四十五經度之數
