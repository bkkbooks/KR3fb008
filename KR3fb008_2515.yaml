  text: 曆象考成土星均數表土星均數表以引數宮度求初均及中分以星距日次引宮度求次均及較分初宮至五宮依次順列于前六宮至十一宮依次逆列于後表名初均者乃土星本輪均輪所生之均數順度爲減逆度爲加中分者則逐宮逐度次輪心距地心與最高距地心之較爲六十分中之幾分也求中分之法以土星次輪心在最高距地心之一五六
