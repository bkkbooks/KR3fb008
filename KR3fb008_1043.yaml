body:
  text: 故臣梅文鼎曰五星中分之率既以較分為六十分之比例則皆以本輪度距最卑之遠近而淂中分之多寡乃五星之中分各有不同者蓋以中分之率生於距地之遠近而五星之距地本天各不同本輪半徑又各不同歲輪半徑之大小又參錯不齊則其歲輪上下所生較分之進退舒急攸分而不能皆等夫中分即較分之較故五星之中分所以各有其率也要其以最卑為較分之大差嘗中分之六十則一而巳矣測土木火三星緯度土木火三星之緯行其根有二一由本遒斜交黃道半北半南以生緯度一由歲輪復斜交本道其面歲輪之面恒與黃道為平行以致
