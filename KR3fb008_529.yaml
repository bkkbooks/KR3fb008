body:
  text: 謂諸宫交會皆可尋十七度及七度之限也今試于本界中論地先論其極高四十度者又于本地論時先論其不甚遠于天頂者如日月交會在夏至鶉首初度設當時不會于正午其高界差變為南北差者必少而所增視距度亦少即所潯者不為其最最限設實會正午月距黃道北潯其高弧七十三度二十八分以稚髙畀差為十八分八秒則全變為太隂南北差依法加于二徑折半潯五十分分五十八秒為黃白兩道之視距度則所值交周度潯十度為順天府北極同髙地黃道本度月距北日食之最大限可食也設月距南則二徑折半共三十二分五十秒反减太隂南北差十八分八秒潯兩道視距十四分四十二秒所值交
