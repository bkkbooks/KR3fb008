body:
  text: 止留四線如十字交羅中心交羅處安量尺方尺其尺徑較圈徑略長皆能旋動與前測食分器同捋測時從初度取上下正對太陰以垂線取準地平轉其方尺令對兩餘光角則量尺抵邊所指度分即本食向方距高弧度也蓋密室月影不顯必室外測乃可若用地平經緯儀上置前圈以象限載之轉中線對高弧須準與他平合可免算高弧距正午度又簡法以界尺對兩角令其或取恆星或五生同居一直線上加太陰高差以高度于本表取之得其向恆星若干免以高弧復求別距度何也因切兩角之線其遇影邊交月邊處必俱以直角交遇月影兩心之線故得用與星居一直線則從此相距九十度遠者必為本
