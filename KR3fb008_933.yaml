body:
  text: 不能見蓋金水之不行既同乎太陽即不能與太陽相離而能為伏為見者因別有一圈抱日為輪環轉於日之上下星與太陽為遠為近皆從此輪而生此圈名為伏見輪與土火木之年歲輪不同星行輪一周有二伏二見其與太陽相距金星極遠至四十八度水星二十五度人目可見二星者皆伏見輪上距日之度又二星雖乙太陽平行為平行而其本天非太陽之天另有一圈截諸小輪以生本天均數而伏見輪之心旋居於本天周上乙太陽為心以星平行即太陽平行故西士以以遠鏡窺金星見其西將伏東視見時其骵其光皆如新月之象或西或東光恆向日又於西視見東將伏時見其光骵全圓若於留際觀之見骵又非全圓有光有魄蓋因
