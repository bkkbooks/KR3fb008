body:
  text: 止論太陽在其最卑全視徑為大得三十一分太陰在其最高全視徑為小得三十分三十秒其較三十秒為全徑六十分之一耳即定朔果在此時日月以兩心正會何因四周能見太陽之邊乎然而古今所記實見實測乃復多有之如明降慶丁邜三月朔日太陽近于最高得全徑三十分太陰在高卑之正中得全徑三十二分三十四秒則全掩太陽之外尚餘二分三十二秒乃西土實候至食甚時二曜以心正會見有金環又萬曆戊戌二月朔日太陰在最卑掩太陽復如是論地則此測在西國之內地前測在海濱論北極則此測高五十度前測正高四十二度論臨食時此測有雲前測無雲也雲氣雖不掩日月亦能變昜光耀損益分秒而第谷轉精候
  hash: sha256:b749368953c3074ee3b420fd511441beced1c26dafd1b56808cf09fd6e42e84a
