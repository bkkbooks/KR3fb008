body:
  text: 一十一萬七千五百自行三九宮初度當两半弦時次均輪上之三均数成直角形次均輪心距地心線九百八十四萬二千六百二十二為股月在次輪周距地心線為弦次均輪之半径為勾勾之對角即四十一分二秒也既定次輪及次均輪之半径乃逐度求其二均三均之数復用三均数以加減乎二均数是為二三均数用以步月離與夭脗合矣但第谷新法于初均数增一均輪極為有理而所設不同心天與小輪合用則不便于觀今將次輪置于均輪之周其心循均輪右旋又將次輪半径與新本輪半径相加為半径作負均輪之圈均輪心則循負均輪圈左旋至月骵在次均輪上則徔冣下點右旋依此以求各均数皆與第谷法無異而圖較明顕如圖甲為地心乙丙丁為本天之一弧丙為本輪心戊宜庚為舊本輪辛壬癸為新本
  hash: sha256:8e40843213b2e114a21bb0c620342ad4509b77b36fb42fce43c14e3cf7d047f6
