body:
  text: 午兩心差之分有丁午均圈半徑全數求淂戊丁午角自淂戊午丁角次用午丁己形有丁午有午已為戊已之分有丁午己角為戊午丁之餘求淂午丁己角與前午丁戊角相併共淂戊丁己角為均數較前法用戊甲己角在最髙左右均數加大在最卑左右較小可以合天但此法以辛甲圈量星之引數平行而七政却另行庚丁圈若但用丁庚一圈即七政至中距又非大均數以午己線非戊丁己形之底故今兩圈合用數雖不謬究其理乃七政骵則行午心之均圈而測引數又在戊心之甲圈且七政既行庚丁圈又不為平行而有戊丁午角之加減大違曆家之公論矣後正德間西史歌白泥另立一法亦用大均圈但不失為正論其法用一不同心圈用一小均輪其小均輪之半徑為兩心差幾分之一七政各不同如啚甲為地心設取兩心差八分之六為甲己己為心作丁丙戊大圈名載均輪之圈次于圈周任取丁丙戊子四點為心最髙卑與中距用兩心差八之二為丁乙半徑作四小均輪七政依小均輪上右行如自行在最髙丁則曜在均輪之最近乙自行在中距丙為距丁九十度則曜在均輪上亦自乙右行九十度至辛自行乙百八十度在戊均輪上亦行乙百八十度至壬自行二百七十度在子均輪亦行二百七十度自乙過丑至癸自行滿一周
