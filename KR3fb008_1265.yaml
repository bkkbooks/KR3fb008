body:
  text: 推月帶食法凡月食子後者視復圓時刻若在日出後月食子前者視初虧時刻若在日入前是有帶食也若日出入時刻與食甚同者不用算即以所推食分為帶食分諸限時刻有與日出入同者亦然皆不必推帶食求帶食距時帶食在朝者以日出時刻在暮者在日入時刻並與食甚時刻相減餘即為帶食距時法同日食求帶食距弧初虧距時化秒為法初虧距弧化秒與帶食距時化秒相乘為寔寔如法而一得數即為帶食距弧帶食距心徑以帶食距弧月距黃緯各自乘兩數相並平方開
