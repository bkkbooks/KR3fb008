  text: 度四分即初虧向東南復圓向西北度初虧向東南復圓必不在西北此葢指前後兩食也所測方向距高弧線之度何以知其宜加宜減于本高弧距正東以得其自距正東之度曰日食時設有大圈徑遇日月兩曜中心左右至地平此即太陽失光及未失光之面所向度分今本圈以直角交高弧則向位距正東或正西之度與高弧距子午圈之度等地平圈上算本圈合于高弧通為一圈則高弧至地平所指度亦為本食可向度若本圈斜交高弧則以下輪盤外圈因知兩距度宜加與否兩距度者遇心圈距高弧高弧距子午圈者蓋午前遇日月兩心之線測得在右上象限或左下象限宜加餘象限宜減午後則反是不拘初虧復圓或
