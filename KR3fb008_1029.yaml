body:
  text: 留時人目覺其大距度多日不變而星在輪周卻日有行動故測淂以近太陽者為確金星第谷於萬曆十三年乙酉西九月十五日晨測金星在鶉火十五度五十八分先均蒙氣及地半徑差當時太陽平行躔壽星宮三度四十八分二十秒金星最高在寔沈二十九度十四分五十秒則金星平等距最高為八十四度三十三分三十秒又視平兩行之較為四十七度四十九分四十秒如圖甲為地心癸為最高沖丙巳為引數依前法求得丁甲乙初均角一度五十分乙甲邊九九九二五以初均乙甲丁角與丁甲辛角四十七度五十分相減存乙甲辛角次乙甲辛形有乙甲乙辛兩邊有乙甲辛角求辛乙甲角淂辛子弧三十九度內減去壬子弧初
