body:
  text: 木星紀夏至前後者實沈鶉首餘八宮有斜者有半斜者若欹球則恆有六宮為正升六宮為斜升正升謂之遲升斜升謂之疾升自北極出地一度至六十六度鶉首鶉火鶉尾壽星大火析木六宮皆為正升之宮正升則斜降南極出地者反是正球黃道上兩點去離二至二分各等則其升度亦等其相對之宮升度亦等如降婁與壽星各二十七度是也欹球則相對宮之升度各不等凡從降婁至鶉尾六宮欹球之升度小而正球大從壽星至娵訾六宮反是又兩弧在黃道相相對相等其正球之兩升度并為一率欹球之兩升度并為一率此兩率等黃道各宮各點之出度不論正偏求必等于入度又各宮之出入度并必與相對宮之出入度并等若欹球各官之出入度雖等而正斜不等此五升則彼斜降此斜升則彼正降凡正球之升降度從地平起算或從子午起算以赤道與地平子午圈相交俱為直角故也欹球必從地平起算出沒晝夜太陽為萬光之宗東升至地平上為出為明自東而西沒于地平下為入為晦顧其行天也一日一周俱作螺旋圈如從冬至一點起算行天一日一周明日不在冬至即此一圈作螺旋一周次日復然迄夏至點行一百八十餘周而通作一螺旋線也第冬至線
