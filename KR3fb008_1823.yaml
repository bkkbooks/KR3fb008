  text: 暦象考成太陽均数表太陽均数表按最高最卑分順逆列之引数礽宮至五宮為最卑後列于上引数六宮至十一宮為最高後列于下前後列引数度分分順逆以別加减中列逐宮逐度之均数太陽引数在上六宮者用順度其號爲加太陽引数在下六宮者用逆度其號為減用表之法以引数之宮對引数之度分其縱橫相遏
