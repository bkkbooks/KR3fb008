body:
  text: 太陽距赤道表得日距赤道緯記志北號以日赤道緯及視朔時查高弧表高弧隨地不同各依北極高度取用先以緯度或南或北之數檢右直行次以視朔時分極上橫行其視朔滿十二時去之用其餘刻入表以時分化刻每一時為四刻十五分為一刻不滿十二時則置十二時減之用其餘化刻入表縱橫相遇淂日距地高度以月距地數及日距地高度查太陽太陰視差表先以月距地數檢右直行次以日距地高檢上橫行得數內減去本數上之太陽視差分秒餘為月高下差用日距限及限距地高查交角表以限距地查左右直行以日距限檢上橫行用中比例取之得數以減象限為兩圈交角度
