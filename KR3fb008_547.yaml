body:
  text: 平行在黃道上壬以丁乙午壬甲午兩角等故設月平行至已與日平行同在甲壬一線內此直線所指則日月中相會之度也若太隂平行至卯與壬點太陽平行度為壬甲卯一直線而指黃道子則日月中相望之度也壬辛弧為太陽減差壬甲辛角之壬辛弧即甲丁乙角故淂中會持太陽之實度在辛設月在本輪戊則日月兩骵同在甲戊丁一線直指黃道淂辛為日月實相會之度如太陽在丁太隂在本輪庚亦在辛甲
