body:
  text: 二兩測之平行甲乙弧八十一度四十四分內減去庚乙餘甲庚三十六度三十一分乃第一測甲火星自長距最高之度八依上依求得火星三測之自行與兩心差次以均數推其寔經皆與三測之度不合因將最高順天移前五度二分兩心差改為二乃密合歷試他測皆準因復算淂第一測火星視經距最高為三十四度三十分前第一測星在寔沈宮二十一度數之淂鶉首宮二十五度三十分為火
