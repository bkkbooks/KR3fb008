body:
  text: 乙已地平緯度又求乙甲戊角子卯已弧內減去戊甲卯直角餘乙甲卯角得卯已弧為地平經度次以甲天頂為心乙為界作乙丑小圈即太陽在乙之距等緯圈也此圈與地平恆為平行上至天頂甲則為一點若太陽在午後或居赤道南如丁則用甲丁戊形求之得辛丁為地平緯酉辛為地平經子午圈或曰地平南北圈地平大圈上之過頂圈一百八十皆地平圈之侶伴其中最要二圈曰子午曰卯酉其最尊而尤要者則子午也子午之極在地平與東西侶圈之交此圈平分天球為東西二方不但過頂極亦過天元赤道兩極與天元赤道相交為直角亦不動與地平圈等但其遊移也人于地面上南北遷此圈止有一若東西遷則隨在不同與地平俱無數此圈正南北方位定子午時刻分升降之限驗赤緯南北夜用恆星以知日躔宿度所在及考四季昏旦中星皆于是賴焉如啚甲乙丙為南北圈人在戊在已在庚俱南北一線則恆以甲乙丙圈為頂移極不移圈若從已東西遷丁為其頂即以甲丁丙為南北圈矣卯酉圈或云地平東西圈卯酉亦地平之侶圈也其兩極在地平與子午圈之交過此兩極
