body:
  text: 求黃赤二道同升度黃赤二道同為宗動天所挈一日一周然各宗其極人望二道之度分參差不齊自二分至二至赤道小于黃道黃道一度赤道上不及一度二至至二分赤道大于黃道黃道一度上一度有竒惟當分至兩㸃二道度分相同其最差在距春分四十五度其差為二度三十分古法用弧矢割圓求之名黃赤道率如啚外圈為子午圈辛癸為地平圈乙為北極已為天頂丙甲丑為赤道丁壬子為黃道壬為春分設黃道距春分為壬戊弧從北極乙作乙戊庚過極圈截黃道于戊截亦赤道于庚而壬庚赤道度必與壬戊黃道度分不同法用壬庚戊曲線三角形形有壬戊黃道經度有庚直角有戊壬庚兩道交角依法全數與壬角之餘弦若甲戊弧之切線與壬庚之切線求弧得赤道度與壬戊黃道度相減得同升之差列表以黃道上之度求赤道各度同升之差從壬㸃春分起算至丁夏至九十度逐度求其同以立表求黃道午位交極圈角子午圈與赤道相交必為直角以過其兩極也若交黃道惟二至時作直角以此時亦過黃道極也餘日皆為斜角春分時則最斜如啚大圈為地平子為天頂庚子丑為子午圈已為北極丙乙壬為赤道癸為黃極戊丁辛為黃道赤道交子午圈于乙所作壬乙
