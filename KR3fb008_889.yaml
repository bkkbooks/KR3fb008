body:
  text: 星本天距地心線水星自行均最大為三度三十四公在距最高三宮十九度測土星兩心之差及最高所在五星既有自行均則當求其本輪半徑及最高經度所在法密測星沖日時之實經度以此時無次均故又前後三測之次用所淂度分依三角形術算之其理與太陰三會食法略同古多祿某擇取土星各測如左第一測漢順帝永建二年丁邜西三月草六日酉正測淂土星經度在壽星宮一度十三分於時太陽平行躔其沖淂降婁一度十三分
