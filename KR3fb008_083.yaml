body:
  text: 球面曲線三角形曲線三角形者乃球面上大圈相交相割所成其形三角為弧三邊亦為弧其用亦有直有鋭有鈍論其極每邊至一百八十度但三邊并不滿三百六十度其角每角亦一百八十度而三角併不能滿五百四十度形中或有兩直角兩鈍角以及三鈍角皆與直線形逈異夫以弧求弧亘古無法而可用以推算者以凡弧度皆各有弦矢切割諸線三弧既相交而成形則每弧相當之各變亦皆相交而成比例可藉以求本形之度分蓋曲線形之邊角雖皆弧度而立算仍主直線此曲線形立法之大凡也曲線三角形總論論圈二十則一體之至圈四周旋轉無礙者為圓球二球之內最中一㸃為球心自心作直線至球面為球徑皆等其數無盡三凡一球止有一心四球面上不能為直線必成全圈圈有大有小以球心為心者大圈不以球心為心者為小圈如甲乙丙圓球其心丁設有甲戊乙圈其心即以丁心為心而甲戊乙必大圈大圈者球面上最大之圈也若庚壬辛圈其心在已
