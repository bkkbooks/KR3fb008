body:
  text: 求丙甲乙角淂丙壬弧為太陰减差用以减庚丙平行淂庚壬弧為寔行度又求乙甲邊淂朔望時月距地心線日月寔會時刻即㝎朔太陽太陰既各有本天之加减差則前中會時两平行難已仝度而其寔行尚未相同今推曰月两寔行同度令與地心為一直線以淂寔會如啚甲地心外大圈為黄道丑夘為日本天子寅為月本天設太陽在丁庚甲辛角為均数即甲丁乙角其寔度在黃道上辛太陰在
