body:
  text: 求丙甲乙角淂丙壬弧為太陰减差用以减庚丙平行淂庚壬弧為實行度又求乙甲邊淂朔望時月距地心線日月實會時刻即㝎朔太陽太陰既各有本天之加减差則前中會時兩平行難已同度而其實行尚未相同今推曰月兩實行同度令與地心為一直線以淂實會如啚甲地心外大圈為黃道丑卯為日本天子寅為月本天設太陽在丁庚甲辛角為均數即甲丁乙角其實度在黃道上辛太陰在
