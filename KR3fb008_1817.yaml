body:
  text: 與伏見輪半徑相乘全数除之淂三線俱與丙壬次輪半径為同類次用午子辰宜角形丁為宜角形有午丁勾有丁辰股酉辰與壬申等即壬寅距交度正弦以壬申與壬申輪心距地線相乘全数除之淂酉辰以加丁酉淂丁辰也求淂午辰弦次求午甲線用午辰甲直角形辰為直角有午辰有辰甲申甲為壬寅距交度之餘弦以與壬甲輪心距地線相乘全数除之淂申甲線內減去申辰淂辰甲而申辰即壬酉線也求淂午甲次輪上星距地線求以午丁甲直角形丁為直角有午丁次緯有午甲星距地心依甲午與午丁之比若全数與午甲丁角正弦之比淂視緯正弦差弧淂視緯度列表午丁線即星距黃道也午甲即星距地数以次輪心置在本天最高立筭而子丙午弧為星次距交寔行宮度五星視差
