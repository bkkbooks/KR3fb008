body:
  text: 數具後作巳壬圈為歲輪此輪與日天辛癸圈等大等大者數各不同比例則一如戊辛半徑前為十萬今戊亥半徑亦為十萬其實戊辛不遇為戊亥中之歲分蓋後所定歲輪半徑類與戌亥為同類又線實則兩圈等大而乙巳與戊辛兩徑等也巳為最遠庚為最近遠近於地心其輪心乙隨本輪左旋星在歲輪周上從已點向醜庚邜順天右旋而復與巳為一周與太陽行癸辛圈同度凡日在辛星則在巳人從戊視星見日星在戊巳一線中如月之朔為合伏已戊去地極遠故骵見小逮日右行至癸星亦右行至醜如遇戊醜切線上星行醜點圈界如直線人目不覺其運動為留晨留日行至壬星行至庚復在庚壬一線中人從戊視星見日與星相對如月之望為沖庚戊去地極近故骵見大日行至子星行至邜又在戊邜切線中為夕留日行至辛星
