body:
  text: 食分為退食在朝為不見初虧食甚但見復圓食在暮為不見初虧食甚不見復圓若是出入時刻與食甚同則不用更求帶食分即以原算食分為日出入時刻所帶食分其食十分者為帶食既出入食在朝不見初虧食在暮不見復圓求帶食出入之分帶已退之分者以復圓距分化秒為法帶方進之分者以初虧距分化秒為法並以帶食距分公秒與日食月行化秒相乘為寔寔如法而一得數自乘又以月視黃緯化秒自乘並而開方得數妝為分六十秒進一分得日出入時距緯以減並徑餘數以十分乘之為寔太陽全徑為法除之淂日出入時所見帶食分秒
