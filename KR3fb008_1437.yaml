body:
  text: 太陽平行塑策一十萬四千七百八十四秒小餘三四三二四乙太陽每日平行與塑策日分相乘即得以度分秒收之得二十九度六分二十四秒一十八微太陽引數塑策一十萬四千七百七十九秒小餘三五八八六五乙太陽每日平行與最卑每日平行相減餘為太陽引數每日之平行與塑策日分相乘即淂以度分秒收之得二十九度六分一十九秒三十二微太陽引數塑策九萬二千九百四十秒小餘二四八五九乙太隂引數每日之平行與塑策日分相乘滿周天去之即得以度分秒收之得二十五度四十九分一十五微太陰交周塑策一十一萬四百一十四秒小餘一六五七四乙太陰每日平行與正交每日平行相加即太陰交周每日之平行與塑策日分相乘滿周天去之以宮度分秒收之得一宮四十分一十四秒一微
