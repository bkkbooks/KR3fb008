body:
  text: 以減已戊存巳庚加降已婁宿黃經得降庚為王良西星黃道經度若求其赤經緯如啚壬為王良西星壬癸其黃緯已癸其黃經用甲乙壬形求辛得五十六度四八三為赤緯求甲角戊辛減全周得三百五十六度四三二為赤經度餘星倣此推之論恆星黃道經度恆星黃赤道經緯之度又有四種變易今先言黃道經度夫恆星在天其麗不億人見其日隨天左旋一周年年如是從無變動古人因謂七政有行動恆星則定于宗動天永久不變是以古曆從未有恆星運動之說及今細測之覺古所測之恆星經度與今所測之經度漸異如堯時冬至太陽在虗宿六度躔星紀宮初分今時冬至亦躔星紀宮初分則在箕宿三度可見恆星漸向東移矣因此普測周天之星座皆比古所測宮度漸轉而東如角宿大星周赧王二十年測其經度在鶉尾宮二十二度及萬曆十三年測得在壽星宮十八度又如軒轅大星周赧王丙寅年測其經在鶉首二十七度今測則在鶉火宮二十四度四十分餘星皆然可見周天恆星俱有行動皆向東順天右旋與七政同法又因此測其距黃道之緯則萬古如是初無變動距赤道之緯時逺時近從無定率又因知恆星之行乃依黃道以黃道極為極不以赤道極為
