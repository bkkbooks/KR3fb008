body:
  text: 極全與七政相似不過其行最遲非數年間所能知耳顧其東行也又恆為平行無遲疾且諸星齊行不各為運動何則使各自為行則星座必易位乃古來尾恆似鈎氐恆似斗天津恆似弓是知周天之星不論逺近于黃道皆循黃道右行矣今欲定其東行之度用古測徴之漢武帝六年戊午測得軒轅大星在鶉首宮二十九度五十分越一千七百十三年測在鶉火二十四度五分其東行為二十四度五分以積年而一得每年東行五十一秒又古測角大星在壽星宮十七度三分三十秒越七十年于萬曆甲申測之在本宮十八度三分計東行為五十九分三十秒用積年而一亦得一歲行五十一秒更用他測相比所淂皆同今定恆星黃道上每年東行五十一秒約七十年行一度此恆星之黃道經度差也古曆名為歲差論恆星黃道緯度恆星既以黃連極為極循黃道右行則其距黃道之緯必終古不變如啚庚為黃極丙乙為黃道設一星丙正居黃道上其行自丙向甲至乙順行一年五十一秒更設一星居丁在黃道北距黃道為丙丁其行自丁向癸至戊順行一周而復于丁其四周距黃道之緯如丁丙癸甲戊乙俱等星在卯在辛倣此可見恆星黃道之緯萬古不變也
