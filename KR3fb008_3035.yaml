body:
  text: 水星地半徑差表水星地半徑差表分最高中距最卑三限列之其前列實高度水星引數自十宮一十五度至一宮一十五度為最高限自一宮一十五度至四宮一十五度自七宮一十五度至十宮一十五度皆為中距限自四宮一十五度至七宮一十五度為最卑限表內分秒卽三限實高所生之地半徑差也用表之法如水星引數當最卑限推淂實高一十九度求地半徑差則察最卑限實高一十九度所對之數為五分卽所求之地半徑差與實高一十九度相減餘一十八度五十五分為本時水星之視高也如
