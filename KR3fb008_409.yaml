body:
  text: 丁為均數最大之角丁乙甲為直角形丁為直角而丁點切圈處恆在中距下如在丁則丁點己過中距丁甲乙角之大均為壬丁弧所量而壬丁弧己過九十度矣若小輪徑線愈大丁點切處愈近最卑故金星次均最大處在引數四宮十七度如中距己試作甲乙線必入圈內不為切線而己甲乙均數角為丁甲乙角之分必小于丁甲乙矣謹按測算七政本天行度用不同心圈及小輪等術可謂法密而理精矣然不同心圈與小輪二者雖異名同理而其致用亦各有所長蓋求均數以小輪布算為親求小輪之半徑以不同心圈立法為切彼此互用期于合天而己至大象森羅其或然或不然則非智計之所能知也太隂加減差舊名遲疾差七政均數之理上論己詳而七政中惟太陽用一本輪己足或不同心圈其餘六曜六曜皆有均輪歌白泥謂太隂可不用第谷測之覺未合乃復用之其求均數之法如啚丁為地心丁申為全數作申酉辰太隂平行天酉為冬至申為最髙經度所在辰為沖設酉申戊為距至平行距最髙引數為申戊戊為心取申丁之五千八百為甲戊半徑作甲乙本輪于本輪上從甲取甲乙弧與申戊等作己戊線與申丁平行次以己為心取己戊之半二十九百為辛己小均
