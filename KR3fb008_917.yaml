body:
  text: 測木星視行距最高為七十二度十一分前一測之木星視經在大火宮二十三度十一分即於大火宮度內減之淂鶉尾宮十一度為木星最高經度所在也最卑在其沖後第穀等細加考測謂宜用木星沖太陽正所躔之度與太陽寔經度相沖乃星體真在歲輪之極近為真沖也土星同理古法以木星沖太陽之平行度分為根未密爰考定兩心差為十萬分之九千五百四十分分之本輪半徑為七千一百五十五均輪半徑為二千三百八十五其比例亦若三與一表用比推算求火星兩心之差及最高所在第一測漢順帝永建五年庚午西十二月十一是醜初本地測火星
