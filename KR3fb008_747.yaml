body:
  text: 太隊食在影時刻既得太隊初虧至食甚等行度用以化時即為初虧至食甚等在影所歷時分第太陰遇比度分如上啚丁丙線在最高則歷時多最卑則歷時少法以定望時月距最高宮度求相當一小時實行經秒為一率用一小時化秒為二率初虧至食甚等行度化秒為三率求得四率為自初虧至食甚等所歷時分食既生光復圓同法次以初虧至食甚時分減先定食甚時刻分秒得初虧時刻以相加得復圓時刻又以食既至食甚時分減食甚時刻分秒得食既時刻以相加得生光時刻舟以初虧減復圓得總食之時刻分秒若初虧在子時前復圓在子時後即以丑初為十三時午正起算丑正為十四時如是接續減之如啚巳戊為黃道子丁為白道丙
