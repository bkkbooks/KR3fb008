body:
  text: 恆星測天自日躔而後首及恆星者何也曰恆星麗天距地甚逺行度最遲且位次前後終古如一可用為七政之規範蓋七政如行人恆星其路程也第恆星棼然不齊大小不一欲㝎其東西之位次南北之逺近何以準之法用黃赤二道蓋星動體也日日行動黃赤道靜象也萬古不變以靜齊動庶可得永逺無敝之真率然用黃赤道奈何所以定其經緯恆星之距黃赤二道雖逺近不一以二道之極為宗求其經緯之度分無不釐然清晰故曆算必求黃赤道之經度以定其東西求黃赤道之緯度以定其南北然星行黃道必與赤道經緯並論者何曰恆星之行本以黃道極為極而赤道亘于天中推步賴以為準故須求黃道之經緯以合于本行求赤道之經緯以合于天元也然欲淂各星經緯非測算無以知之法先測淂數星之經緯次用曲線三角法以弧線相連交互推求即淂周天恆星之經緯度矣其法詳測量全義中兹略具數測為例如左用太白測恆星之經緯度明萬曆十六年戊子西史于十二月十五日已初初刻測淂太白距太陽四十六度三十六分太白在赤道南十四度四分太陽躔星紀三度五十三分四十一秒在赤道南二十三度二十八分二秒本日辰初初刻先測淂太白距角宿大星為二十九度三
