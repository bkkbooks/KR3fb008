body:
  text: 見地影之大法作巳辛線或辛己癸直角形淂辛巳癸角為人目所窺地影之大天度之分依法己癸與癸辛若全數與巳角之切線求弧淂巳角為月在癸之地影半徑如在最卑戊求壬巳戊角為月最卑之影半徑而壬巳戊角必大于癸巳辛角求地影視半徑依上法求月各距地之影半徑然測之于天往往未合推淂之影恆大于所測之影如月在最髙推淂影半徑為四十四分五十秒而實測止四十三分在最卑推淂四十八分三十秒而實測止四十七分測數恆小于推數比其故非由于日月地三骵而由于太陽之光何則試思大圓之中四周皆日光照爍而地影獨一暗骵居其內且影為虗形四面受日光圍迫其影必
