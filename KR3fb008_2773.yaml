body:
  text: 一與金星次輪心在最卑距地心之九八五六八九相減餘二八六二二為一率六十分為二率逐宮逐度次輪心距地心與最高距地心相減餘為三率求淂四率即逐宮逐度之中分也求次輪心距地心之法詳暦理求初均數篇次均者乃次輪心當最高金星行次輪周逐宮逐度之次均數順度為加逆度為減較分者則次輪心在最卑逐宮逐度之次均與次輪心在最高逐宮逐度之次均相較之數也求較分之法與土星同用表之法設金星引數為初宮一十二度二十分求初均及中分則察初宮一十一度二十分與初均所對之數為二十一分二十二秒其號為減即所求之
