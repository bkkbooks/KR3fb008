body:
  text: 乘之四正方等矣而乙丙一邊自乘之乙癸方實為乙戊股自乘之四正方然則甲丁半徑上方與乙丁十邊形之一邊上方相并既與乙戊股自乘之四正方等而乙丙邊自乘之正方有不與甲丁半徑及乙丁十邊形之兩方并等乎故以甲丁半徑一千萬為股即六邊形之一自乘乙丁六百一十八萬四三為勾自乘并而開方淂乙丙邊一千一百七十五萬五千七百四弱為乙丁丙弧七十二度之弦宗率六圈內作十五邊等切形求邊數法曰圈內從一點作一三邊等形又作一五邊等形求兩形相近之第一差弧即十五邊形之一邊如圖任取一點如甲從甲作甲乙丙三邊形又作甲丁戊五邊形求兩形相近之第一差為乙戊即十五邊等形之一邊乃丁乙全差之半其數先有三邊形乙丙一百二十度之弦為一千七百三十二萬五百八又有五邊形戊子七十二度之弦為一千一百七十五萬五千七百四則乙庚六十度之正弦為乙丙之半淂八百六十六萬二百五十四戊辛三十六度之正弦為戊子之半淂五百八十七萬七千八百五十二兩相減淂乙癸二百七十八萬二千四百二夫乙已半徑上方減乙庚上方餘為已庚上方開方淂已庚五百萬己子半徑
