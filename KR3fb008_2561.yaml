body:
  text: 用表之法以距交實行之宮對距交實行之度其縱橫相遇即所求之星距黃道線也設土星距交實行為初宮五度求星距黃道線則察初宮五度所對之數為三八二七卽所求之土星距黃道線也若距交實行有零分者亦按中比例法求之
