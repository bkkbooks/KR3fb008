body:
  text: 九一七四與土星次輪心在最卑距地心之九四三八一六相減餘一一三八三四八爲一率六十分爲二率逐宮逐度癈輪心距地心與最高距地心相減餘爲三率求得四率即逐宮逐度之中分也求次輪心距地心之法詳曆理求初均數篇次均者乃次輪心在最高土星行次輪周逐宮逐度之次均數順度爲加逆度爲減較分者則次輪心在最卑逐宮逐度之次均與次輪心在最高逐宮逐度之次均相較之數也求較分之法設次輪心在最卑求淂逐宮逐度之次均數與次輪心在最高逐宮逐度之次均數相減相卽淂用表之法設土星引數爲初宮四度一十分求初均及中分則察初宮四度一十分與初均所對之數爲
