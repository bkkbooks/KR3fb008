body:
  text: 㨗法不用求白平象限徑求白道高弧交角自午作午酉距等圈與寅庚平行而午申亦畧與寅辰平行則酉午申角與庚寅辰角等酉午子角畧與庚未子角等故于庚寅辰黃道高弧交角內加庚未子黃白交角四度五十八分三十秒即如于申午酉角內加酉午子角淂申午子為白道高弧交角也較細推所淂相差不及一二十分又午申太陰高弧亦畧與寅辰太陽高弧等故即以命太隂高弧午申也較細推可淂差不及十分然用此二数求三差高下僅差一秒東西差差二秒南北差差十餘秒而時刻食分皆不遇差数秒可以不計用此可省白平象限立表之繁至庚未子角與辰寅庚角或相加相減視太陰在正中交之前後及距黃平象
