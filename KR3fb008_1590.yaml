body:
  text: 相加加滿二十四時去之用其餘淂初杅春分距午時分求初杅月距限用交食北極高四十度黃平象限表以初杅春分距午時分察表內時分相近者取其典黃平象限相對之数淂初杅黃平象限宮度又置太陽黃道經度減初杅復圓距弧復加減真時東西差真時距分加者亦為加真時距分減者亦為減淂初杅太陰黃道經度两数相減餘為初杅月距限度太陰黃道經度大于初黃平象限宮度者為限東小于初杅黃平象限宮度者為限西求初杅限距地高用交食北極高四十度黃平象限表以初杅春分距午時分察表內
