body:
  text: 丁上半周受光為明丁丙下半周彂影為暏恆以一半受光于彼靣一半射影于此靣而相反一明暗兩骵任一運動影隨之移如甲為明骵戊為暗骵甲發光射戊生巳影設以戊暗骵移至丙則為丁影若以甲明骵移至乙則為辛影任一轉動影必隨之一影心與明暗兩骵之心為一直線如一圖影心戊必與明暗兩骵之心甲乙為一直線一明骵小暗骵大發光以大半受光以
