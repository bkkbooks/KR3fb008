body:
  text: 弧與午丁倍離等月真骵在乙作乙丁乙癸等線成丁乙癸形形有乙丁半徑有乙丁癸角倍離之餘有丁癸次輪距地線求丁癸乙角或酉辛弧即第三均數也以此均數與酉辰次均相減淂辛辰為行線左用減實行淂申甲辛為白道視經度又求乙癸邊為月距地心線其乙癸丁角最大不過四十分今新法用此諸圈以齊太隂行度實為密合要而言之太隂之三種均數各有根源以甲五自行度用丙寅午卯兩輪求淂丑癸午角或丑辰弧為第一均數即自行加減表所列也以午㸃為最近用午己次輪求淂午癸丁角或酉辰弧為第二均數又以倍離所至丁㸃為心用又次輪求淂丁癸乙角或酉辛弧為第三均數次以二均三均或相加或相減淂辛辰弧為二三均數總數即表中所列也其加減之界以乙癸線在午癸初均線之左右而定之若乙癸與午癸合為一線則無二三均數即表中曲線相隔處又二三均數之大小固係于離日之逺近亦由于自行之髙卑故本表以距日及實自行兩引數求之
