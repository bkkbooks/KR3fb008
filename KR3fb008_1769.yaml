body:
  text: 象限西而交角在四十五度已上則初虧右稍偏下復圓左稍偏上交角在四十五度已下則初虧下稍偏右復圓上稍偏左在黃平象限東者反是若月在交前後有距緯則必求緯差角與交角相加減為㝎交角然後可㝎其上下左右也如圖丁為天頂外圈為地平癸丁子為子午圈甲丙為黃道丑為黃平象限丁乙戊為高弧乙為日心巳為初虧月心庚為復圓月心巳午庚午俱為月緯距黃道北設日在黃平象限西則初虧以巳乙午緯差角與甲乙戊交角相加淂巳乙
