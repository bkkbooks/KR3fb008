body:
  text: 四率乙丙邊三丈又一率丁乙餘弦五二率乙戊半徑三率甲乙一丈五尺四率乙丙邊三丈求丙角置兩直角一百八十度內減去九十度又減去乙角六十度餘三十度為丙角直線鈍角形算法銳角仝理鈍角形者乃平面上之斜形其形有一鈍角兩銳角而無直角其三邊皆斜交不為勾股算之較直角倍難今或用比例或用垂線以求本形之各邊角凡直角形一角直餘二角必銳鈍角形一角鈍餘二角必銳銳角形則三角俱銳第一法有一鈍角兩邊其一邊對鈍角求餘角餘邊甲乙丙銳角形設有甲鈍角一百度有乙甲邊三丈有乙丙對邊八丈六尺三寸八分三厘求乙丙両角及甲丙邊求丙角法以乙丙邊與甲角正弦之比例若乙甲邊與丙角之正弦查弧淂丙角度分此用角之正弦與其對邊為比例也一率丙乙八丈六尺三八二二率甲角正弦九八四八一三弦乙甲三丈四弦丙角正弦三四二二求弧淂二十
