body:
  text: 論三角形十八則一兩直線不能為有界之形三直線則成形有三邉及三角四直線五直線巳上成多邉多角形二三角形有三邉等有二邉等有三邉俱不等一圖三邉等二圖兩邉等三圖三邉俱不等三三角形若三邉等即三角亦等兩邉等兩角亦等三邉俱不等三角亦不等如上一圖三邉等即甲乙丙三角俱等二圖甲乙甲丙二邉等即莫其相對乙丙二角必等三圖三邉俱不等即甲乙丙三角亦不算反之凡形三角等即三邉亦等二角等二邉亦等三角俱不等三邉亦不等四三邉形有一直角為三邉直角形有一鈍角為三邉鈍角形有三鋭角為三邉鋭角形五三邉形邉在下者為底在上者為兩腰
