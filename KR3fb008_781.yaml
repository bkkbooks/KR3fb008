body:
  text: 四川等處得見江南山東等近海東境則不可得見以秦蜀之子午異于東方之子午故也今以京師順天府推算本食因定各省直之食時宜先定各省直視順天子午線之里差幾何後以其所差度數化為所差時刻每一度應得時四分向東以加于順天推定時刻向西則減乃得各省直見食時刻也若日食則其食分多寡加時早晚皆係視差東西南北悉無同者必須隨地考北極高下差得其距度隨地測子午正線得其經度乃可定其目見器測之視時也法先定各地之子午線次于當身所居目見器測考定一月食之時刻與先所定他方之月食時刻較算或兩地兩人同測一月食彼比較算乃以
