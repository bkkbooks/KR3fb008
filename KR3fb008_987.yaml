body:
  text: 乙太陽為心圖算逈異嘗細繹之火星以距日而生次均之理元與土木兩星同所異者歲輪之半徑是以測算倍難西國古今纍測始淂明其半徑變易之理以定行度之法乃五星中最為無定者古稱火星為熒惑良有以也火星歲輪半徑之大小其根有二一為日躔高低之差一為星本輪上高低之差一日躔高低差者凡星之歲輪皆與太陽天等大而太陽之本夫有最高最卑不同高則太陽本圈大則星之歲輪亦大卑則太陽本圈小則星之歲輪亦小故火星歲輪半徑之大小從乎太陽之高卑但此差土木二星亦同第因二星本天甚大其與太陽高卑
