body:
  text: 十一秒太陰引數一宮七度三十四分三十四秒交周五宮一十五度五十分四十九秒紀日十六日已上皆曆元初當之數朔寔二十九日一十二時四十四分三秒望策一十四日一十八時二十二分二秒太陽平行宮二十九度六分二十四秒望策宮十四度三十三分一十二秒太陽引數宮二十九度六分二十一科望策宮一十四底三十三分一十秒太陰引數宮二十五度四十九分秒望策六宮一十二度五十四分三十秒交周一宮度四十分一十四秒望策六宮一十五度二十分七秒已上皆一增朔相當之數半之為望策月食所用也
