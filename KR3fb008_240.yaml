body:
  text: 天之運動有四異其一甚疾一刻分中行幾萬里如鳥如矢如炮如霹靂皆非所及其二恆平行若非一一平行或時疾時緩即測候之術無從可施其三恆久不已其四萬物之動此為首何者天下之動皆於此繫焉故也若無此動即無四季即無生物矣天之度數舊以天周判為三百六十五度又四分度之一所謂日度也蓋以大陽行黃道一日一度以命周天之度是天度者乃歲實之日分也夫舊曆所用歲實諸家多寡不一是其分天非有一定之術矣試思諸曜運行棼然不齊欲以是遊移之法定諸曜之行豈不難乎且又均之為宮次氣候數更竒零勢難齊一今新法分天則以曆度即于天周以三百六十平剖之每度析六十分分析六十秒蓋六十者半之則為三十三之一則為二十四之一則為十五餘任剖析皆自然而然之分其于曆算甚捷甚便可以齊諸曜之行也時憲曆天周度周天三百六十度四分之為象限九十度六分之為紀限六十度十二分之為宫每宫三十度二十四分之為節每節十五度七十二分之為候每候五度又每度析為六十分每分為六十秒微纎以下遞以六析之地球
