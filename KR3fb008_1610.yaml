body:
  text: 求太陽黃道宿度依日躔求宿度法求淂本年黃道宿鈐察太陰黃道經度足減本年黃道宿鈐內某宿度分則減之餘即為太陽黃道宿度求太陽赤道宿度依恒星暦求淂本年赤道宿鈐察太陽赤道經度足減本年赤道宿鈐內某宿度分則減之餘即為太陽赤道宿度推日食方位及食限搃時求初杅交周置食甚交周減初杅復圓距弧淂初杅交周求復圓交周
