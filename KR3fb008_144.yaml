body:
  text: 度如丁乙丙形以丁為心即極作戊未大圈淂戊午弧為丁角乙為心作庚酉大圈淂庚卯弧為乙角丙為心作申寅大圈淂申子弧為丙角夫戊午弧既為丁角之度戊午兩角必直庚卯為乙角之度庚卯二角亦必直而戊與庚既皆直角則戊甲庚甲二弧相交于甲必各淂九十度又如申子弧為丙角之度其申角必直子角同而午亦為直角困戊午弧為丁角故則午己申己二弧相交于己亦必各九十度故午己為一象戊甲亦為一象而淂戊午與甲己等餘倣此推之曲線形八線相當互易之法本弧八線相易如甲乙丙曲線直角形有甲直角有乙角有乙丙邊求甲丙依直角第三法為全數與乙角之正弦若乙丙之正弦與丙甲之正弦今易一二率用本弧故為乙角之餘割線與全數若乙丙之正弦與丙甲之正弦或不用全數易為乙角之餘切與餘弦若乙丑之正弦與丙甲之正弦也又八線相易後其四率之序悉與原率不同如全數為一率弦線正餘弦並同為二率易割線後則全數居二割線居一切線相易亦然若全數居二率弦切割第一者反是兩弧八線相易如甲乙丙直角形求丙甲邊法為全數與乙角之正弦若乙丙之正弦與丙甲之正弦今易三四率因兩弧故為全數
