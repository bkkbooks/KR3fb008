body:
  text: 求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考徃古則以所餘轉與紀法六十相減餘為天正冬至日分求紀日以天正冬至日數加一日淂紀日求積日置中積分加氣應分六五六三七四九二六不用日減本年天正冬至分亦不用日淂積日上考往古則置中積分減氣應分加本年天正冬至分淂積日求通朔
