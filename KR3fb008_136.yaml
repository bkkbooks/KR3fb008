body:
  text: 必為直角用戊甲丁戊甲丙兩直角形算之如三邊皆九十度內三啚則從乙作乙甲垂弧必平分丙丁邊于甲以乙丁乙丙兩邊等故丁同用乙甲丁乙甲丙兩直角形求乙丙丁三角若兩邊等如一啚乙丁丙形乙丁乙丙兩邊皆九十度正則丙丁兩角必直丁丙邊即乙角之度不用算若兩邊皆九十度外如二啚則用丙戊丁次形以丙丁平分于甲作甲戊弧必為丙丁之垂弧甲為直角用戊甲丁戊甲丙兩直角形推算如三啚兩邊皆九十度內則從乙作乙甲垂弧必平分丁丙邊于甲甲為直角然後依直角形法求之若三邊俱不等法以所求角旁兩腰之正弦相因淂數為一率兩腰相減取較弧之矢與底弧矢相減淂較矢為二率半徑全數為三率求淂四率為所求角之矢用減半徑淂角之餘弦求弧淂度分觧曰丁乙丙斜角形丁丙邊在九十度外丁乙乙丙兩邊皆九十度內丁為所求之角丁丙與丁乙為兩腰丙乙為底先以丁丙丁乙引長之各滿半周遇于酉其極線為酉甲丁甲為球心酉乙丁為平半圈球之腰圍酉丙丁為斜半圈兩半圈各平分于辛于未作甲辛甲未甲乙皆半徑又作辛未弧即乙角之度也其正弦為未夘其矢為夘辛又取丁戊弧與丁丙大腰等作兩戊小圈之弧為
