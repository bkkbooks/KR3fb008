body:
  text: 也合之則乙角之正弦與其對邊丙甲之正弦亦若丙角之正弦與其對邊乙甲之正弦蓋乙丙二角與其對邊之正弦既並以半徑與乙丙為比例則其比例亦自相等而兩角與兩弦皆為同比例矣若斜角形如次啚丁乙丙形先任從乙角作乙甲垂弧至對邊分元形為兩直角形甲為正角依正角形論各對邊之正弦與所對角之正弦比例皆等則乙甲丁形丁角正弦與乙角正弦若半徑與丁乙正弦甲乙丙形丙角正弦與乙角正弦若半徑與乙丙正弦夫兩率者其第二同為乙甲第三同為半徑則兩理之首末二率為互視之比例故丁角之正弦與乙丙之正弦若丙角之正弦與丁乙之正弦也若從丙丁兩角作垂弧理同此邊用比例之算似同直線形法而理實不同蓋直線形以各邊當各角之全弦故比例相等此則以同理之比例而連為四率也曲線直角形算法第一法有一角兩邊其一邊對直角求餘角餘邊甲乙丙曲線形甲為直角有甲丙邊四十度有乙丙邊六十七度二十九分弱有甲直角求乙丙二角及乙甲邊求乙角法曰乙丙弧之正弦與丙甲弧之正弦若半徑或曰全數與乙角之正弦查弧得乙角丁己弧度分此用甲乙丙本形立算其四率之理見前八線比例之啚以乙角為黃赤交角觀之自明
