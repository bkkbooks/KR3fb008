body:
  text: 五分五十五秒并淂五十八分十五秒若距度與之等者依前法推交常度淂十一度十六分此限以内月遇影必有食也必者無不食也抑此两者論寔望時之食限耳若論平望其限尤寛如圖甲乙為黄道甲丙為白道甲為交乙為地影心丙為太陰心月切影在丁其最大两半徑為乙丙淂一度四分二十秒則相值之甲丙淂十二度二十八分為定望食限設平望尚在前為戊則戊平望距丙定望最遠者二度三十八分有竒為丙戊弧以加甲丙弧淂甲戊一十五度六分有竒為太陰切影之時以其心距两交之度今定寔望之食限最大為
