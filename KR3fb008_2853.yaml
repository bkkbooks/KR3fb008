body:
  text: 用表之法以距次交實行之宮對距次交實行之度其縱橫相遇即所求之星距黃道線也設金星距次交實行為初宮一十六度求星距黃道線則察初宮一十六度所對之數為一二九九六即所求之金星距黃道線也若距次交實行有零分者亦按中比例法求之
