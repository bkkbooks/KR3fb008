body:
  text: 周天三百六十度入算化作一百二十九萬二千秒周日一萬分周歲三百六十五日二四二一八七五紀法六十水星每日平行三千五百四十八秒小餘三三五一六九與太陽平行同水星最高每日平行十分秒之二又八八一一九三水星最高每歲平行一分四十五秒一十四㣲以周歲除之淂每日平行一十七㣲一十七纎一十三忽四十六芒以秒法通之即淂水星伏見每日平行一萬一千一百八十四秒小餘一一六五二四八水星伏見每日平行三度六分二十四秒六㣲五十九纎二十九忽二十二芒以秒法通之即淂
