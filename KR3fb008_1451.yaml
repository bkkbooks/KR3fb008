body:
  text: 置積日減朔應二十六日三八五二六六六淂通朔上攷徃古則置積日加朔應得通朔通朔者乃所求本年天正冬至次日子正初刻距暦元甲子年首朔之日分也求積朔及首朔置通朔以朔策二十九日五三五九三除之淂數加一為積朔餘數與朔策相減為首朔上考徃古則置通朔以朔策除之淂數為積朔餘數為首朔積朔者暦元甲子年首朔距所求本年首朔之月數而首朔者本年天正冬至後第一朔距本年天正冬至次日子正初刻之時分也求首朔太陽平行以積朔與太陽平行朔策一十萬四千七百八十四秒三四三二四相乘滿周天一百二十九萬六千秒去之餘為積朔太陽平
