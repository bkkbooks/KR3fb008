body:
  text: 率為距子正之分數蓋乙太陰一日之寔行與一日之分數為比同於本日子正太陰距某宮初度之度分與距子正之分數為比也乃以六十分妝為一時十五分妝為一刻淂交宮時刻如本日太陰寔行適當某宮初度而無餘分則交宮即為本日子正初刻也推正升斜升橫升法合朔日太陰寔行看自子宮一十五度至酉宮一十五度為正升升者指西方地平上之黃道升度所以定生明之方向也正升時月體北正西而向正東自酉宮一十五度至未宮初度自丑宮初度至子宮一十五度這斜升月體背西北而向東南自未宮初度至寅宮一十五度為橫升月體背正北而向正南自寅宮一十五度
