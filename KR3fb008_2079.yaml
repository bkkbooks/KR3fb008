body:
  text: 恒星赤道經緯度表恒星赤道經緯度表亦以曆元康熙二十三年甲子之赤道經緯度列之上列星名次列赤道經度次列赤道緯度下列星等用表之法設康熙甲子年月離赤道一宮二度四十分求赤道宿度則察恒星赤道經緯度表牛宿第一星赤道經度為一宮初度五十一分取相近畧小者用與月離赤道經度相減餘一度四十九分即太陰入牛宿一度四十九分也若求曆元後各年之赤道宿度則
