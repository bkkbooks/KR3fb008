body:
  text: 半輪切線得女奎弧以減半距淂奎戌弧為次均數即平行圈上昂氏弧也以減寔經得至降昂弧為視經度上論乃火星正法以地為火星平行天之心以歲輪心置於均輪之上求甲乙寅次均角如土木二星法若第谷火星次均圖典此迥別以日為火星平行天之心以均輪上星距地心線為火星距日數所用次均角亦與上不同其原圖如左方第谷火星圖取甲為地心用甲乙為法徑作乙井圖為太陽天典火星歲輪等火周分十二宮井為夏至設太陽寔行在降婁宮十四度所設數典前等為至春乙弧太陽體在乙即以為心作房沖大圈為火星平平行天丙為最高設引數為丙壬如前求淂壬乙寅初均角次從
