body:
  text: 陽焒之一靣受光一靣生影以有交食而地與月皆為暗骵也一物骵䏻隔他物之象者為暗骵若骵之一靣受光而光復透射于彼靣為徹骵目之所司惟光與色而色又随光發見故徹骵必通光暗骵必䏻隔他象使不至目如日全食時至晝晦星見因爾時太陽在外骵質顕明又堅密無比光力甚厚乃為月骵所隔不䏻映見㣲光可證月非徹骵而全為暗骵矣若徹骵又有二通明之極者為甚徹維透光而㣲襍昏蒙者為次徹一光在本骵為原光出而顕他物之象為炤光日有原光地與月皆借之為光者炤光也顕他物之象者因他物之勢随施随受無先後之分非如寒熱熛濕漸及于物力盡而止也
  hash: sha256:f7118030e841a1772ca25cca97841e46131c5c318a9930e6abf238f4e0715185
