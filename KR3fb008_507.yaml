body:
  text: 陽焒之一靣受光一靣生影以有交食而地與月皆為暗骵也一物骵能隔他物之象者為暗骵若骵之一靣受光而光復透射于彼靣為徹骵目之所司惟光與色而色又隨光發見故徹骵必通光暗骵必能隔他象使不至目如日全食時至晝晦星見因爾時太陽在外骵質顯明又堅密無比光力甚厚乃為月骵所隔不能映見微光可證月非徹骵而全為暗骵矣若徹骵又有二通明之極者為甚徹維透光而微雜昏蒙者為次徹一光在本骵為原光出而顯他物之象為照光日有原光地與月皆借之為光者照光也顯他物之象者因他物之勢隨施隨受無先後之分非如寒熱熛濕漸及于物力盡而止也
