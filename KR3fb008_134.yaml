body:
  text: 丙邊六十七度二十九分對丁角求乙鈍角及乙丙丁丙兩邊法從不知之乙鈍角向丁丙底作乙甲垂弧分元形為兩直角形算之底上丁丙兩角同類垂弧在形內求乙丁邊法丁角之正弦與乙丙邊之正弦若丙角之正弦與乙丁邊之正弦七八四七五求弧淂五十一度四分弱為乙丁邊此用邊角兩正弦之比例也求丁丙邊先用乙甲丙直角形有丙角有乙丙邊求淂用直角第三法甲丙六十度乙甲四十度次用丁乙甲直角形有丁角有乙甲求淂且直角第四法之後法丁甲三十六度以加甲丙共九十六度度為丙丁邊求乙鈍角用乙甲丙直角形如前法求淂乙甲邊再求丙乙甲角用直角第三法淂六十九度三十八分次用乙甲丁直角形有甲乙及丁角求淂用直角第四法之後法丁乙甲角四十八度二十九分末以丙乙甲丁乙甲兩角相并共淂一百十八度七分為乙鈍角第五法有三邊求三角乙丙丁鈍角形有乙丁乙丙丙丁三邊求乙丙丁三角之度法曰所有形若三邊俱等如一啚乙丙丁形其三邊皆九十度正則乙丙丁三角皆直不用算若三邊皆在九十度外二啚則用丙戊丁次形以丙丁邊平分于甲向戊作甲戊弧甲
