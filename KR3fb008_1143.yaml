body:
  text: 為一率得四率數如法妝之得三均三均與次均恒相加淂定均數將定均依次均號加減于實經距日次引初宮至六宮為加六六至十二宮為減五星同為星視經度置實經內減去正交行即得星距正交以距交入緯度表查中分以次引查緯限各淂數中分化秒為三率緯限化秒為二率三千六百秒為一率求四率數妝之得星視緯定南北向以距交宮度定之前六宮一二三四五在北後六宮六七八九十十一在南視經度如是躔法減宿淂星本日宿次度分求火星經緯度
