body:
  text: 星最高經度所在也後第谷考定火星兩心之差為十萬分之一萬八千五百五十分分之本輪半徑一萬四千八百四十分均輪半徑三千七百一十分其比例若四與一測金星最高所在及兩心之差上土木火三星各以本行能沖太陽其本天之平行不與太陽同外更有年歲輪與太陽為沖為會當沖會時星必無歲輪之均數故用三測沖太陽時刻度分以求最高與兩心之差金水二星不然其行恒隨太陽即乙太陽平行為其平行雖亦有離太陽時然其距度或左或右東西不一且時多時寡會日之時一順一逆人目
