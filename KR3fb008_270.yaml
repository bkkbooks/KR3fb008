body:
  text: 黃道有經度有緯度從黃道作過極圈以定其經度法與赤道同但本道本極異耳若起算從春分始其義有二一為黃赤二道大圈之交二為大圜之中中者二極之間也黃道之過極圈容其各緯度限各經度其左右侶圈限其各緯度容各經度黃道有極古者但言赤極不言黃極蓋古曆以赤道為宗以赤道一周均分十二宮每宮三十度以齊七政經度而黃道宮分反有廣狹近二分黃道一宮約二十八度近二至每宮三十二度不知月五星皆循黃道而行距黃道之內外各有逺近而赤道之經緯不足以齊之故必求黃道上之經緯乃可定也新法一以黃道為主黃道周天勻分十二宮每宮分三十度其分宮度之經度線皆一一與黃道十字相交自此引之各成經度大圈以周于天骵則其各圈相交以為各度湊心之處必不在赤道之南北極而別有其心是名黃極若自黃道之南北兩極出線至黃道其緯各得九十度而均極距黃道四面皆相等如赤極之距赤道以此各線之緯聯為圈線皆與黃道平行自黃道相離一度起逐度作圈至九十度則成一㸃而合于黃極名為緯圈是黃道既有經緯則必有所宗之極矣且以恆星東移驗之周天星斗古今盡有差移惟黃極終古不動以近黃極之星驗之則亦真有是極非但為測算而設也蓋以宗動天論之南北兩極為樞每日左旋一周赤極不動黃
