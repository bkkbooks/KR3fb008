body:
  text: 戊丁弧即戊乙丁角任髙任下皆用甲乙丁形有乙甲有甲丁有丁乙甲角求乙甲丁角為地半徑差之數若求月小輪上各度之距地以前推均數所淂之第三邊為三率本輪最髙距地一度二千九百為一率六十一地半徑又二七八一為二率求淂四率淂月各距地心度測月徑地影徑測日月視徑度分其術不一惟用月食立法為曆家之正術也西史載周襄王三十一年庚子某月日子正後順天府時刻四十一刻五分月食十二分之三約為四之一于時日躔降婁宮二十七度五分月離壽星二十七度五分月自行為三百四十度五分月距交九度二十分距黃道北四十八分三十秒又周景王二十二年戊寅某月日子正後十四刻五分月食十二分之六約為半徑于時日躔星紀十八度十二分月離鶉首十八度十二分月自行二十八度五十四分前食月距本輪最髙二十度弱兩食之較八度有竒俱在本輪上弧不能變逺近之數月距交七度四十八分距黃道南四十分四十秒如啚日光照地面即地背生影形如角骵漸小以趨盡月過交入地影有髙卑食分為之大小今兩食時同在最髙之左右其距地等食分一為半徑一為
