body:
  text: 輪半徑作庚辛小均輪從均輪之最近辛取甲己引數之倍為辛丑弧月止丑即作己丑戊丑丑丁三線成己戊丑戊丁丑二斜角形先算丑己戊形形有己戊五千八百有己丑二千九百有戊己丑角引數之倍辛丑弧用切線分外角法求淂己戊丑角及丑戊邊以己丑戊角減庚戊丁角引數之餘存丑戊丁角次算戊丑丁形形有丑戊邊有丑戊丁角有戊丁全數依切線分角法求淂戊丁丑角或戊亥弧即申戊引數弧相當之均數也以戊亥減平行淂酉申亥為寔行又以減申戊淂申亥為寔引後求月次均所用再用丑戊丁形丑丁戊角之正弦與丑戊邊若丑戊丁角之正弦與丑丁邊淂丑丁為月距地心線交食中視半徑表所書今列表月自行從最髙起初宮求各度之均數其最大初均為四度五十八分三十秒在引數三宮二度測太隂本輪半徑及最髙所在太隂既有最髙卑之行其本輪上距最髙度分及本輪半徑之大小西史多祿某法用三會食以測之以月食時月骵正在本輪無次輪差故也說詳後其各測如左
