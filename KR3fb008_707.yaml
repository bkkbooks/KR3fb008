body:
  text: 出地迤卑居地高平去水澤遠食時無雲氣則月魄盈推數少于測數展轉推求即清蒙之氣隨地隨時有無厚薄不等能淺深受光于日而變昜其焒耀之勢使人目所見或增或減迄無定限也故蒙氣盛者即高弧至于午正人目見日無橫斜之線不能升卑為高而地以上之蒙氣猶能承受日光使溢界外而展小為大以致月體不能蔽日矣如圖地心為甲日心為丙太陰正當日目之中為乙月影之最中人目所在為巳設太陽之邊實為丁為戊其光下焒所限月影之界宜為丁甲戊甲丙線此限外之氣皆得最光也然因乙太
  hash: sha256:8d1923784a30900ac8a307563bfc7dff4a783ff2295773d0dab3e1b8c4a11fb3
