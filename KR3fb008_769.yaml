body:
  text: 三四月體當食而成青黑色是借光所生月居食甚之中時顯雜色時但青黑前言月既入此界即無太陽入氧折照之光則可由見色者皆因光而見若並無光當為純黑也其顯雜色者凡雜色之映見皆不由于純光純光自當無色而雜色所從著見者必因濕氧居其中間如虹霓是已若虹霓是濕蕓所眏無從可證試以玻璃瓶滿注清水別為密室止穿一隙已達日光瓶水承隙則光透墻壁亦成虹霓大氣之體本是熱濕因于地氣時重時輕若太陽之光從地旁遇而地影在濕氣之中則月體所至生種色亦此理矣至若青黑色月在滿影多見之則因去光最遠所得希微之光不足歞其本體故光色近于純黑果絶無光又不能顯此色矣第可謂希微之光者實非本光如人在地影最厚處天光尚眏焰之近目之物略能別識若月食時則受光之天去月最體為切近而諸星環繞四周皆有借光可焰月體較人在地面尚為影之薄處豈得無微光可借聊顯色象乎或云合朔以後月之下半未受日光而月體微光亦顯青黑之色果絶無本光此光又何從而生日生明以後魄顯微光然能去離月體足知其非本光去離者未至上弦此光漸消漸不可見也若實為本光則上下弦前後深夜視之比朔後之月尚近太陽者尤為竊黑其本光愈宜顯著為不然深夜即無初昏即有其為此時地面反焰之光甚昜矣比論月為暗體絶無本光與前月離卷內所論不同蓋西土原有此二說不妨互存也
