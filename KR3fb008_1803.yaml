body:
  text: 每年交行一分四十五秒十四㣲至于金水二星之次輪面與黃道相交之角則未載其数今按其緯度表推之金星次輪面交黃道之角為三度二十九分水星次輪心在正交當黃道北之角為五度五分十秒當黃道南之角六度三十一分二秒次輪心在中交當黃道北之角為六度十六分五十秒當黃道南之角皆為四度五十五分三十二秒次輪心在兩交之中當黃道南北之角皆五度四十分夫五星在次輪面斜交本道其交角宜相等而輪心南北之角為交錯之角其度尤宜相等惟水星獨不等或因水星近日逼于陽先低昂不㝎亦未可知然其體甚㣲且不数見于其應見時候之隨見即隱故始從舊術推筭無由測騐以淂其
