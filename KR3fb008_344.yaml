body:
  text: 日午正太陽躔春分㸃在子午圈上左旋一周至乙日午正春分㸃復在子午圈上此時太陽尚偏東一度黃道夫此一度乃黃道上之度以較赤道止五十五分而此一度內再減去縮差二分寔餘五十三分則太陽寔偏東五十三分少俟之令赤道旋過此數太陽已至子午圈上人目見為午正其寔平日尚未及也迨旋過一度滿平日一日太陽則在子午圈西過午正矣是視日先子平日其相差之數為七分升差與縮差之并即視日不及平日之較化時淂三十秒弱即春分後一日之日差也今立表從春分起算以春分時無升度差又太陽近中距平寔二行畧同無盈縮差即平日與視日相等餘日用此差以加減于平日平時淂視時算法假如立夏節太陽距春分為四十五日平日赤道上過四十五度太陽平行黃道經度亦四十五度法以黃經度加象限減髙沖淂四宮九度為引數查加減表得均數一度三十五分與盈縮大差二度三分相減淂二十八分為自春分至四十五經度之縮積差次以黃經四十五度查升度得同升差二度三十分因此時赤道小于黃道又均數為縮差宜相并共二度五十八分化時淂十二分為視日平日之差視先于平號為加又如立冬太陽平行為七宮十五度依前法淂均數一度三十七分與二度三分相減淂二十五分為自秋分至立冬之積盈差因前秋分時有縮積大差四度六分則與之相減淂三度四十
