body:
  text: 五星交周名義雖與太陰同而其行之順逆寔相反也太陰之交逆行五星則順行然而本道與黃道之交周土木火三星有之而金水二星則無何也土木火三星各有本道與黃道斜交其自黃道南遇黃道北之點亦為正交自黃道北遇黃道南之點亦為中交自交而後便生距度比本道與黃道相距所生之緯度也若夫金水二星則皆以黃道為本道因無二道之交點故亦無二道相距之緯度也其所以又有緯度者曰于次輪之面不與本道平行而斜交于本道星行次輪周兄離本道者皆生緯度比又非獨金水二星為然即土木火三星亦然也是故土木火三星本道與黃道相交之兩點仍名之曰交周自兩交點遇地心作徑線名之曰交線自西交之
