body:
  text: 日食圖甲為太陽心丁乙癸圈為太陽戊庚丙三點為月心庚甲為視距度月行至戊則乙點為初虧月行至庚得巳壬為食甚月行至丙則丁點為復圓戊庚與庚丙即月初虧至食甚食甚至復圓所行之時分也
