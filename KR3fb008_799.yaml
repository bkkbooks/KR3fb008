body:
  text: 丁丙以已為心用三點同圈法得甲丁丙辛為太陰乃以已丁較戊乙亦得日月兩徑大小之比例定食分及兩徑比例必係真元形前密室測食雖可得食分及日月兩視徑然所得非真形何則太陽胡形入室內必借孔形以兩形合別為雜形今設圓孔雖原形無從可變除上為下左為右而食之時其自變形露角射於密室內又與孔之圓形不合因而損其兩鋭角似圓故所測兩徑在光形密室之中比于兩實徑在食時必依孔之廣狹變其大小未嘗正合且于形中點號以求徑並距孔時遠時近就影于先所畫圈亦不昜今設紙中孔為定度用窺管前開小孔後置白牌彼此以平行相焰可免多圈多量之煩受
