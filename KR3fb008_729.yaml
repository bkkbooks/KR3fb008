body:
  text: 徑丁為月心小圈為月丁甲為實距度乙丙即太陰半徑與丁壬等總得甲丙為食限者月心在丙二周能相切于乙食從乙點起漸入漸大若兩周相分于丙則不食矣今以月食分分為三等曰不全食日全食曰正食一啚月成在丁則乙丑為月進地影之數而壬乙小半尚有餘光不全食也二啚月心在丁其上半正切地影周壬丑全骵俱入影內為全食也三啚甲為二道之交月無距度正在
