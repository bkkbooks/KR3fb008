body:
  text: 曆書㝎月食初虧復圓方位距緯在黃道北初虧東南復圓西南在黃道南初虧東北復圓西北食八分已上則初虧正東復圓正西此東西南北主黃道之經緯言非謂地平經度之東西南北也惟月寔行之度在初宮六宮初度望時有為子正則黃道經緯之東西南北與地平經度合否之黃道升降有斜正而加時距午有遠近故兩經緯逈然各別而所推之東西南北必不與地平之方位相符不如寔指其在月體之上下左右為眾目所共觀乃為親切也其法從天頂作高弧遇月心至地平即分月體為左右兩半周又平分為上下兩象限即成左上左下右上右下四象限而黃道在地平上之半周亦平分為東西兩象限乃于初虧復圓二限
