body:
  text: 大圈必相交不能為平行者以諸大圈共一球心故也如小圈各自為心則平行矣十六兩大圈相交其交處止有兩點如丙丁兩大圈丙圈之極在戊丁圈之極在已此兩圈必相交于乙于甲但交處止有甲乙兩點此外不能相遇十七兩大圈相交必分球為兩平分如從兩交點作直線此線必過球心十八兩大圈相交必各自分大圈為兩平分十九大圈之心即球心小圈之心在大圈之軸其半徑亦小于大圈之半徑兩平行甲乙大圈癸子為軸即以球丁心為心丙戊庚辛為甲乙之距等圈其心為壬為己必在子癸軸上其半徑庚壬丙己皆小于大圈之甲丁半徑而恆自為平行與子軸線俱為直角又己壬兩心若距丁等則戊己庚壬兩半徑亦等二十球上大圈從兩極出線平分為三百六十則小圈亦必平分三百六十但小圈之各分必小于大圈之各分今立算凡大圈皆平分為三百六十度論角八則
