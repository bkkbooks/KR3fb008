body:
  text: 火星多祿某於漢順帝永和四年巳邜用火星沖太陽平行淂星最高在鶉首宮二十五度半此時太陽躔星紀宮十五度距最卑三十五度時太陽最高在實沈宮十度均數為一度三十分應加又太陽一日細行為六十分火星為二十五分沖日時一日逆行之數兩行並之淂一日太陽與火星相近為一度二十五分用三率法一度二五與二十四時若均數一度半與二十五時二十四分乃火星預先沖太陽之實經度也依此法補前第一第二測再算得當時最高實在鶉首二十八度十五分又萬曆二十八年庚子第穀自測得在鶉火二十八度五十五分相差為三十度四十分以中積一千四百六十一年而一得每年行一分十四秒五十二微
