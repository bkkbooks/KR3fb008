body:
  text: 陰隔太陽原光于已目所能見者非丁戊乃是庚辛而作已辛直線則目宜全不見日周之微光矣第太陽下焒之最光下及于月影四周之外而外氣之近地者為次徹之體則太陽之光借此體以侵入于月影本界之內別作一界線曲而向內即人所正見為癸而癸既切影較遠影之處加有光舄光愈正焒愈明切影之光甚似垂線若正焒然故比距遠之處加明舄故影之四周從癸至壬目所見者皆成日光是為癸壬金環癸壬所在寔于空中非太陽之光果溢至辛也從下視之若在月之四周與太陽同天而太陽之原光遂若丁戊以外更餘庚辛一環矣但癸壬之廣狹依氣厚薄隨地隨時一不同耳是知日月近地平固因蒙氣有視度之高卑差即去地平遠猶有視
