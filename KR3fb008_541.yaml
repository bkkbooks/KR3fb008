body:
  text: 不再食太陽越五七月能再食者蓋五平月及七平月之交周度雖但不及食限然朔時日月經度尚不甚遠于交而太隂有視差設會朔在卯酉時其南北差甚大月之距黃道度遂易遠為近能入食限而有食然五月能食者必大月七月食者必小月蓋月大月行度多而又逐及于交月小月行度少而又退就于交也若月食之限前後皆十五度有竒而五月後能再食者論五平月之交周亦不及食限然望時或二曜本輪之加减差極大則日月相距之弧極遠而實望之加時必多又當大月太隂之行度又多則月猶能及于食限內二度餘然而食分則少至越七月望與交相去甚遠即
