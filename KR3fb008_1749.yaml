body:
  text: 寔行為比例淂戊巳可變十分以減寔朔用時甲戊大于甲丁則加淂太陰在戊點為食甚用時也求日食食甚真時及食甚視緯日食食甚時刻必以東西差加減用時方為真時而東西差之時分最為难㝎盖太陰因視差之故其行度時不同若以寔行比例加減用時而其時又有東西差必不與用時之東西差相等自
