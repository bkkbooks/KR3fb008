body:
  text: 十三分內減去癸壬初均一度三十三分淂二百十度乃水星在辛距壬辛遠所行之度數也依此可定伏見平行之曆元求土木金水四星較分五星次均下各有較分者以星歲輪心旋居於本輪周上凡自最高至最卑一百八十度歲輪心皆淂遁居則其距地各遠近不等而次均角悉為之變勢不能一一為表故先定其高卑之較若欲全算有三高二千四百之次均角法先設歲輪心在本天最高算歲輪上一百八十度之次均設輪心在最卑又算歲輪上一百八十度之次均末以上下各本度之次均相減得輪心在最卑之次均大於最高若干謂之罰分也蓋次均角近最卑則愈大近最高則愈小今先定最大最小之兩數次用中分法即可淂本輪中間各度
