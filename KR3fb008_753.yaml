body:
  text: 折焒若一物在一體之中以一直線入目謂之直焒夫同是日光也在地面之上能折入于地影之根際則自地面而上何獨不能折入于影之中際至月體經行之處孚如圖甲為太陽乙為地球藉非清蒙氣能近太陽之光而成折焒則宜從子出光至丙從丑出光至丁節地面徑遇而復合于庚為地影銳角也今因清蒙氣同繞地球日光至丙至丁遇其次徹之體難于透射則曲而內聚止于戊已地面矣而大
