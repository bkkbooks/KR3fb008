body:
  text: 輪設月距最髙為辛壬則己子丑為均輪丑子為倍度月居子淂丙甲子為初均角次作寅卯為新增負均輪之圈其半径為次輪半径與新本輪半径相加之数乃移均輪心于負均輪圈卯作辰巳午均輪與已子丑原均輪䓁辰為遠點午為近點用均輪心行負均輪圈寅卯弧之倍度即本輪同辛壬弧之倍度徔均輪近點午数至巳以已為心作未申子次輪其未子全径與均輪辰午全径恒平行未為遠點子為近點其近點必與原均輪相交于子次輪周與原均輪必相切于子點朔望時月在子西弦時月在未如朔望之後两弦之前月從子行至申子申弧為倍離度月止申作子甲申两線成子甲申三角形有子甲邊初均距地心線有甲子申角以壬丙甲角距冣髙之餘度与丙甲
