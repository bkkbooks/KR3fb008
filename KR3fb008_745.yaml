body:
  text: 戊因太陰在丁得交常為甲丁而庚丁與庚乙若甲丁與甲戊若甲丁設四十五度與甲戊最差之限得六分甲戊少于甲丁在啚為巳丁若甲丁在食限內其與甲戊差又不及三分矣因兩道之最大距不遇五度故也設甲丁弧二十度而以甲乙與乙丙之比例推甲丁與丁戊得丁戊距度一度四十二分今作戊巳與甲乙為垂線又以甲丙與丙乙之比例推甲戊與戊已亦得戊巳相距一度四十二分可見丁與巳見有差戊巳與戊丁有微差不足見也今不用戊丁開方而用戊巳又以戊巳平分太陰入影與出影之弧其不得有差甚明矣
