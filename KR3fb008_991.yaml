body:
  text: 太陽最卑天半徑九六四一六與所測歲輪半徑若丙甲太陽高卑之較三五八四與兩甲最大日差萬二千三百五十分為太陽最高至最卑火星歲輪半徑極大之差也火星歲輪軌迹圍日之象火星歲輪既與日天等大則星行歲輪一周必成圍日之象以日為心如圖甲未為太陽天癸申為火星本天辛酉寅午二圈為歲輪甲為日體合伏時日在甲星在辛退沖時日行滿一周復至甲星在午其餘自辛至午歲輪上星所應一周之軌迹成辛邜午
