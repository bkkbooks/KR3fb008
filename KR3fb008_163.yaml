body:
  text: 千萬分八線割圓之根測圓無法必以直線直線與圓相準不差又極易見者獨有六邊一率古云徑一圍三者是也然此六弧之弦非六弧之本數自此以外雖分至百千萬億皆弦耳故測弧必以弦弦愈細數愈密其法仍由六邊之一準率始自此又推淂五率此六率皆相準不差但後五率其理難見推求乃淂是名為六宗率其法先定半徑為一千萬分則作圈內六種多邊形准此六形各等邊之數淂此六數即為六通弦各當其本弧次用後五要法輾轉推求以淂九十度各度之通弦立割圓表宗率一圈內作六等邊切形求邊數法曰圈內六邊等切形其邊與圈之半徑等即一千萬如啚丁乙丙圖作六等邊內切形其乙丙邊即甲乙半徑何則甲乙丙形其丙甲乙角既為六十度而丙甲乙甲兩腰又等同為半徑故則相對之甲丙乙甲乙丙兩角必等而甲乙丙形之三角俱等矣每角皆大十度夫乙丙甲三角既等其三邊必等故丙乙即甲乙半徑一千萬分為六十度之通弦宗率二圈內作四等邊切形求邊數法曰半徑上方形倍之與四邊形之一邊上方等開方淂邊數
