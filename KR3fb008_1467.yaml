body:
  text: 太陽寔均并記加減號求太隂寔均用月離太隂初均数表以太隂寔引宮度分察其所對之度分秒淂太隂寔均并記加減號求寔距弧太陽太陰两寔均同為加或同為減者則相減得寔距弧一為加一為減者則相加淂寔距弧求寔距時用交食周日諸平行表以寔距弧度分秒察月距日相當之数取其所對之時分秒淂寔距時㝎加減之法典距時同
