body:
  text: 若真距度與真時差相較有餘分即為距較度分差數秒不論以真時距分與距較度分化秒相乘為寔十求內先得時差化秒為法除之得數為距時損益分若真時美國大於真距度則為益分真時差小於真距度則為損分湏記損益號置真時距分以所得損益分如號損益之為考定真時距分復置視朔時以考定真時距分加減之東減西加並如原數為考定食甚時十三求食分以寔朔與真時相減得較數如前法查四行時表交周度得距時交周限東為減限西為加置寔交周以距時交周加減之為定交周
