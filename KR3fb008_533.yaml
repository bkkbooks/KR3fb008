body:
  text: 掩而食今冬至南北差甚大太隂之視行循內乙視道尚在已距甲遠即已切太陽周入日食之限後太陽丁行黃道至隱與太隂視道相遇是為視交即二曜以兩心會合能全食若更前至辛日月亦未及實交甲太隂實未過黃道南而視行則已過太陽之南即丙不能掩日亦不能切日而不食矣可見太隂實距北在已為順天府同緯地最大食限潯十七度有竒至辛遂出食限之外况過甲而後實距南其視度距太陽甚遠安潯尚有食乎再于本界中論地論其極高十八度者先設日月在冬至星紀宮初度實會在正午淂高弧四十
