body:
  text: 定日月兩徑之數多依此測不能無差今別有測徑之多法見月離卷以真視徑比例推食之實分測食者于室中任用器之長短孔之大小不必拘遠近之比例而惟以先列視徑表定食分為主法以所測之光形作圈以光影之界弧求心即太陰心亦作圈必量兩圈等用比例尺或預分定數百平分之線得各分數若干搃而半之即與兩曜視半徑並分數等何為分數等也日食形內光與影各失其本然止以邊論則猶是若兩心相距則非矣蓋兩心相距與原形恒有比例因彼所張此反損各半徑與原半徑不合而兩並數則有合故以此搃兩半徑重之分與彼搃兩半
  hash: sha256:6d2d2481d0185caa34bd1de0f31f9d6927ab6e92f9f727db5add5ad7a9b5cb05
