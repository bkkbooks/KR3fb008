body:
  text: 若正在黃道乙即甲乙甲丁兩道同升之較與太陽升度同表初度下所書求之用醜子酉曲線斜角形形有子醜兩極之距二十三度三十一分三十秒有酉子星黃道緯度庚酉之餘有醜子酉角為星黃經度之餘黃庚為黃道經度減半周淂庚邜為醜子酉角之度依法求子醜酉角淂寅巳弧為酉星赤道上經度又求醜酉邊減醜巳象限淂巳酉星距赤道緯度五星行率不同五星行天別其行度各有不仝論平行土木火為一類金水為一類自行土木火金為一類水星為一類歲輪土木為一類火星為一類金水為一類伏見行金水為一類土木火為一類其緯行則土木火為一類金水為一類此行度仝異之大凡也
