body:
  text: 遇八度故星緯自初度起至八度止求其升差如圖邜黃為黃道子壬為黃極赤寅為赤道醜癸為赤極黃為冬至邜為夏至甲為春秋分設一星居酉緯在黃道北即從黃極子作子庚壬弧淂其黃經度為寅黃緯為庚酉次從赤極醜遇星骵作醜巳弧則其赤道上經度為寅巳與黃道經度不同法以寅巳與黃庚相減淂赤道或多或少於黃道為仝升差若赤道大於黃道天加小於黃道用減以淂星赤道上經度星在辛在甲倣此
