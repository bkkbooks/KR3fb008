body:
  text: 引即星距正交以次寔引入前緯表查前中分以伏見實行查前緯限中緯各化秒相乘三千六百而一淂星前緯記書南北號又以次寔引入後緯表查後中分以伏見寔行查後緯限水星後緯限有二表中緯各化秒相乘三千六百而一得星後緯亦記南北號視前後緯號同者俱南俱北也兩緯相加如號異者一南一北也兩緯相減即淂視緯人南北以數大者定之異號相減南緯大都是命其減餘為南北大者則命為北也求羅睺計都經度以本年所推月離經緯內正交經度中交經度查距宿鈐表減本年宿如日躔法淂羅計宿度分
