body:
  text: 月適當黃道無距緯則初虧復圓時兩心相距之線與甲乙丙黃道合為一而無差矣因有緯度故乙庚兩心相距之線與甲乙丙黃道相離即成甲乙庚角乙戊之距愈寬其差角愈大也法以乙庚并径之正弦與初虧距緯壬庚之正弦為比同于半径一午萬與乙角之正弦為比即初虧之緯差角也又以乙辛并徑之正弦與復圓距緯癸辛之正弦為比同于半徑一千萬與乙角之正弦為比即復圓之緯差角也即淂黃道高弧交角及虧復是緯差角以㝎月食方位如月距黃道而在黃道東象限則甲乙邜或丙乙丑為黃道高弧交角庚乙甲為初虧緯差角辛乙丙為復圓緯差角因月距黃道之南初虧時
