body:
  text: 白為白道戊為白平象限設食甚真時太陰在辛在白平象限西辛丙為其高弧人從地面視之却見太陰在壬當白道之癸正當食甚之點辛癸為食甚東西差子為初虧子癸為初虧距食甚之弧夫太陰行遇癸辛東西差時而寔經度在辛視經度即在癸則太陰行遇初虧子點若干時而寔經度在丑則視經度必應在子是故丑子與辛癸等丑辛亦與子癸等丑點即為初虧用時然初虧在食甚前其時亦兀有東西差乃以初虧用時復推淂東西差如丑寅為小于丑子然則依食甚之東西差辛癸計之太陰在丑視之應在子而依初虧之東西差丑寅計之則太陰在丑者視之必應在寅巳遇初虧子點之東如子寅是自初虧用時至食甚真
