body:
  text: 則此實會線所指謂之實度視會線所指謂之視度如甲辛線所指為黃道之庚則庚為太陽之實度若乙目視辛日至黃道癸視巳月至黃道午則癸為太陽之視度午為太隂之視度也太陽太隂高畀差視會與實會無異者惟有正當天頂之一點過此以地半徑及日月距地之遠測太陽及太隂實有三等視差法以地半徑為一邊以太陽太隂各距地之遠為一邊以二曜高度為一邊成三角形用以淂高畀差一也又因此月偏南而變緯度淂南北差二也以黃
