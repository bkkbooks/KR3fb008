body:
  text: 太陰㝡高距地一千零一十七萬二千五百與地半徑之比例為五千八百一十六黃赤大距度二十三度二十九分三十秒黃白塑望大距四度五十八分三十秒氣應七日六五六三七四九二六紀八日朔應二十六日三八五二六六六朔應者暦元甲子年首朔距天正冬至次日子正初刻之日分也諸矅皆從天正冬至起算交食則自合朔起算故以首朔距冬至日分為朔應首朔太陽平行應初宮二十六度二十分四十二秒五十七微暦元甲子年首朔太陽距冬至之平行經度也合朔日月㒰度故不用太陰
