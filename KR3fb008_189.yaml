body:
  text: 割圓八線用法有弧度求其正弦如三十七度五十四分之弧求其正弦查表本度本分下淂六一四二八五三若有秒數與下行五十五分之弦相減用中比例法淂之求切線割線同法求餘弦以正弧反減象限查之有鈍角求其各線如鈍角一百四十二度六分求正弦則以一百四十二度六分減半周餘三十七度五十四分查表淂六一四三八五三為其正弦若求鈍角餘弦以一百四十二度六分減去象限餘五十二度六分查其弦為餘弦丁甲也如啚戊丙弧為鈍角之度其丙丁正弦當丙乙小弧亦當丙戊大弧蓋丙丁當丙甲丁鋭角亦當戊甲丙鈍角也求割切線倣此惟矢線以甲丁餘弦加半徑淂丁戊為鈍角大矢有正弦求其弧如有正弦八八八八八三九欲求其弧查表正弦內相當數淂本度為六十二度四十四分如無此數即取相近而略小者有各比例法求之他線求弧倣此有弧求其通弦如七十五度四十八分之弧求通弦其法半之
