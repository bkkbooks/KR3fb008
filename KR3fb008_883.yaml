body:
  text: 行在子即子為心作丁戊本輪丁為最高又以丁為心作已井均輪巳為最遠井為最近平行自子右行而醜而辰而復於子為一周本輪左行自丁而戊為鬥而復于丁為一周均輪右行自已而亢而井而復於巳為一周其巳點之行三倍疾于丁子兩心之行如平行在最高子本輪上則在丁均輪即在巳巳為星之
