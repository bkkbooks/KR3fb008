body:
  text: 下半弧其兩會間視平之差為一度二十一分即黃道上午未弧也甲乙乙丙相并淂甲丙一百六十八度三分甲丙之間自行大平行小丙行疾假必在本輪下半月行丙申弧兩行之差為子未六度二十一分以子午減未午淂子未差夫上乙丙丙甲兩弧并即平行少視行多月必在最卑之兩旁行疾故甲乙反之即平行多視行少必在最髙之兩旁行遲故即定已為最髙次從甲乙丙丁等㸃各作線成乙戊丙乙戊丁等形先算乙戊丁形戊角之餘甲戊丁為乘圈角乘甲乙弧乘甲乙弧半之淂五十五度一三為甲戊乙角減半周淂乙戊丁角乙百二十四度四九三置一百八十度減去戊丁乙角即子午弧及乙戊丁角存戊乙丁角四十七度二八三有三角求其邊法以丁角七度四二之正弦倍之淂乙戊度二六七九八戊乙丁角之正弦倍之淂一度四七三六九為戊丁邊次戊丙丁形乙戊丙乘圈角乘之丙弧半之淂四十度四八為乙戊丙角與乙戊丁角相減淂丙戊丁角八十四度一三置兩直角減去丙丁戊角即子未弧及丙戊丁角存戊丙丁角八十九度三七
