body:
  text: 太陰初均表太陰初均表按最高最卑分順逆列之引数初宮至五宮為最高後列于上引数六宮至十一宮為最卑後列于下前後列引數度分分順逆以別加減中列逐宮逐度之初均数太陰引數在上六宮者用順度其號為減太陰引數在下六宮者用逆度其號為加用表之法以引數之宮對引数之度分其縱橫相遇卽所求之初均数也表以十分為率若引数有零分者按中比例法求之設太陰引数為一宮三度四十
