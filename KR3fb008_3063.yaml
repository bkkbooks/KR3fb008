  text: 五星伏見距日加減差表五星伏見距日加減差表亦以星之黃道宮度按晨夕列之初宮至三宮六宮至八宮列於上三宮至五宮九宮至十一宮列於下前後分順逆列星之黃道度中列各星黃道南北自一度至八度之距日加減差宮在上者用順度宮在下者用逆度南緯為加北緯為減用表之法求晨見晨不見用晨宮求夕見夕不見用夕宮設土星當夕不見限度其黃道經度為六宮二
