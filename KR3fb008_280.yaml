body:
  text: 道同線丙丁等為距等圈其戊已等㸃皆與地平平行旋轉惟七政循黃道行則與地平有出入也若黃道極在天頂則黃道每日一次與地平為一線一瞬則六宮在地平上六宮在地平下離黃道極圈而外出入皆有法一宮先出二宮繼之入亦然若黃道極圈之內赤道極之外則反是欲測各㸃運行視其出入于地平測法必以赤道之升度為其尺度何者赤道恆平行乃有準分之尺度也平球而外尺各宮出地平上在黃道俱三十度赤道則有長短測法俱不用黃道之長度而用赤道上之黃道升度如北極出地十度為丙乙其黃道初宮出地為丁戊三十度則截取赤道先與黃道初度同出今與黃道第三十度同在地平線上者為己戊得二十四度弱是為黃道初宮之地升度凡論時刻及各㸃出入皆用之不用丁戊也此為斜升度凡測升度有二或連或斷連者俱初宮初度起以至本㸃依前法視赤道同出度即得若有別設二㸃在黃道上欲測二㸃之升度是為斷也法以前㸃視初宮相距之升度幾何是為前升度以後㸃距初宮之升度幾何是為總升度于總升度中減去前升度得
  hash: sha256:325f7de3ddb720b1405a75fef313fec2bffbababfc39cbaad49775bd0d13a115
