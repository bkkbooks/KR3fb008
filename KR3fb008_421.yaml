body:
  text: 為同類更以先得之戊丙戊丁亦變與後淂之乙丙為同類蓋欲以戊丁戊丙乙丙三邊皆變與本輪半徑為同比例也法用後乙丙為主線以先乙丙一七八一與後乙丙一三六八若先戊丙與後乙丙同類之戊丙一度一九六一五即戊壬丙弧之全弦也又先乙丙與後乙丙若先戊丁一度四七三九六與戊丁十度八一五一此戊丁與後乙丙為同類次以戊丙全弦半之求弧淂三十六度七三三六倍之淂戊壬丙弧七十三度四六七二以與甲乙乙丙二弧相并淂甲戊丙弧二百六十五度二五減全周存甲戊弧九十四度三五取其全弦一度四六九五八為甲戊線與戊丁十度八一五一相并得甲丁十二度二八四六八次求辰庚丁角先求庚丁線法從地心丁作丁癸切線切本輪于癸淂庚癸丁為直角而癸丁上方形與甲丁偕戊丁矩內形等以甲丁與戊丁相乘淂一百三二八六為股積即癸丁上方故庚癸一度自之為勾積相并開方淂庚丁線十一度五七次求庚角從本輪心庚作庚辰垂線為甲戊之垂線平分甲癸戊弧于
