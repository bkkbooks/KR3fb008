body:
  text: 丁全數與甲角甲乙丁之餘角之正弦若甲乙邊與乙丁次用甲丁丙形形有丁直角有丙甲丁角于鈍角內減去丁甲乙角餘為丙甲丁角有甲丁邊求丁丙全數與甲角之切線若甲丁與丁丙邊既得丁丙與前丁乙相加共為乙丙邊求甲丙邊法甲丙乙角之正弦與甲乙邊三丈若甲乙丙角之正弦與甲丙邊七丈五尺九六三或依分形法用甲丁丙直角形求甲丙邊理同求丙角法見前得甲丙乙角六十度第五法有三邊求三角甲乙丙鈍角形有甲乙邊三丈有甲丙邊七丈五尺九寸六分三釐有乙丙邊八丈六尺三寸八分三釐求乙乙甲丙三角法曰所有三邊若皆相等一圖則三角俱等每角六十度不用算若兩邊等二圖則腰間丙乙兩角必等即從甲作甲丁垂線平分乙丙邊于丁用甲丁乙甲丙丁一直角形算之若三邊俱不等如啚甲丙乙鈍角形以甲鈍角為心甲乙小邊為半徑作全圈截甲丙邊于庚乙丙邊于戊丙甲又引長于已即甲已甲乙丙半徑相等作甲戊線亦與甲乙等次從甲向丙乙邊作甲丁垂線必平分乙戊于丁丁為直角則甲乙丙形分為甲丁乙甲
