body:
  text: 圓太陰高弧按太陰距地限察其所對之数為太陰地半徑差兩地半徑差相減餘為復圓高下差求復圓東西差用交食東西南北差表以復圓白道高弧交角及復圓高下差察其典東西差所對之数淂復圓東西差求復圓南北差用交食東西南北差表以復圓白道高弧交角及復圓高下差察其典南北差所對之数淂復圓南北差求復圓視行復圓典食甚同在限東或同在限西者以復圓東西差典食甚東
