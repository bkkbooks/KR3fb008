body:
  text: 乙之垂線三點同圈法有甲乙丙三點欲作一圈以貫之術任以甲為心作虛圓分用元度以丙為心亦作虛圓分兩圓相較于戊于辛作戊辛直線又任以乙為心以丙為心各作同度之虛圓分相交于庚于壬作庚壬直線兩直線相遇于丁以丁為心作圈則甲乙丙三點並在圈周
