  text: 三九九九九六一一四五八八六五一一四五九三二四五九九九九九二二九一八一六六二二九一八三八五九一度分餘弦餘切线餘割線本割圓表每弧一度析為六十分每分各具弦矢切割共有二萬一千六百之數今隔十五分列一數以概其餘十五分以內各線用中比例法可求也
