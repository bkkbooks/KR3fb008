body:
  text: 七政天居恆星之下其各天又有髙卑第一最近地者為月以月能掩日五星又行黃道二十七日有竒而周為最速也其次水星天次金星天次太陽天皆行黃道一年一周次火星天二年一周次木星天十二年一周又次土星天至三十年一周因此推其髙下必行遲者去地逺行疾者去地近也又以人目視差驗之視差之理見後卷月視差最大日次之火星次之木又次之土星幾于無有至恆星則無差因知七政近人者差愈大愈逺者差愈小也其金水二星與日同一歲一周似難別其逺近近世用逺鏡以測金星見有弦望之象因知金星有時在日上有時在日下水星骵小近日難見其晦明因其運行不異金星亦當為同理而水星之距日恆小于金星知其又在金星天內也蓋土木火三星其天皆以地為心包乎太陽天之外故能與太陽為沖為合金水二星其本天同乎太陽陽而星另有一輪抱日環轉小于太陽天不能包地故有合而無沖而火星當沖日時其體最卑亦能入太陽天之內是諸天各為逺近之中又能互相容入也恆星各天證驗七政各居一天固顯明而易見矣而七政之上何以知復有恆星一天曰恆星布列終古常然而一骵東行行度最遲殆如不動既與七政異行知其不得共居一天也故當別有一恆星之天衆星皆麗其上矣
