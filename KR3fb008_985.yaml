body:
  text: 戊甲壬次均角也戊甲壬形有壬戊甲角八十度三分十秒有戊甲邊有戊甲壬角求戊壬邊淂一萬九千二百九十四分八十秒為木星歲輪半徑測火星次均火星視行較他星行之獨異其故全在於歲輪蓋土木二星本天大而歲輪小火星則本天大而歲輪亦大又土木金水之歲輪半徑皆有定數而火星則乍大乍小毫無定率西士測淂火星歲輪半徑從無一相等若是以其行天也有時逾二百餘日不及天周一宮或越四旬而即遇一舍進退盡縮莫可端聣又因歲輪甚大有時在日之上有時在日之下人目見星骵大小絶殊第谷遂謂火星之本天不距為心
