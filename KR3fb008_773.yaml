body:
  text: 線不等既所向方位不等論日食則甲丙為日月兩半徑并甲戊為太陰距太陽食甚之視距度以求甲丙戊角同前法今更作圓甲為影心乙丙為黃道若太陰初虧在乙其入影之面必向正東若復圓在丙初虧在乙復圓必不在丙故日若指他食也其出影之面必向正西皆無距度故若其距北在丁或在戊即入影之面向東南或西南若其距南或在已或在庚即入影之面向東北或西北也論日食設甲為太陽心其理同此但出入之面所向方位與月食所向正相反耳黃道出沒變日月食所向方位黃赤道之兩交切地平若一在正邜一在正酉不偏南北即諸方具無濶度矣外此或黃道距南或距北其距漸多其出沒之濶度去離邜酉亦漸多又南北極愈高其相離更遠如北極出地三十六度黃道度去離春秋分或南或北一宮其濶度左右各一十四度十五分若去離二宮則更遠其濶度各二十五度十三分最遠者得二十九度二十九分若北極出地四十度其最遠則至三十一度十九分也太陰既隨黃道行其食也亦必依其濶度則起復之所向方位太陰亦必依闊度之左右也今欲定其多寡如圖南西北東為地平圖丁甲戊為黃道食時得濶度戊距正東若干太陰心在丙影心在甲遇兩心之庚甲已大圈指已因戊黃道度距正東遠已隨之距正東亦遠而
