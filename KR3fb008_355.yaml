body:
  text: 九十七度五十分庚已弧在赤道南八度五十六分二庚辛河鼓已右距婁宿北星丁九十度十五分已丁在赤道北七度五十一分三壬已婁北丁右距北河東星戊七十四度四十五分三丁戊在赤道北二十一度二八三丁癸北河東戊右距角大星九十度四六二戊庚在赤道北二十八度五十七分戊子右旋一周各作弧線連之成諸三角形奏甲心者四角先推甲乙庚形有已甲河鼓星緯之餘有已庚河鼓距角大星之度有庚甲角宿距北極以庚辛加辛甲九十度即淂求甲角淂辛壬弧九十六度四十五分九秒為両星赤道經度差餘形倣此算次推甲已丁形如上法淂甲角士癸弧九十三度二十二分五十八秒甲丁戊形淂甲角子癸弧八十五度五十四分十八秒甲庚戊形淂甲角辛子弧八十三度五十七分三十三秒末以四星各經度之差併之淂三百五十九度五十九分五十八秒以較全周止差二秒可謂親切矣測六大星以察周天之度再用六大星測其赤道經度以合天周如啚乙為角大星左距丙軒轅大星測淂五十四度二分乙丙在赤道南八度五十六分二十秒乙子丙左距丁井宿距星五十八度三十二分丙丁在赤道北十三度五十八分丙丑丁左距戊婁宿大星五十八度二十二分丁戊在
