body:
  text: 道之交角壬未與丁午平行末亦為直角丁壬為弦高下差也壬未為勾東西差也丁未為股南北差也直角對高下差交角對角北差餘角對東西差若丁角大則壬未東西差大而丁未南北差小壬角大則丁未南北差大而壬未東西差小蓋角大則對邊百大三差既為勾股形正角大餘角心小故二差二一大一小勢若相因又太隂在中限辛則南北差最大與丁壬高下差等以限上則丁壬與丁未合為一線無下角故也若在地平即南北差甚小以地平上丁壬未角俱小于中限至地平各度故也至東西差太隂在地平時其差最大以此時丁壬未角最小則餘角壬丁未必最大對邊壬未東西差必最長但偤有丁壬未角中限距天頂之
