body:
  text: 等有甲乙丙三率即可淂丁第四率何則乙丙二三率相乘所淂戊庚矩形即如一四率相乘之甲丙矩形也以一率乙丙除之淂甲乙四率矣又如戊巳庚三率為連比例其中率巳上方形必與首尾戊庚兩率相乘之甲丙矩形等故以中率自乘一率乙丙而一淂末率甲乙也此為有三率而求第四名三率法為用最大算三角諸形不能外此七有更理更前與前更後與後四幾何甲與乙之比例若丙與丁之比例今更推甲與丙之比例若乙與丁之比例為更理八有反理取前為後取後為前甲與乙之比若丙與丁今反推乙與甲之比例若丁與丙之比例為反理九有合理合前與後為一而比其較甲乙與乙丙之比例若丁戊與戊巳今合甲丙為一而比乙丙合丁巳為丁而比戊巳即推甲丙與乙丙若丁巳與戊已是合兩前後率為一率而比兩後率也十有分理取前之較而比其後
