  text: 求太陽黃道經度置寔朔太陽平行加減太陽寔均淂太陽黃道經度求太陽赤道經度用日躔黃赤升度表以太陽黃道經度察其所對之赤道宮度分秒淂太陽赤道經度推寔朔用時苐七求均数時差用日躔均数時差表以太陽寔引宮度察其所對之分秒淂均数時差并記加減號求升度時差
