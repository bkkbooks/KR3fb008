body:
  text: 度五十分今兩測視經度差為三十四度三十四分相減淂三度十八分為均數平行大視行小星亦在本圈之上弧依上測作圖甲乙丙為土星本天取甲點為土星第一測所在未定最高左右故任取之從甲取前兩測之中積平行七十五度四三而至乙乙為第二測土星所在又從乙取後兩測之中積平行三十七度五二而至丙丙為第三測土星所在次於本圈心外任取一點如丁以當黃道心即地心也作黃道大圈又作甲乙甲丁乙丁三線又從第三測丙遇丁作丙丁戊線截圈界於戊作甲戊乙戊諸線成多三角形凡星視行之度在黃道丁心其平行之度則在本圈之周
