body:
  text: 當影半徑之分秒也影差者乃太陽自最卑至最高逐度所生之地影與太陽在最高所生之地影相差之數也用表之法設太陽引數初宮五度太陰引數十一宮一十五度求各視半徑數則察太陽引數初宮五度與日半徑所對之數為一十五分三十二秒即所求之日半徑其與影差所對之數為三十五秒即所求之影差又察太陰引數十一宮一十五度與月半徑所對之數為一十五分五十四秒即所求之月半徑
