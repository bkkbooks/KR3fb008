body:
  text: 上所推皆京師順天儲及南北同經度等方也若在東或西不提相同依法算節氣時刻若徃東一千里廣與搃圖每方五百里南北同行謂同經度東西同行謂同緯度若某地距順天儲一方即五百里差二度若距二方即千里差四度三方四方後倣此在南在北則不拘或二度變時得八分變時法一度為四分十五度為一小時度之一分為時之四秒有本表即以所淂節氣時刻加八分若徃東距二方則加十六分每方八分又若某方在順天府西一方宜減八分距二方宜減十六分餘倣此若先推得每日太陽細行遇交節宮度即以次日細行與本日細行相減減餘化秒為一率置六十分以本日細行分秒減之減餘化秋為二率二十四小時化作一千四百四十分為三率推得四率數如法妝之得交節氣時刻分加日差及裏差法同上
