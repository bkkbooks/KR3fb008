body:
  text: 大減小得月星視距度如一南一北兩數相加相距一度外不用以月寔行分化秒為一率時差分化秒為二率六十分化秒為三率求得四率妝之得定時差以定時差加減視星距限度東減西加於淩犯時刻淂月星淩犯視時推月與五星淩犯倣此
