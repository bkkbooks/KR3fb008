body:
  text: 木星距地表木星距地表按星距日次引宮度分順逆列之初宮至五宮列於上六宮至十一宮列於下前後列星距日引度中列逐宮逐度之星距地數星距地者乃次輪心在中距木星行次輪周逐宮逐度之距地心線木星距日次引在上六宮者用順度木星距日次引在下六宮者用逆度用表之法以星距日次引之宮對星距日次引之度其縱橫相遇卽所求之星距地心線也設木星距日次引為初宮一十六度求星距地心線則察初宮一
