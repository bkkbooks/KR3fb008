body:
  text: 各有專家而所用之率互有不同故耶求金水二星各日緯度金水以前緯後緯各用中分相乘同類相加異類相減即淂他處之緯者如圖甲為地心乙丁為星本道即黃道丁為交乙為大距前緯為乙戊向南作丁戊弧又設後緯為丁庚亦向南作戊庚弧三弧皆一象限次如星距交為丁已即已壬為前中分法乙戊六十分與乙戊前緯限若壬已中分與壬已緯度又以丁已距交丁交仝查淂壬辛後中分法庚丁六十分與丁庚後緯限若壬辛後中分與壬辛緯度二緯皆向南為同類相加淂辛已為本時
