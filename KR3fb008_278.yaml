body:
  text: 如啚甲乙為黃道弧若長度則值甲丁升度則值甲丙于赤道上命甲丙曰黃道之升度也從黃赤交至北最逺黃道圈上有九十度每度作一圈與赤道之距等圈平行其初圈則赤道也其第九十則為夏至圈南迄冬至亦然是名日軌圈亦曰日距圈如啚甲乙為赤道丙丁為黃道辛丁為冬至圈丙庚為夏至圈已戊等皆其日距圈也赤道緯圈去北極二十三度有竒者過黃道極名為極圈南北同如啚甲乙為黃道丙丁為黃道之二極過此二極之赤道緯圈為丙已為戊丁名南北極圈黃道與地平圈子午圈相交黃道與地平圈相交所作角隨時隨地大小不同正偏球皆然平球則否其與子午圈相交所作角自六十六度有竒而至九十當九十度為二至時成直角也六十六度為二分鋭角也為相交至鋭之角黃赤道出入降降黃赤二道隨天左旋其與地平相交則有出入升降在平球凡各㸃見地平上者皆與地平為平行無出入如啚甲乙為地平與赤
