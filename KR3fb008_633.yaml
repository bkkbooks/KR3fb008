body:
  text: 即太陽在乙點之高弧其巳乙丁角即高弧與黃道之交角也求之用巳乙丁直角形丁為直角有隱丁太陽距中限之度以實會時太陽所躔宮度與本時中限所在宮度相减淂乙丁日距中限度有丁巳中限距天頂法隱丁之正弦與丁巳之切線若全數與乙角之切線淂丁乙巳交角若太陽至中限丁即巳庚與巳癸合為一線成巳丁戊直角而無丁乙巳形故限上氣差即高畀差而無時差矣又中土丁癸中限距地最低不過二十七度北極出地四十度之地故從二十七度起求丁乙巳各交角之度列表乙巳為正交角表所載皆餘角則以戊乙丙直角减丁乙巳角即淂巳乙丙餘角亦即辰乙庚角也
  hash: sha256:e281f2c3a903872eb88edcde1d9a1bc905cbbadca8928ac46cd055e51c8fc12f
