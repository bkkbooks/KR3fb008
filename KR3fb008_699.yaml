body:
  text: 得而氣之厚薄冬與夏必有分矣故所定蒙氣差隨之異也若論地則山阜之上蒙氣為少平地乃多澤國尤多海濱更多蓋此氣周生于大地之面外規之界距地心悉等而地面有高卑其距氣界各不等此為淺深厚薄之緣正如海底有坳突之勢因有淺深若海水之面恆平而已然論其恆勢淺氣所生之視差少深氣為多論其變淺氣或忽然加增昜少為多深氣乃鮮有變時也明萬曆庚寅夏六月西記月曆太陽以半體出地其太陰正相對尚高二度入影中已多分及太陰半沒而太陽已高二度出地平之上非蒙氣所為安得此乎然本地因近于大山之下大河之濱凌晨蒙氣甚厚若他地他時未必盡同故治曆者當先定本地之諸
