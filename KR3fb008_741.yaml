body:
  text: 啚太陰心行到丁則全入影為食既至戊即生光得丙丁及丙戊亦略相等故求得丙丁倍之即丁戊為太陰全入影至生光之總弧法用甲丙丁三角形甲丙為距度甲丁為地半影減月半徑之餘以甲丙甲丁上兩方相減餘開之得丁丙線為食既至食甚月所行度分也丙戊食甚至生光同若欲精求之不聽甲乙丙為平行仍作兩線斜交于乙太陰初虧在丁食甚在丙復圓在戊丙丁是太陰在影之半為
