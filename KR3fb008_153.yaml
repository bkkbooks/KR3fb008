body:
  text: 八線割圓割圓用八線説八線割圓測三角形法也凡測算皆比此測彼而此一彼一不可淂測古九章算多以三測一獨勾股章以二測一則以勾股為三角形之一也盖勾與股交必為直角直角者正方角也遇斜角則勾股窮矣或分斜角為兩直角亦勾股也遇不可淂分之形又窮矣故三角形之理非勾股可盡勾股之易測者直線也平面也測天則圓面曲線非勾股所能淂故有弧矢弦割圓之法弧者曲線弦矢者直線也以弧求弧無法可淂必以直線曲弧相當相準乃可淂之相當相準者圍徑之法也而圍與徑終古無相準之率古云徑一圍三寔圍以內二徑之六弦非圍也祖沖之宻率云徑七圍二十二則其外切線也非圍也劉徽宻率云徑五十圍百五十七則又其內弦也非圍也或推至萬萬億以上然小損即內弦小益即外切終非圍也暦家以勾股開方展轉商求累時方成一率然不能離徑一圍三之法即祖率已繁不復能用況徽率乎況萬萬億以上乎是以甚難而寔謬今時憲暦法以周天一象限分為半弧而各取其正半弦其術從二徑六弦始以次求淂六宗率皆度數之正義無可疑者次用三要法相分相半以求各率而淂各弧正半弦又以其餘弧之正弦為餘弦以餘弦減半徑為矢弧之
