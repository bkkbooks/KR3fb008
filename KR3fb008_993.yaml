body:
  text: 太圈以甲日為心為圍日之象當沖日時丙午醜弧割入太陽天內距地極近辛合伏時在大陽之上距地極遠所以然者以火星行本天一周太陽行二周適成此象也又辛邜午圈與癸申火星本天等大是以第谷遂有火星本天以日為心之說蓋以辛卯圈代癸申平行天以甲醜日天代火星歲輪立借象之巧算下文詳之一本天高低差者火星歲輪心旋居於本天周上則距地有高卑而歲輪之半徑又隨此本天高卑以為大小當歲輪心在最卑其半徑極小在最高半徑反極大其餘漸高則漸大漸低則漸小皆與視法相反此火星所獨也如圖歲輪心在本天最卑甲測得甲亥歲輪半徑極小在中距戊其戊丁半徑比甲亥為大至最高丙
