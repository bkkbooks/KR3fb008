body:
  text: 至為已寅則月掩太陽止于已庚半徑見為半食矣大凡日之有食月不䏻騅黃道一度外自此以上無緑相涉故㝎朔之日有食時少無食時多也日月地三骵大小遠近各異日月地三骵大小不同地為靜骵日月則有諸種行度有高內外其去地去人遠近不等法當求其大小遠近之比例以推其施光受光之骵勢乃淂影之骵勢因而淂交食之骵勢蓋交食生于影影生于光故必先明三者之本骵而後交食之原可淂而推步亦有根據云一地之骵為圓球又在大圜之中心已見前解
