body:
  text: 秒三十六微與辰己或午丑一度之比同于大于半周歲之一時一十七分五十四秒二十六微與辰子或午未四十四分三十六秒四十八微之比而淂辰子或午未與乙辰或丁午之七度相加淂乙子或丁未七度四十四分三十六秒四十八微即最髙過夏至最卑過冬至之度亦即中距過春秋分之度也此所淂之数比永年表丁酉年前冬至最卑度多四十七秒比戊戌年前冬至最卑度少一十五秒盖最髙每年行六十一秒今合最髙最卑取数立算則其所淂為中距過秋分之度較之丁酉年前冬至固應差四分之三較之戊戌年前冬至固應差四分之一是所測與永年表合矣又用比例法求淂本年五月二十二日乙亥寅初初刻一
