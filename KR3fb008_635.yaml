body:
  text: 交食下視會前實會中會視時食限等皆日月食之公法取準于地心者也然月食生于地影影生于日故天上之實食即人所見之視食無二食也日食不然有天上之日食有人所見之視食其食分之有無多寡加時之畀晚先後各不同故步日食倍難于月食其推筭視食則依人目與地面為準以三視差全憑人目為主而其根由于地面地心之不同視野凢交食者必叅相直不叅直不相掩也日之有寔食也地心與月
