body:
  text: 交食下視會前實會中會視時食限等皆日月食之公法取準于地心者也然月食生于地影影生于日故天上之實食即人所見之視食無二食也日食不然有天上之日食有人所見之視食其食分之有無多寡加時之畀晚先後各不同故步日食倍難于月食其推算視食則依人目與地面為準以三視差全憑人目為主而其根由于地面地心之不同視野凡交食者必參相直不參直不相掩也日之有實食也地心與月
  hash: sha256:ff106be97c3ed26dc21740eda70001a1e2444fa73ef8b6ab1f693e10bd55aa7b
