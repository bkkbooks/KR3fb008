body:
  text: 度五十八分三十秒如癸酉作酉戍負白極圈設白道極在亥則申白爲白道未爲正交自白極亥遇天頂甲作亥甲庚遇白経圈則午點爲白平象限申爲白道出地平白爲白道入地平申午白午皆九十度而白平象限午更在已黄平象限之東惟白極正當黄極之上如酉或正當黄極之下如戍則黄白大距當黄平象限自白極遇天頂甲之白道経圈即舆黄道経圈合故两象限亦仝度今白極亥在黄極西半周故
