body:
  text: 宜以庚乙甲緯差角與甲乙邜交角相加淂邜乙庚為㝎交角在四十五度以上故初虧子點左月體之左稍偏下復圓時湏以辛乙丙緯差角與丙乙丑交角相減餘丑乙辛為㝎交角在四十五度以下故復圓寅點在月体之上稍偏右也若在黃道西象限則初虧之緯角為減復圓之緯差角為加與比相反月距黃道北倣比推之五星行度不同
