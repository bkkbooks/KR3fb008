body:
  text: 圈此圈負水星本天心旋轉丙為最遠壬為最近星之平行自邜右行而醜而午而復於邜為一周一日五十九分九秒小輪則自丙右行而癸而壬而復於丙為一周其行三倍疾于平行大圈行一度小圈行三度即本圈心行設邜為最高甲為最卑如星在最高邜即其本圈心在丙取已丙為本天半徑全數作巳弧為星之本天星距最高三十度至醜即小圈上三倍邜醜至癸丙癸九十度癸為水星距高三十度之本圈心用元半徑為度巳丙也作丁弧為星之本天距最高六十度至寅即小圈上行一百八十度至壬壬為心元半徑為度作庚弧為星之本天距最高九十度至子即本天心在亥如前法作辛弧距最高一百二十度至午即本天心復行至
