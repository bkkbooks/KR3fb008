body:
  text: 一原光以直經發炤為最光因而旁及者為次光日光正炤以直線至于物骵則為最光有物隔之旁周映射則生次光如雲之上日骵所炤最光也雲之下不復見日而猶有光是次光也一原光全骵所彂為滿光半骵彂少光日为全出地平上所生光為少光全升在上則生滿光日食時未全食則存少光既已復原即滿光一暗骵遇明骵不能透光勢必生影而影之四周有最光遶之即影為次光影之為物至虚也以影為明者固非影為暗者亦非稱影為明暗之中庶幾近之盖全無光乃為暗今至夜子初人在地影至深之中去最光極遠而近目之物尚能别識即在影中猶存㣲
