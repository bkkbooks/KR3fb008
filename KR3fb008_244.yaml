body:
  text: 天星半恒在上半恒在下故知地在最中也如啚丙為地東見甲星西見乙星甲乙以上恒為天星之半知丙地必在中也若云非中或在丁則東望戊西望已當見天之小半而不見者大半矣地骵至静地之骵恒静而不動故為各天之心不動者不去其本所亦不旋轉也何謂不去其本所去即不在天之最中矣在本所又不旋轉者若旋轉人當覺之且不轉不已轉湏一日一周其行至速一切雲行烏飛皆冝順行則遲逆行則速人從地擲物空中復歸于地亦必不在其初所今皆不然足明地之不轉地骵最小地球在天中止於一㸃以之較天若稊米之於喬嶽何以徴之人在地面不論所在仰視土木火諸星彼此所見恒是同度故知地骵較于天骵則為極小若地大両人相去絕逺其視諸星彼此所見必不同躔如啚丙已戊乙為天甲為地丁為星地骵若大能為天分数者則人在庚宜見丁在已度人在辛冝見丁在戊度今不然者是地與天其小大無分數比例可論也地周里數
