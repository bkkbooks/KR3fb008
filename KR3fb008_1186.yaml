body:
  text: 二度內取月在下一度內取之次以本日之月視行內減次日之月視行取其較又以五星本日經度內減次日經度取其較視星順行者兩較相減逆行者兩較相加化分為一率日法一千四百四十分為二率以本日五星經度內減月經度為月未及星之距化分為三率求得四率為淩犯時刻五星犯五星以本年所推五星經度及南北緯度相距一度內取用五星各以本日經度與次日經度相減淂較如俱順俱逆者兩較相減一順一逆者兩較相加化分為一率日法一千四百四十為二率又以本日五星經度兩相減之較化分為三率如法求得四率為淩犯時刻
