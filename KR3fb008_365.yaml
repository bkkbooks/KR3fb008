body:
  text: 盖星行既以黃道極為極而星之在黃道或南或北者其所行之圈皆與黃道為距等圈如丁戊夘已之類永逺無變易也然而亦有變動者第谷宻測近二至之星在星紀宮緯度南者其緯古近今逺北者古逺今近若在鶉首宮者反是究極其故並非關測器之謬人目之差為二道之大距古逺今近故也星之在他宮者亦然特逺于大距有未覺耳第此差明知有數可推不敢預為定率如謂古逺今近必上古更逺不知逺于何始將來更近不知近于何終湏随時改測追合天行此不係于星行而係于黃道此黃道緯度之差也論恒星赤道經度恒星赤道經度與黃道逈不相同以星行不以赤道極為極故也凡星近于黃道其黃赤両經度之差猶未甚覺若逺于黃道其両經度之差最大如啚設一星在已近于黃道其黃經為甲庚赤經為甲辛両經度相差不逺設一星在壬逺于黃道其黃經為甲子在春分前其赤經則為乙夘在甲春分後矣故近両極之星其黃赤經度差或至百餘度且不特経度前後至異更能變易星次之前後使前者在後後者在前如參觜両宿古測其赤經先觜後參今測則先參後觜參在前而觜在後矣如下啚甲為赤極乙為黃極有丁星距
