body:
  text: 一度實一萬五千里弱而日天之去地為地半徑者一千一百四十二倍也今求本天各度之距地法以戊乙本天半徑十萬為一率即用前圖一千一百四十二為二率所求丑壬距地心線為三率推得四率即丑壬線變與地病篤為同類為日距地度依法求得最高時日去地午壬為一千一百八十五地半徑最卑時壬卯為一千三百三地半徑中距時即戊乙一千一百四十二二半徑按此數各家微不同以測時或差數秒距地即差至數度也餘度倣此推之求太陽視差地骵居天中止子一㸃然各重天髙下大小不等則各天與地球比例之大小亦不等惟恆星一重天甚逺甚大以地球較之直無數可論故測候之術以恆星為求視差之本視差者日與宗動天髙卑之差也其根由地半徑而生蓋周天度分皆從地心出線使人從地心視之則一以貫之而無差今人不居地心而居地面則自地心至地面有此半徑之差遂使實度與視度不同實度恆髙視度恆卑矣苐此差又非一定其多少之故一係子日骵距地之逺近距地逺則差少近則差大一係于地平上髙弧之多寡日正當地平差最大漸髙漸少至天頂則無差如啚甲為地心甲乙為地半徑丁辛為日躔最髙之天丙癸為最卑之天日行在最髙丁人在乙見日
