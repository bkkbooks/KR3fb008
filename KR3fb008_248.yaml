body:
  text: 二分以及諸節莫不皆然又因此推知地球四面為人所正以天頂而分四方搃以天為上以地為下而無偏墜之虞又地骵悉與天骵相應亦可界為三百六十度以合天行東西為經測以赤道南北為緯測以子午名詳見後第測南北者有二極為之端若測東西湏先定一處以為起界時憲暦以京師為起界而地之經緯度亦一一可淂而明焉子午定南北正線即子午線人居地面先正四方欲正四方先定南北南北者天上真子午線也子午線之為用甚大詳見後世俗用羅盤恒差度教其法于天正春秋分前後一日午正前後立表視表末影所至作㸃識之次作直線聯諸㸃即夘酉線其垂線即子午南北線也盖兩分時日行赤道下表影自朝至暮止作一直線前後各一日尚未覺有曲線也二法不拘月日以直表根一㸃為心多作平行圈視午前影末切某圈作㸃午後待影再切原圈作㸃聯兩㸃作直線為夘酉線如啚甲為表根以為心多作丙乙等圈甲乙為午前影甲丙為午後影聯乙丙二㸃作乙丙線乙丙平分之于丁作甲丁垂線至乙丙即子午線也此法宜于二至左右數日間以此時太陽緯行所差甚微故也右二法雖可淂子午但太陽本行去離赤道
