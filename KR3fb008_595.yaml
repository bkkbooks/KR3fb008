body:
  text: 角可見月距地雖同而影徑又以太陽而大小而未子申角必小于午子申角相減淂午子未角為地影差即表申辛子日距地相當之差數餘依壬子距地遠近推之測地影視徑用前後兩月食擇食之法欲太陰去其最髙卑卑距同度則其入影之小大亦同而月距黃道不必同亦不必全食因以兩距度及兩食分求其所過之影以淂視徑之度多椂菒于周襄王三十一
