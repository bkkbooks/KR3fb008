body:
  text: 借西國所測明弘治元年戊申西史測得春分時刻為西暦三月二十四日子正後六十四刻六分越一百年為萬暦十六年戊子復測得春分時刻為西暦三月十九日子正後四十三刻六分西法之歲三百六十五日四分日之一每四歲之小餘成一日因置閏日則百年中為整年七十五閏年二十五共為三萬六千五百二十五日用両測中積數戊申三月二十四日子正後六十四刻六分算至戊子三月十九日午後四十三刻六分相減其較七十五刻五分百而一得每年少刻一十一分十五秒以減整年寔三百六十五日二十四刻得三百六十五日二十三刻三分四十五秒為今㝎用歲寔乃太陽行天一週之日數也次以周天三百六十度為實歲實為法除之得太陽每日之平行為五十九分八秒十九微四十九纎三十六芒又以一日之平行為寔用二十四小時除之得一時之平行為二分二十七秒五十一微依各日時之平行累加之利表測太陽黃赤兩道之大距法於夏至前後一日用測器數具各依法求午正日軌髙若俱合即真率否則擇相合者用之第二第三日再測如前於所得真率內減去地半徑之差差數見後又減去本地赤道髙度餘為両道大距度即夏至日躔赤道之緯度也不用冬至者以冬至時蒙氣差甚多也用前後一二日者以至前後一日太陽去離赤道止一十三秒相去無幾也西古測黃赤大距為二十三度五十一分二十
