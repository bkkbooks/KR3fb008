body:
  text: 影設月在最高距地為癸己則辛子為最高時影在最卑距地為戊己則壬丑為最卑時影而壬丑必大于辛子求之以丙己地半徑一度減戊乙日半徑五度二十五分第谷所㝎淂戊丁丁丙與乙己平行次用戊丁丙丙己甲兩相似形戊丁與丁丙丁丙即乙己日距地數若丙己與己甲淂總影之長次以己癸最高月距地數與己甲影長相減淂癸甲次甲己與己丙若甲癸與癸辛倍之淂辛子為月在最高之影徑但辛子乃地影之實徑與戊乙丙己諸線為同類而非人目所
