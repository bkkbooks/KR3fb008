body:
  text: 蓋以赤道之上時准黃道左旋距午之度分也如圖甲乙為子午圈丁為天頂戊己為赤道丙巳為黃道己為春分設辛巳春分點距子午圈四十度求赤道上同升度壬巳為三十七度三十四分變時淂二時三十分則距午正二時三十分春分點距子午圈四十度而斯時黃道在子午圈壬者必金牛宫十度故本表于金牛十度下書時二時三十分凡日食時求中限所在必以實會時刻筽之乃淂中限所在也日月距地平高弧視差之有多寡必依太陽出地平高度之多寡日月會合若同高度或差一度以下
