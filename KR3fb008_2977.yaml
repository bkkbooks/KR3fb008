body:
  text: 用表之法以距次交實行之宮對距次交實行之度其縱橫相遇卽所求之星距黃道線也表分二十限依實交角相近者取用水星次輪南與黃道相交之角逐度不同故以最小之交角四度五十五分三十二秒與最大之交角六度三十一分零二秒均分為二十限各求其星距黃道數列表每限交角相差五分夫交角止差五分則星距黃道數所差甚微可以不計故依實交角相近者取用也設實交角五度零一分水星距次交實行為初宮二十二度求星距黃道線則察交角五度星距黃道表為與實交角五度零一分相近初宮二十二度所對之數為一二五六九九卽所求之水星距黃道線也若距次交實
