body:
  text: 骵何從淂生弧線且果平面日炤之宜全骵發光如平面之鏡一向日即全骵發光也月為不然知非平面矣至論其骵質非清非純乃虗寔雜骵故能映光不能透光能發光不能廻光比擬其像稍似于雲虗寔踈宻介在其間獨雲之映光多發光少月則映光少發光多此為異耳論月駁月面非純一色如斑駁然昔人以為山河大地之影非也山河大地之骵東西不等云何月中之影時時不變此其説有二一日月本圓骵特其骵中踈宻虗寔不淂純一不能如鏡光合骵廻返所受之光苐因其本質所至自為發光宻寔處發光大虗踈處發光微凡大光明中間有弱光可指則日大光中之駁㸃也如大赤霞中間有淡紅可指則為大赤中之駁㸃一日月骵如地球寔處如山谷土田虗䖏如江海日出光炤髙山光甚顯次及田谷江海漸微如人登大髙山視下土崇卑其明昧互相容也試用逺鏡窺月生明以後初日見光界外別有光明微㸃若海中島嶼然次日光長魄消則見初日之㸃或合于大光或魄中更生他㸃如日出地先炤山巔次及平疇等以光先後知月面髙卑此其微已至月之發光則本于太陽太陽為萬光之原本其骵至寔其質極純其骵為全球曲面故在大圜中為大光之獨骵月及經緯諸星之光皆從稟受焉古稱月借日之光以為光淂其理己
