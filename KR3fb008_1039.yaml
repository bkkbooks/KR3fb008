body:
  text: 求土木火金星四星中分前置歲輪心在最高卑兩處求淂次均與較分然惟輪心當最高卑時只用次均及較分巳足若在本輪之他度則次均之較數又變他度次無皆大於最高小於最卑而所增各不等其較分悉變因未能逐一為表故設一中分以括之蓋又較分之較也其法以本輪之度分為主若曰歲輪各度在本輪最卑其較分若干今在本輪他度其較分只應若干也故以最卑之較分命其比例為六十分而其餘自離最卑一度起各有所減減至最高而無中分則亦無較分只用次均本數足矣是故較分求次均恒為加而以中分求較分則於較分恒為減表所列較分皆輪心在最卑之數以中分乘之變為輪心未至最卑之較分視在陽卑皆為小數其比例為歲
