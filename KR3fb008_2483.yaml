body:
  text: 緯差角表緯差角表以并徑及距緯縱橫列之并徑自三十一分至六十四分列於前視緯自一分至六十四分列於上太陽最小之半徑一十四分五十九秒三十微太陰最小之半徑一十五分五十三秒三十微兩半徑相并淂三十分五十三秒太陰最大之半徑一十六分五十一秒地影最大之半徑四十六分四十八秒兩半徑相并淂六十三分三十九秒故并淂自三十一分起至六十四分止中列逐分之緯差角用表之法以并徑之分對距緯之分其縱橫相遇卽所求之緯差角也設并徑三十四分距緯三分求緯
