body:
  text: 法淂甲庚邊倍之為甲癸以減半徑淂癸乙為甲丁倍弧之餘弦要法三各弧之全弦上方形與其正半弦上偕其矢上兩方并等如圖甲丁弧之正弦為丁辛其矢為甲辛此兩線上方形并與甲丁上方形等因此凡有一弧之正餘弦可求其半本弧之正弦如甲丁弧其正弦丁辛餘弦乙辛用丁辛甲勾股形丁辛正弦為勾餘弦乙辛減乙甲半徑有辛甲矢為股求甲丁全弦半之淂甲已為甲戊弧正弦此為有一弧之正弦而求其本弧折半之正弦也二簡法附有前三要法即九十度之正弦大略可淂外有簡法二種其用甚便亦可資之以淂各弧之在弦簡法一兩正弦之較與六十度左右距等弧之正弦等如圖乙丙象限內有丙已小弧丙已丁大弧丙戊弧為六十度其戊丁戊已兩距弧令相等兩弧之正弦一為己辛一為丁庚其較為丁癸與己壬壬丁兩正弦各等何則試作一已子線則成丁己子為三邊等角形此形中子丁壬壬已子兩形相等以子壬同腰而丁壬壬已兩腰等則丁壬子已壬子兩直角亦等而丁子子已兩底亦等子丁己子己丁兩角亦等又丙戊弧既六十度其
