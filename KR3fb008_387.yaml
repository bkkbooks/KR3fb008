body:
  text: 月轉遲疾也月行遲限則過影時多月行疾限則過影時少此第一差之緣也一為月轉最髙最率也在最髙月骵小又入于小影則過時少在最卑月骵大又入于大影則過時多此第二三差之緣也是故曆家設擇食之法擇者導擇也去其不齊之緣以求其齊也不齊之緣苐一在日躔經度或在盈或在縮則擇食之苐一法宜擇兩食之日躔經度所在等用前後兩會望皆全食又兩食之黃道同度差分秒至一二度無害則太陽之盈縮等兩影之大小等影行之遲速亦等兩過之加時等免苐一差之緣矣其擇食之第二法求兩食之月距地心等即其本輪之轉分所至亦等若同在本輪之最髙或最卑則其逺其近一而已如在正轉中轉則距地之逺近雖等而在左在右未定欲定其左右則以恆星經度測之若兩食之經度等加時等即其或在左右在右亦等既淂月轉分之所在等即可測食前月骵之徑若徑等即其距地必等測月骵有本法本論見後篇可免第二三差之緣也夫依上論欲求月平行率必用各率均齊之前後兩月食食分同距交同距最髙同加時同經度同然後依法推算以淂各種行度然欲得此各率均齊之兩食考之傳記大都有年月日而無時刻分秒亦無經緯度數何從取之不淂己借西測會通用之西古史依巴谷用實法考驗定為三百四十五平年又八十二日刻平年者古法三百六十五日無餘分或十二萬六千七日四刻實兩交食各率齊同之距也于時交會轉終皆復其
