body:
  text: 十度限相近則太陰之偏東西不多前所得時差于本食之實時不甚相遠可不必復求東西差若所食遠死九十度之限則太陰偏左偏右左右即西東者必多而能變其實行以為視行使不再三考求則所得食甚時刻未真故必先算太陰之視差化之為時差次求其視行與太陽實相距若干則用以推東西差乃得食甚至若復圓初虧總不外太陰之視行而得之此步日食必復算三視差始為密也求太陰視行定太陰東西差須得其與太陽相會之實度應先如在九十度東應後在九十度西乃用太陰一小時實行以三率法推其度差則相應幾何時刻因與完朔加減之其所得時亦可與其視會不遠
