body:
  text: 但先後會之度差必以太陰實行為主然因視差故每移其本實行故以實行求時差多謬而以視行求之乃準矣法曰日食在九十度東則較定朔前一小時食在九十度西則較定翔後一小時復求東西差以兩差不等之分秒或加或減于太陰一小時實行因以得其視行若次得之東西差大于先得之東西差其兩差不等之數為減若次得之差數小于先得數則兩差不等之數為加乃得太陰一小時視行也或不用一小時先于定翔所算東西差而以實行化為時差或加或減于本時得時會又以視會與定翔相去不拘若干于此時再求東西差兩差不等之數依前法加減之必得太陰視行時差因以復算真時差如照崇禎辛未年十月定
