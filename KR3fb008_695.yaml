body:
  text: 陽太陰之蒙氣差大約相等自地平以上至四十餘度高差漸少更高則無有而近地之最大差得三十四分故太陽極近地平以地徑視差之偏卑三分蒙氣差之視高三十四分相減得太陽高弧之視差三十一分則目視太陽將入以下周至地平見謂在上而其寔骵巳全入于地太陰以最大視高差六十三分蒙氣差之視高三十三分相減餘三十分目視之見謂全沒而其寔骵猶全在地平上也多祿某以諢儀測太陽行春秋分積年所得皆以本日兩交于赤道遂為千古不決之疑若謂差在測器安得百無一合又安得悉在地平之上竟無差而在下者至近世而後知為清蒙之差盖太陽臨春分論寔度尚在赤道南晨測之為蒙氣所
