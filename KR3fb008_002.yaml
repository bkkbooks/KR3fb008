body:
  text: 平靣直線三角形二角法為暦算之綱暦家所憑全在測量測量之術古用九章然九章止能推直線而不能求曲線止能算平面而不能馭球面則以勾股僅為平面之直角形也夫以天之髙星辰之逺暦數之瞔且隱欲究其數而探其原非三角之法莫能淂何則物之始生日㸃㸃未成形也㸃引為線線亦未成形也線展為面面者以三線容有三角而形成矣自此以徃四角五角迄乎無窮之形體皆三角所積也故三角形實衆形之宗主測量之綱要也第三角形有二一為平面直線三角一為球面曲線三角直線三角筭平面用之曲線三角算球面用之算圓之法必以邉與角相求而一以圓之半徑為准其在平圓則自圓心至于圓周其半徑恒命為一所限之周即角也所設諸直線即邉也其在圓球則自所設之㸃四周至九十度為界其半徑亦恒命為一所容之弧即角也所設諸曲線即邉也角有直有鈍有銳直者九十度以內為銳以外為鈍算直角易算銳鈍両角難邉有等有大有小等者九十度以內為小以外為大算等邉易算大小兩邉難算平圓即以所設之直線立法算立圓必依所設之曲線更求諸曲線相當之弦矢切割各線立法故算平圓易算立圓難治暦者必從事于平面直線形更求之球面銳鈍角形
