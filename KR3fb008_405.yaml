body:
  text: 乙又以乙為心取兩心差八之二為乙午半經作庚午小均輪午為最近庚為最逺七政在本輪乙實在均輪上午其距地午甲與歌白泥等若丙心右行九十度至丁本輪上亦自戊行九十度至乙從戊點最髙左旋均輪上自午倍行一百八十度至丑從午最近右旋丁甲丑角為大均數丑丁即兩心差之全丙心行一百八十度至癸本輪自子亦行一百八十度至乙均輪則滿一周復至午午甲為最卑之距地亦與歌白泥等丙心行三百度至己本輪亦行三百度至乙均輪滿後復行二百二百四十度至辛月止則用乙己辛己辛甲二形求辛甲己角為均數若自行復至最髙丙即本輪復至乙均輪滿二周復至午蓋丙心向丁癸己右行復于丙乙心向各乙點左行後于乙同時行滿一周而均輪之行倍于乙心之行故乙心滿一周均輪滿二周也今新法推七政加減差俱用此圖立算均數加減之界七政既有均數則有加減其加減之界以自行初宮所起而定之如啚甲為地心卯庚圈為平行天卯甲半徑為十萬酉為冬至設距至平行宮至乙右行乙為心作壬己辛本輪壬
