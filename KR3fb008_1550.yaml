body:
  text: 宫一十八度一十五分自五宫一十二度四是午饭至六宫六度一十四分自十一宫二十三度四十六分至十一宫三十度皆為入食限為有食不入此限者不食即不必筽入限宮度寔朔距交可食之限也推太陽寔徑苐六求太陽距弧用交食周日諸平行表以寔距時之時分秒各察其典太陽平行相對之数而并之淂太陽距弧寔距時為加者亦加寔距時為減者亦減求寔朔太陽平行置平朔太陽平行加減太陽距弧淂實朔太陽平行
