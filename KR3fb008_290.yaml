body:
  text: 分皆不等而晝夜亦不等矣又一歲之中凡日之距兩至等則其晝夜之長短亦等若距兩分等即一在赤道南一在赤道北因其距度等而此日之晝與彼日之夜等凡球愈欹極愈髙即至日之晝愈長惟正球之二至午中時其髙下恆相等冬至距南夏至距北欹球夏至甚髙冬至甚低又正球之南北濶度皆相等欹球則否論平球則以半年為一晝半年為一夜何者北極與天頂合即赤道與地平合故九十距等圈從赤道迄夏至皆在地平上其在下亦如之其走恆作無窮及最長影不作短影每日一周亦作十二時或二十四時但百八十周恆在晝耳求晝夜長短差或一名斜升降度大圈為子午規乙丙為地平戊已為赤道甲丁為南北二極庚辛為緯北距等圈交地平于子壬癸為緯南距等圈交地平于卯戊辛戊壬俱為距赤道緯度春秋分日在赤道上其午戊午已兩弧等故晝夜均平春分後日行赤道北子辛大于子庚故晝長夜短秋分後日在赤道南卯壬小于卯癸故晝短夜長求之從赤極作甲丑丁未兩過極圈交地平于子于卯成午丑子未卯午兩直角形午未與午丑為升降差緯北用午子
