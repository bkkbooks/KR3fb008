body:
  text: 寒露氣策二百九十一日四時四十九分加日差二十分半霜降氣策三百六日六時八分加日差二十四分立冬氣策三百二十一日四時三十一分加日差二十四分小雪氣策三百三十六日時二十九分加日差二十一分大雪氣策三百五十日十八時十二分加日差十五分半冬至氣策三百六十五日一十時五十九分加日差八分節氣日率有平有寔平者歲週二十四分之一寔者太陽行某宮節之日率也古用平數今用寔數乙太陽有盈縮之行故也又每定節氣之日數年年亦自不同為最高沖每年有行動耳求各處節氣時刻分
