body:
  text: 地平下辰辛丁形代算以緯北夜弧辰辛與緯南書弧丙未相䒭故女法取辰女與丙房等女點為緯北丑正時取其餘弦即女申弧正弦因辰已半數即亢淂寅女箕內减申午即井箕邜酉正弦存女井為緯北丑正時高弧之正弦即緯南房尾巳正時高弧正弦也未正同丁辛辰形夲與丙未乙形相等今兩所截之丙房與辰女又䒭則女井房尾兩正弦必䒭又心牛緯北承淂數與緯南女箕䒭求一即淂二癸申亢辰申已兩形相䒭今癸心辰女又䒭則心牛與女箕必䒭求邜酉前後之高弧太陽在緯南卯前酉後必無高弧不用算若緯北如啚申點為酉正卯正同已滿二十四刻太陽尚有申午高
