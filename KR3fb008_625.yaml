body:
  text: 地平下辰辛丁形代筭以緯北夜弧辰辛與緯南書弧丙未相䒭故女法取辰女與丙房等女點為緯北丑正時取其餘弦即女申弧正弦因辰已半数即亢淂寅女箕内减申午即井箕邜酉正弦存女井爲緯北丑正時高弧之正弦即緯南房尾巳正時高弧正弦也未正同丁辛辰形夲與丙未乙形相等今両所截之丙房與辰女又䒭則女井房尾両正弦必䒭又心牛緯北承淂数與緯南女箕䒭求一即淂二癸申亢辰申已両形相䒭今癸心辰女又䒭则心牛與女箕必䒭求邜酉前後之高弧太陽在緯南夘前酉後必無高弧不用筭若緯北如啚申點為酉正夘正同已滿二十四刻太陽尚有申午高
