body:
  text: 距度若日食則以庚辛加减南北差為視距度几月距交在正交後六宫緯北中交後六宮緯南太陽太隂視半径日月之骵皆為圓球祗因其去地絕遠人視之若一平靣然測之者不依其形而依其径視径者言與寔径不同也盖論寔径日月两骵大小径庭而人目所見則皆視度故以視径為主但此径變易多端測候不易曆家所當審慎者也一視径與寔径不同日月之径日視之不過寸許而謂大于地誰其信之不知乃自然之理也如圖甲乙為地径内辛為日径丙辛
