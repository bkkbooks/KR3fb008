body:
  text: 距度若日食則以庚辛加減南北差為視距度几月距交在正交後六宫緯北中交後六宮緯南太陽太隂視半徑日月之骵皆為圓球祗因其去地絶遠人視之若一平靣然測之者不依其形而依其徑視徑者言與實徑不同也蓋論實徑日月兩骵大小徑庭而人目所見則皆視度故以視徑為主但此徑變易多端測候不易曆家所當審慎者也一視徑與實徑不同日月之徑日視之不過寸許而謂大于地誰其信之不知乃自然之理也如圖甲乙為地徑內辛為日徑丙辛
