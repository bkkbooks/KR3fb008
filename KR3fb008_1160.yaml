body:
  text: 乙最高沖九分八秒二十微今所求者為初日子正至本日或次日定冬至之甲戊線其法查表取根數丁丙以戊丙次日子正根減日平行甲丙所餘為太陽經數甲丁以加於戊寔冬至丁平冬至本年之最高沖丁乙得甲乙為引數次於加減甲乙初日子正表內查甲乙之均數得丁戊次於本表查號或加或減此係加號則以丁戊加於經數甲丁淂甲戊以變時刻加日差為定冬至即太陽距赤道南最遠二十三度三十一分半之一點也若根數少或均數多則定冬至或在次日子正後如次戊點求二十四氣日率凡半月一節氣遇太陽在某宮一十四度與二十九度即是交莭
