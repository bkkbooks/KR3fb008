body:
  text: 如圖甲為天頂外圈為地平丁為白極丁甲乙為遇白極經圈白巳為白道戊為白平象限設食甚用時太陰在辛庚為實高人從地面視之却見太陰在壬當白道之癸尚在食甚辛點之西故辛癸為東西差夫太陰寔經度在辛視經度即在癸待太陰行遇辛點若干時而實經度在子則視經度必應在辛故以一小時月寔行計之行癸辛弧若干時行辛子弧亦必若干時癸辛與辛子兩弧等是為近時距分因于食甚用時內加辛子弧時分是為近時也然近時既遲于用時其時亦必有東西差乃以近時復推淂東西差如子丑大于子辛弧一分然則依用時之東西差計之太陰在子視之應在辛而依近時之東西差子丑計之則太陰在子者視之必
