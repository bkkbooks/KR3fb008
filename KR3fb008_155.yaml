body:
  text: 外與正弦平行而交于割線者為切線以他半徑截弧之一端而交于切線者為割線其與餘弦平行者則餘切線也即正割一線交于餘切線而止者餘割線也以正弦減半徑者餘矢也總之為八總其弧度分為五千四百每一度分有八線焉合之為四萬三千二百率也其用之則一形中有三邊三角任有其三可淂其餘三也凡測候所淂者皆弧度分也以此二三弧求彼一弧先簡此弧之某直線與彼弧之某直線推算淂數簡表即淂彼弧之度分初不勞餘力焉之者艱用之者逸方之勾股開方以測圓者甚易而淂其真也然則必無差乎曰有之或在某末位如半徑設十萬則所差者十萬分之一也設千萬所差者千萬分之一也然暦家推衍至微纎以下率皆棄去即謂無差亦可故八線法于推步術中猶農夫之耒耜大匠之準繩測天所必湏其用至精而至大也割圓八線名義凡三角形六率之比例其中用弧者最為難定何則圓線與直線之比例從古至今未有其法而三角形皆有弧度無論球上三角形其三邊三角皆為弧即平面三角惟三邊為直線欲測其角非弧不淂第弧為圓線無數可測今割圓八線求其與弧相當之直線以測其弧與弧相當之直線者割圓界而求其直線之分與弧之分相當者是也割圓之直線有四一曰弦一名通弦二曰半徑皆在圓界內三曰
