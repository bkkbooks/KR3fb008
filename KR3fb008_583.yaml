body:
  text: 壬丁弧其所生影為丙甲丁角骵之影漸小以盡于甲此角骵形乃日炤地所生之影也盖日骵大地骵小其影必為角骵漸小以至盡故地影止䏻食月不䏻及土木火等星若使日小于地或相等其影将一直至上為無窮之影而恒星亦有食今皆不然則日之大于地而日為地影所食信矣求地影寔徑地影固為角骵而月食時所當之影又有大小不同則以月之距地有逺近故也盖食甚時月正在影中使月距地逺其所當影必小距地近所當影必大以影為角骵故故月自最高至最𤰞一百八十度皆各不等如圖乙為日骵己為地球丙甲夘為地
