body:
  text: 測日食方位太陽本食或正向南北東西則目力所及一見能決惟不盡出于正而偏有所距則因以分別所偏若于定分數多寡此必實見之測乃可得耳前論食分設兩輪盤并在一平面與太陽正對亦與外耳進光者平行其下大盤不動分以遇圈徑從徑左右邊分全度數用以測食方向上小盤則能運轉載量尺與下輪邊以對度數為主捋測全器對太陽下盤之徑線對高弧以光形之角較本線或正或偏因推所向方位設兩輪底方以真角安表衡上為甲乙與外耳戊正對太陽毫不偏于左右則乙戊衡正居遇天頂及太陽圈之平面前所雲高弧也而甲乙直線自上至下亦當天上本圈徑
