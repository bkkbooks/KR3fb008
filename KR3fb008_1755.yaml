body:
  text: 應在丑仍在食甚辛點之西如辛丑是自食甚用時至食甚近時止見太陰行癸丑之度故以丑辛為差分以減用時之東西差辛癸餘丑癸為視行夫行癸丑弧既湏癸辛弧之時分寔度也即辛子則行癸辛弧以辛癸弧為視行度其歷時必更多于癸丑故以辛子弧視行度所遇時分加于食甚用時淂辛點為食甚真時也盖食甚用時寔經度在辛視經度在癸而寔甚近時寔經度在子視經度在丑則食甚真時寔經度必更在子點之東如寅人從地靣視之却見太陰在邜其視經度正當食甚白道之辛故太陰行至寅點方為食甚真時
