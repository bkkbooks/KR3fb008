body:
  text: 壬之差未見同度而丁壬即高卑差也壬丑為視髙丁丑為實高夫實會時太陰既在壬則前所推實會時刻丁點非人目見食之時法于黃極上作申壬大圈過太陰壬截黃道于午則實會時人目見太陰之黃道經度為癸午並不與太陽之黃經癸丁同度其差為午丁乃東西差也若欲得視會須以壬太陰進退之使掩丁日如本啚則應以午丁弧化時減前實會時刻使太陽與太陽同度在戊未圈上其所退之
