body:
  text: 一十三秒爲太隂在最高所遇地影之半径于甲庚内减太隂在最卑距地心之甲未五千四百八十四餘未庚一萬六千一百四十八以甲邜庚勾股形舆未申庚勾股形爲比例淂未申七十四小餘六又用甲未申直角三角形求淂甲角四十六分四十八秒爲太隂在最卑所遇地影之半径比舊表最高多一十三秒最卑少一十二秒以月距地之高卑舆舊表有不同故也于是随時以
