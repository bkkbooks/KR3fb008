body:
  text: 四宮二十五度三十二分零一秒三十一微其太陽引數朔策為四宮二十五度三十一分三十六秒四十八微其太陰引數朔策為四宮九度零五分零一秒一十五微其太陰交周朔策為五宮零三度二十一分一十秒零五微即所求首朔後第五月各平朔策之數也求望策倣此
