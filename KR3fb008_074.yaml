body:
  text: 丁丙兩直角形求之以甲丙與甲乙即甲巳両邊相加淂丙巳為二率又相減以甲庚減甲丙甲庚即甲乙淂庚丙為三率丙乙大邊為一率丙巳與丙庚相乘丙乙除之淂四率丙戊用以減丙乙淂戊乙半之于丁淂乙丁邊轉減丙乙淂丁丙邊既淂丁乙丁丙兩分邊依直角形法求甲乙丙三角之度此以各邊上方形相較而成互視之比例也其理亦由垂線分形而出夫甲乙丙鈍角形既作甲丁線分為両勾股形則丙巳即兩弦甲丙甲乙之搃庚丙其較乙丙邊兩勾乙丁丁丙之搃戊丙其較而已丙偕庚丙矩內形必與乙丙偕戊丙矩內形等何則試以甲巳即甲乙上方形子巳與甲丙上方形辛甲丁減壬甲方即子巳方存庚辛癸磬折形乙丁止方形丁戊與丁丙上方形未丁相減丁午方即乙甲方餘戊未申磬折形此兩磬折形必等何者甲乙邊方形內包甲丁丁乙上兩方甲丙邊方形內包甲丁丁丙上兩方而同用甲丁方則子巳辛甲兩方相減所存者為乙丁丁丙兩方之較數則兩磬折形必等矣兩形既等以戊辰補申亥以未于為正方故壬丙補夘子辛壬為正方故淂辛丑與
