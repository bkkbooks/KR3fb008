body:
  text: 法求南北東西差一以白平象限為本以白道高弧交角為量夫用白平象限則月之正當黃平象限亦有東西差近限左右数度加減恒與舊術相反用白道高弧交角其東西南北差之大小與黃道上亦微不同而騐之于天寔為宻合也如圖甲為天頂乾甲丙為子午圈外大圈為地平丁為赤極戊為黃極黃辛為黃道壬為黃平象限癸為白極白寅為白道邜為白平象限設食甚用時太陽在巳太陰在午巳為寔緯在黃道北午為直角午辰弧為寔高未午寅為白道高弧交角其視高在未辰為視高午未即高下差法從白極癸作癸午癸未兩弧一之寔高午一至視高為截白道于申則午申為東西差未申為南北差此時太陰寔經度午點
