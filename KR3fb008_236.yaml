body:
  text: 恆星天之上又何以知有宗動無星之天曰七政恆星其運行皆有兩種其一自西而東各有本行如月二十七日而周日則一歲是也其一自東而西一日一周者是也使非有二天何能作此二動故知七政恆星之上復有宗動一天牽製諸天一日一周而諸天更在其中各行其本行也又七政恆星既隨宗動西行一日而周其為疾速殆非思議所及而諸天又欲各遂其本行一東一西勢相連背故近于宗動東行極難遠于宗動東行漸易此又七政恆星遲速所因矣謹按恆星七政諸天其本行皆為右旋而人所見則皆隨宗動左旋一日繞地一周此即古人蟻行磨上之喻也但恆星左旋之行成渾圓圈出于東而沒于西東西之方位等七政左旋之行則成螺旋圈東西方位不一以恆星本行極遲而七政每日各有行動也又宗動之上復有常靜大天何以知之曰今所論者度數也試以度數之理明之凡測量動物皆以一不動之物為準譬如舟行水中遲速逺近若于道里何從知之以離地知之地本不動故也若以此舟度彼舟何從可得諸天自宗動以下隨時轉動八極不同二行各異若以動論動揉雜無紀將何憑藉用資考算故當有一不動之天其上有不動之道不動之極然後諸天運行依此立算凡所云某曜若干時行天若干度分若干時一周天之類所言天者
