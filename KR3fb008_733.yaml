body:
  text: 食矣而甲子為食限約一度四分故月食最大之限六十四分而止也又月食分之多寡固係于距度之遠近而月徑及地影徑之大小亦有變昜鳥故距度雖同而食分又有不同也如太陰在最高視徑為三十分三十秒平徑為十分設月正在交點無距度依法得食分為十九分五秒其平徑一分當天度三分三秒又設在最卑視徑為三十四分四十秒平徑亦為十分食甚在交如前則得食分為十八分三十四秒而平徑一分當天度三分二十八秒故同一距度而所得食分不同以月距最高漸遠即視徑漸大而人目可見食分總以月體為十平分故也
