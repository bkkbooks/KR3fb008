body:
  text: 以生緯度次輪斜交本天其面又與黃道平行能加減其緯度為一類而金水之本又即為黃道本無緯度因次輪斜交黃道以生緯度又為一類以伏見言之土木火皆有合有衝為一類而金水則有合有退合而無衝是又為一類也五星本天皆以地為心新法曆書言五星古圖以地為心新圖以日為心即观西人第谷推步均数土木金水四星仍以地為心惟火星以日為心嘗推火星以地為心立筭其淂数與彼相同乃知第谷之推步五星不遇虛立巧筭之法非真謂火星天獨以日為心也然則新法曆書之新圖五星皆以日為心者何也盖金水二星以日為心者乃其本
