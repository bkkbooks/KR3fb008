body:
  text: 丁邊第三法有兩角一邊其邊連兩角求餘角餘邊乙丙丁鈍角形有乙鈍角一百十八度七分有丁鋭角五十五度弱有乙丁邊五十一度四十二分求乙丙丁丙二邊及丙角法從乙鈍角向丁丙大邊作乙甲垂弧分元形為兩直角形次用乙甲丁乙甲丙兩形依直角形法算之丙丁兩角同類垂弧在形內求丙角先用乙甲丁直角形有乙丁邊有丁角求淂用直角第一法乙甲四十度丁乙甲角四十八度二十九分次用乙甲丙直角形有乙甲邊有丙乙甲角六十九度三十八分以丙乙丁鈍角減丁乙甲角淂丙乙甲角求丙角用直角第四法淂四十四度六分為所求求乙丙邊用乙甲丁直角形如前求淂甲乙邊及乙角次用乙甲丙直角形有乙角有乙甲邊求乙丙用直角第四法淂六十七度二十九分為所求求丁丙邊先用乙甲丁直角形如前法求乙甲及乙角又求甲丁邊淂三十六度用直角第三法次用乙甲丙直角形有乙角六十九度三十八分乙甲邊求淂用直角第四法甲丙六十度末以丁甲甲丙并之淂九十六度為丁丙邊第四法有兩角一邊其邊對一角求餘角餘邊乙丙丁鈍角形有丁角五十五度有丙角四十四度六分有乙
