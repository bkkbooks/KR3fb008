body:
  text: 實會中會以地心為主日月會望雖在黃道而實以地心所出宜線上至黃道者為主如會望時日月之骵兩居此線之上則實會也即南北相距非同一點而總在此線正對之過黃極圈亦為實會過黃極圈者過黃道之兩極而交于黃道分黃道為四直角者也蓋于後旁視之雖地心各出一線南北異緯徔黃極視之即見地心所出二線東西同是南北正對如一線也故謂之實會若日月各居其本輪之周地心所出線上至黃道而兩本輪之心即日月平行所至俱當此線之上則為日與月之中會鳥如圖甲為地心亦為黃道心亦即太隂平行天心乙為太陽本天心與地不同心小圈為月本輪設太陽平行在丁作甲壬線與丁乙平行即太陽
