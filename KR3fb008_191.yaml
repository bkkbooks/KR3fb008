body:
  text: 淂三十七度五十四分取其正弦淂六一四二八五二倍之淂一二二八七五四即所求如啚甲乙弧七十五度四十八分半之為乙戊求淂乙丁正弦倍之即乙甲丁通弦以通弦恒為正弦之倍故也若乙甲已弧以乙巳為其通弦有弧求其大小矢如乙丁弧三十七度五十四分求兩矢先查乙丁弧之餘弦丁已以減戊乙半徑淂丙乙小矢次以丙乙小矢減甲乙全徑二千萬分得甲丙為大矢割圓表不列矢線以矢線用正餘弦相減即得且不常用故也八線全圖甲為圓心丙庚為圓周四分之一九十度甲丙甲戊甲庚俱半徑千萬設丙戊為正弧則乙戊為正弦乙丙為正矢丙辛為正切甲辛為正割線又丙戊為正弧則戊庚為餘弧即戊巳為餘弦庚已為餘矢庚丁為餘切甲丁為餘割是一弧度中各線可藉以比例推求者合正餘共有八線也如以庚戊為正弧即戊丙為餘弧而各線正餘之名亦互易矣
