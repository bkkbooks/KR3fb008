body:
  text: 人視之或在食甚前或在食甚後猶非食甚真時也故欲㝎東西差之時分必以視行為比例其法以不時月寔行與一小時之比即㒰于用時東西差與近時距分之比以加減食甚用時為食甚近時限西則加限東則減又以近時求淂東西差與用時之東西差相較淂差分以加減用時東西差為食甚視行用時之東西差小近時之東西差大則以差分減用時之東西差大近時之東西差小則以差分加或即以用時之東西差倍之減近時之東西差所淂亦㒰乃以食甚視行與近時距分之比即同于用時東西差與真時距分之比以加減食甚用時即為食甚真時也即淂食甚真時則以真時求淂南北差與食甚寔緯相加減即淂食甚視緯矣白平象限在天頂南者緯南則加緯北則減如南北差大于北緯則反減之而視緯變為南白平象限在天頂北者反是
