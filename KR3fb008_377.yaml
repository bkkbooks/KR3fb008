body:
  text: 諸星也天漢之為物古人以為非星不置諸列宿天之上意其光與映日之輕雲相類謂在空中月天之下為恆清氣而已今乃知其不然萬曆年間逺鏡既出明見為無數小星比密如櫛蓋因天骵通明透徹受諸星之光并合為一直似清白之氣耳然後知天漢果為氣類與星天異骵者安能亘古常存且所當星宿又安得古今寰宇覯若畫一哉蓋其理與鬼宿中積尸氣同積尸氣古相傳為白氣如雲今見為小星三十六瞭然分明可數又如昂宿傳云七星或云止見六星而實則三十七星他如牛宿中南星尾宿東魚星傳説星觜宿南星皆在六等之外所謂向范難見者用鏡則各見多星列次甚逺如觜宿南一星數淂二十七星相距逺近大小不等又以鏡窺因天衆星較多于平時不啻數十倍而且光耀燦然界限井然也天漢昔之為説者非一今足破千古之疑矣恆星出沒恆星日隨宗動一周其出沒中之理與太陽之晝夜同而各星時刻之不等者一由于太陽所躔之宮分蓋近太陽則共太陽出沒逺太陽則星自為出沒一由于各方極出地之髙下極出地髙則赤道近地平星自出至沒之時刻少極出地下則赤道近天頂星自出至沒之時刻多一由于距赤緯之南北星在緯北者每先出而後沒緯南者恆後出而先沒若在本地極髙度內則常見不隱
