body:
  text: 黃道上月心與影心同在甲點乙甲為影半徑甲丑為月半徑相并得乙丑與邜丙等夫巳丙白道也則太陰自邜點入影為初虧自此漸行至甲與影心同而邜丙為入地影之數以視月全徑丙未約倍大馬故月全入影內人目巳見全骵暗黑而太陰又必再行至甲方為食甚而邜丙為食分倍大于月徑第食既巳上分秒全在影中人目不能見耳此食之最大者為正食至若月心在子甲子為寔距度與影周相切于乙則不食以寔距度與兩半徑并相等故也若距度反大于兩半徑并子甲則月在地影之外更不
