body:
  text: 求星距地心線用土木距地表以星距日次引宮度察其所對之數淂星距地數求視緯以星距地心線為一率星距黃道線為二率半徑一千萬為三率求淂四率為視緯之正弦檢表淂視緯星距黃道線當以次輪心距地心線與初緯之正弦為比例今表中前列星距黃道線即初緯之正弦而星距地心線亦以次輪心在中距立算故其比例仍同也求黃道宿度依日躔求宿度法求淂本年黃道宿鈴察黃道寔行足減本年黃道宿鈴內某宿度分則減之餘為黃道宿度
