body:
  text: 八視高過九十度故減淂九十度六分二一二八為廣州府太陽之真高也又於康熙五十五年丙甲三月初吾丙甲午正係春分後八日以本日太陽躔本天之中距為距地心之適中如前法兩地測求淂太陽距地心之遠為一一四二一八六七七三如上圓戊甲邊京師地半徑差為一分四十八秒三十二㣲廣州地半徑差為一分二秒四㣲其距地心之遠典地半徑之比例若一典一千一百四十二為太陽在本天中距時距地心之数今以最高距地心一一六二典中距之距心一一四二相減餘二為兩限距地心之較則最卑限太陽距地心之遠應為一一二二然中距時太陽距地心如弦本天半徑如股其距最高之差應少距最卑之差應多故最卑限太陽距地心當不足一一二二欲以寔
