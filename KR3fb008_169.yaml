body:
  text: 戊丁甲戊同存已丁小分為末率蓋理分中末線者于一直線上作連比例之謂也求之法以所設甲戊半于乙為勾甲戊為股即戊丁求乙丁弦即乙庚也減乙戊勾存戊庚即戊已大分以減戊丁元線存已丁為小分理分中末線大分為十邊等形之邊如啚戊己丙圈甲為心乙丙弧為十分圈之一甲乙甲丙為半徑乙丙為其弦則甲乙丙形之甲乙丙角為三十六度其腰間甲丙乙甲乙丙兩角必俱七十二度而各倍大于甲角次作丙丁線與丙乙等則丙乙丁形之丙丁乙角與甲乙丙角等因淂丁丙乙角與乙甲丙角亦等而甲丙乙丁丙乙兩形為相似形甲丙與丙乙若丙乙與乙丁為連比例夫丁丙乙角既與乙甲丙角等則丁丙甲角亦與丁甲丙角等因甲丙乙角為乙甲丙角之倍故而淂甲丁丙為兩腰等形其甲丁邊與丁丙等亦與丙乙弦等則甲乙與甲丁若甲丁與丁乙而半徑上為自分連比例甲乙首率甲丁中率丁乙末率而甲丁即乙丙也故以半徑作理分中末線淂丙乙弦依法甲乙半徑千萬自乘為股積又半之淂五百萬自乘為勾積相併開方淂弦一千一百一十八萬四百三十即前圖之乙丁線次弦內減去五百萬存六百一十八萬四三為中率即甲丁線亦即乙丙弦也乙丙弧為全圈十分之一是乙丙為三十六度之全弦
