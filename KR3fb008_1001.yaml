body:
  text: 法乙太陽為本天心故名距日以平自行為引數又三項側各書差數者以前後兩數相減或日差或半徑用六而一淂每引數十分之差列之以便算也火星次均與他星不同故立表亦異求火星次均乙為地心婁角為太陽天房丙為火星平行天丙為最高設引數為丙壬依前法作小輪淂星在均輪上寅壬乙寅為初均角寅為歲輪心作戊亢歲輪圈戊為合伏極遠於地亢為退沖極近於地且割入太陽內故火星退沖時能在太陽天之下為張亢線星體最大設太陽寔行在降婁宮十四度為婁點其距合伏張為張角婁弧即於歲輪上自戊右行取戊亢申弧典之等星在申作申乙申寅線成申乙寅形申乙寅角為次均數求之法以
  hash: sha256:3e2ce4c80cfbfcdaf9c3d04273f65b2eb172602f0fb9e1655833c2a15cfea6e8
