body:
  text: 之差比例極微可以不算至金水二星本天雖小而其伏見輪又不與土木火三星同理故亦無此差惟火星界平高卑之間時在日上時在日下遂致此差甚大以變昜其半徑如圖辛為地心乙已為太陽中距天丙甲為日本輪如日在最高丙則丙庚為太陽最高天其辛丙半徑則大在最卑甲則甲戊為最卑天其甲辛半徑則小其餘各度不等夫星之歲輪既恆與日天等大則其半徑亦必隨太陽之高卑以為大小也求之法先設歲輪心在本天最卑太陽亦在最卑免本輪上之差測淂歲輪半徑六三二八二次用比例甲辛
