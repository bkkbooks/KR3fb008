body:
  text: 能令小輪轉動輪上定量尺隨以同轉則因以載方尺而外指度數矣此則兩尺俱不用本小輪改為方形如啚甲為表中之軸亦為太陽景心先依太陽在本圈某宮度取視徑作圈乙丙丁戊則大方形也轉以甲軸以辛為表鋭用鋭以指外圈之度左右大方形開兩小陷道能受小方形為已庚癸壬此中亦有小圈即掩太陽之太陰也周圈先去孔半徑開得圈在大小不等預以引數取定或偹數面以待臨其更推亦可其四周開空小方形止存六小條與方相連以支圈將測用大方置衡上長方尺為衡其圖在下前可言窺管亦可與孔以定度相距小方貫入其前令中圈以邊合于影食甚時見
