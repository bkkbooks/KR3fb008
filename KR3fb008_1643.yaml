body:
  text: 十秒今自康熙五十三年于畅春園累測夏至午正太陽高度淂視高七十三度二十九分十餘秒加地半徑差五十秒淂寔高七十三度三十分減去本地赤道高五十度三十秒餘二十三度二十九分三十秒為黃赤相距最遠之率較舊測少二分准此以立太陽距度表測嵗寔以定平行古暦定太陽每日所行為一度故周天為三百六十五度四分度之一其後漸覺後天以為嵗實太強自漢以來每次修暦必有所減以合當時寔測故每日之平行雖㝎為一度而天周與嵗實訖無㝎率也今法㝎天周為三百六十度故太陽每日之行不及一
