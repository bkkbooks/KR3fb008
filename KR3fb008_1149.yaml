body:
  text: 前六宮在北後六宮在南宿次與日躔減法同按火星距日半徑日差及切線四項逢十進之求金水二星經緯度查二百恒年表于本年下取引數伏見距至三平行年根以距至日入太陽周歲平行表查太陽距至平行即金水二星之平行以距至日平行與年根之引數距至二平行相輥得生平行及引數又以距至日查金水伏見平行表淂數與年根伏見行數相加得伏見平行
