body:
  text: 頂及中限與黃道為直角而壬癸即中限距天頂之度壬丙為中限之高如實會時午位黃道度在丁丁乙即黃赤二道之距己辛丑丁為午位黃道距春分經度即表中第一方所列也以丁壬加丁點黃經度若限在午西則减淂己辛丑壬為中限所在宫度即第三方所列也丁壬為限距子午第四方所列也壬癸為限距天頂第五方所列也次以午位黃道距春分經度求其赤道上同升之度如己庚子乙化為時即第二方所列也變時法以赤道左旋一周與一日二十四時若今同升若干度與幾何時分立表徔春分起筽故白羊初度下無時分左旋一周至雙魚三十度則滿二十四時矣九十度限筽法用丁癸壬直角形壬為直角乙癸為赤道距天
