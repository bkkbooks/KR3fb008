body:
  text: 午高得躔析木宮初度四十五分三十秒距北二度十分三十秒測太陽食之時太陽東出地平左旋漸高至午正則最高遇午復漸低至西則沒此太陽自行一畫之時刻也故得其高度取出可求時具初虧食甚復圓等限惟以此為常測法第非密室中不可故又仍用前器架上之衡及矩架俱如前而方架之式之用與月離同各細分度數下方為地平從正東正西至子午圈諸弧之切線衡為太陽距天頂之割線矩架之股又為太陽距頂之切線此三度所以全本器之用也測時將方架置幾上以中線對南北一手轉矩架隨太陽行並動其衡使之上下以受光一手對輪盤上之尺才一對影即於衡
