body:
  text: 陽高九十度六分二十一秒四十八㣲以之立法甲為地心乙為暢春園地面庚為天頂子為廣州府地面丑為天頂戊為太陽寅為赤道寅庚弧三十九度五十九分三十秒為暢春園赤道距天頂之度寅丑弧二十三度一十分為廣州府赤道距天頂之度赤道距天頂数俱係在本地測所淂以兩處赤道距天頂度相減餘一十六度四十九分三十秒為庚丑弧即庚甲丑角以暢春園高度典一象限相減餘一十六度四十三分五九三七為庚乙戊角于廣州府高度內減去一象限餘六分二十一秒四十八㣲即戊子丑角在戊天頂丑北先用乙甲子三角形有甲角一十六度四九三有乙甲及子甲邊俱地半徑命為一千萬乃取甲角之全弦得二九二五九
  hash: sha256:bf5846b544eff75a294c4b31ffce4a2f1e52945bea07e17c5dc13bf8a0ffb658
