body:
  text: 百三十二地半徑乃土星最遠之距地也次戊甲線與一萬二九三二若甲子線兩輪最卑距地心線與子甲九千一百七十五地半徑乃土星極近之距地也若求中距時淂一萬五百五十地半徑依上法淂木星最遠距地為六千一百九十度命地半徑為一度中距五千九百一十九度極近三千九百九十度火星最遠距地為二千九百九十八度中距一千七百四十五度極近四百二十二度下金水二星因其本天不圍地球演算法少異如圖乙亥為日天即金水平行天戊甲為星兩輪最遠本輪伏見輪距地心線如金星為一度七三八五二法乙甲全數與就甲一千一百四十二度若戊甲
