body:
  text: 月食圖義推月食所向方位以初虧及復圓距度作圖求距度食甚前與食甚後為一法乙太陰自初虧至食甚之實行加入太陽同時所行分秒得太陰初虧至食甚在影之總分以加前可定食甚交常度得復圓交常度以減得初虧交常度次求初虧距度則全數與其交常度之正弦若黃白大距度之正弦與距度之正弦求復圓距度倣此如圖設月食在交南外大圈為月半徑影半徑之并內圈為地半影初虧在乙食甚在丙復圓在丁各依其距度之遠近圈上下左右書四方其起復所向方位必與天合也
