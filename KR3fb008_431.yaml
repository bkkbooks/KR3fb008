body:
  text: 即月孛所在也次從甲過亥癸二㸃作甲酉線即甲所指為平最髙酉為平最卑其行度從甲最髙起算順經度右旋名曰次自行亦名正不同心天又設月自行為庚丑弧丑為心作丙子本輪丙丑半徑為五千八百本輪上距最髙為丙子午為心作丁午小均輪倍自行至午月居午子午半徑二千九百如前法求淂午亥丑角為初均并求午亥距心線次從癸過月骵作癸午乙線戊亥午癸斜角形而亥午癸角即為次均數蓋以甲為平最髙則亥癸若為兩心之差而淂亥午癸為均數角也平髙平卑蓋為次均而設第谷于次均數暗用不同心圈法求之以庚丑自行減去丑未初均淂庚未為實引再減去甲庚兩髙相距差己癸線與庚申平行即甲亥庚角與亥癸己角等而亥癸己為乘圈角以己亥弧半之淂亥癸己角即庚甲弧也淂甲未次自行弧或甲亥未角次求癸亥兩心差用變率法己癸全徑二萬與己癸次輪全徑四千三百四八若亥癸弧倍離之餘之全弦與癸亥兩心差數則午亥癸形有午亥癸亥二邊有癸亥午角次自行之餘求淂午角或乙未弧即次均也其加減之界視次自行在甲未酉前六宮為減酉庚甲後六宮為加若午㸃在甲與酉則無次均又朔望時亥心必在癸合為一㸃兩弦時亥心在己距癸極逺其餘旋居
