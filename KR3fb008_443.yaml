body:
  text: 如啚丁為黃道極丙辛戊圈為黃道甲己俱為白道極壬癸二圈俱白道丙為正交戊為中交如大距為辛癸或癸丙辛交角則有丙癸白道九十度之緯或大距為壬辛又有丙壬白道九十度之緯求之如癸辛大距月距正交為丙庚即從黃極丁作丁庚弧至月骵成丙子庚形子為直角法全數與大距癸辛之正弦若距交丙庚弧正弦與庚子之正弦淂庚子緯度若設壬辛大距丑丙為距交理同測太隂交均及距限正中兩交行度昔人皆謂其平行每日三分十一秒而第谷測淂月有時在交上以平行算之往往未合于是知正交亦有平自行與七政同理當朔望與兩弦則無均數適如其平行兩弦前後恆多寡不一其均數最大處在倍離九十度淂一度四十六分朔至弦應減平交淂定交弦至望應加平交淂定交此差名為交均至于黃白兩道之大距亦以倍離逺近而有廣狹朔望時最小自此漸大至兩弦而極五度十七分三十秒自此又漸小至望復與朔同此差名為距限蓋交均與距限二者皆係于距日之逺近而生始于朔望極于兩弦其朔至望與望至朔兩半周恆等而行度亦為倍離也如啚甲為黃極取甲卯九十度作卯癸黃道大圈次以測淂最大及最小之兩距度四度五八三五度十七三相并半之淂五度八分為二道相距之中數即子甲上取五度八分至丁為中白道極以卯
