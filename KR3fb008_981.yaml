body:
  text: 所測視經相減淂六度十二分十七秒即丙丁乙次均角也丙丁乙形有丙丁前求初均所淂有乙丙丁角或乙戊弧距日減周之餘半有丙丁乙角求丙乙邊淂一萬四百二十六分為土星歲輪半徑立表用此測木星歲輪半徑第谷門人於萬曆二十一年癸巳西九月二十八白戊正本方測木星枉星紀宮十三度五十六分依表求其平行距冬至三十度
