body:
  text: 四周也今不全食之地在已其交影之頂為子亦見光此光非金環因在日周故其理不一而光中甚黑則非丁戊氣所能生矣蓋自從已視太陰之下周庚必以已子庚線視其上周必從已壬至太陽辛則太陽之辛癸原光正焒已目及蒙氣之界面丁壬丁壬之中絶無月影而丁壬等高之影全在已子庚直線之下安所得生光之原乎可見日四周之光必生于蒙氣已上必為空氣所生或近于月輪在庚丑兩線之中或在月輪之下不遠矣
