body:
  text: 與日參居一線之上也其有視食也人自與月與日參居一線之上也人目居地面之上與地心相距之差為天地之半徑則人所見日食與天上實食恆偏左偏右分為兩直線各至于宗動天其所指不淂同度分是生視差而人目所參對之線不淂為實會而改為實會如圖甲為地心乙為地面丙為天頂若丁為日戊為月在甲丙一直線上則實會即為視會因地心與人目無分線故也若日在辛必月至壬方與地面乙作一線為視會矣若月至巳與地心甲作一線則實會也夫交食惟以日見為憑故日食全論視會若昕居地面不同即食分多寡加時畀晏亦隨之異也又視會實會在日月夲天皆無度分可指而勸依宗動天之黃道圈度分
