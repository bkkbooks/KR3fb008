body:
  text: 角形此兩形必等而乙為交角又等則庚乙戊甲乙丙兩形之邉為互相似戊乙與乙丙之比例若甲乙與乙庚之比例依顯凡三角形皆如是二十兩相似形相連一直線上則兩形之邉為互相似如甲乙丙乙戊丁兩相似形相連于戊丙一直線乙為交角則兩形之邉為互相似甲乙與乙戊之比例若丙乙與乙丁之比例二十一三角形任依一邉作平行線即此線分兩餘邉以為比例甲乙丙形任依丙乙邉作戊丁線與乙丙平行分甲乙甲丙兩邉于戊于丁則此兩分邉甲丁與丁乙之比例若甲戊與戊丙之比例或乙丙與丁戊若乙甲與丁甲亦若丙甲與戊甲又丁乙與戊丙若甲丁與甲戊俱成比例反之若兩分線比例等即丁戊乙丙兩線必平行二十二三角形任分一角為兩平分而分對角邉為兩分則兩分之比例若兩餘邉之比例甲乙丙形作甲丁線分乙甲丙角為兩平分分對角乙丙邉為兩分此兩分乙丁與丁丙之比例若乙甲與甲丙何則試作乙戊線與丁甲平行又引長丙甲邉至戊成乙戊甲外角形則此形之戊
