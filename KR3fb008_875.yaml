body:
  text: 徑有乙辛巳角倍弧度分壬巳為子辛之倍數求辛乙巳角及巳乙線以辛乙巳角減辛乙甲角引數之餘存巳乙甲角次算巳乙甲形有乙巳乙甲兩邊有巳乙甲角求巳甲乙角淂乙丁弧即邜乙引數相當之自行均也因距最高在前六宮應用減又求巳甲邊淂星本天距地心線上星自行均最大為六度三十八分十七秒木星五度二十六分五十九秒火星十度三十四分二十秒金星一度五十分十六秒求水星自行均數水星自行均所以與四星異者以水星本天之心亦有行動時時旋轉遂致星體所麁之本天圈不為圓形而為撱形上下寬而中
