body:
  text: 論天行無紫氣七政之外別有四餘謂之四隱曜一曰羅睺二曰計都三曰紫氣四曰月孛隂陽家以此推人祿命頗不經然羅計為黃白道之兩交月孛為太隂本輪最髙之處俱有度數可稽至于紫氣實天行所無有而作者妄增之後來者妄信之有為之説者謂為土木二星之會合又謂閏之餘氣其説荒誕牽合不倫尤甚今欲測候既無象可明欲推算復無數可定欲論述又無理可據且稽之漢唐以前古曆亦未聞其説蓋出于後人之附會可知今新法去之所以契合乎天道也曆元太隂諸根數戊辰年天正冬至後第一子正為曆元月距至平行六宮一度五十分五十五秒月自行六宮二十五度三十二分十六秒正交行七宮度分一十四秒最髙行即月孛十一宮六度一十九分紀日干支己卯日值宿井宿太隂本天半徑十萬本輪半徑五萬八千均輪半徑二萬九千次輪半徑二萬一千七百四十又次輪半徑一萬一千七百二十朔望黃白道大距度四度五十八分三十秒時憲曆推算月離諸表曆元後二百恆年表康熙永年表周歲各日平行表周日時刻平行表
