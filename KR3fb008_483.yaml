body:
  text: 西曆笑之艱且劇莫過于此又見食月食則天下皆同日食九服各異其故一由天上之本行一由食時地平上高弧之度故均一日食有見全食有見食數分有全不見食就南北論見食地界如京師見全食其南北各距四十五度之地為萬一千餘里皆見有食然而食分多寡不等矣就東西論各距六十度為萬五千餘里皆見食而分數多寡亦不等焉至月食雖所見食分皆同而時刻南北亦不同東西為尤其此交食各種之大凡也日食在朔月骵所掩日食在朔緣月在內去人近日在外去人遠故月骵能掩日光而有食然金水二星亦皆時在日內又皆不通光之骵水星雖小而
  hash: sha256:58d4a8b67c415fd384f0231751ebb4db54e21d24b397d45a4c1ce5315790b370
