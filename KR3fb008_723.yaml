body:
  text: 炤斜炤之縁如太陽當晨昏時斜炤于地上氣得其正炤之光則能返炤地面若此時以日食絕正炤于氣中則地無返炤之光又本無正焰之光安得不为甚晦乎故午前日食初虧至食甚时加晦生光至復圆時稍明午後食则反是盖太陽愈卑愈能正焰氣中而地得其返炤之光太陽愈高愈正炤于地面而以有食絕其正光惟四外反有從旁斜入之次光耳又或太陰近最高其視徑不甚大于日之視徑則太陽四周光耀散溢雖則全食地面之次光乃大于少食者亦多有之又使日食切近地平太陰微高于日則地面所見日下周之原光雖不畫如鉤而上氣乃于日月參相對絕其正炤即地面絕無返炤之光此時亦變為甚晦也日見食隨地不同日食與月食人目所見各不相同盖月食天下皆同而日食則否日食此地速彼地遲此地見多彼地見少此地見偏南彼地見偏北盖日食月居日與地之中而月體甚小距地甚近日體又甚高遠隨人所居地面其視線各不同也而月食凡地面見之者大小同舄遲速同舄經候同舄惟所居不同子午線者則時刻不同盖月食地在日與月之中月一入影失其借光大地所居皆無處可見其光也故日食有全食周邊無光而畫晦星見者有全食而周顯金環者又有食不全而此地見食之分多彼地見食之分寡者若欲求見全食之地幾何廣見金環幾何遠自見全食之地至畫
