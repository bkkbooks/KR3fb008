body:
  text: 照斜照之緣如太陽當晨昏時斜照于地上氣得其正照之光則能返照地面若此時以日食絶正照于氣中則地無返照之光又本無正焰之光安得不爲甚晦乎故午前日食初虧至食甚時加晦生光至復圓時稍明午後食則反是蓋太陽愈卑愈能正焰氣中而地得其返照之光太陽愈高愈正照于地面而以有食絶其正光惟四外反有從旁斜入之次光耳又或太陰近最高其視徑不甚大于日之視徑則太陽四周光耀散溢雖則全食地面之次光乃大于少食者亦多有之又使日食切近地平太陰微高于日則地面所見日下周之原光雖不畫如鉤而上氣乃于日月參相對絶其正照即地面絶無返照之光此時亦變為甚晦也日見食隨地不同日食與月食人目所見各不相同蓋月食天下皆同而日食則否日食此地速彼地遲此地見多彼地見少此地見偏南彼地見偏北蓋日食月居日與地之中而月體甚小距地甚近日體又甚高遠隨人所居地面其視線各不同也而月食凡地面見之者大小同舄遲速同舄經候同舄惟所居不同子午線者則時刻不同蓋月食地在日與月之中月一入影失其借光大地所居皆無處可見其光也故日食有全食周邊無光而畫晦星見者有全食而周顯金環者又有食不全而此地見食之分多彼地見食之分寡者若欲求見全食之地幾何廣見金環幾何遠自見全食之地至畫
