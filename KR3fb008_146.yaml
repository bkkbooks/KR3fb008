body:
  text: 曲線形之邊角皆為圓線而可推求者賴有八線為之用也盖各弧既相交而成形則各弧相當之八線皆錯列于球之內外形之四周而各大圈並以球心為心其八線並從球心而出則諸線交羅必生相似形而成比例以此弧之八線比彼弧之八線若此弧與彼弧而本形之邊角可淂此曲線形之算是于無法之中而有法也孔三角有形設一角二邊法從他角作垂弧至其對邊為直角若設有二角角一邊法從他邊之對角作垂弧補為直角如啚乙丁丙形有丙角丙乙丙丁兩邊即從乙作乙甲垂弧分為兩直角形其甲丙乙形有一角一邊可求其餘甲丁乙直角形先淂甲乙乙丁兩邊可求其餘如形內不能作垂弧則如次啚從丙丁二角于形外作丙甲丁戊垂弧補成丙甲丁丙戊丁直角形立算此條與直線形同理同法凢底邊兩旁角為同類或銳或鈍或直其垂弧在形內若異類一銳一鈍或一直垂弧在形外直角形以對直角邊為底斜角形大角對邊為底凢曲線形其邊小于象限則用之大于象限則依前次形法變為小而用之曲線形用八線以為比例
