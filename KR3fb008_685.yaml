body:
  text: 秒太陽本行一分二十七秒相加共得十九分二十三秒為太陰本行今設交周寔度為五宮二十九度因時差應加則交周多得一十九分二十三秒終得太陰食甚時寔距北一分四十一秒次以真視會時南北差加減于寔距度得視距度故前求三視差考時差並求南北差以此乃所得為真視會時之視距度也即食甚時若太陰距黃道北人居夏至北則寔距度恒減視差為視距度若太陰距黃道南則視差反加于寔距度為視距度日食分秒日食分數之多寡以太陰視距度為主法用日月兩半徑相并內減視距度餘為太陰掩日之分天度數之分次以日全徑為一率日徑
