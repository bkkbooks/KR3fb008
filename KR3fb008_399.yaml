body:
  text: 復在最髙丁均輪亦滿一周復至乙均輪上之度俱與自行弧等兩輪同時行滿一周復于故䖏中距時辛丙與丙己癸子與子己俱為直角最髙卑時合為一線其乙辛壬癸小均輪上所歴一周之迹連之必成乙辛壬癸一大均圈與多祿某同但此圈不為正圓形何則凡圓內之半徑皆等今以乙甲壬甲最髙卑兩距地折半于丁則午為圈心而乙壬與辛午兩半徑不能等細繹其故圈中乙午壬午兩半徑極小最髙卑辛午癸午兩半徑極大兩中距其餘自最髙以下漸大至辛午而極自此復漸減至最卑與乙午等又此最大之徑不在髙卑兩限之中距最髙近距最卑逺以辛午乙為銳角故則此大均圈之迹上寬下窄成為夘形與上圖少異然其乙甲壬甲最髙卑兩距地與前等午甲兩心距亦與前己午等以甲己丁乙之并即前己午午戊之并故也其所淂均數因大均圈為夘形與前微不同所差不出分秒然騐之于天更為宻合求之如自行為丁丙九十度先用己甲丙形有己甲兩心差八之六有己丙全數有丙己甲角距最髙之餘求淂己丙甲角及甲丙線次用甲辛丙形有甲丙有丙辛有甲丙辛角以己丙辛均輪弧之角加己丙甲角或乙酉弧淂甲丙辛角求淂丙甲辛角與己丙甲角相并淂均數與前圖戊丁己角同
