body:
  text: 丙形之三邊俱可淂其比例銳鈍角形皆如是兩正弦不同類用變率法則兩弦之比例等甲乙丙三角形甲乙邊為丙角正弦又甲乙丁三角形亦用甲乙邊則甲乙邊又為丁角正弦此兩正弦必不同類用變率法丙甲乙形之甲乙邊與甲乙丁形之甲乙邊若甲丁先數與甲丁後數則甲丁邊變為與甲乙丙形之三邊同類求乙丁邊同理凡兩圈徑不同用此則兩圈门各線比例相等両弧之正弦與両分之通弦比例等丁戊弧正弦為戊巳丙丁弧正弦為丙辛丙丁戊為両弧之并戊戊丙為并弧通弦其甲丁圈徑截通弦于乙則戊乙乙丙兩分弦之比例與戊巳丙辛兩正弦之比例等以乙戊已辛丙乙為相似形故也三角形作中垂線分本形為直角形甲乙丙鈍角形銳角仝理從丙鈍角向對邊甲乙作丙丁垂線分本形為甲丙丁丙乙丁兩直角形此丙丁垂線必在形內或從乙銳角向甲丙邊作乙戊垂線補本形為甲戊乙直角形此乙戊垂線必在形外或從甲銳角向乙丙邊作甲巳垂線補本形為甲巳乙直角形此甲巳垂線亦在形外凡垂線所成諸直角形其邊
