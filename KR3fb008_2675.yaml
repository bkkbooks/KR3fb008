body:
  text: 天次輪半徑也又設太陽引數為七宮二十度求太陽高卑差則以太陽引數減六宮淂一宮二十度太陽引數遇六宮者減六宮不及六宮者加六宮因太陽引數初宮起最卑此表初宮起最高故也察其所對之太陽高卑差數為一九三二八卽所求之太陽高卑差也若引數有零分者亦按中比例法求之
