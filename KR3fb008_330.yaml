body:
  text: 無加減距最高九十一度其最大為二度三分如圖外圈為宗動天之黃道與地同心為壬內圈為太陽本天其心戊午為最髙卯為髙沖設太陽自午右行至乙距最髙為午乙弧日在乙若從本圈心戊視之見太陽平行在黃道上丁今人從地心壬視之則見太陽實行在已巳丁為兩行之差已實行在丁平行之後應減已丁差而得已點實行故古法太陽在夏至後半周為縮曆若過半周行至丑其平行在子而視行已至丙實行在子平行之前應加子丙而得丙點視行故古法太陽在冬至後半周為盈曆若在午卯二點則平行與視行合為一無加減之差求算之法如平行在丑則用壬戊丑三角形有戊壬兩心差有戊丑本天半徑十萬有壬戊丑平行距最高之餘角即卯丑弧依法求戊丑壬角即丙子弧為加差也又求第三邊丑壬為日骵距地心線今算距最髙逐度之戊丑壬角立加減差表丑午弧從卯點最卑起初宮名引數又最髙卑左右距弧等其加減之差亦等求一即淂二求太陽去地逺近之度日月地三骵其大小逺近逈殊西人歌白泥以日月食推地半徑與日天半徑之比例若一與一千一百四十二蓋以地之半徑命為
