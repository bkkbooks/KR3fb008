body:
  text: 求太隂不同心圈及本輪鈞輪行度太隂行天有遲有疾理與太陽之盈縮同然前論太陽為不同心圈今大隂或用不同心圈或用小輪且更有均輪以消息乎本輪即小輪之度二者雖實異名而同理然頭緒既繁名亦易亂今以用不同心圈大均圈及本輪均輪之理一一詳著其說以明太隂第一均數之根後五星之自行均亦同理同法論不同心圈如啚己為地心大圈為宗動天之黃道甲為冬至次取戊㸃為心作丙辛圈為七政骵自行之本圈篇中不指言某曜者以小輪之理七政所同也戊丙為本圈半徑十萬丙為最高庚為最卑戊已為兩心差數七政各不同設七政在本圈上自丙最高右行至壬即從本圈心戊作戊乙線指黃道度分于乙乙即其平行所至也甲丁為距至平行從冬至順天右行次從地心己作己丁線過壬至黃道上丁丁為人目所見實行度分夫從戊心視之七政應在乙今人從地心己視之見七政實在下相差為乙丁即均數也或戊壬己角其丙庚壬引數己過六宮丁實度在乙平行之前以乙丁加甲癸乙平行得甲癸丁為實經度若自行至亥則距最髙為丙亥弧從最高起算如前法得平行在未實行在申未申弧為均數因丙亥引數未滿六宮申實行在未平行之後則以申未減甲癸未弧得甲癸申為實經度故
