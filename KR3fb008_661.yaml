body:
  text: 差徑為南北差若黄道自為高弧而太陽在交豦無距度則高差徑為東西差而絕天南北差若太隂有距度則黄道不同于高弧太隂仍有東西南北兩差矣如圈甲為天頂甲乙為黃道即為高弧與地平為直角庚辛為黃極太隂在丁則其高差丁戊即為東西差若太隂距南或北作打圈黄道之兩極高庚丁辛其距度為丁乙丁丙得甲乙甲丙弧與甲丁弧必不等又不交于庚丁辛弧之極故甲乙丁甲丙丁不能為直角而幷得南北東西差且太隂愈近天頂乙丙兩角愈銳南北差愈多太隂漸遠于天頂兩角漸大殆如直角而南北差漸少矣
