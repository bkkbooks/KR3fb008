body:
  text: 後升度如啚乙甲為別設㸃求其升度則丙乙為戊丁之升度是前升度戊甲為丙甲之升度是總升度相減存丁甲為乙甲之後升度也黃赤道升度相等者惟正球之地從二分二至起算各出地九十度其黃道弧與升度等以此時極至極分二大圈與地平相合為一線故黃道之象限交與赤道之象限交偕出偕入周天之中相等者四而已若欹球黃道惟春秋分時與赤道升降度等以二分為黃赤道之交必同時至地周天之中相等者二而已又正球四象限之黃道弧與升度常相似所差不出三度欹球則所差絶多如啚正球甲乙赤道軸即地平故丙丁弧與丁戊升度相似欹球北極髙則辛壬弧與辛癸升度所差漸大若極愈髙其差益大升降有二有正升降有斜升降各弧與升度同出入若赤道上升度大于黃道弧謂之正升降小者謂之斜升降愈大愈正為黃道與地平相交近于直角故也愈小則愈斜矣球愈欹黃道與地平為角愈斜正球但有四宮為正升冬夏至前後各二宮是也冬至前後者析
