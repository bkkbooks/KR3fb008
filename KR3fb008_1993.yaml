body:
  text: 率若月距日次引有零分者交均則按中比例法求之距限則取相近者用之不足三十分者去之滿三十分以上則進作一度察表設月距日次引六宮八度一十五分求交均及距限則以六宮八度所對之交均三十分一十秒與下層九度所對之交均三十三分四十八秒相減餘三分三十八秒為一度之較乃以一度化六十分為一率較数化二百一十八秒為二率設数一十五分為三率求得四率五十四秒小餘五收作五十五秒與八度之交均三十分一十秒相加因九度之交均大于八度之交均故
