body:
  text: 掩餘曜若絶無次光者然而形始顯矣鏡中可見之形與實在天所食之形相反以大光遇小孔之故蓋玻瓈原體厚能聚光使明分于周次又以本形能昜光以小為大可用以細測以小為大非前所雲光形周散也因鏡後玻瓈得缺形光以斜透其元形無不昜之使大也然距鏡遠近無論止以平面與鏡面平行開合長短俱取乎正光中現昏白若雲氣則長邊有則短進管時須開合得正餘法與前同遠鏡玻璃左前者聚光漸小至一點在後者受其光而復散于外則後玻瓈可當一點之孔乃所射之光形亦不真者蓋以後玻瓈不正居聚光之點必略進焉以接未全聚之光乃復開展可耳故謂比當甚微之孔則可謂當無分點之孔則不可然用鏡測縱或不真亦庶幾于真形遠矣
