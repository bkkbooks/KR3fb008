body:
  text: 如啚甲丙乙丁為地平戊已為赤道極若二已為極出地四十度則壬癸乙常見緯圈亦去極四十度而緯圈之乙㸃即地之乙㸃平球者一極在頂一極在底天元赤道與地平為一線各距等圈皆與地平為平行也如啚甲乙丙丁為地平即為天元赤道而戊極在頂庚辛等緯圈皆與地平為平行圈子午圈與赤道相交子午圈交于天元赤道即為天元赤道之極髙從天元赤道至頂極之度即極出地之髙度如啚甲丁為赤道丙為頂極乙為赤道極戊庚為地平甲丙赤道距天頂與乙庚極出地之度等以丙戊甲乙各為一象限而同用丙甲弧故也因得甲戊與乙丙亦等黃道與赤道相交黃赤二道之交為春秋分從此作過極大圈名為極分交圈從二道最逺䖏作過極大圈為極至交圈此二大圈分黃赤道各為四
