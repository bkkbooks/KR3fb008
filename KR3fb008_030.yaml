body:
  text: 如甲乙丙丁四幾何甲與乙之比例若丙與丁之比例今又有兩幾何為戊與已其戊與已之比例若斷比例丙與丁之比例則此戊與巳亦必若甲與乙之比例等反之丙與丁之比若戊與巳則甲與乙之比亦若戊與已何則戊之大于巳猶丙之大于丁亦猶甲之大于乙故也五同理之比例前與前相當後與後相當比例之兩幾何有前後同理之兩比例四幾何有兩前兩後而前與前後與後恆相當如甲與乙丙與丁兩比例同理則甲與丙相當乙與丁相當也戊已巳庚兩比例同理則巳既為前又為後兩相當也六四幾何一與二若三與四為斷比例則中二率相乘矩形與首尾兩率相乘矩形等如連比例中率自乘方形與首尾兩率相乘矩形等有三率即淂第四以三推一名三率法如甲乙丙丁四幾何甲與乙若丙與丁為斷比例則甲為一率乙為二率丙為三率丁為四率其乙丙二三率相乘之矩內形必與甲丁一四率相乘之矩內形
