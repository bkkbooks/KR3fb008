body:
  text: 以積日與土木每日平行土星一百二十秒六二二五五一木星二百九十九秒二八五二九六八相乘滿同天一百二十九萬六千秒去之余為積日土木平行加土木平行應土星七宮二十三度一十九分四十四秒五十五微木星八宮九度一十三分一十三秒一十一微淂土木二星年根上考徃古則置土木平行應減積日土木平行淂土木年根求最高年根以積日與土木最高每日平行土木十分秒之二又一九五八三木星十分秒之一又五八四三三以積乘淂數為積日最高平行加土木最高應土星十一宮二十八度二十六分六秒五微稅務局通過九宮九度五十一分五十九秒二十七微淂土木二星最高年根上考徃古則置土木最高應減積日最高平行淂最高年根
