body:
  text: 度為丙角求乙角前圖法從乙向丙甲邊作乙丁垂線又引丙甲至丁補本形為乙丁丙直角形其乙甲丁增形亦為直角形內有甲乙丁角乙甲丁為鈍角之餘而乙角又為乙甲丁之餘角則乙甲邊與乙丙邊之比例若甲乙丁角之割線乙甲與丙乙丁角之割線乙丙查弧得丙乙丁角內減去甲乙丁角餘為丙乙甲角此用乙丙丁直角形以乙丁為半徑而與各線相比也一率乙甲三丈二率乙丙八丈六尺三八三二率甲乙丁角十度割線一度一五四二四率丁乙丙角割線二度九二三八查弧得丙乙丁角七十度內減去甲乙丁角十度餘六十度為丙乙甲角求甲丙邊前圖先用乙甲丁形形有丁直角有乙甲丁鈍角之餘有乙甲邊以求乙丁全數與甲角之止弦若甲乙邊與乙丁邊又求丁甲全數與甲乙丁角乙甲丁之餘角之正弦若乙甲與甲丁邊次用勾股術以乙丁乙丙兩邊自乘相減開方得丙丁邊內減去甲丁餘為丙甲邊求乙丁求甲丁一率半徑全數一率半徑二率乙甲丁角止弦九八四八一二率甲乙丁角正弦一七三六五三率乙甲三丈三率乙甲三丈
