body:
  text: 道上之用時何也盖黃道與赤道斜交二分之後黃道如弦赤道如股故黃道一度赤道一度不足赤道度少則時刻增矣右旋度少則左旋度多故時刻增二至之後黃道以腰圍大圈之度當赤道距䓁小圈之度故黃道一度赤道一度有餘赤道度多則時刻減矣右旋度多則左旋多少故時刻減如圖甲為北極乙戊丙為赤道乙丁丙為黃道乙為春分丙為秋分丁為夏至春分後太陽寔行四十五度至已赤道上與己相䓁之度為庚庚距乙亦四十五度與己相當之度為辛辛庚弧為赤道少于黃道之度淂二度二十九分是為升度差如推淂太陽本日實行距春分四十五度而即以四十五度之點當某位為某時者是以赤道之庚點命時也如庚點當午位即為午時而寔度之辛點
  hash: sha256:4d6f0a08d17e1467b648674f34819cb6a6f40f7779f40204913ed6ea0e44d5aa
