body:
  text: 時高度求正午前後各刻高弧凡午正以丁卯酉以前求各刻高弧不論午前午後俱不異法只取時刻為準以距午時化度取其餘弦因前半數以南加北减卯酉正弦即潯所求本時高弧正弦若乘潯數小午卯酉正弦不及减者即日距南時無高弧相等太陽正在地平上如太陽距午八刻己正時求高弧以八刻化度潯赤道上距午三十度即距等圈上癸心也癸辰丙丑與赤道為距等圈則赤道上距午度即二圈上之度取其餘弦即心申弧正弦因癸亢本數的心午正弦加申午卯酉正弦潯心斗即緯北已正時高弧之正弦來正同若緯南已正時求高弧房為已正房距午三十度已正時房屋為高弧正房則正緯北
