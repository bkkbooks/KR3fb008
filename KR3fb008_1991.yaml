  text: 交均距限表交均距限表按朔望兩弦分順逆列之朔望後之各宮列于上月距日初宮至二宮為朔後六宮至八宮為望後其数同兩弦後之各宮列于下月距日三宮至五宮為上弦後九宮至十一宮為下弦後其数同月距日次引在上六宮者用順度交均之號為減月距日次引在下六宮者用逆度交均之號為加用表之法以月距日次引之宮對月距日次引之度其縱橫相遇即所求之交均及距限也表以逐度為
