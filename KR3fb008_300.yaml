body:
  text: 太陽行一宮為一月或三十一日或三十日用太陽年者止用全日其小餘四年而閏一日為四分之一故四百年而減一閏也其一以太隂會合天陽十二次為一歲謂之太隂年太隂與太陽相會為一月或二十九日或三十日用太隂年者每歲積氣盈朔虛十日有竒而置閏月三年而一閏為十日故五年再閏十九年而七閏也太陽年之日二分之為半歲周四分之為四季八分之為分至啓閉十二分之為節二十四分之為節氣中氣七十二分之為候太隂年之日合朔兩平分之為望四平分之為上下弦合十二會朔為一年以年加之十二年為一紀三十年為一世六十年為一元凡節候晝夜用太陽年紀年用太隂年而西國則專用太陽年也暦書所載縂期年月皆用太陽年暦元暦之有元履端于始也以諸曜之平行同時而求各數用為起算之根古暦皆以冬至時刻為暦元今法則以天聪戊辰年太陽過天正冬至後第一子正為暦元其日千則已夘也斯時太陽躔星紀宮初度五十三分太隂平行在鶉首宮初度五十分他曜皆以此時行度為準不用冬至時刻與舊暦異縁冬至有平有定最難淂其真率也夫暦元為諸算之本稍有舛忒即諸行皆謬況諸曜細行莫不以子正起算又奚必拘拘于冬至時刻為也暦算治暦必由于算古法有加減乘除開方勾股和較等術雖于髙深
