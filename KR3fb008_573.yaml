body:
  text: 須各方纍年密測㝎其蒙氣之厚薄以限本地之視徑又測驗數食乃可淂之今所約㝎各方加減于月徑者日朔減月望加如北極高三十度其加減于半徑十秒四十度三十秒五十度至七十極高度加減更多至六分已上以改表中視徑中國極高雖止四十三度然東南皆近海顧亦用加減數然必須測驗數食審其果否乃可執為恆法可見徑之能變于氣也其一由于人所秉之目力蓋人目力有不同其視日月之徑亦有大有小西第谷于晴明之夜每夕用大儀器數十人皆利眼能手測月視徑所淂恆不同共經二十二測淂三十一分者二三十二分者六三十三分者七三十四分者六三十六分者一蓋以大光射目當之有利鈍不齊故也今再
