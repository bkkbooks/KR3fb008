body:
  text: 湏各方累年密測㝎其蒙氣之厚薄以限本地之視徑又測騐数食乃可淂之今所約㝎各方加减于月徑者日朔减月望加如北極高三十度其加减于半徑十秒四十度三十秒五十度至七十極高度加减更多至六分已上以改表中視徑中國極高雖止四十三度然東南皆近海顾亦用加减数然必須測驗数食審其果否乃可執為恒法可見徑之能變于氣也其一由于人所秉之目力盖人目力有不同其視日月之徑亦有大有小西第谷于晴明之夜每夕用大儀器数十人皆利眼能手測月視徑所淂恒不同共經二十二測淂三十一分者二三十二分者六三十三分者七三十四分者六三十六分者一盖以大光射目當之有利鈍不齊故也今再
