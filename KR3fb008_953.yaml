body:
  text: 所求之巳丁乃大均圈心距地心之數即本圈之壬丁線為最高卑時星在均輪最近處兩距地之半較非甲丁之全甲丁此前已丁差約為倍數相減半之得壬子均輪半徑後第穀及其門人更加考驗定金星兩心差之全為十萬分之三千二百八分分之本輪半徑二千四百六均輪半徑八百二其比例若三與一伏見輪半徑定為七萬二千二百四十八分立表用此求水星最高所在及兩心之差水星行天與金星相似測法亦畧同但其本天甚小在金星大內伏見輪之距日最遠不遇二十六度且不常見不越晨昏二時古今以
