body:
  text: 八度三十分于時高早差全變為南北差四十一分五十八秒加二徑折半總淂兩道相距一度十四分四十八秒外此無日食在其內可食相值之食限十四度三十二分其食甚亦未至實交也若行至實交則太隂以視度過交而南四十一分五十八秒矣以較二徑折半則視距為大不已出食限之外乎安淂有食設日月會夏至鶉首宮初度此在天頂北五度三十分得高弧八十四度三十分距北之高弧推南北差淂六分八秒以加二徑折半淂三十八分五十八秒為太隂入場曆兩道相距度二曜至此即以周相切推淂日食限七度三十一分若月距北則兩半徑减南北差餘二十六分五十二秒僅淂五度十分為日食限也如啚
