body:
  text: 各求其黃道交高弧之角若月當黃道無距緯而交角滿九十度則初虧正左復圓正右在黃道西象限而交角在四十五度以上初虧左稍偏上復圓右稍偏下交角在四十五度以上初虧上稍偏左復圓下稍偏右在黃道東象限者反是若月在交前胡有距緯則又湏求淂緯差角與高弧交角相加減為㝎交角然後可㝎其上下左右也加減之法月距黃道北而在西象限初虧為加復圓為減在東象限初虧為減復圓為加月距黃道南者反是乃視㝎交角為相加者在九十度以內則虧復之上下左右為前論若遇九十度為鈍角則易象限之上下又或㝎交角為相減者而交角內減去差角則虧復之上下左右如前論若差角內減去交角
