body:
  text: 戊為徑以方尺乙巳丁切光之純角乙丁交徑于巳影邊交于戊今依孔半徑得巳庚作壬庚辛直線與方尺平等而更作辛癸壬子即日言食之真形何也使壬丁辛乙各于方尺為垂線必自為平行線因而庚巳亦于方尺為垂線因作法葢庚已為丙已徑之分則庚已壬丁辛乙三線皆等既等而庚已為孔之半徑則餘兩線亦各半徑可知壬辛兩點當孔中心為真形之銳角則日月兩邊寔于此點相交而壬癸辛為太陽壬子辛即太陰兩弧中必食分外則為所存光之真形也真原形既定則依之推兩徑之比例及太陽之食分法孔與形相
