body:
  text: 度其分秒之進退視嵗實之消長淂嵗實即淂每日之平行矣数嵗以來于二分二至遣入各省分測淂嵗寔為三百六十五日五時三三分四十五秒乃置天周度為實嵗寔為法而一淂太陽每日平行五十九分八秒一十九㣲四十九纖五十一忽三十九芷遞祈之淂每時每分之平行也測嵗實之法古入皆測冬至然冬至之時刻難㝎不如用春秋分時淂数為真盖冬至時黃道典赤道平行其緯度一日所差不過数十秒儀罌無促分別春秋分黃道典赤道斜交其緯度一日差二十四分其差易見且求平行須用平行嵗寔而測量止觸淂視行惟二分時去中距不遠其平行寔行之差甚微可以不計况冬至
