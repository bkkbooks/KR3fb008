body:
  text: 皆此天也暦家謂之天元道天元極天元分盖常静天有三理一為此下各動天之一切諸㸃凡測七政度分皆以一㸃藉此天以知其所在也二為測各動天運行之時之度與夫各㸃之出入隐見以定歲月日時也三為測諸動天之各㸃相去離幾何也凡常靜天上诸名皆係之以天元因其不动以騐他动也天之形象天之骵其象为圓球何以知之天骵最為精純無雜最為单獨無二圓之為象亦無雜亦無二骵勢如此故其形象亦當如此又運行最疾者莫如圓球他骵則滯礙也其去地最逺之數以地之半徑為度最近䖏得一萬四千度指恒星天而言自此以上非人力思議所及矣其本所在萬物之最上其質最輕虛細宻又極精純無他夾雜也天之運動天之運動皆環行何者天骵单獨無二故其運動亦應单獨無二環行者單獨無二之行也何為單行凡運動如人如鳥獸如風皆雜亂無法之行單行止有二一日垂線一日圓線石在空中下墜于地此為垂線一切循環無端者皆為圓線垂線之動勢盡而止惟圓線獨為無窮天以覆函生存下土者也故不能不為無窮不能不環行矣又於之運動恒不去離其本所故論其各分無一不動而其全骵無一分動此運動之最尊者也
