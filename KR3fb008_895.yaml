body:
  text: 一乙戊丁形有乙戊丁角乘乙丙弧十八度五十六分有乙丁戊角乙丁丙角或醜邜弧為後兩測之視行度以減半周淂乙丁戊角一百四十五度二十六分因淂乙角為十五度二十八分有三角求三邊淂乙丁為度三二四四七戊丁為度二六九四八戊乙為度五六七三六此各角之正弦其實丁戊乙戊乙俱各角之全弦然其北例相似故可通用也二甲戊丁形有甲戊丁角乘甲乙丙前後兩測之平行度五十六度四七三有甲丁戊角甲丁丙角或子邜弧為前後兩測黃道上視徑度之並一百十三度二十五分七十六度五十九分自淂戊甲丁角四十六度十三分半有三角求三邊淂甲丁為度八三六六八甲戊為度九七四二戊丁為度七二二六
