body:
  text: 太陽平行望策一十四度三十三分一十二秒九微太陽引數望策一十四度三十三分零九秒四十一微太隂引數望策六宮一十二度五十四分三十秒七微太隂交周望策六宮一十五度二十分七秒各以每日平行與望策日分相乘即得一小時太陽平行一百四十七秒小餘八四七一四九一小時太陽引數一百四十七秒小餘八四一二七一小時太隂引數一千九百五十九秒小餘七四七六五四一一小時太隂交周行一千九百八十四秒小餘四二五四九一小時月距日平行一千八百二十八秒小餘六一二一一零八太陽本天半徑一千萬
