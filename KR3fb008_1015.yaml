body:
  text: 太陽之沖處未點割小圈有火星行歲圈最近侵入太陽天內之象故遂以大圈命為星行之圈以乙日為心而寅乙為距日數以甲為地心也夫第穀此圖有歲輪半徑乙甲有火星寔行視行差度有周天十二宮有太陽度乙春有火星最高卑又有火星行最近割入太陽天內之象可謂簡而該巧而妙矣故新法竟以日為火星平行天之心也然而法雖工究是借象何則甲乙者歲輪之半徑不淂與日距地心角乙同數一也寅乙距心線從兩小輪求出而兩小輪在火星本天是從乙心起算為從甲心起二也因寅乙距心線以淂視差之角亦為乙心之角非甲心之角三也若甲真為地心則與乙
