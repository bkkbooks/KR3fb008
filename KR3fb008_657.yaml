body:
  text: 度則未壬不能與丁壬合為一線其東西差與丁壬高下差等無比中限以下各度為最大矣若在中限則無東西差以限上丁壬與未丁合為一線無丁角故也其餘自中限以下地平已上各度隨交角之大小為二差之大小求之用于午壬形有壬丁午交角有丁壬高下差有午直角求丁午南北差法全數與丁壬之正弦若丁交角之正弦與丁午南北差之正弦丁未同求丁午東西差全數與丁壬之正弦若壬角丁角九十度之餘之正弦與丁午東西差之正弦未壬同凡黃道在天頂之地其東西差太隂在地平時最大即與地平上最大高下差等以此地黃道無距天頂度即未壬與丁壬合為一
