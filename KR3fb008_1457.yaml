body:
  text: 求逐月望太隂交周置本年首𦍤太隂交周用交食𦍤望策表察正月太隂交周望策宮度分秒典首𦍤太隂交周相加淂正月望太隂交周以下逓加交周𦍤策一宫四十分一十四秒淂逐月望太隂交周求太隂入交月数視逐月望太隂交周自初宮初度至初宮一十四度五十四分自五宮一十五度六分至六宮一十四度五十四分自十一宮一十五度六分至十一宮三十度皆為太隂入交苐幾月入交即第幾月有食也太隂距交前後可食之限一十四度五十四分故逐月望太隂交周在此限內者為有食推平望諸平行第一
