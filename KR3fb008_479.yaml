body:
  text: 限多如京師近北約笑陽曆八度陰曆二十一度則知日月相會凡在陽曆近二交八度內在隂曆近二交二十一度內其下必見日食而過此限外則否即北可以推南莫不以遠近分多寡矣然而二曆食限之度又以人目所視而變易此其故盡在月輸蓋月比日最近于地而月之體又小于地人目見月之離度又在地靣不在地心故以月天論地平雖皆為平分各半直過其心而人在地靣所見天地之兩界則似地球與月天非為平分少半在上多半在下而差約一度故以實度論之月已出正地平而于人目所視之地平尚少一度謂之視差惟月在天頂則正地平與視地平之拯皆以一直線合于天頂無有視差過此皆有差數若愈遠天頂
  hash: sha256:5d268812a51e52661467ee5dfd7dcbf95d59c746e61ad2950a746883db5c5bea
