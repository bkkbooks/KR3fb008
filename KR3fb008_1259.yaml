body:
  text: 十二求所食時刻以月寔引宮又月距黃緯入月食時分表分三表查視日寔引在五六七宮在最高限取二三四八九十宮在中距限取一十一宮在高沖限取查得初擴至食甚時分若食至十分外者並查食既時分為所食時刻食甚至復圓與初虧至食甚同食既至食甚與食生光同又法以月寔引宮度查太陰寔行表得月一小時寔行表隔三度用中比例取之以距緯加並徑與並徑減距相乘平方開之得初虧距弧為三率月一小時寔行為一率六十分化秒為二率求得四率妝之為初虧距時分寔影內減去月半徑餘數與距緯相咖為和相減為較和較相
