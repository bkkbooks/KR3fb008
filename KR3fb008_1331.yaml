body:
  text: 中交寔行足減本年黃道宿鈐內某宿度分則減之餘為中交宿度推合朔弦望法太陰寔行與太陽寔行同宮同度為合朔限呀三宮為上弦限距六宮為望限距九宮為下弦限皆乙太陰未及限度為本日已遇限度為次日如太陰距太陽未及九十度為上弦本日已遇九十度上弦次日之類求時刻之法以本日太陽寔行與次日太陽寔行相減餘為太陽一日之寔行以本日太陰寔行與次日太陰寔行相減餘為太陰一日之寔行乃於太陰一日之寔行內詁太陽一日之寔行餘為一率一千四百四十分為二率本日太陽寔行加限度合朔同宮度度無可加上上弦加三宮望加六宮下
