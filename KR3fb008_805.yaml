body:
  text: 距之度與甲癸真形之半徑若全數與原視半徑之切線查表得太陽視半徑試以全形為一百分孔形一十分相距萬分一百減一十餘癸丑為九十半之得甲癸四十五以算終得一十五分二十八秒度數之分論太陰半徑此以庚辛中比例線求之蓋先以庚癸太陽徑分求庚辛見幾何三卷三十五題次以庚子與庚辛若庚辛復與庚寅得全子寅論食分則癸丑與一十平分若子丑與食之分或若癸子與未食之分以與十分相減餘為所食之真分測日食細法用方尺量食之形或影淡面影符無處可用欲以所測推太陰視徑未免微差今更用一器愈準愈細前可雲受光形之表中有軸
