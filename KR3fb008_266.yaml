body:
  text: 甲丙乙限其首庚已辛限其尾丙己在其中是過極圈上所容之五緯度也宗動天之赤道係于宗動之天一日左旋一周為七政恆星之公運動其丙極即大圈之兩極何者為本道與天元赤道相合為一線動靜雖異終古不離也又大圜之心中圈之心赤道之心地之心同是一點為赤道與大圈中圈同為大圈故也赤道既為大圈其分數亦有半圈有象限有三百六十度及分秒其算數則從一至三百六十與黃道地平異黃道分十二宮各以三十為限地平分四象各以九十為限故赤道亦有過極經圈一百八十為用甚大其左右有距等侶圈每至極各九十不甚為用為與天元緯度一一同線故也其用則以赤道之經緯度測各點之所在命為各點赤道經度如啚赤道上任設甲點從赤道初點乙數至甲為幾何度即甲點之赤道經度分也為在赤道上故無緯度若如丁點在赤道外則作極丁戊過極大圈截赤道于已所限之乙已即丁點之赤道經度其丁己即所容之赤緯度也凡地球之南北皆以赤道分之日時亦以赤道命之赤道左旋三百六十一度為一日謂之平日也
