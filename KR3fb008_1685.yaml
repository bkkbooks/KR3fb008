body:
  text: 于次輪全径與三均数之生于次均輪半径亦猶初均数之生于本輪及均輪半径也故欲求二均三均之数必先定次輪及次均輪之径而欲㝎次輪及次均輪之径又湏先測二均及三均之数也暦家于上下弦當自行三宮或九宮時累測之其極大之均数淂七度二十五分四十五秒查其切線淂一百三十萬四千自行三九宮初度當两弦時初次两均数合成直角形本輪心距地全数為股月次輪周距地心線為弦两輪半径或一直線為勾內減去本輪均輪两半径之共数八十七萬餘四十三萬四千半之淂二十一萬七千即次輪之半径也又于两弦及朔望之間約月距日四十五度時當自行三宮或九宮時累測之其均数常與推筭不合差至四十一分二秒是即次均輪所生之三均数也依法求其半径淂
