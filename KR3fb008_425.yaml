body:
  text: 則不然古曆于上下弦日推太隂自行本輪之二限四限本輪之左右兩旁均數最大之處又在黃道之九十度限以此時無東西差以定本日之經度若如本輪法則加減差止應淂五度及用渾儀測候或以距太陽求月之視經度或以恆星求其黃道上之視經度淂數恆與先推不合輪推算宜淂五度測之則淂七度四十分從古纍測皆如之又測弦前後若干日亦與推算不合每日多寡所差不等乃知月行止定朔望時在本輪周餘日另有本行度分因其差數想月本輪之上復有一次輪其心循本輪左旋月骵在次輪之上又循周右旋恆于朔望時最近起界朔望時月骵最近本輪心兩弦則最逺其周上行度恆倍于距太陽之度日行二十四度二十分所謂倍離也此差從距日逺近而生其差數名為次均測次輪半徑太隂既有次輪則當求其半徑如啚丁為地心庚為本輪心甲乙丙為本輪周作庚丁過心線又作本輪之丁甲切線即庚丁甲為五度角乃類望時均數次作庚甲戊線及丁戊線成庚丁戊角為七度四十分即視平兩行上下弦之大差次庚為心戊為界作戊己圈太隂在定朔望時必循甲乙丙本輪周左行在兩弦時必循戊己周左行而弦前後半月間則自甲向戊戊向甲右旋成甲戊次輪圈朔望時月在甲兩弦時在戊十五日有竒而一周今求甲戊次輪徑庚丁為十萬全數即庚甲為八千七百二十五度之五弦也
