body:
  text: 高下差之多寡係于高弧而時氣二差之多寡係于高弧與黃道之交角蓋交角之度以中限為宗當太陽在地平其交角即中限高之餘故地平上有最大時差若太陽在中限則高弧圈與中限高合為一線而成直角故無時差而氣差最大即與高下差等餘自中限以下地平以上交角各有大小而時氣兩差亦不等如圖已為天頂大圈為地平甲為北極辛壬為黃道丙為黃極午寅為子午圈丁為中限丁癸為限距地之高丁巳為限距頂之度太陽自辛出地平設推淂實會時在乙即從天頂已過太陽作巳乙庚大圈而乙庚
