body:
  text: 依上論地為圓骵人在子午圈下自南向北或自北向南行二百五十里見天星差一度則地之二百五十里當天之一度於是以一度為一率二百五十里為二率周天三百六十度為三率得四率九萬里乃地體之大也又用周求徑法以二十二為一率七為二率九萬里為三率得四率二萬八千六百里有竒為地之徑數半之得一萬四千三百餘里為地面至地心之厚乃地之半徑也地分五帶地骵既圓則人居處地球者其視日影之不同共分五帶其中則自赤道南北各以二十三度半為限二十三度半者黃赤兩道之大距為本方二極出地之髙名為煖帶居其下者午正立表揆日測景必自射南射北又每歲必有二日其表無影即春秋二分太陽正過其天頂之日也此指正居赤道下者春秋一分日中無影過春分則影在南過秋分則景在北此帶惟一又於其南其北各自二十三度半外各截至六十六度半為限名為溫帶其下居南者表影恒射南居北者表影恒射北歲有一日其影極短然太陽則下經其天頂矣此帶共有二以上三帶皆太陽每日有出入而四序均調者也又于南北二方自六十六度半外各底其極名為冷帶其下或表影周圍旋轉有日太陽繞其地恒見有日太陽繞其地恒隱隱見之候或乆至半年或數閱月不等此帶亦有二是為大地共為五帶之概也因此推知距赤道之南北二方其氣候必相反如太陽躔星紀宮向北之方為冬至向南之方為夏至春秋二
