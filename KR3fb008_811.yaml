body:
  text: 十八分三十秒化為度數之分得六分八秒光形一百一十分減孔一徑一十六分三十秒餘分為法數太陽在卑徑三十一分為寔數算得六分八秒如圖甲丙太陰半徑減甲乙兩心之距餘乙丙為九分七秒加乙丁太陽半徑十五分三十秒得丙丁為二十四分三十七秒度數之分即體掩日之分故以三十一全徑為法以十二平分為寔算得九分三十二秒即太陽寔食之分較于形中可食多一分三十二秒矣夫測食常法因難分食與未食之徑今室中測食雖能明分之而所見食分非真食分所測徑非真徑則測數似不可用然因分得日月兩徑大小之比例及明暗之界即推真食分及寔徑之根古
