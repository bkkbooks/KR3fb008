body:
  text: 時太陽在乙即從天頂丅作丁甲圈過太陽而乙甲即實會時高弧也求之先用午癸丙形午為直角有午丙為戊午時度之餘即赤道上距子午圈度用時分者有丙角赤道高戊巳弧求午癸全數與午丙之正弦若丙角之切線與午癸之切線以加乙午赤道北距緯在南則減淂乙癸邊又求癸角全數與丙角之餘割若午丙之割線與癸角之割線次用乙甲癸形甲為直角有乙癸有癸角求乙甲全數與乙癸之正弦若癸角之正弦與乙甲之正弦淂乙甲高度高弧圈與黃道交角
