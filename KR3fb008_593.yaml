body:
  text: 既非定于最高影之大小己變則雖月距地等而所當之影必不等蓋太陽在最高影則巨而長在最卑影則細而短法當依太陽高卑推各度所生影以淂差數用以減最卑時影乃為本時之影此差不係于太陰而係于太陽之高卑如圖子為地球日在最高壬所生影為丙甲丁在最卑辛所生影為丙乙丁較最時刻則小餘自最高至最卑各度所生之影必皆漸小于最高故所淂地影差恆用減立表以太陽置最高算求之先設日在最髙距地為壬子月在最卑距地為子申如前推淂午子申角地影次設日過最高若干距地為子辛推淂子乙影長月原在最卑距地申子不變推淂未子申角地影夫月同一子申距地而所當地影一為未子申角一為午子申
