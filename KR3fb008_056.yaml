body:
  text: 一率乙甲一丈五尺二率甲丙二丈五尺九寸八九三率乙巳半徑四率已丁切線一度七三二五查表淂乙角六十度巳戊弧求丙角法以丙甲與甲乙之比例若丙已半徑與丙角之切線已丁求弧淂丙角度分一率丙甲二丈五尺九八九二率甲乙一丈五尺三率丙已半徑四率巳丁切線五七七三五查弧淂丙角三十度巳戊弧也求乙丙邊以丙甲乙甲兩邊上方形相并開方淂乙丙邊三丈勾股求弦術第三法有兩角一邊其邊對直角求餘角餘邊甲乙兩直角形有甲直角有丙角三十度有乙丙邊三丈求乙甲邊以丙戊半徑與丙角正弦戊丁之比例若丙乙邊與乙甲邊一率丙戊半徑二率戊丁正弦五三率丙乙邊三丈
