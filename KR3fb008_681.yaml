body:
  text: 距天頂及距太陽度因以本高弧及高弧交黃道角復算視差如前辛未年十月朔日食得真時差九分一十九秒何以知其然也因減時九十度略在前即壽星宮二十三度六分距天頂五十三度四十分距午二十三度三十一分較太陽復西去八度二十一分算得高弧三十六度三十四分交角八十三度四十五分推東西差五分十三秒故以三率法用太陰一小時實行三十三分二十秒以真時差得五分一十秒為太陰實距太陽分數見其與才得之東西差相等則前時之時差亦準若未等則求所差分數如前東西差三分五十秒得九分一十九秒為時差此不等之三秒亦得七秒依前法視會內應減實得午正三刻一十四
