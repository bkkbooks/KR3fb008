body:
  text: 土木火三星與太陽合伏後為晨見合伏前俱稱夕金水二星順行與太陽合伏後曰夕逆行合伏後曰晨求五星衝伏同度時刻法兩星各以次日行與本日行相減得較兩較相加減為一率同順同逆兩較相減一順一逆兩較相加一千四百四十為三率兩星本日視行度相減為二率乘除淂四率數妝之得時刻求五星退入宮法本日度分內減去次日度分其較為一率本日餘分為二率度以上不算止用餘分一千四百四十為三率如前法乘除淂時刻求五星順入宮法
