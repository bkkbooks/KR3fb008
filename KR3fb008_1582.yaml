body:
  text: 其所對之数為太陽地半徑差又用月離太陰地半徑差表以真時太陰高弧按太陰距地限察其所對之数為太陰地半徑差兩地半徑差相減餘為真時高下差求真時東西差用交食東西南北差表以真時白道高弧交角及真時高下差察其典東西差所對之数淂真時東西差求真時南北差用交食東西南北差表以真時白道高弧交角及真時高下差察其典難別差所對之数淂真時南北差求食甚視緯
