body:
  text: 周止二度五十分為本地本度月距南日食之大限可食也次論其甚遠于天頂者設日月在冬至星紀宫初度會亦正午其高弧二十六度三十分推潯高畀差即南北差五十六分二十四秒加二徑折半潯黄白兩道搃距一度二十九分十四秒為月寔距北所推最大可食之限一十七度二十四分所以然者人目所見日月以两心會合必在太隂所雖視道交黄道之䖏距其两道寔交尚一十一度又本南北差减二徑折半潯距度二十三分三十四秒相當者潯四度三十二分為太隂尚不及寔交未過黄道南而以視差故人目所見則已過交出日食限之外矣如圈丙為大隂丁為大陽甲為黃白二道之寔交論寔距度則日月至甲宜相
