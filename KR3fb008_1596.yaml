body:
  text: 用交食東西南北差表以初杅白道高弧交角及初杅高下差察其典東西差所對之数淂初杅東西差求初杅南北差用交食東西南北差表以初杅白道高弧交角及初杅高下差察其典南北差所對之数淂初杅南北差求初杅視行初杅典食甚同在限東或同在限西者以初杅東西差典食甚東西差相減為差分以加減初杅復圓距弧初杅典食甚同在白平象限東初杅東西差大則以差分減初杅東西差小則以差分加初杅典時甚同在白平象限西初杅東西差大則以差分加初杅東西差小則以差分減淂初杅視行初杅在限東食甚在限西者以初杅東西差典食甚
