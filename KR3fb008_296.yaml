body:
  text: 廣西陜西減二刻四分貴州減二刻八分四川減三刻七分雲南減四刻八分以上地在京師之西皆減天象同時並見而在東者早見日故其刻分皆加在西者遲見日故其刻分皆減凡南北緯度以北極髙下定之東西經度以月食時刻定之各省加減刻分以省城為主時刻凡測騐七政瀍離度數及交食會望晝夜等皆取時刻為憑時者因宗動天之運動而得也夫天下有形之物必有變革變革多端中有遷運一端因其遷運先後從而測量剖分之則為時也又草木鳥獸人事皆有變革遷運而必用二曜者凡立術有三法一須公共二湏分明三湏永乆惟二曜則然也時之尺度時之準分尺度一日是也一日者何太陽随天左旋一周又過赤道上之一升度弱當黃道一度是也盖時刻以赤道為主凡赤道左旋三百六十一度是為一日以赤道亘于天中不偏不倚運動有常故取準也其起算有四法或以早或以晚或以晝之中或以亱之中時分十二
