body:
  text: 黃道黃道亦繞地同心之大圈兩交于赤道內外相交之兩㸃為春秋二分相距最逺之二㸃為冬夏二至其最逺處為二十三度三十一分三十秒黃道之兩極去赤道兩極亦二十三度有竒與二道相距之數同太陽行此圈一周成四時寒暑節氣晝但六曜東行之道皆以是為宗主焉如啚庚為北極甲丁為赤道戊為黃極丙乙為黃道甲丙為黃赤之大距度二十三度有竒與庚戊黃亦二極相距等戊黃極繞庚赤極每日左旋一周黃道分數其四象限三百六十度與赤道同又十二分之為宮二十四分之為節氣七十二分之為候與赤道異十二宮曰玄枵子娵訾亥降婁戍大梁酉實沈申鶉首未鶉火午鶉尾已壽星辰大火卯析木寅星紀丑節氣曰冬至小寒大寒立春雨水驚蟄春分清明穀雨立夏小滿芒種夏至小暑大暑立秋處暑白露秋分寒露霜降立冬小雪大雪每一節分為三候節氣中以二分二至為主春分太陽躔戊宮初度夏至躔未宮初度秋分躔壽星初度冬至躔星紀初度黃道左石各八度以定月五星出入之道名為月星之道諸曜出入于黃道內外多寡不同最逺者八度也
