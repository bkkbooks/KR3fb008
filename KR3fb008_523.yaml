body:
  text: 各不同視差之理詳後安尋以實渡邊寶日食之限乎今測太陽交會時最大高畀差尋一度四分月極進距地五十四地半徑之差數減太陽之最大高畀差三分餘一度一分此為本隂偏南之極多者凡日食時必有一方能見其然是為大地公共之差以加二徑折半尋總視距度一度三十三分五十秒外此即無日食在其內則可食依前法求食限尋兩交前後各一十八度五十分為兩大視徑折半之限也若以小半徑求食限與前差度並尋一度三十一分有竒推相值之交周度一十七度四十八分為兩小是徑折半之日食限若日月會時如此限內者日必食但非總大地能見必有地能見之耳若以中會輪食限又需加入實會距中會之度其最大弧三度則中會有食之限二十餘度如圈甲
