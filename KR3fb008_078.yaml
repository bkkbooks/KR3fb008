body:
  text: 度各作線會于丁即丁為容圓心次丁為心儘一邊為界作圈必各切形之三邊于戊于巳子庚于是從丁心向切處作丁庚丁戊丁巳三線必俱為三邊之垂線而等亦即容圓之半徑求之以三邊相并而半之為半搃以半搃與甲丙丙乙甲乙三邊相減淂較三較連乘半搃除之淂數開方淂丁巳容圓半徑丁容圓之心亦即三角形之心三角形外切圓甲乙丙三角形求外切圓法以三邊各平分于辛于癸于壬從分處作十字垂線如辛丁壬丁癸丁俱與邊為直角三線相遇于丁丁即為圈心以作圓淂甲乙丙三角并切圓周引各線抵圈界而丁庚丁戊丁巳皆為半徑即所求又銳角形外切圓之心在形內鈍角形則在形外如二啚有角求両平分之設有甲角欲兩平分之法以甲角為心作處半䂓截角旁両線淂辛壬二㸃乃自辛自壬各用為心作弧線相遇于癸作癸甲線即分甲角為両平分有一直線任于一㸃求作垂線設甲乙直線任于丙㸃求立垂線法于丙左右任用一度愈逺愈准如丁如戊以為心又任用一度湏長于丙丁為半徑各作虗弧相交于已從丙向已作巳丙線即為甲
