body:
  text: 步月離推月離用數康熙二十三年甲子天正冬至為曆元周天三百六十度八算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二一八七五紀法六十太陰每日平行四萬七千四百三十五秒小餘二一一七七太陰每日平行一十三度一十分三十五秒一微一十六纎一十四忽一十三芒以秒法通之即淂太陰一小時平行一千九百七十六秒小餘四五九二一五七置每
