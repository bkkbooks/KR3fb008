body:
  text: 戊丁弧之倍為壬乙日真体在乙作乙已甲乙䓁線先用丁已乙三角形求淂丁已乙角及乙已邊次用己甲乙三角形求已甲乙角淂己癸弧即太陽丙己引数之盈縮差也又求乙甲邊為太陽本天髙卑距地心線時差時差者平時與用時相較之時分也推步所淂者為平時測量所淂者為用時用時即視時也二者常不相合其故有二一因太陽之寔行
