body:
  text: 氣之日十四度與十五度相較為莭二十九度與次宮度相較為氣法先定某節氣距冬至度數次查周歲平行表中度分橫行求本節氣小近度分內減本年最高沖度分為引數查加減表淂均數以本號於節氣小近數或加或減淂數為某度乃某日數太陽所行之度查表中行有度上行有日數凡取度項識為某日之度若合于節氣度數者所淂日數為某節氣之日數若盈或縮則相減以較數變時以本日太陽距冬至日數查細行變時表若寔行遇節氣度即以所淂時分減日數若寔行不及即以所淂時分於日數并加之又查日差表本節氣下或加或減日差分而淂從冬至到某節氣日數若干次以某年平冬至紀日及時刻加于各節氣日率淂某年某節氣在某日某時若以節
