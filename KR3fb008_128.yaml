body:
  text: 法曰丙乙丁斜角形以丙乙邊引長至甲從丁角作丁甲垂弧補成丙甲子直角形甲為直角次用乙甲丁丙甲丁兩形依前直角法求之乙丁兩角為異類垂弧在形外求丙乙邊先用乙甲丁直角形有乙鈍角之餘六十一度五十三分有乙丁邊依前直角形第三法求淂乙甲邊三十度四十九分及丁甲邊四十二度四十八分次因丙丁邊在九十度外用甲戊丁次形若丙丁弧在象限內即用丙甲丁直角形有甲丁丙丁兩邊依直角第一法求甲丙減去甲乙淂乙丙邊形有甲直角有丁戊八十四度丙丁之餘有丁甲邊用直角第一法求甲戊邊淂八十一度四十二分并乙甲共淂乙戊減丙乙戊半圈一百八十度淂六十七度二十九分為丙乙邊求丁角先用乙甲丁直角形有乙角有乙丁依直角第三法求淂乙丁甲角四十度四十五分及丁甲邊四十二度四十八分次用丁甲戊次形以丙丁邊在象限外故有甲直角有丁甲丁戊丙邊依法用直角第一法求淂甲丁戊角八十四度十五分用減兩直角餘丙丁甲角九十五度四十五分再減去乙丁甲角存五十五度弱為所求丙丁乙角求丙角丙丁邊之正弦九九四五二凡邊角在九十度外用其餘弧之正弦為正弦與乙鈍
