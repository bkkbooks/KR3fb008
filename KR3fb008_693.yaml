body:
  text: 視度隨地隨時大小不一也此外三差之義振古未聞第谷殫精推測周行萬里始洞徹原委而交食之法乃為盡也清蒙高差曆家測驗日月及經緯諸星積累所得其光入人目徃不依直線而至夫太陽太陰有地徑視差無怪其然也恒星無地徑差人測之在地面與在地心不異宜所見者必依直線若之何不然且兩星相距近于地平與其相距近于天頂絕不同其各體之大小亦不同又太陽太陰固有地徑差其視體偏下視高度宜少而所得者忽復多定望時二曜正居天地徑之兩端以理論見一不得見二或並見則半體而已今有時全見之何也古度數家見直物入水中折成曲像空水之交則有鈍角以此鈍角喻諸星射目之折線于理為允則近地面之氣可比于水天體至清可比水晶光在有氣無氣之交必成折角而能令諸曜之象升卑為高也若星距頂愈遠所射光之折線角愈減其鈍而視高之去寔高也愈多葢近地則濕氣愈厚故受蒙為甚而又寔非雲霧等有質之物且在地濁之上曆言入濁言濁中近濁入時不見視此為異也謂之蒙氣也因此凢測候兩星若距度線與地平行者其在高之距與在卑之距必小有異若不與地平行而兩高弧各異者不論或直與地平為直角或斜與地平為斜角其在高之距與在卑之距亦小有異總之星愈近于地兩距之寔度愈少遠則愈多矣第谷本地北極高五十五度有奇測定太
