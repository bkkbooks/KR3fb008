body:
  text: 乙為黃道甲戊為白道甲為交實會時太隂實度任己以視差故其視差在丙尋與太陽乙兩周視相切于丁而有食其己丙為高畀差而己戊為東西差丙戊為南北差而南北差之最大者一度一分其故見後以加乙丙為總距乙戊若乙丙為兩大視徑折半即兩半徑之並與兩全徑並之半數蕁推尋甲戊食限一十八度五十分或乙丙為兩小視徑折半加丙戊尋甲戊一十七度四十八分設中會更在前為辛尋食限甲辛更多于加戊共二十餘度也求北中界日食限北中界者地居赤道之北南不至赤道北不至北極也今依極出
