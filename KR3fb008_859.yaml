body:
  text: 測五星經度平行測五星之平行其根有二第一欲兩測之星距太陽左右度分等累年所測擇其前後各一測星皆在日之左或皆在日之右其距度分等第二欲兩測星之在黃道經度等則其行必滿周而複於故處而其中積之年日數必等年日數等者任用若干測其前兩測與後兩測中積之年日數必等法先用恒星淂五星之黃道經度次用測星諸法有本星之經度求其距太陽度分今不言緯度者置星圈於黃道下論之以擇其前後等度者蓋星之次行乙太陽為行動之原使距有遠近則行有遲疾高卑若距度等即星之前後兩測其遲疾等其高卑亦等其行必滿周也而或右或左必求同方者星距太陽一左一右雖等度其時日不等亦不能滿一周而複於故處也又
