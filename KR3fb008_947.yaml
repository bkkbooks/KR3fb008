body:
  text: 巳本天半徑為全數用變率法淂巳丁兩心差為十萬分之二千一百二十九甲庚或乙辛伏見輪半徑為十萬分之七萬五九八求金星均圈半徑前置伏見輪心在最高卑求淂兩心之差依此差數算他度之均數與伏見輪上距度並之恒與所測之大距不合推數每小於測數因知金星亦有均輪上所求巳丁差非兩心差之全今置星平行在距最高九十度用晨夕兩測大距求其兩心差蓋平行距最高一象限則為最大初均角而本輪均輪之兩半徑為一直線淂兩心差之全也如圖乙為地心大圈為星平行天庚最高辛最卑置星平行在丁距庚九十度丁為心作本輪均
