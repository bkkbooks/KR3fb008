body:
  text: 圈戊點為赤道距赤道戊二十二度十二分為己是廣州之天頂作己丙線截地面于乙乙即廣州也又距戊三十九度五十五分為丁是順天之天頂作丁丙線截地面于甲甲即順天也兩人在甲在乙各測月作視線為甲辛為乙辛辛甲丁角乃順天所測月距頂之度辛乙己角廣州所測月距頂之度次作辛丙為月距地心線又作甲乙底線以求辛丙法用甲乙丙形形有丙角甲乙兩地相距十七度三十八分即己丁弧兩測月距頂相較之數甲乙三角各八十一度十一分因甲丙乙為兩腰等形故丙甲丙乙各為全數因淂甲乙邊度六五四即丙角全弦次用甲乙辛形形有甲乙邊有甲角五十五度三十六分半周內減去丙甲乙角再減辛甲丁角餘為乙甲辛角也有乙角一百二十四度八分半周內減甲乙丙角又加己乙辛角淂甲乙辛角求乙辛邊淂五十四地半徑又三四五次用辛乙丙形形有乙角一百五十四度四十一分半周內減己乙辛角之餘有乙丙全數有乙辛邊求淂辛丙五十五地半徑又四一為月距地之逺也此法曰五星懼可用二法本地自測後皆本地自測用月全食子食甚時測月軌髙又推太陽經度以㝎太隂經度查髙弧表或用測量法求月在本時本經度之地平實髙與所測視髙相減為視差角則成三角形其一邊
