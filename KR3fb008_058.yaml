body:
  text: 四率乙甲邊一丈五尺求丙甲邊法以戊丙半徑與丙角之餘弦丙丁若乙丙邊與丙甲邊一率戊丙全數二率丙丁餘弦八六六三三率乙丙三丈四率丙甲邊二丈五尺九八九求乙角以兩直角一百八十度內減去甲直角九十度再減去丙角三十度餘六十度為乙角第四法有兩角一邊其邊連直角求餘角餘邊甲乙丙直角形有甲直角形乙角六十度有乙甲邊一丈五尺求丙甲邊法以乙巳半徑與乙角之切線巳戊若乙甲邊與甲丙邊一率乙巳半徑二率巳戊切線一度七三二五三率乙甲一丈五尺四率甲丙邊二丈五尺九八九求乙丙邊法以巳乙半徑與乙角之割線乙辛若甲乙邊與乙丙邊或以乙角之餘弦乙丁與乙戊半徑相比若甲乙邊與乙丙邊一率巳乙半徑二率乙辛割線二度三率甲乙一丈五尺
