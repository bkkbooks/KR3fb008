body:
  text: 白平象限必居黄平象限之東如午出地申點在黄道北入地白點在黄道南正交前子點當黄平象限而午子即白平象限距黄平象限之度午庚即白平象限距地之高也如太隂在午子之間則所當黄道度爲限東視経度差而東其時刻直减而白道度寔爲限西視経度差而西其時刻則宜加也又白平象限距地平之午庚弧低于黄平象限距地平之已寅弧則白道高弧交角必大于黄道高弧交角若午庚高于已寅則白道高弧交角必小于黄道高弧交角也按京師赤道高四十度弱黄平象限最高者七十三度餘最低二十六度餘白平象限最高者七十八度餘最低二十一度餘黄平象限距正午偏至二十四度餘白平象限距黄平象限偏至十
