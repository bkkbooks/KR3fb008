body:
  text: 犯時刻在地平上者取之如在地平下可勿推算求月星淩犯密法先依前月犯恒星術用四率法推淂淩犯時刻次以大陽本日細行與次日細行相減淂較為二率淩犯時刻分為三率一千四百四十為一率求得四率以加于本日細行淂太陽細行以太陽細行查交食九十度媽表淂時分以時分及淩犯時刻午後減十二小時午前加十二小時滿二十四時去之餘為搃時以搃時入交食九十度表查九十度限及限距大頂度用九十度減限距天頂淂中限高度
