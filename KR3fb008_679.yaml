body:
  text: 分一十九秒為真時差因減故算得視會在午正三刻一十四分二十一秒與所測密合也考真時差真時差者為太陰視行反覆推求再三加減吻與視會相合也欲更考其實須算太陰實距太陽幾何若所得分數與太陰所當視會之東西差等則所得視會亦準若微有不等則以不等之分數化為時依兩曜實相距之分數較之視差或大或小依法加減于前視會如距度大日食在九十度東則時差為加食在九十度西則時差為減如距度小則九十度東宜減九十度西宜加分秒內可得其準也因此再求東西差而以本視會時復求九十度限與其
