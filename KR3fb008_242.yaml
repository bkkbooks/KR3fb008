body:
  text: 地球渾圓地為圓骵與海合為一球何以徴之凡人任於一處向北行二日半日行百里則北方之星在子午線上者必髙一度次後二日半復髙一度恆如是為相等之差向南行亦如之則知從南至北為圓骵也如啚甲為北星丁為南星乙辛丙圈為地球人在乙則見甲正在其頂至戊則少一度矣從戊至已與乙至戊道里等又少一度矣逮至辛則不見甲至壬則反見丁安得謂非圓骵乎若云地為平骵則見星當如癸從丑向寅至辰宜嘗見不隱又丑至寅寅至卯若見子之髙下所差等則道里冝不等安得有時不見又恆為相等之差也若人東行漸逺則諸星出地平者漸先見西行漸逺漸後見故東西人見日月食遲速先後各異是知東西必圓骵也或疑地有山之髙河之深似非圓骵不知山河之髙深以較地骵之厚不及千分之一另有算法猶大圓面之一炮㸃耳無礙其為大骵之圓古云天圓而地方蓋指其德而言也地在天中地在大園天之最中為宗動天之心何以徴之隨人所居之地見
