body:
  text: 時刻之法以本日太陽寔行與次日太陽寔行相減餘為太陽一日之寔行以次日星寔行與本日星寔行相減餘為星一日之寔行乃乙太陽一日之寔行與星一日之寔行相加為一率一千四百四十分為二率本日星寔行內減本日太陽寔行餘為三率求淂四率為距子正之分數以時刻收之淂合退伏時刻求金水二星晨夕伏見叚日金水二星合伏後距日漸遠為夕見西方順行星漸差而東日入後即可見順行漸遲遲而忽退為㽞退初退行漸近太陽為夕不見復與太陽同度為合退伏自是又漸遠太陽為晨見東方退行星漸差而西日出前即可見退行漸遲遲而忽順為㽞順初順行漸疾復近合伏為晨不見
