body:
  text: 一率乙甲正弦八六六三二率丙甲切線八三九一三率半徑全數四率乙角切線九六八九四求弧淂四十四度六分為乙角丁己弧又法全數與乙甲之正弦即戊角甲己之餘弦若甲丙之餘切即戊丙之正切與乙角之餘切即戊丁正切求弧減象限淂丁己弧為乙角此用戊丙丁次形元形有甲乙甲丙次形有戊丙邊及戊角也求丙角法為丙甲之正弦與甲乙之切線若全數與丙角之切線求淂丙角庚壬弧用甲乙丙本形算一率丙甲正弦六四二七九二率甲乙切線一度七三二五三率全數四率丙角切線二度六九四五八求弧淂丙角庚壬弧六十九度三十八分又法丙甲之餘割即辛角甲庚弧正割與全數若甲乙之餘切即乙辛正切與丙角之餘切即辛壬正切求弧減象限淂丙角壬庚此用辛乙七次形元形有甲丙甲乙次有辛角及乙辛邊也求乙丙邊法為全數與甲乙之餘弦即戊角甲己正弦若甲丙之餘弦即戊丙正弦與乙丙之餘弦即丙丁正弦得丙丁弧減象限淂乙丙邊此用戊丙丁次形元形有甲乙甲丙即次形有戊角及戊丙邊也一率全數二率乙甲餘弦五三率甲丙餘弦七六六四四率乙丙餘弦三八三二淂乙
