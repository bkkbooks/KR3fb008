body:
  text: 非中暦先推太陽躔度至春分之日彼亦茫然無處以得支干合于中國所用歲月也況其暦元已暦千年不可復用乎兹惟新暦增修古法叅以西國數千年之測算更加新測以廣古法之未偹其立法致用俱極精詳用以合天如操左券我朝欽定為時憲暦日頒行天下敬授人時誠度越前否億萬斯年永永不爽云
