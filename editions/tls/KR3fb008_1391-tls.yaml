body:
  text: 周歲三百六十五日二四二一八七五紀法六十金星每日平行三千五百四十八秒小餘三三五一六九與太陽平行同金星最高每日平行十分秒之二又七一九五金星最高每歲平行一分二十二秒五十七㣲以周歲除之淂每日平行一十三㣲三十七纎三十五忽四十芒以秒法通之即淂金星伏見每日平行二千二百一十九秒小餘四三一一八八六金星伏見每日平行三十六分五十九秒二十五㣲五十二纎一十六忽四十四芒以秒法通之即淂金星本天半徑一千萬金星本輪半徑二十三萬一千九百六十二
