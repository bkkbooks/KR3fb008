body:
  text: 太陰最髙天辛丁為最𤰞天乙戊為地平設月在最距地為未乙當初出地平在丁其寔度在戊而人目從癸視丁則見視度在巳而戊巳為地平上最大髙𤰞之差若月髙度至未其寔度在亥亥戊為寔髙而視度在申申戊為視髙亥申為丁未髙度之髙𤰞差若月在最髙天距地為午乙當出地平在午寔度原在戊而視度在壬戊壬為視差但比最𤰞時戊巳則小故髙度同而距地不同所生視差大小亦異如月至天頂其髙弧九十度則寔度與視度合為乙甲一直線無視差矣求之如月在未用乙癸未三角形有乙癸地半
