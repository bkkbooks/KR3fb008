body:
  text: 小半其影為漸大而無窮甲為明骵乙為暗骵甲發光以戊辛巳弧乙受光以丙壬丁弧戊辛巳必大于丙壬丁施大受小其所生癸影為漸展而無窮一明暗两骵等彂光受光各一半其影為平行而無窮如甲乙明暗两骵相等其發光受光必各半周所生癸影為平行而無窮一明骵大暗骵小發光以小半受光以大半其影為角骵漸小以趨盡如甲明骵大乙暗骵小甲發光以戊辛巳弧乙受光以丙
