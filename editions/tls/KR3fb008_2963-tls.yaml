body:
  text: 水星距限表水星距限表按正交中交分順逆列之初宮至五宮為正交後列於上六宮至十一宮為中交後列於下水星距交實行在上六宮者用順度在下六宮者用逆度用表之法以距交實行之宮對距交實行之度其縱橫相遇卽所求之距限也表分南北兩限依星在黃道之南北取用水星次輪面與黃道相交之角南北不同故分列兩表設水星距交實行一宮二十二度星在黃道北則察黃道北
