body:
  text: 而必不見生光復圓在暮為不見初虧但見食既或並不見食既而但見生光復圓若月出入時刻在食甚後其所帶食分為退在朝為見初虧食甚不見復圓在暮為不見虧與甚但見復圓若食既者在朝為但見初虧食既食甚生光不見復圓或並不見生光在暮為不見初虧食既食甚生光但見復圓或並可見生光
