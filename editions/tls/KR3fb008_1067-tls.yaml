body:
  text: 伏巳為退合星行伏見輪上前六宮緯北後六宮緯南在初宮庚與六宮巳無緯在三宮壬與九宮癸有大緯此一周之緯度有似諸曜本道交黃道之象在乙亦然故立算遂以甲點命為正交乙點命為中交此點金星恒在最高前十六度水星恒與最高全度其寔不遇命名為交非真交也夫甲與乙既命為交則甲丁乙線可命為兩道交線內與戊亦命為大距度辛甲丙甲命為輪心距交之度如上三星法當輪心仕甲則子午樞線與交線甲乙合為一輪心在丙距交線最遠其子午槿線又恒與交線為平行至輪上大距處之壬癸線伏見輪交俱本道之大距與子午樞線直角壬癸線不在本道平面上半在本道北下半在本道南輪心在甲與交線亦為直角在丙與丁醜線為斜
  hash: sha256:b8defe4a473f3a6bbc98e85471984ac35c9c5f6f4f6015a1407a9b7d49da079b
