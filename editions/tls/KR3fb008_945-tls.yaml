body:
  text: 角測淂四十四度四十八分乙丁辛角測淂四十七度二十分多祿其測乃人目所見金星視行距太陽平行之度也甲丁庚形有丁角大距伏法置庚丁為全數求丁角之正弦淂庚甲七四六三次丁乙辛形有丁角大距置丁辛為全數求丁角正弦淂乙辛七三五三一測庚甲乙辛小輪半徑有二數庚甲乙辛皆為伏見半徑本相等用變率法以求乙辛丁辛與庚丁為同類法乙辛與甲庚若丁辛全數與丁辛九五八二七則甲庚丁辛三線為同類以庚丁辛丁相加折半淂庚已用減庚丁淂已丁二八六次置庚
