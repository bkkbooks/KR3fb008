  text: 金星距地表金星距地表以伏見實行宮度求星距地以引數宮度求距地差初宮至五宮列於上六宮至十一宮列於下前列順度後列逆度中列逐宮逐度之星距地及距地差星距地者次輪心在最高金星行次輪周逐宮逐度之距地心線距地差者乃金星次輪心自最高至最卑逐宮逐度之距地心線與最高距地心線之較也宮在上者用順度宮在下者用逆度用表之法設伏見實行為一宮二十度求星距地則察一宮二十度與星距地所對之數為一五七八八
