body:
  text: 度数略相等也今求黄平象限及黄道高弧交角舆舊法同而推高弧立算較捷盖舊術以太陽午正高度爲主先定距午時刻及太陽距赤道南北然後依各方北極出地度算之今法一以黄平象限之高度爲主依太陽距黄平象限之逺近用一直角形可得而作表亦甚簡也如圖甲爲天頂丙甲乙爲子午圈乙丙爲地平丁爲赤極丁丙爲極高戊已庚爲赤道辛爲黄極壬癸丑爲黄道已爲春分丑爲黄道交西地平之點壬爲黄平象限距丑九十度壬癸爲黄平象限距午度壬寅爲黄
