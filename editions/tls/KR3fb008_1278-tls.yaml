body:
  text: 分數乃以六十分妝為一時十五分妝為一刻不滿十五者為分自單位以下則以一百與六十為比例淂秒再比例淂微命時之法時從子正起算一時為二十四時周歲三百六十五日二四二一八七五周歲三百六十五日五時三刻三分四十五秒將時刻分秒用周日一萬分通之淂二千四百二十一分小餘八七五即歲寔也紀法六十宿法二十八太陽每日平行三千五百四十八秒小餘三三零五一六九太陽每日平行五十九分零八秒一十九微四十九纎五十一忽三十九以秒法通之即淂最卑每歲平行六十一秒小餘一六六六六最卑每歲平行一分零一秒一十微以秒法通之即淂
