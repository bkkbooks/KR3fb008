body:
  text: 影而加大也譬如眼鏡本無厚之體徒以變昜物象顯其用耳且氣影之于地影亦何能加長加大乎計清蒙出地之高不能遇極高之山而極高之出測具垂線不能遇于四百步大地之徑則三萬里以高山之步數化里而較地徑特五千分之一耳此氣之厚何能加于地徑而有妨于地徑測量之法乎二日月體當食而成赤色是氣影所生月全食時其光色徃更迭變易其初食既與未生光當此二際則成赤色夫月入地影果必失光宜為純黑不應復顯他色今赤色者或疑月之本光不知天下次光之物惟無光之處能顯其光一遇大光之體則次光悉泯今以地影言之月居其甚厚之際即甚遠于大光果有本體
