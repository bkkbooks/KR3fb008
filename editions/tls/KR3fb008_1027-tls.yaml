body:
  text: 點距日最遠金星為四十八度水星二十六度所謂大距也即最大次均設星伏見平行為邜申辛弧星在辛退合後求次均法先於伏見平行內加邜癸丙角邜午線既恒與巳甲平行則丙癸邜角即戊甲癸初均角但此初均以自行度論之引數在前六應減平行而淂寔行而在伏見輪上反應加伏見平行而得伏見寔行加減之號恒與初均相反以兩平等線所生角骵之勢使然也得丙申辛伏見寔行從丙起算次作癸辛甲辛線成辛甲癸形形有辛癸伏見輪半徑有癸甲輪心距地心線有辛癸甲角伏見行減半周之餘申辛弧求癸甲辛角得未壬弧為次均數用以減至庚未寔經淂至庚壬作為星視經度測金星伏見行測金星伏見輪上之行宜擇星近太陽非留行及大距度之處蓋
