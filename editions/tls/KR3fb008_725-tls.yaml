body:
  text: 不見食之地幾何更求相距幾何地即見食漸差一分大概依視差推算皆一𠚤可得舄推定望月食定望與日食定朔理同先求日月兩平行相距六宮為平望次以平望時日月兩均數或較或并得距弧化為時刻以加減平望為寔望再以平望至寔望時分內日月所行引數平行復求均數得次距弧化時加減平望即為定望末以黃赤升差時分即加減時表加減定望得定望視時即人目可見食甚時分也盖月食地居日月之中月入地影大專可共見無高卑南北東西等差故寔望即為視望又因望時無次輪之行故不用次均數次以定望時求月
