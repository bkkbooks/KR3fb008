body:
  text: 線一二一三四一三八求弧得丙乙五十度三十分加丙癸淂乙癸九十五度三十分為冣髙距春分之經度減癸甲九十度存乙甲五度三十分淂冣髙在夏至後五度三十分冣卑在冬至後五度三十分戊壬両心差古今累測之皆古逺今近其根另見別說測最髙行之度分太陽行本天既有最髙卑之二㸃但此㸃非一㝎不移年年皆有行動西史多祿某于晋永和七年庚辰測最髙在寔沈宮五度三十五分後于唐禧宗廣明元年庚子測在寔沈二十二度十七分明弘治元年戊申測在鶉首五度十五分十秒至萬暦年間測淂在鶉首五度三十分法計両測中最髙行之度以積年為法而一淂最髙㸃每歲東行四十五秒後康熙十九年庚申改測淂在夏至後七度十分一十秒每年東行定為一分一秒七微三十三纎今用以立表求太陽加減差舊名盈縮差太陽本天既與地為不同心則有加減之差盖本圈上之平行與人目所見黃道上視行之差也如前春分至立夏人目見太陽行黃道度四十五經度其在本圈則行四十五度二十七分三十四秒此兩行之較為加減差或曰視平両行之差亦名均數太陽自最髙下行至最卑半周視行恒不及平行應減從最卑上行至最髙半周視行恒大于平行應加在冣髙卑二㸃則平行與視行同
