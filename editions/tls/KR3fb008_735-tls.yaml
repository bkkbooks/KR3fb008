body:
  text: 算法如前一啚甲乙為影半徑與乙丙月半徑并得甲丙為食限內減去甲丁寔距度存丁丙為距緯餘數與乙丑等何則丁丑與乙丙等同用乙丁則丙丁與乙丑必等而乙丑即月入地影之數壬丑為太陰全徑乙丑即為月食分第此食分有二類一為天度之分一為曆家所命之分以天度之分而論如丑壬全徑約三十分則亦丑為三址分之幾二啚為三十分三啚邜丙為一度四分若以命分論先以丑壬月全徑命為十平分古法命十二分而乙丑為十分中之幾二啚為食既三啚約食二十分今推算食分皆以丑壬命為十平分以求乙丑法丑壬視全徑與十分若乙丑距緯餘數與食分也如無距度者如三啚即以太陰視全徑與十分若邜
  hash: sha256:75dd9a798ad8a943819163c6cf07259d4152bcbd239174a6c33df7b9690c6ac4
