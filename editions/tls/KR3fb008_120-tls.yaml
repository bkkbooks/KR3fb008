body:
  text: 又法全數與乙甲之餘割即戊角己甲正割若乙角之餘切即戊丁正切與甲丙之餘切即戊正切淂丙甲邊此用戊丁丙次形元形有乙角乙甲邊次形有戊角及戊丁邊也求乙丙邊法全數與乙角之割線若乙甲之切線與乙丙之切線淂丙乙邊用甲乙丙本形一率半徑二率乙角割線一度三九二四一三率乙甲切線一度七三二五四率乙丙切線二度四一一八八淂六十七度二十九分為乙丙邊又法全數與乙甲之餘切即戊角已甲正切若乙角之餘弦即戊丁正弦與乙丙之餘切即丁丙正切淂丙乙邊此用戊丙丁次形求丙角法全數與乙角之正弦即辛乙壬角正弦若甲乙之餘弦即乙辛正弦與丙角之餘弦即辛壬弧正弦辛壬為丙外角庚壬弧內減庚辛九十度之餘與乙丙甲之餘角等淂丙角此用辛乙壬次形元形有乙角乙甲邊即次形有乙角及乙辛邊也一率全數二率乙角正弦六九五八八九三率甲乙餘弦五四率丙角餘弦三四七九五淂六六十九度三十八分為丙角即子庚弧又法全數與乙甲之餘弦即癸戊庚角之正弦也若乙角之正弦即戊癸正弦與丙角之餘弦即癸庚正弦癸庚為丙角子庚弧九十度之餘淂內角此用癸戊庚次
