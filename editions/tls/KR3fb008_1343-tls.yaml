  text: 土星最高應十一宮二十八度二十六分六秒五微土星正交應六宮二十一度二十分五十七秒二十四微推木星用數康熙二十三年甲子天正冬至為曆元周天三在暗夜址度入算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二一八七五紀法六十木星每平行二百九十九秒小餘二八五二九六八木星每日平行四分五十九秒一十七微七纎四忽七芒以秒法通之即淂
