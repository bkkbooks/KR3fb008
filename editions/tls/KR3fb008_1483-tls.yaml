body:
  text: 求影差用交食視半徑表以太陽寔引宮度察其典影差相對之分秒淂影差求寔影半徑置地影半徑減影差淂寔影半徑求并徑以太隂半徑典寔影半徑相加淂併徑求食分以太陰半徑倍之為一率十分為二率并徑內減食甚距緯餘為三率求淂四率即食分滿六十秒進一分在十分以外為食既
