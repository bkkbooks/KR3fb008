body:
  text: 積為法而一得一十三度十三分四十五秒三十九微四十九纎為太隂一日距交之平行度也既淂此三種行度即以太隂一日之平行與一日之距交行相減淂三分十一秒為兩交一日逆行之度自東而西以歲周乘之淂每年退天十九度十九分四十三秒即正交行也又以月一日之平行與一日之自行相減淂六分四十一秒五微為月孛每日右行之度即月之最髙行也次以每日諸行率累加之淂周歲各日之平行又以一日之各平行為寔二十四小時為法除之淂每時刻各種之平行以列表上諸率皆依巴谷古測所定後多祿某歌白泥苐谷等各加宻測仍用試法數端所定諸率自秒以下小餘各家不同今月離表用第谷新法然與古測亦不甚相逺各率如下朔策二十九日五十刻一十四分三秒九微半之為望策轉終二十七日五十三刻三分三十四秒四十一微交終二十七日二十刻五分三十三秒四十八微月平行十三度一十分三十五秒一微自行一十三度三分五十三秒五十七微距交行一十三度十三分四十五秒三十九微月孛行六分四十一秒四微正交行三分一十秒三十七微距太陽平行十二度十一分二十六秒四十一微
