body:
  text: 求正交年根以積日與正交每日平行一百九十秒六四相乘滿周天一百二十九萬六千秒去之餘為積日正交平等與正交應六宮二十七度一十三分三十七秒四十八微相減正交應不足減者加十二宮減之淂正交年根上考往古則置正交應加積日正交平行淂正交年根正交逆行故上考反加下推反減求太陰日數以所設日數與太陰每日平行四萬七千四百三十五秒零二一一七七相乘淂數為秒以宮度分妝之淂太陰日數求月孛日數
