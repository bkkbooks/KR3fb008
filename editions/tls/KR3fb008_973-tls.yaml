body:
  text: 伏見輪如圖戊為地心辛癸為太陽天酉為冬至外圈為星平行天丙為最高設星引數為甲丙依前法作本輪均輪星在乙求乙戊甲角得甲亥弧為初均因得酉亥為寔經度此自行本法也今星與大陽遠近更有順逆之行則乙戊線不足定星之經度又以乙為心用乙巳為半徑
