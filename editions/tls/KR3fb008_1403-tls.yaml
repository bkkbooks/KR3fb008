body:
  text: 求積日置中積分加氣應分六五六三七四九二六不用日減本年天正冬至分亦不用日淂積日上攷徃古則置中積分減氣應分加本年天正冬至分淂積日求金星水星年根以積日與金水每日平行金星每日平行三千五百四十八秒三三五一六九水星同相乘滿周天一百二十九萬六千秒去之餘為二星積日平行加金水平行應金星為二十分一十九秒一十八㣲水星同則置金水平行應減積日平行淂金水年根求金水最高年根
