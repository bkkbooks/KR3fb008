body:
  text: 庚分處戊為丙戊庚乙戊庚兩直角十七一直線全在圈外止遇圈以一㸃名切線從圈心作線至切處必為直角如甲乙一直線止切圈界于丙此外不復相遇名為切線若從圈心丁向丙作丁丙線其丁丙甲丁丙乙必為直角因此推之凡圈內直線與切線為直角者其線必過圈心十八圈內惟過心線極大餘逺心漸小于近心又左右距心等其兩直線必等所截兩圈分亦等作負圈角兩角亦等如甲壬乙圈丁為心圈內線惟甲乙戊壬極大餘如巳庚丙辛漸逺心漸小漸近心漸大盖不過心之線任作之必無有等于過心者又如二圖甲為圈心設甲癸甲壬左右距心等其丙丁戊巳二線必等所分丙乙丁戊庚巳兩圈分亦等又以丙丁戊巳為底作丙辛丁戊子巳兩負圈角亦必等盖圈內之兩直線等即距心之逺近等所割之圈分亦等反之所割圈分等即両直線必等論比例二十五則一比例者兩幾何以幾何相比之理両幾何者或両數或両線或両面或體各以同類大小相比言
