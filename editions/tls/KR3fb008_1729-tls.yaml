body:
  text: 在兩交點者淂数少差而入筭則甚簡盖食限距交不遇一十六度食限距緯不遇一度太陰正當黃道者其数本同雖不正當黃道者而淂数亦畧相等細推之法如圖甲為天頂乙甲丙為子午圈外大圈為地平丁為赤極戊為黃極黃庚為黃道辛為黃平象限壬為白極白子為白道丑為白平象限設食甚用時太陽在寅辛寅為太陽距黃平象限東之度寅庚為其餘辛邜為黃平象限距地平之高即庚角度寅辰為太陽高弧庚寅辰角為黃道高弧交角設食甚用時太陰遇正交後如午食甚交周遇正交後五度五十八分三十九秒如午未食甚交周白道度也寔朔交周遇正交後六度如寅未寔朔交周黃道度也解見後則午申為太陰高弧子午申角為白道高
