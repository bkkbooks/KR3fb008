body:
  text: 南西南北差表南西南北差表以交角及高下差分順逆列之交角自一度至四十五度順列於前自四十五度至八十九度逆列於後中按高下差分數列逐度東西南北差之分秒順度用上東西南北差逆度用下東西南北差用表之法以高下差之分對交角之度其縱橫相遇即所求之東西南北差也設高下差三分交角二十五度求東西南北差則察高下差三分與交角二十
