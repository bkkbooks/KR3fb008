body:
  text: 與乙巳本道緯度之正弦淂乙午弧為初緯即乙甲巳角也次全数與初緯之正弦若乙甲距地心線與乙巳變乙巳正弦與乙甲為全數邜戊為寅邜弧距合伏度之正弦戊乙其餘弦各與寅乙歲輪半徑相乘全数除之淂邜戊乙戊兩線俱變與歲輪半徑為㒰類乃用戊乙甲形求戊甲形有戊乙有乙甲有戊乙甲角戊乙甲為未乙甲之外角而未乙甲角與乙甲午角等即初緯也求淂戊甲邊次用邜戊甲直角形戊為直角戊甲為股邜戊為勾求淂邜甲為歲輪上星距地心線未作邜壬線與乙巳平行而等又作壬申線在黃道面成邜壬申直角形壬為直角即邜甲壬角為星在邜之視緯此形有邜甲星距地有邜壬法以甲邜與邜壬之比若全数與邜甲壬角之正弦求弧淂視緯度也列來乙巳正弦即星距黃道線也邜甲即星距地数也俱命乙
