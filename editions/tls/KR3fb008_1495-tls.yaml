body:
  text: 推月食方位及食限總時求春分距午時分用交食北極高四十度黃平象限表以太陽黃道經度察黃道宮度取其典時分所對之数為太陽距春分厚時分又以食甚時刻加減十二時不及十二時則加十二時過十二時則減十二時為太陽距午正後時分两数相加加滿二十四時去之用其淂春分距午時分春分距午時分者食甚時春分距正午後赤道度相應之時分也求月距限用交食北極高四十度黃平象限表以春分距午時分察表內時分相近者取其典黃平象限相對之数為黃平象限宮度典太隂
