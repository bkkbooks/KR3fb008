body:
  text: 弧必至辛乃入地平而自申至辛為夘酉前後各刻高弧也求之用地平下相對之辰申巳形立筭法以所設距午時刻在二十四刻之外如戍初太陽在未距午二十八刻化度淂癸未弧用减半周淂辰未取其餘弦即未申弧正弦因辰已半数即亢寅淂丙未以减丙㐪夘酉正弦即申午餘未㐪為戊初初刻高弧之正弦今本表従極出地十八度起至四十二度止推太陽南北緯度距午各刻之高弧立表用三角形法求寔會時高弧其理不異如啚外圈鳥干午圈已壬為地平辛為北極丁為天頂戊丙庚赤道丑子為黄道設寔會
