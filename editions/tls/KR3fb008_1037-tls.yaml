body:
  text: 之差矣如圖丁為地心丙為本輪心置歲輪在最高乙設距日度為甲辛求淂乙丁辛次均角即表中甲辛弧下所書也次置輪心在最卑戊設距日度癸辛與甲辛等求淂戊丁辛為次均角則大子乙丁辛角夫同一距日弧當乙最高則乙丁辛角為小在戊最卑則戊丁辛角為大可知次均因乎本天之高卑以為大小也高卑兩角之較為辛丁辛角即表中甲辛弧下所書之較分
