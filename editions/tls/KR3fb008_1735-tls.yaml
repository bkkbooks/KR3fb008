body:
  text: 限之東西隨時定之東西南北差新法曆書推筭南北東西差以黃平象限為本盖太陰在黃平象限東者視經度恒差而東在黃平象限西者視經度恒差而西差而東者時刻宜減差而西者時刻宜加故日食之早晚必徵之東西差而後可定也北極出地二十三度以上者黃平象限恒在天頂南太陰之視緯度恒差而南若極出地二十三度半以下者黃之平象限有時在天頂北太隂之視緯度即差而北差而南者寔緯在南則加在北則減差而北者寔緯實緯在南則減在北則加故日食之淺深必徵之南北差而後可定也其法自黃極作兩經圈
