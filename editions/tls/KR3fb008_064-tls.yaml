body:
  text: 四率乙丁二丈九五五四四三四率甲丁五尺二寸九五既得乙丁甲丁次用乙丁乙丙勾弦自乘相減開方得丙丁邊八丈一尺一七二五內減去甲丁餘七丈五尺九寸六分三厘為甲丙邊第二法有一角兩邊具邊連鈍角求餘角餘邊甲乙丙鈍角形有甲鈍角一百度有甲乙邊三丈有甲丙邊七丈五尺九寸六分三厘求乙丙兩角法以甲丙甲乙兩邊相加為一率又相減為二率甲鈍角之餘度半之取半角切線為三率得四率半較角切線查弧用以加半角得乙大角減半角得丙小角此切線分外角術也如啚甲乙丙鈍角形取甲乙小邊為半徑作夘乙寅半圈得乙寅弧為鈍角之度作甲辛線與乙丙平行得夘甲壬角壬夘弧即元形之丙角乙甲壬角乙壬弧即元形之乙角乙夘弧為甲外角之度又作甲庚線平分乙夘弧于庚則庚夘庚乙各為外角之半數庚癸為半外角切線庚丑仝夘丁為夘壬弧正弦乙戊為乙壬弧正弦乙夘為兩角并之通弦又取庚子與庚辛等作甲子線得乙未弧亦與夘壬等夫三角形各角之
