body:
  text: 一目見物僅䏻㝎其似大小凢目接于物物諸分皆發本象来至于目目則全妆其象夫妆象者非在目之外郛也睛本圆球有同鳥卵重重包裹妆象之豦在其最中謂之瞳心若目視物之四周則四和線發来至瞳心合而成角為角骵之形若視物之两端腰線彂来至瞳心合成三角靣之形凡角之末銳必在瞳心名為視角角之大小稱物之大小若視角極微目不見物乃不䏻㝎其大小若視角過大則目眶所限不䏻盡角之廣必移目两視乃淂全見故凡目之見物皆為瞳心之視角而非物之真像也一同是物在近見大在遠見小以三角形之理明之甲乙丙丁两物本等大而丙丁近目則丙目丁視角為大甲乙遠目則甲目
