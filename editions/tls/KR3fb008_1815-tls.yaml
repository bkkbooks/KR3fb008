body:
  text: 遠近線未為合伏乙為退合未乙二點俱在本道面上然因次輪而與本道斜交自地心計之星雖與未乙遠近線㕘宜而合是星寔在巳昂子未點之上退合星寔在辛低于乙點之下其合伏巳點距子交之度恒與輪心距正交之壬寅弧等今設伏見寔行為巳午星在午法先以巳午弧與巳子即壬寅弧相加淂子午為星距次交度午酉為距次交度正弦即丑午弧正弦壬酉其餘弦從午作午丁線即午丁為次緯丁點在黃道面上午甲為星距地心又作丁甲黃道面線即午甲丁角為星之視緯求之以丙壬戌午酉丁兩宜角形全数與壬交角之正弦若午酉距交正弦與午丁次緯之正弦次全数與壬交角之餘弦戊壬若午酉正弦與丁酉次緯餘弦乃以午酉午丁丁酉壬酉三弦各
