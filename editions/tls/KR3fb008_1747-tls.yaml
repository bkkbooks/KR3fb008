body:
  text: 求淂用時則可以東西差求近時與真時既有寔緯則可以南北差求視緯故日食之分秒時刻雖不以用時與寔緯而㝎而寔以用時與寔緯為入筭之本也如圖甲乙為黃道甲丙為白道甲為正交甲巳丁為太陽巳為太陰甲巳為寔朔交周與甲丁等故巳點為寔朔用時之度然丁巳相距猶遠必自白極遇太陽丁作丁戊垂弧與白道成直角則丁戊之距必近于丁巳故戊點為食甚用時之度甲戊為食甚交周丁戊為食甚寔緯戊乙為交周升度差求之用甲丁戊正弧三角形有戊直角有甲交角四度五十八分三十秒有甲丁邊依法求淂甲戊弧為食甚交周丁戊弧為食甚寔緯以甲戊與甲巳相減淂戊巳升度差以與太陰一小時
