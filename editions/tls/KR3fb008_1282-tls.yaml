body:
  text: 最卑點遇冬至之度分也推日躔法求積年自曆元康熙二十三年甲子距所求之年共若干年減一年淂積年積年者乃所求本年天正冬至距曆元甲子年天正冬至之年數因本年初交天正冬至尚在歲前故減一年求中積分以積年與周歲三百六十五日二四二一八七五相乘淂中積分中積分者乃所求本年天正冬至距曆元甲子年天正冬至之日分也求通積分置中積分加氣應七日六五六三七四九二六淂通積分上攷徃
