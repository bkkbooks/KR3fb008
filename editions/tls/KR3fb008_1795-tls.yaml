body:
  text: 星圈甚大包日天之外故常在日上火星圈亦大但不能包日天而割入日天之內故有時在日之下金水二星圈甚小不惟不能包日天并不能包地故不能沖日然金水之本天即日天此圍日者乃其本輪也土木火亦各有本天此圍日者乃次輪上星行距日之跡也土木二星之本天大次輪小故星行歲輪轨迹所成圍日之象全在日天外距日遠近亦畧相等火星之本天小于上木二星之本天而次輪則甚大其次輪轨迹所到成圍日之象悉與土木同但因次輪大沖日時割入日天之內星行至此即在日之下也五星交周
  hash: sha256:e46ba36bbb07385577281df317fd4d5b9c68ec2b81c9f35ce43d29474d3c98a7
