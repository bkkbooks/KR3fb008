body:
  text: 五度以外为左偏下適足九十度为正左过九十度为左偏上太陰在限西者初杅㝎交角在四十五度以內為上偏左在四十五度以外為左偏上適足九十度亦為正左過九十度為左偏下求復圓方位太隂在限東者復圓定交角在四十五度以內為上偏右在四十五度以外為右偏上適足九十度為正右過九十度為右偏下太陰在限西者復圓㝎交角在四十五度以內為下偏右在四十五度以外為右偏下適足九十度亦為正右過九十度為右偏上京師北極高四十度故月食方位皆以黃平象限在天頂南而㝎若北極高二十三度以黄平象限有時在天頂北則月食方位之左右典此相及
