  text: 次均輪半徑一十一萬七千五百朔望黃白大距四度四十八分三十秒兩弦黃白大距五度一十七分三十秒黃白大距中數五度零八分黃白大距半較九分三十秒氣應七日六五六三七四九二六太陰平行應一宮零八度四十分五十七秒一十六微太陰平行應者曆元甲子年天正冬至次日子正初刻太陰本輪心距冬至之平行經度也月孛應三宮零四度四十九分五十四秒零九微月孛應者曆元甲子年天正冬至次日子正初刻最高遇冬至之度分也太陽從最卑起算月五星皆從最高起算
