body:
  text: 法曰所有形若三角俱等如一啚乙丙丁形其三邊亦必等即從乙作乙甲垂弧必平分丙乙丁角亦平分丙丁邊用所分兩直角形算之若兩角等如二啚丁乙丙形腰間丁丙二角等即相對乙丁乙丙兩邊必等從乙不等之角作乙甲垂弧平分丁乙丙角亦平分丁丙邊于甲然後用兩直角形算之又若所有三角俱為直角其邊必皆九十度不必算若三角俱鈍其邊必皆九十度外用次形算之如三角俱銳其邊必皆九十度內即用本形作垂弧算之兩角相等仝理若三角俱不等如丁乙丙形則用前第五易形法以元形之三角易為次形之三邊算之如丁乙丙元形易為壬己甲次形其元形之丁角戊午弧易為次形甲己邊元形乙鈍角之餘庚夘弧易為次形甲壬邊元形丙角甲子弧易為欲形壬己邊然後以甲壬己形依鈍角第五術求甲角淂戊庚弧戊甲庚與壬甲己為交角自等即元形丁乙邊求壬角淂夘子弧即元形乙丙邊求己角淂其餘午申弧即元形丁丙邊邊角互易觧曰凡相對兩直角旁之兩弧引長之必相交于九十
