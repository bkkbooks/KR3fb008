body:
  text: 辰亦必平分甲戊線于亥庚亥丁為直角以甲戊半之淂度七三四七九加戊丁淂亥丁十一度五四九八九則庚亥丁直角形有庚丁有亥丁有亥直角庚丁與亥丁若全數與庚角之正弦度九九八二六一求弧淂壬辰八十六度三九一八減半周淂辰己九十三度二四二次以甲戊弧半之淂甲辰四十七度一七三減辰己存甲己四十六度三一二為第一食太隂自行距最髙之度用減甲乙存己乙六十四度一七四八為第二食太隂距最髙之度以己乙并乙丙淂己丙一百四十五度五三四八為第三食太隂距最髙之度求庚壬本輪半徑形內甲戊戊丁己壬壬丁戊丙五線俱與後乙丙一三六八為同類今求庚壬先以庚丁命為本天半徑十萬變庚壬半徑與為同類即淂則庚丁十一度五七與庚丁全數若庚壬一度與庚壬八六四三乃本輪半徑之數也為本天半徑十萬分之八千六百四十三後第谷等更加宻測定為八千七百又以均數反覆比量取其三之一二千九百為小均輪半徑依此推算寔為合天測太隂第二均數古今測月行審有自行度與平行不合因立本輪法與自行加減以定朔望以正交食然其朔望之極大差不過五度此本輪之半徑也是知定朔定望時太隂恒在本輪之周矣其在上丁弦之差
