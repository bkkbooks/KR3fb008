body:
  text: 與乙角之正弦若甲丙之餘割與乙丙之餘割若并易前兩率則乙角之餘割與全數若甲丙之餘割與乙丙之餘割或四率皆易而不用半徑則乙角之餘切與餘弦若甲丙之餘割與乙丙之餘割也又如求乙角法為乙甲之正切與乙丙之正切若全數與乙角之正割今以三四率易為乙甲正切與乙丙正切若乙甲餘弦與全數如四率並易則乙甲餘切與乙丙餘切若全數與乙角餘弦或四率皆易不用半徑則乙甲餘切與乙丙餘切若乙角餘切與乙角餘割餘倣此推之曲線形四率互求之法曲線形之四論用反更等理交互推求其法無盡如甲乙丙形求乙角法為乙甲之正切與乙丙正切若全數與乙角之正割依法先易前兩率次易後兩率又次易為不用半徑又次四率皆易末四率並易又不用半徑己上共有六法如每法只行取一法如乙角餘切與餘弦若甲丙餘割與乙丙餘割先更之則乙角餘切與甲丙餘割若乙角餘弦與乙丙餘割再更之乙角餘弦與乙丙餘割若乙角餘切與甲丙餘割次反之乙丙餘割與甲丙餘割若乙角餘弦與其餘切又反而更之乙丙餘割與乙角餘弦若甲丙餘割與乙角餘切或甲丙餘割與乙角餘切若乙丙餘割與乙角餘弦亦仝如再
