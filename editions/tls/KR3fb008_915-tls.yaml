body:
  text: 巳癸角淂五十四度十二分壬辛弧也以減半周淂辛庚弧內減去戊辛弧戊丙弧之半存庚戊三十八度四十四分半加戊甲四十度四十六分共淂甲庚弧七十九度三十分半乃木星第一測距最高之度也加甲乙弧一二測相距平行淂庚甲乙一百七十九度二十五分半第二測木星距最高也又加乙丙二三測相距平行淂二百十二度五十一分半即星第二測自行距最高之度也十用上法求淂三測之自行距最高度與兩心之差次用不同心圈術求其均數以加減平行皆與三測之視經度不合乃改用大均圈及諸小輪等法求均數亦復不合則試而再試移最高點順天二度十五分兩心之差增為九一七乃與所測合因復算淂第一
