body:
  text: 丙與最大食分也太陰食甚前後時刻食甚前初虧也食甚後復圓也兩限之間時刻多寡其緣其三一在大陰距度因距度或多或寡每食不同即太陰入影淺深不同淺則時刻必少深則時刻必多其二在月及影之兩視半徑半徑小太陰遇之所湏時刻少半徑大太陰遇之所湏時刻多其三在太陰自行自行有時速有時遲雖距度同視徑同而自行遲疾不同即所歷時刻不同故欲得初虧復圓食既生光等時刻必合此三故乃可求也太陰虧復行度太陰入影自初虧至食甚之弧與其出影自食
