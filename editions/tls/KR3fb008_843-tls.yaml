body:
  text: 矩架下方架各識以號號宜同如一二等數是而以號數對各噐之度加輪盤所測之影因推太陽食時及向位食分諸用下方架東西邊所分各當二干分自後至中左右各當一干二百分置儀與子午圈對以太陽距正午左右相等之高度或先一日或測役考對對得架偏必差度或加或減于推測之度得地平正弧以測得地平弧即可推時刻以測分推度分法二千與測分若全數與地平弧之切線假如甲乙丙丁為下方甲丁乙丙每邊分二千戊丁戊丙各一千二百分戊壬正對子午圈亦二千當測得戊巳即七五一平分求戊辛弧則壬戊與戊已線若壬辛全數與戊辛弧之切線算得三七五五求弧
