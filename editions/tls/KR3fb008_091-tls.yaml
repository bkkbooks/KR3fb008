body:
  text: 一両大圈相交即作角二此大圈有彼大圈過其兩極則此兩圈之交必作直角若彼大圈不過其極則相交為斜角或銳或鈍乙丁大圈已甲為其兩極今有他大圈已丙甲甲辛已過甲己兩極則兩圈與乙丁圈相交必為己辛乙己丙丁直角若不過其極如壬庚圈則交處為壬癸丁庚癸丁斜角一銳一鈍三大圈之距兩極必各九十度前論大圈皆平分三百六十度則己乙甲己辛甲己丙甲乙丙丁諸半圈必各一百八十度夫大圈恒居兩極之中則甲已二極之距乙丁大圈其己乙已丙以及甲辛甲丁諸弧必各淂九十度故大圈之距兩極四周皆九十度而等又兩圈相交為直角必交互過其極如已丙乙為直角則甲丙己圈過乙丁圈之兩極甲與己而乙丁圈又過甲丙己圈之兩極也乙與丁為甲丙己圈之兩極四兩大圈相交上下交角必等左右相連二角并之與兩直角等甲乙兩大圈相交于丙其所作甲丙乙戊丙丁兩交角必等乙丙戊與丁丙甲亦等又甲丙乙乙丙戊左右二角并之必等兩直角皆與直線同理五凢角旁兩弧各引之至半圈必復相交其交角與元角等
