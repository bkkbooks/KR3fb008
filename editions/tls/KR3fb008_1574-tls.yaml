  text: 時太陰高弧按太陰距地限察其所對之数為太陰地半徑差两地半徑差相減餘為近時高下差求近時東西差用交食東西南北差表以近時白道高弧交角及近時高下差察其典東西差所對之数的近時東西差求食甚視行以用時東西差倍之減近時東西差餘為食甚視行求真時距分以食甚視行化秒為一率近時距分化秒為二率用時東西差化秒為三率求淂四率為秒以時分收之淂真時距分加減號典近
