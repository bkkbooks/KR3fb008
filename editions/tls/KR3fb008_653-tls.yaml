body:
  text: 弧為壬未與丁午等又寔會時太隂視度既在壬勢必退至未點方與太陽黄徑癸丁同度為相會則食甚時太隂骵不在丁而在未而前筭寔會時太隂在丁從黄極緯圈觀之則有丁未之降差北為南為南北差也盖高畀差既降高為畀而丁未隨之亦不潯不降高為畀矣故求視會必以壬未即丁午東西差化為時刻加減寔會而潯視會以丁未南北差加減寔緯而潯視緯東西為時刻之差使會有先後南北為緯鹿之差使食分有多寡也又此三差皆恒垂向下南北差恒偏南降高為畀也東西差中前以減中後以加亦降高為畀也又三差成一曲線小三角形因其弧甚小三邊俱不滿一度即當直線等午丁壬角與辛丁甲角等即前高弧圈與黄
