body:
  text: 秒嗣後累代測之每測漸小於前因知二道之距古逺今近無一㝎之度至明萬暦年間西史第谷造測器十具甚大甚準又算地之半徑差及清蒙氣差歲歲測候㝎為二十三度三十一分三十秒今宗用之測太陽最髙最卑所在太陽之行天必成全圈既成全圈必繞圈為平行其所經歴之歲月日時悉宜平等則從天正春分至秋分又從秋分至春分平分一歲其日時亦宜等乃從春分晝夜平至秋分歴一百八十六日有竒而平從秋分晝夜平至春分歴一百七十八日有竒而平相差八日有竒又人目所見太陽視徑冬至則大夏至則小夫見大必去人近見小必去人逺又冬至前後一日之行為疾夏至前後一日之行為遲行疾必近行遲必逺且漸疾漸遲非驟然遷變每日每時皆非平行今欲明其不平行之故而又不失為平行之理因悟太陽所行之圈必與地為不同心也如圖甲為地心乙丙丁為宗動天之黃道又任取壬㸃為心作庚已辛戊圈為日行之本天次作乙甲丁過地心線則庚辛為春秋両分戊已為冬夏二至若使両圈為同心者即庚戊辛半周辛已庚半周所淂圈分必等其經歴之時日亦等今不等必由不同心之故夫人目不在太陽本天之心壬而在宗動天之
