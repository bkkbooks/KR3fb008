body:
  text: 恒星行度新法暦書恒星圖表共星一千二百六十六分為六䓁第一䓁星一十七二䓁星五十七三䓁一百八十五四䓁三百八十九五䓁三百二十三六䓁二百九十五外無名不入䓁者四百五十九康熙壬子年欽天監新修儀象誌恒星亦分六䓁而其数又與新法暦書微異第一䓁星一十六二䓁六十八三䓁二百八四䓁五百一十二五䓁三百四十二六䓁七百三十二搃計一千八百七十八盖观星者以目之所能辨因其形体聯綴成象而命之名其微芒昏暗者多不可攷故各家星官之學有古少而今多著亦有古多今少者而惟列宿及諸大星則中外如一轍也至恒星之有
  hash: sha256:23f982aa59d19e6b7d776a654e2cd02f25772ed9727c456093ec443fe767bf6f
