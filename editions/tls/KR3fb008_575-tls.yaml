body:
  text: 三考求㝎日月本輪高畀之視径淂日在最高三十分最畀為三十一分月最高三十分二十秒最畀為三十四分四十秒其餘依法求其本輪上各度之視径立表至若蒙氣之差須各方密則未可預為定率也求日月本輪高畀各視径以太陽最高畀两視半径相减淂数為二率太陽在本輪其度之距地線與在最高距地線日一度三五八四月一度二九相减淂数為三率本輪全径日七一六八月五八為一率淂四率径差用加于最高時半径淂所求本輪上某度之視半径太隂同法太隂距地数太隂行本輪有高畀則距地心有遠近朔望時即前均輪上之月
