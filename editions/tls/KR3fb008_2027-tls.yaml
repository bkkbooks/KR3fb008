body:
  text: 太陰地半徑差表太陰地半徑差表按太陰距地與地半徑比例数分十限列之自距地五十三地半徑至距地六十二地半徑表內度分秒卽各限實高度所生之地半徑差也用表之法如太陰距地五十三地半徑推得太陰實高二十六度求地半徑差則察太陰距地五十三地半徑表實高二十六度所對之数為五十八分四十七秒卽所求之地半徑差與實高二十六度相減餘二十五度零一分一十三秒為本時太陰之視高也
