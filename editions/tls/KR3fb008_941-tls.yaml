body:
  text: 一測多祿某於漢順帝陽嘉元年壬申西三月初八日夕測金星在大樑宮一度半用昂宿比測當時太陽及星之平行為娵訾宮十四度十五分兩行之差為四十七度十五分乃金星距平行之大數也二測永和五年庚辰西七月三十是金星見東方則淂在寔沈宮十八度半用片宿第七星此測當時大陽及星之平行為鶉火宮五度四十五分兩行之較為四十七度十五分與一測等用兩測之兩平行相減淂中積為一百四十一度三十分折半淂七十度四十五分加於娵訾十四度十五分以減全用淂大樑宮二十五度其沖大火同度乃金星最高與最卑處也孰為最高尚未定之再用他測反覆比試見金星近大樑大距度少近大火大距度多因知大
