body:
  text: 以定交周查太陰距度表用中比例法得月寔黃緯記南北號視定交周宮度宮至五宮月緯在北六宮至十一宮緯在南置月寔黃緯以氣差加減之得視黃緯凡月寔緯在南以氣差加月寔緯在北以氣差減若寔緯在北而氣差大于寔緯當以寔緯轉減氣差為視緯其緯變北為南置前并徑內減去一分再以月視緯減之為并徑減距分如月視黃緯大于并徑不及減者則不食倍日半徑為一率十分為二率並徑減距為三率求得四率六十妝之為食甚分秒十四求初虧時刻
