body:
  text: 用月離太隂初均数表以太隂寔引宮度分察其所對之度分秒淂太隂寔均并記加減號求寔距弧太陽太隂兩寔均同為加或同為減者則相減淂距弧一為加一為減者則相加淂距弧求寔距時用交食周日諸平行表以寔距弧度分秒察月距日相當之数取其所對之時分秒淂寔距時㝎加減之法典距時同求寔朔置平朔加減寔距時淂寔朔加滿二十四時則寔朔進一日不足
