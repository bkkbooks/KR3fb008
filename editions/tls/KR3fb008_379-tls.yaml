body:
  text: 在南極入地度者反是今以京師極出地度取赤道左右四十五大星㝎其出沒中之時刻至太陽躔度則取各節氣之初度云如圖庚為天頂丙丁為地平圈乙為赤極子申為赤道大圈為子午圈設一星當出地平為已距赤道北赤緯為已戊法用甲己戊弧線直角形求其赤道上升降差形有戊已緯有甲赤道與地平交角即極髙之餘有戊直角甲角之切線與已戊之切線若全數與甲戊之正弦淂甲戊升降差次加差星緯南則減甲子九十度淂戊子即已癸也為星自出地平至午位之赤道度其自午至西入之度亦等化時即星自出至中之時分自中至設時分同今欲求星某時刻出沒法以本星赤經加升降差緯北則減為星斜升度又減之緯北則加為斜降度又以本日太陽距赤道緯求其升降差以加太陽赤經度北則減為太陽斜升度又減之北則加為太陽斜降度次以本星斜升度內減去太陽斜升度又減去太陽半晝弧以太陽升降差南減北加九十度為半晝夜弧餘度化時命午正起算淂本星出地時刻以出地時刻加星自出至中時分淂星在中時刻再加自中至沒時分淂西八時刻用以作表可淂各節氣昏旦之中星至夜中測時尤所必需也
