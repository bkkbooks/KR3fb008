body:
  text: 甲寅角餘一十五分五十三秒爲邜甲已角乃用邜甲已直角三角形已爲直角求淂甲邜爲一百又千分之一甲邜内减去舆丑寅相等之甲辰餘二十六小餘二二一爲辰邜于是以邜辰寅勾股形辰寅舆甲丑等舆邜甲庚勾股形爲比例淂甲庚二萬一千六百三十二即地影之長又以甲已庚勾股形舆丙丁庚勾股形爲比例淂丙丁六百三十七即太陽之光分爲地半径之六倍又百分之三十七也既淂丙丁太陽之光分又淂甲庚地影之長乃于甲庚内减太隂在最高距地心之甲已五千八百一十六餘已庚一萬五千八百一十六以甲邜庚勾股形舆午已庚勾股形爲比例淂已午七十三小餘一一又用甲已午直角三角形求淂甲角四十三分
