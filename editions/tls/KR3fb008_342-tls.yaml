body:
  text: 已為直角黃道交子午圈于丁而辛丁丑為斜角矣求之用甲乙丁曲線三角形形有丁甲午位黃道距春分之度有乙直角有乙甲丁両道交角依法全數與甲角之餘切線若甲丁弧之割線與丁角之切線得甲丁乙交角度列表從甲㸃春分起算表所載皆銳角以中國北極出地故不用乙丁戊鈍角也此為交食中求九十度限所用求日差日差者平日與視日之差也曷為平日宗動天即赤道左旋一周又過一度弱五十九分八秒即太陽一日東行之度共赤道左旋三百六十一度子午圈為界為一日恒如是無多寡也凡七政恒年經緯諸表皆以平日為宗視日者人目所見之日時太陽到某時圈上即為某時必與平日不等何則太陽每日東行一度乃黃道上之一度而非赤道之一度前算平日以赤道之一度為主而太陽寔由黃道則此一度內有両道升度之差矣又太陽每日東行之一度有盈有縮既有盈縮其所當赤道上之升度亦有多寡則此一度內又有盈縮之差矣夫人目所見日時總以太陽為主如太陽至子午圈上即謂之一日不必問其所旋度分若干或赤道所旋之度不及三百六十一度已為一日或過之猶未成一日叅差不等而前之平日恒以每日左旋三百六十一度為準鳥能合于目之所見乎假如甲
