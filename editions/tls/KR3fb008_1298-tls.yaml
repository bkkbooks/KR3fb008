body:
  text: 推入日出畫夜時刻法以半徑一千萬為一率北極高度之正切線為二率本日距緯度之正切線為三率求淂四率為邜酉前後赤道度之正弦檢表淂日出入在邜酉前後赤道度乃以一度變為四分十五分妝為一刻春分前秋分後為邜後酉前分以加邜正為日出時刻以減酉正為日入時刻春分後秋分前為邜前酉後分以減邜正為日出時刻以加酉正為日入時刻自日出至日入為畫刻與九十六刻相減餘為夜刻其各省日出入畫夜時刻俱依本處之北極高度立算京師北極高三十九度五十五分盛京北極高四十一度五十一分山西高三十七度五十三分三十秒朝鮮高三十七度三十九分十五秒山東高三十六度四十五
