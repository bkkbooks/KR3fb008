body:
  text: 輪在心本輪某度之較分與在最卑之較分若中分與六十分也蓋為本輪上自高至卑各度較分大小之公數如圖丁為地心乙丙圈為星本輪小圈為歲輪乙丁為輪心最高距地丙丁為最卑距地法以乙丁與丙丁相減淂乙丙為一率又以乙丙命六十分為二率如輪心在戊距最高為乙戊弧其輪心距地為戊丁線即求初均時均輪上距地心線即以戊丁即丁與乙丁相減淂乙巳為三率求淂四率乙巳即距最高乙戊弧相當之中分也故表相自行度分為引數
