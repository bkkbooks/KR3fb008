body:
  text: 以交角慶及月高下差查時氣差表以交角檢左直行以月高下差檢上橫行即得時差順度用上時差號逆度用下時差號以月寔行化秒為一率六十分化秒為二率時差化秒為三率推得四率數為近時距分置視朔以近時距分加減之得近時日在限西則加限東則減十一求真時置搃時以近時距分加減之得近搃時日在限西則加限東則減以近搃時查九十度表如前法取之得日距限記東西號以近搃時入九十度表如前法取之得限距地高用日赤道緯及近時如前法查高弧表得日距地高度
