body:
  text: 二表以首南緯與後北緯或首北緯與後南緯相較亦淂北加減分矣謹按水星後緯其伏見輪與本天之交角左右不等故後緯有四表如輪心在正交甲南半周交角極小北半周交角極大在中交北半周交角極小南半周交角極大若在交中距正交各九十度其南北二交角相等又北半周最大之角與南北周最大之角等兩小角亦然以此推其距線如上圖戊巳線最小與度三三四六最大為度四二九三中線為度三八一八兩交中處依此推算立表但以理揆之伏見輪之交本天左右兩角斷無不相等之事或以水星近日難測所淂之緯未能畫一抑西儒曆學
