body:
  text: 首朔太陽引數應初宮一十九度一十分二十七秒二十一微暦元甲子年首朔太陽距本輪㝡卑之行度也首朔太隂引數應九宮一十八度三十四分二十六秒一十六微暦元甲子年首朔太隂距本輪最高之行度也首朔太隂交周應六宮初度三十分五十五秒一十四微暦元甲子年首朔太隂距正交之行度也
