body:
  text: 六求寔交周以寔距時之時分檢四行時表時分下取交周平行兩數并之為交周距弧依寔距時加減號置交周平麼以交周距弧加減之得交周次平行置月寔均以加減交周次平行依均數加減號得寔交周寔交周隨視其宮度以辨食限凡陰曆宮十七度四十分以內五宮十二度二十分經外陽曆六宮八度二十度以內十一宮二十一度四十分以外寔交周入此限者并有食限外則不食七求躔離實度
