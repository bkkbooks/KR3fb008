body:
  text: 度二分太隂行至丁太陽己過丁而前又逐及之終和于己故丁己弧三十五分加乙丁共淂乙己中寔兩會相距二度三十八分也太陽食限太陽之視半徑最大為一十五分三十秋太隂之最大視半徑一十七分二十秒幷尋三十二分五十秒所謂二徑折半也以此推相值之交常為六度四十分是太陽不論視差不分南北正居寔會之食限也第日食有高畀視察惟正居頂則無太隂每偏而在下交會時以此差故或就近于太陽或更移遠隨地隨時
