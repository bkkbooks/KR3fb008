body:
  text: 從辛壬作两線切地球戊已两邊而交于癸則成戊癸已影而小于戊庚已影論其寔推筭之数爲真欲合仰覌則測量之数爲凖今用月食測淂太陽在最高太隂在中距地影視径爲四十四分四十三秒而推筭淂四十八分三十四秒相差三分五十一秒則太陽光大能侵削地影可知矣然不淂太陽之光分雖逐時測量猶有影差襍于其内則地影之大小終不能淂其真今立法以太隂
