body:
  text: 庚丁丁辛矩形與戊丁偕丁丙矩內形等以戊丁與丁丙八四二三相乘戊丙為戊乙丙弧之通弦一九七二九六減去戊丁存丁丙與庚巳全數自乘相減餘為巳丁上方開方淂二一八一六為巳丁兩心差七從巳與戊丙作垂線到圈周為巳癸壬平分戊辛丙弧於壬亦平分戊丙弦于癸成巳癸丁勾股形形有巳丁癸丁一四四一八戊丁內減去戊丙半戊癸淂癸丁求癸巳丁角淂四十一度十五分壬辛弧也以壬辛弧與壬丙弧八十度三十三分半戊丙弧之半數相減淂辛丙三十九度十九分減半周餘丙庚弧一百四十度四十一分為第三測火星自行距最高之內減去乙丙九十五度二十八分二三測中積之平行存庚乙四十五度十三分為第二測自行距最高之度又一
