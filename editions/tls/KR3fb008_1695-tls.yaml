body:
  text: 之大距為五度一十七分三十秒與新法暦書同依此立大距及交均表測月距地之髙用两地並測法于暢春園測淂太陰髙六十二度四十分五十一秒四十三微同時于廣東廣州府測淂太陰髙七十九度四十七分二十六秒一十二微于時月自行三宮初度月距日一百八十度即望時以之立法推淂地半径差二十七分四十九秒為中距限太陰髙六十二度有竒之差求其距地淂五十六地半径又百分之七十二為太陰在本天中距時距地心之遠乃依此法于月自行初宮初度月距日九十度時即上下弦測之淂六十一地半径又百
