body:
  text: 之經度以中限為宗下至地平為直角故論天頂則高畀差為正下南北差為斜下東西差獨中限一線為正下餘或左或右皆斜下論黄道則南北差恒為股東西差恒為勾高畀差恒為弦至中限則股與弦合為一線而高畀差即南北差又因限上無勾線而無東西差故黄道九十度線寔為三視差轉移之界舊法以子午圈為中限中前以减中後以加所推視會皆與天弗合今法以黄道出地最髙度為中限東西各九十度則是最高午限東則减使視食先于寔食限西則加淂視食浚于寔食而中限所在不同加時各有多寡而所推視會悉與天密合矣如圖癸為天項戊辛大圈為地平戊甲為子午圈邜為北極邜甲
