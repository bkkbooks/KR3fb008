body:
  text: 所求之月距日實行也設太陰引數為初宮二十四度求月距日實行則察初宮二十四度所對之數為二十七分五十七秒即所求之月距日實行也初宮在上故用順度若引數有零分者滿三十分以上則進作一度不用中比例因逐度實行所差甚微故也
