body:
  text: 即太陽在乙點之高弧其巳乙丁角即高弧與黄道之交角也求之用巳乙丁直角形丁為直角有乚丁太陽距中限之度以寔會時太陽所躔宮度與本時中限所在宮度相减淂乙丁日距中限度有丁巳中限距天頂法乚丁之正弦與丁巳之切線若全数與乙角之切線淂丁乙巳交角若太陽至中限丁即巳庚與巳癸合為一線成巳丁戊直角而無丁乙巳形故限上氣差即高畀差而無時差矣又中土丁癸中限距地最低不過二十七度北極出地四十度之地故従二十七度起求丁乙巳各交角之度列表乙巳為正交角表所載皆餘角則以戊乙丙直角减丁乙巳角即淂巳乙丙餘角亦即辰乙庚角也
  hash: sha256:c7ea3bd002d69a7a13ddf12fb18ab91fc9d93f539c788f55e87226271a054db2
