body:
  text: 如啚丁丙乙圈作四等邊內切形甲乙為半徑其丙乙上方形與丙甲乙甲半徑上兩方并等即勾股術也今兩半徑方形并為二開方淂一千四百一十四萬二千一百九十六為乙丙弧之弦乙丙弧為四分圈之一九十度則乙丙弦數為乙丙九十度弧相當之數宗率三圈內作三等邊切形求邊數法曰半徑上方形三倍之與三等邊形一邊上方等開方淂邊數如啚丁丙乙圈內作戊丙乙三等邊形乙丙為三等邊之一其乙丙上方與甲丁半徑上方之三倍等何則乙丙戊既為三邊等形則乙丙弧為一百二十度餘丙丁弧必大十度丙丁即六十度之通弦而丁乙為圈之全徑則乙丙丁形之丙角負半圈必為直角而淂丁丙乙為勾股形矣以丁乙全徑上方減去丙丁上方丙丁與甲丁等餘為丙乙上方而丙乙方必淂丙丁方之三倍即丁乙上方形四分之三法三因半徑即丙丁淂三三百萬萬萬開方淂一千七百三十二萬五八弱為乙丙一百二十度之通弦宗率四圈內作十等邊切形求邊數
