body:
  text: 宗率五圈內作五等邊內切形求邊數法曰六邊等形與十邊等形之各一邊上方形并與五邊等形之一邊上方等開方淂邊數如啚乙丙庚圈作五等邊內切形乙丙弧為五分圈之一七十二度乙丙其邊先以乙丙弧半于丁作乙丁線即為十邊形之一邊次自圈心甲作甲丁半徑成甲乙丁形又依乙丁線度作乙已線成丁乙已形與甲乙丁元形相似甲乙與乙丁若乙丁與丁已為連比例甲丁首率乙丁中率丁己末率其甲己亦與乙丁等夫乙已既與乙丁等則乙丙線必平分己丁于戊成乙戊丁勾股形乙戊五邊形之半為股丁己之半丁戊為勾乙丁為弦試依甲丁半徑度作甲辛正方形又依乙丙邊作乙癸正方形其甲辛正方內之甲五方為乙丁弦自乘之方甲已與乙丁等故其巳辛矩內形亦與乙丁弦自乘之方等丁辛與甲丁首率等則己丁末率與丁辛相乘自與乙丁中率自乘之方等其子寅矩形為乙丁弦自乘之一正方內少勾自乘之四正方子辛長方為首率與末率相乘之矩形與乙丁中率自乘之方等今子寅矩形較乙丁自乘方少一丑辛正方而丑辛正方實為戊丁勾自乘之四正方故子寅矩不足于乙丁弦自乘方者為勾自乘之四正方也是則甲丁半徑之甲辛方內有弦自乘之三正方而少勾自乘之四正方夫弦自乘之方骨原有一勾自乘之方今弦自乘之四正方內少勾自乘之四正方即與股自
