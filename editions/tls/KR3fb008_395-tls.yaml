body:
  text: 凡引數在前六宮丙亥庚均數用減後六宮庚壬丙均數用加以引數從丙最髙起初宮順天右行故也若七政在最髙卑之二㸃即引數初宮與六宮則丁己乙戊二線合為癸夘一直線無戊壬己角平行即寔行度若己午半徑與戊己丙心差為直角如戊午己形即戊午己角為最大均數子丑弧在引數三九兩宮前後但不正居三九宮初度以戊已午直角形之午㸃距最髙丙午弧己過一象限故也如戊已丙心差愈大即戊午己形愈近最卑又或作己辰線與戊乙平行辰㸃即平行所至辰己丁角為加減差丁辰弧丁㸃原為寔行度以辰已丁角與己壬戊角等故也故用戊己壬形有戊己有戊壬有壬戊己角求淂壬角為均數即辰丁弧也此用不同心圈法也用上法求七政均数惟太阳合天餘六曜當最髙卑與兩中距則合此外俱不合天多祿某因想六曜所行或非不同心圈也其軌道蓋有他圈于最另立大均圈法如啚已為地心戊為本圈心戊己為兩心差辛甲癸為本圈依上法設七政在甲求淂己甲戊角為均数以不合故因以戊己两心差分之于午分法各不同午為心作亥丁丑大均圈為七政所行之道但此圈不平行其平行者在辛甲丑癸圈如七政在甲距最髙為辛甲弧作甲戊線七政在自行圈上甲即在大均圈上下置七政在丁作午丁己丁二線成戊午丁己丁午二形先用戊丁午形有丁戊午角為辛戊甲之餘有戊
