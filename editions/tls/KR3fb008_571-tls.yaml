body:
  text: 徹之骵其映大光之物能展小為大變其本象如日月初出地時其視徑比于中天甚大即在中天或有薄雲翳之其視徑亦加大皆為次徹之骵隔之故也又更試之日之視徑本不能大于月交食時月能掩盡有餘而何以有時月小于日月掩不盡日四周皆顕金環西第谷所居之地見之北極高五十五度此非映小為大乎又同是一食同一極高則两䖏見食分冝等乃測之恒不等又或即此一䖏見食有時視月魄為盈有時見月魄為縮變幻不等故第各所㝎月視徑用加減法月朔用減月望用加其加減之数皆約為全徑四分之一日視徑則不動以此推金環之差密合但此時第各所居之地乃爾用之他䖏原未必合因知交食時日月之視徑随地時不一
