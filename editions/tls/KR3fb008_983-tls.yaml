body:
  text: 二十分半自行為一百十二度四十八分十時木星最高在壽星七度三十二分二時太陽視經躔壽星宮十五度十七分如圖甲地心丙乙為自行之餘六十七度十二分如前法作本輪均輪星在戊淂庚申戊初均角五度七分十秒甲戊邊九八五四六二以初均減平行淂二十五度十三分二為寔經以與太陽視行相減淂距日二百六十度三分十秒為歲輪上癸酉壬弧星在壬又以寔經與所測視行相減淂十一度十七分二十秒即
