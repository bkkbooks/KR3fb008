body:
  text: 法之意求各弧切線正弦之外有切線求之則用三率法如圖戊乙弧其正弦為戊丙切線為丁乙求之用甲丙戊甲乙丁兩相似形戊乙弧之餘弦甲丙與戊丙正弦若甲乙半徑與丁乙切線乃戊乙正弧相當之外切也表于戊乙弧下書之謂之正切求各弧割線求割線亦用三率法如前圖戊乙正弧甲丁為其割線求之用甲戊丙甲丁乙兩相似形戊乙弧餘弦甲丙與甲戊半徑若乙甲半徑與甲丁割線乃戊乙弧相當之數也求割線用加減法如圖乙已弧二十度其切線為戊乙餘弧為已丙七十度半之淂已丁三十五度即截乙庚弧與已丁等次作乙辛切線淂數以加乙戊切線即兩切線并為戊乙辛切線與甲戊割線相等求各弧矢線求矢線以餘弦減半徑即淂如丙丁弧五十度餘弧甲丁四十度其餘弦為丁戊與已乙等用以減乙丙半徑存己丙為丁丙弧之正矢線
