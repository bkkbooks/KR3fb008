body:
  text: 算之法耳與算加減差法不作角於心而作角于邊全一樞軸也一以寅乙甲為星遇沖日角何也曰太陽體在心黃道上其沖在未星寔行在氐氐未弧為氐乙未角即星寔行已遇沖日之真距也張角弧同正與前歲輪上申亢弧等故用氐乙未角為星黃道上遇沖日之度與用歲輪
