  text: 入太陰時刻平行表內查其平行依日差號以加減於月平行月自行為平行搃平行引平行引即引數以平行引查太陰自行加減表相較即中比例法見前得初均數記加減號引數前六宮為減減後六宮為加均數依號加減于平行搃為寔行又用以加減平行引為寔行引實行內減去太陽經度不及減加十二宮減之為月距日次引以月距日次引若在六宮已上減去六宮用之同寔行引宮度查二三均數表縱橫相遇相較得次均依號加減于寔行得白道經度以月距日次引入交均距表查交均記加減號隨即于交均下查取大距數
