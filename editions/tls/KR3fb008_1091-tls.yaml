body:
  text: 南北蓋星骵大距日遠升度正緯度北則昜見難伏若星骵小距日近升度斜緯度南則昜伏難見故定崢伏之界湏合此四根論之但五星之伏見各有不同土木火三星皆夕伏晨見金水二星順合晨伏夕見退合夕伏晨見然理則一也多祿某定五星見伏之界測淂土星在地平圈上太陽在地平下十一度即太陽地平下高弧人目約能見星故定十一度為土星見伏之界木星為十度火水二星十一度半金星五度畫見不算此五星見伏之率也如圖乙為天頂壬為沖大圈為子午圈地醜為地平黃邜為黃道丁為黃極設一星在地平甲其黃經為甲邜正在黃道次置太陽在癸子癸為太陽地平下高弧如土星為十一度子癸一定不動以癸太陽遷移就之癸甲為星黃
