body:
  text: 十度為甲丙邊又法全數與乙丙之餘割即丁丙正割若乙角之餘割即戊丁正割與甲丙之餘割即戊丙正割淂丙甲邊用戊丁丙次形求丙角法乙丙之餘弦即丙丁正弦與乙角之餘切即丁戊正切若全數與丙角之切線丑寅弧之切淂丙角亦用戊丙丁次形一率乙丙餘弦三八三二二率乙角餘切一度三二一二三率半徑四率丙角正切二度六九四五八淂六十九三十八分為丙角戊丙丁角與乙丙甲角等又法乙丙之割線即子角丁寅弧之割丁寅與丙乙等與全數若乙角之正切即子戊正切與丙角之餘切即子丑正切子丑為丙角丑寅之餘淂丙角此用子丑戊次形元形有乙角乙丙邊即次形有子角及子戊邊也子戊與乙角丁己弧等第四法有兩角一邊其邊連兩角求餘角餘邊甲乙丙形有甲直角有乙角四十四度六分有乙甲邊六十度連甲乙兩角求甲丙乙丙二邊及丙角求甲丙邊法全數與乙角丁己弧之切線若甲乙之正與甲丙之切線淂甲丙邊用甲乙丙本形一率全數二率乙角切線九六八九四三率甲乙正弦八六六三四率甲丙切線八三九一淂四十度為丙甲邊
