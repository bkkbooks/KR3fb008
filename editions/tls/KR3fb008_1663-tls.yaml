body:
  text: 為均輪半径而後髙卑之数盈縮之行始與寔測相符也推太陽盈縮差盈縮差即今所用之均数授時暦最大積差為二度四一四中分今推淂最大之差為二度三分一十秒但新法暦書用两心差之全数立算今覺未合亦如太陰五星用两小輪求之如图甲為地心子辛為太陽平行天甲辛半径命為一千萬辛為冬至丙為最卑丙辛為最卑距冬至度設太陽平行距最卑為丙已即已為心取甲已之二十六萬八八一二為已戊本輪半径作庚戊本輪于本輪上從戊右行取戊丁弧與丙已䓁又丁為心取已戊三之一八萬九千六百四為丁壬均輪半径作壬丑小均輪壬為最近従壬右行取
