body:
  text: 以積日與金水最高每日平行金星最高每日平行十分秒之二又二七一九五水星最高每日平行十分秒之二又八八一一九三相乘淂數為積日最高平行加金水最高應金星為六宮一度三十三分三十一秒四㣲水星十一宮三度三分五十四秒五十四㣲淂二星最高年根上攷徃古則置金水最高應減積日最高平行淂最高年根求伏見年根以積日與金水伏見每日平行金星伏見每日平行二千二百一十九秒四三一一八八六水星伏見每日平行一萬一千一百八十四秒一一六五二四八相乘滿周天一百二十九萬六千秒去之餘為積日伏見平行加金水伏見應金星為初宮一十八度三十八分一十三秒六㣲水星十宮一度一十三分一十一秒一十七㣲淂二星伏見年根上攷徃古則置金水伏見應減積日伏見平行淂伏見年根
