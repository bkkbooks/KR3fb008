body:
  text: 四之一其較為四之一距黃道一為四十分四十秒一為四十八分三十秒其較七分五十秒依法算月徑四之一淂七分五十秒四之淂三十一分二十秒乃月距最髙二十度之視徑也又食分既為月之半徑即月距黃道緯為影之半徑因上數淂地影半徑為四十分四十秒若用噐測為木候儀先作木架立柱髙與人等柱端為兩運之軸一周轉一上下木為長衡三分之一在前二在後而入之軸上下左右無所不可也衡之兩端各立一表上表中心為圓孔徑二三分下表與上表同心從心作圈與上孔等圈之外更作數平行圈兩表之間為影簫以束上影而致之下表也簫之下端剡寸許缺之令旁見下表之影圈或不用影簫則設之幽室獨直上表于外以受日光達于下表室湏黝黑絕無次光乃淂寔影用時以上表承日光在下表則成圓形必合一圈不合更作合者如甲為下表之心甲乙圈與上孔等光之半徑為甲丁取丙丁與甲乙等作丙圈即甲丙與乙丁亦等乙為日周其光至丁甲為日心其光至丙是兩表相距若干因生大甲丙之光若干用三角形法求甲丙于兩表之距度淂幾分即見日視角之度分法
