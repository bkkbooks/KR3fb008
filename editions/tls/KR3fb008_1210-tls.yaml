body:
  text: 又以月寔引查視半徑表太陰半徑相較得月半徑以日寔引加減六宮入視半徑表查太陽半徑相較得日半徑日寔引在六宮以下加六宮在六宮已上則減六宮以日月二半徑各倍之為全徑用在月寔引宮度入太陰寔行表杳行一小時月寔行十求近時查黃道九十度表九十度表一名黃平象限表其表隨地不同如京師立算取四十度在江南取三十二度各依本方極出地取本表用之以日寔經度取表第一行宮度得相對第二行幾時幾分另以視朔時分與十二時相加尊得數以加入之為搃時若搃時遇二十四時去之用其餘為搃時
