body:
  text: 為極出地度庚子為赤道辛丑為黄道己為春分午為黄極夫論赤道庚子半圈自庚出地平至子入地平其中間最高䖏必在子午圈上乙點庚乙九十度乙子亦九十度若黄道自辛出地平丑入地平其交子午圈丁點不淂為出地平東西各九十度䖏丁丑為小分辛丁為大分是黄道不以子午圈為中关而其九十度之界乃在午東壬點壬丑距西地平為一象壬辛距東地平亦一象壬點其折中䖏名黄道中限也可見地平上黄赤二道各自為象限不同在于午圈而壬丁即中限偏東之度分次後徔黄極作午丙大圈過天
