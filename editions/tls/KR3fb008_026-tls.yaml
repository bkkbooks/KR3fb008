body:
  text: 此幾何與彼幾何相比此幾何或大或小于彼幾何若于彼幾何與此幾何相比此幾何或大或小于彼幾何若于兩相比皆有定理謂之比例也如甲乙兩幾何甲為六乙為三以甲幾何六與乙幾何三相比甲為倍大于乙也為倍大之比例丙丁兩幾何丙為十八丁為六以丙幾何十八與丁幾何六相比丙為三倍大于丁也為三倍大之比例又如戊巳兩幾何戊為十二巳為五戊十二與巳五兩幾何相比戊為倍大于巳又等帶巳之二也為等帶倍之比例餘倣此凡兩幾何以此幾何比彼幾何則此幾何為前率彼幾何為後率以彼幾何比此幾何則彼何為前率此幾何為後率如甲乙兩幾何以甲六比乙三則甲為前率乙為後率淂甲倍大于乙以乙三比甲六則乙為前率甲為後率淂乙半分于甲凡兩幾何相比小幾何必為大幾何之分大幾何必幾倍大于小幾何又等帶小幾何之幾相比之中各有條理而不可紊其用至大而至廣也二兩比例之理相似為同理之比例兩幾何相比謂之比例以兩比例相比謂之同理之比例如甲與乙兩幾何之比例丙與丁兩幾何之比例其理相似為同理之比例也又若戊與巳兩幾何之比例巳與庚兩幾何之比例其理相似亦為仝理之比例也盖兩幾何比例之理既相似則可以兩此
