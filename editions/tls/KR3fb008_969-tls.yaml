body:
  text: 金星古測得最高在太梁宮二十五度測見前萬曆十三年乙酉第谷測得在寔沈二十九度十五分相差為三十三度十五分以中積一千四百四十五年為法而一得每年行一分二十二秒五十七微水星古記周赧王五十年丙申西十一月十五日水星晨見在大火二度三十五分太陽平行在大火十九度五十六分半用古表緯南為二度二十分依此測及後屢測周赧王至漢順帝四百年間所記諸測甚多追算得水星當時最高在壽星宮六度五分萬曆十三年乙酉第穀自測得本年最高在析木宮初度三十分相差為五十四度二十五分以積年一千八百四十九年而一得每年行一分四十五秒依上諸算定五星曆元恒年表
