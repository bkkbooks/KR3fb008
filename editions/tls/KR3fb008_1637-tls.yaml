body:
  text: 八即戊子丑角求淂戊甲邊一一六二二六四二五一二為太陽在本天最高時距地心之遠以地半徑較之其比例如一典一千一百六十二也末用乙戊甲三角形乙甲邊為一戊甲邊為一一六二戊乙甲之外角一十六度四十三分五九三七邸庚乙戊角求淂乙戊甲角五十一秒五㣲為最高限太陽高七十三度一十六分之地半徑差以加暢春園視高七十三度一十六分二十三㣲淂七十三度一十六分五十一秒二八為太陽之真高也于乙戊子角五十一秒二十五內減去乙戊甲角五十一秒五㣲餘二十㣲為甲戊子角乃最高限太陽高九十度六分二十一秒之地半徑差即八十九度五三三九之地半徑差以減廣州府視高九十度六分二一四
