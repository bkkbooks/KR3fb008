body:
  text: 五星伏見距日黃道度表五星伏見距日黃道度表以星之黃道宮度按晨夕列之初宮至二宮六宮至八宮列於上三宮至五宮九宮至十一宮列於下前後分順逆列星之黃道度中列各星之距日黃道度分宮在上者用順度宮在下者用逆度用表之法求晨見晨不見用晨宮求夕見夕不見用夕宮設土星當晨見限度其黃道經度為初宮一十二度求距日黃道度則察晨初宮一十二度與土星
