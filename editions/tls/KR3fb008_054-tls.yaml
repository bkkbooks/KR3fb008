body:
  text: 求乙角法以乙丙邊與丙甲邊之比例若乙戊半徑全數與乙角之正弦戊丁既淂戊丁正弦查弧用八線表淂子角之度戊巳弧也一率乙丙三丈二率丙甲二丈五尺九八九三率戊乙半徑全數四率戊丁正弦八六六三查弧淂乙角六十度求丙角法以甲丙邊與丙乙邊之比例若戊丙半徑與丙角之割線丙丁查弧淂丙角一率甲丙二丈五尺九八九二率丙乙三丈三率戊丙全數四率丙丁割線一度一五四七查表淂丙角三十度戊已弧求甲乙邊法以乙丙上方形減丙甲上方形餘開方淂甲乙邊一丈五尺股弦求勾術也第二法有一直角両邊其邊連直角求餘角餘邊甲乙丙直角形有甲直角有乙甲邊一丈五尺有丙甲邊二丈五尺九八九求乙角法以乙甲邊與甲丙邊之比例若乙巳半徑與乙角之切線巳丁求弧淂乙角
