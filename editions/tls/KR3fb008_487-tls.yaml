body:
  text: 信不知乃一定不易之寔理也盖月對日受光藉非日月之間有不通光之寔骵為其障蔽則何由阻日光之直炤若天骵及空中之火火中之氣皆通明透徹不能作障使月失光即金水二星亦是寔骵有時居日月之間然其影俱不及地况能過地及月乎則知能掩日者惟有地骵一靣受光一靣射影而月骵為借光之物入此影中不能不食半進則半食全進則全食矣日月食理勢不同日與月雖皆稱食然其理其勢各不相同食日謂之障食食月謂之藏食何謂障食日為諸光之宗月與星皆徔受光焉月之食日非真食日也定朔則地與月與日自下而上為一直線相参直
