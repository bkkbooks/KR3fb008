body:
  text: 黃道赤經交角表黃道赤經交角表黃道赤經交角乃黃道與遏赤經圈相交之角成正弧三角形即極所謂黃道交極圈角也亦按二分二至分順逆列之二分後之各宮列于上二至後之各宮列于下太陽寔行在上六宮者用順度太陽實行在下六宮者用逆度用表之法以實行之宮對實行之度其縱橫相遇即所求之交角也設太陽實行在黃道實沈宮五度求黃道赤經交角則察實沈宮五度所對之数為七十九度三十五分三十秒即所求之交角也實沈宮在上故角順
