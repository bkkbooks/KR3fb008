body:
  text: 圓體甲戊乙方體甲丁戊皆次徹也當其面有斜焰之光在丙至甲點而入至乙點而出則甲丁與丁乙皆為垂線焰光至甲點而入必聚而折向于甲丁垂線至乙點而出必又散而折離于乙丁或乙壬垂線若言光至乙點出或不焰庚瑞更焰巳則是反焰之光非折焰之光也依此甲言上可推地球滿影之長如面太陽之光遇于蒙氣從壬癸折入作壬邜癸辰線為初折又從邜辰折出作邜午辰未線為次折以復合于已別生午已未雜線角形乃因乙已未角生已未辛及巳辛未為外兩角并之得乙已未內角一度二十分四十八秒今
