  text: 正交應六宮二十七度一十三分三十七秒四十八微正交應者曆元甲子年天正冬至次日子正初刻正交遇冬至之度分也推月離法求積年自曆元康熙二十三年甲子距所求之年共若干年減一年得積年求中積分以積年與周歲三百六十五日二四二一八七五相乘淂中積分求通積分置中積分加氣應七日六五六三七四九二六淂通積分上考徃
