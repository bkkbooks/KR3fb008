body:
  text: 求復圓時刻置食甚時刻加初杅復圓距時淂復圓時刻加滿二十四日去之即復圓在次日命時之法典平望同推食既生光時刻苐十一推食既生光距弧用交食月行表以寔影半徑內減太陰半徑之餘分及食甚距緯分察其所對之分秒淂食既生光距弧求食既生光距時以月距日寔行化秒為一率三千六百秒為二率食既生光距弧化秒為三率求淂四率為秒以時分妝之淂食既生光距時
