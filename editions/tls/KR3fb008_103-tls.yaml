body:
  text: 交夫大圈皆相等故兩形之三角等者三邊必等無相似之形也十直線形一直線交兩直線所作兩角等兩直線必平行曲線形兩角等而兩圈線不平行如甲直線交于乙丙兩直線其所作甲丁乙甲戊丙兩角等則丙乙兩直線必平行若曲線與甲已弧交乙丙二弧所作之甲戊丙甲丁乙兩角等而丙乙兩弧不能平行以球上大圈必相交故也十一直線形即用其邊之直線算曲線形必用其邊之弦矢割切線算不得即用其邊十二直線形之邊可任意引長之以至無盡曲線形之邊引之必成全圈弧三角形次形用法凡弧三角形之三邊三角皆為球上大圈所交如以各邊角引長之至九十度或一百八十度則諸大圈復相交相割以生次形患與本形相當或有本形之邊或有其角俱可藉以求本形之度如本形有難于立算者用次形代之其弧角錯綜互易以得次形共有五法如左一甲乙丙正弧三角形甲為直角法于乙甲乙丙兩邊各引長之滿象限為乙丁乙戊又甲丙邊引長之作甲丙已象限次聫丁戊引至
