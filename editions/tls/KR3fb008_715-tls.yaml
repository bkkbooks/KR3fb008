body:
  text: 而相遇于寅北折甚于前折者愈遠于垂線愈欲急就之也得寅已辛角形以內為折入影中之重光人目在重光之中從辰邜兩交得見金環意疑在丁丑旋遠月輪其寔則太陽之原光庚乙也夫日光遇地面則折入于影為蒙氣故也凢象射次徹之體則成折線若空中本氣乃甚徹之體何亦能受光而折入于人目不知空中本氣為甚徹之體此恒理耳然亦有時面變如彗孛攙搶以及客星等皆在列宿天中非理所宜有難究其所生之原而寔則恒有之今言日食有金環者大抵皆虛環也其寔環甚為希有萬一有之不得不究其所從來盖虛環既蒙氣所為無可疑者則寔環之縁不得不在蒙氣之上既在其上不得不歸之空中本氣舍是別無可推
