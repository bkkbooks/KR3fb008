body:
  text: 梁為最高大火為最卑謹按金水二星既不沖太陽何由知有本天高低以測其與太陽之大距有大有小故知之又二星之平行既同太陽何以知其最高卑又不與太陽同以測其大距度大不在太陽最卑小不在太陽最高因知本天自有其高低也此説淂之錫山草莽臣楊作枚雲求金星兩心之差及伏見輪半徑如圖丁地心已金星本天心作庚丙辛圈及庚丁辛線已丁為兩心差庚為最高辛為最卑又于庚辛高卑一處各為心作甲乙兩伏見輪又從丁地心作丁甲丁乙二線切輪周于甲子乙成庚丁甲辛丁乙二直角形甲丁庚
