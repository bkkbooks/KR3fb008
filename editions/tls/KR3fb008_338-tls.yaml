body:
  text: 為丙乙戊之餘丙乙戊角為乙戊髙弧圈距正午丙之度其弧為丙戊依法求乙已邊用減九十度乙戊得已戊太陽寔髙所測視髙為辛戊見日在辛辛已即清蒙之差盖地半徑差恒降髙為卑清蒙氣差又升卑為髙故寔髙內必加減二差乃得視髙也求太陽距赤道緯度赤道亘于両極之中平分天骵黃道則斜交赤道之內外半北半南二者俱為球上同心大圈其相交二㸃為春秋二分相距最逺二㸃為冬夏二至両道之交角即大距度測㝎為二十三度三十一分三十秒距度者求太陽自二分至二至黃道上各九十度距赤道之緯度也盖太陽在二分時正當赤道無距度在二至即二十三度有竒餘各逺近不等如圖甲為北極丙已庚圈為赤道乙為黃極丙戊壬圈為黃道丙為春分丁為秋分戊冬至壬夏至戊已與壬庚即大距二十三度有竒與甲乙両極之距等設太陽自春分丙行至辛即從北極甲過太陽作甲癸辛經圈成丙癸辛曲線直角形辛癸即距緯度也求法丙癸辛形有丙辛太陽距春分經度有辛丙癸両道之交角即戊已二十三度有竒有癸直角依法全數與丙角之正弦若丙辛弧正弦與辛癸之正弦求弧得辛癸距赤道緯列表從丙㸃春分起算戊冬至太陽距分至左右等其距緯亦等
