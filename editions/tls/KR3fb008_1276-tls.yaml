body:
  text: 都得象考成步日躔推日躔用數康熙二十三年甲子天正冬至為曆元即癸亥年十一月冬至周天三百六十度入算化作一百二十九萬六千秒盖七政諸行自度以下皆以六十遁析湏將度分皆化為秒數微纎忽芒則以六十與一百為比例妝為秒之小餘然後便於入算故周天度亦化為秒數則諸曜之行方與天行相應也周日一萬分一日二十四時刻則為九十六分則為一千四百四十秒則為八萬六千四百法各不同故將一日命為一萬分然後便於入算如有時刻欲通為分數則以一千四百四十分為一率所有時刻化分為二率一萬分為三率求淂四率即所通之分數如有分數求時刻則以一萬分為一率所有之分數為二率一千四百四十分為三率求淂四率即時刻之
