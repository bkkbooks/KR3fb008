body:
  text: 金星均輪半徑八萬八千八百五十二金星次輪半徑七百二十二萬四千八百五十金星次輪面於黃道交角三度二十九分氣應七日六五六三七四九二六金星平行應二十分一十九秒一十八㣲與暦元甲子年天正冬至次日子正初刻太陽平行度同金星最高應六宮一度三十三分三是一秒四㣲金星伏見應初宮一十八度三十八分一十三秒六㣲推水星用數康熙二十三年甲子天正冬至為暦元
