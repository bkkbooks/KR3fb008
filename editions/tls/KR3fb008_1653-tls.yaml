body:
  text: 四秒二十六微而未宮八度至丑宮八度歴一百八十二日一十四時二十七分三十秒二十微小于半歲周二十六分五十二秒一十微乃以此两数立法以求最髙所在如圖甲為地心即宗動天心乙丙丁戊為黃道與宗動天相應同以甲為心也乙為夏至丙為秋分丁為冬至戊為春分又設己點為心作庚辛壬癸圈為不同心天庚為最髙當黃道之子壬為最卑當黃道之未則寅卯為其中距過己甲两心作庚未線則平分本天與黃道各為两半周故歴半歲周一百八十二日有竒適行半周天一百八十度若夫夏至乙則在最髙前有加差時刻早冬至丁則在最卑前有減差時刻遲故夏至冬至大于半歲周而秋分丙在最髙後有減差時刻遲春
