body:
  text: 五星行度有平行有自行有距日行大槩與太陰同推步之法或用兩心差或用小輪或用均輪于本天心或用均輪于本天周其法雖別而理寔同然五星之行雖相似而細較之亦有不同以平行言之土木火各有平行為一類而金水即以太陽之平行為平行是為一類以自行言之土木火金之次輪心皆行倍引数為一類而水星之次輪心則行三倍引数是獨為一類以次輪之大小言之土木金水之次輪半徑皆有定数為一類而火星之次輪在本天最高則大最卑則小又視太陽在最高則大最卑則小是獨為一類以次輪之行度言之土木火皆行距日度為一類而金水自有行度又為一類以緯行言之土木火皆有本天與黃道相交
