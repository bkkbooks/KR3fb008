body:
  text: 求地半徑差必先得地半徑典日天半徑之比例今随時測太陽之高度求淂地半徑典日天半徑之比例冣高為一典一千一百六十二最卑為一典一千一百二十一比舊㝎地半徑典日天半徑之比例冣高少二十二冣卑多二十一盖太陽高卑之故由于兩心之差然最高之高于本天半徑最卑之卑于本天半徑者非兩心差之全数而止及其半解見後舊表日天半徑乃依兩心差全数所㝎故最高較寔測則多最卑較寔測必少也今新測如左康熙五十四年乙未五月二十九日甲子午正夏至後八日也以本日太陽躔本天之最高為距地心之最遠在暢春園測淂太陽高七十三度一十六分二十三微同時于廣東廣州府廣州府子午測淂在京師之兩三度三十三分所差無幾測淂太
