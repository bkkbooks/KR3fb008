body:
  text: 庚戊為一萬三千三百四十七度四十分之正弦相減淂甲戊四千六百三十甲戊線半于辛庚為心辛為界作辛癸為負次輪圈即甲辛為二千三百一十以并庚甲淂庚辛一萬一千三為負次輪圈之半徑其甲辛次輪半徑為二千三百一十甲戊全徑四千六百二十分求太隂次均前既淂次輪半徑即可求月每日之次均如啚癸為地心庚癸為全數作庚申月本天或宗動天之黃道庚為最髙所在設月自行為庚戊弧戊為心取八千七百為午戊半徑作丙夘本輪丙最髙夘最卑本輪上取丙午弧與庚戊等月居午淂戊癸午角或戊辛弧為初均朔望時月恒在午若去離朔望午癸線不足定月之經度法取二千三百一十為壬午半徑壬為心午為界作午乙次輪圈又作丙壬為員次輪心之圈午為最近己為最逺以去離本輪心而言其行度從午㸃右旋過乙歴己而復于午為一周當朔望時無倍離度月
