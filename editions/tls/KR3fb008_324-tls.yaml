body:
  text: 立秋至秋分亦然西史於萬暦年間測得春分至立夏太陽行天元經度四十五其所暦時日為四十六日十刻十分又測立秋至秋分行天元經度四十五其所暦日為四十六日三十八刻十分又測得自春分至秋分行天元經度一百八十其所暦日為一百八十六日七十四刻用此三測求両心之差及最髙㸃如圖壬為地心作甲癸辰圈為宗動天之黃道甲為夏至癸為春分次于甲壬線外任取戊㸃為心困未知其數故任取之作午丑子夘為太陽平行之本圈又作壬乙過両心線定乙為最髙㸃所在戊壬為両心差數戊午為本圈之半徑命為全數十萬凡七政本圈之半徑不論大小皆命為全數十萬若論其寔太隂為六十二地半徑太陽為一千一百八十二地半徑七政各不同詳後論依上測春分後日行丙癸弧為經度四十五其視行四十六日十刻十分以平行度準之五十九分八秒十九微得其本圈上平行之子丑弧為四十五度二十七分三四丙壬癸角為癸丙弧四十五度之角次作庚子線為丑庚子乘圈角半之得壬庚子角為二十二度四三四七丙壬癸角既四十五度子壬庚角必一百三十五度與壬庚子角并減両直角得壬子庚角為二十二度一六一五倍之得亥庚弧四十四度三十二分三十秒又春分至秋分行癸甲辰弧一百八十度暦時一百八十六日七
