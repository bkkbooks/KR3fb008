body:
  text: 十五度二十八分視行二測到三測九十三度四十四分相較淂一度四十四分為均數均數小知兩測並在最高同方或左或右以三測作圖如土木二星法此三測置火星在本道下不求其緯蓋火星緯行甚大沖時益大測其經度者亦不淂指為黃道度又不淂為本道度然測法戓用黃道度或本道度其差有限不礙於算甲乙丙為三測丁為黃道心任取之從甲乙丙三測到丁作甲丁乙丁丙丁三線又丙丁
