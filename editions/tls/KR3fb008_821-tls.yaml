body:
  text: 之分外有木距架為丙丁已全形見月離卷以丁已柱正立取地平柱端作運軸使衡能上下轉以入架腰定乙丙太陽出地平高度而全架則又周轉如轆鑪也用法日食時表衡對太陽以甲乙方之面正受其影則上下輪環轉而方尺與餘光兩角或積或平行其量尺所指輪邊度分即太陽本食所偏向高弧度分也又本衡未幹架腰自指太陽高度則得時分因得太陽及高弧距正東西以加或減於日食之角偏去高弧度分終得食影偏去正東西度分設衡下無架可分太陽高度則以
