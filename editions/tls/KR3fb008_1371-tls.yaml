body:
  text: 置中積分加氣應七日六五六三七四九二六淂通積分上攷徑古則置中積分減氣應淂通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上攷徃古則以所餘轉與紀法六十相減餘為大正冬至日分求積日置中積分加氣應分六五六三七四九二六不用日減本年天正冬至分亦不用日淂積日上攷徃古則置中積分減氣應分加本年天正冬至分淂積日求火星年根
