body:
  text: 緯餘巳戌為視緯在黃道南而酉午與午申兩東西差相較約差至半刻此所以復求近時東西差也求日食食甚用時食甚交周食甚視緯食甚用時者太陰寔行與太陽實行白道同度之時刻食甚交周者食甚用時太陰距交之白道經度而食甚寔緯者食甚用時太隂距太陽之白道緯度也太陽距交之黃道經度與太陰距交之白道經度等是為東西同經即為寔朔其距交之度為寔朔交周然此時太陰與太陽相距猶遠惟自白極遇太陽作經圈與白道成直角太陰寔經行至此直角之點則與太陽相距最近是為食甚用時其距交之經度為食甚交周其相距之緯度即食甚寔緯
