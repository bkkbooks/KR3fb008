body:
  text: 月本暗骵令在日與地之間以暗骵之上半受光于日以下半射影于地如屏蔽然特能下掩人目而不能上侵日骵日之原光自若也是故人見為食而寔非食也何謂藏食㝎望則日月相對日正炤之月骵正受之人目正視之若于此際經度相及適近两交日與地與月亦為一線相参直而地在日與月之間地既暗骵以其半骵受光于日以其半骵射影于月若月骵全入于影中則純為晦魄必待出影際然後蘇而生明如沒而復出者然是則可謂真食也搃之日月两曜若仝行一道之上則每朔每望無不食矣日月地三骵若并不居一直線則求無食矣惟各行于一道時及于两交故日與月皆五月而一食或六月而一食嵗嵗大率有之
