body:
  text: 以月離內寔引查交食視半徑表淂月距地半徑又以月寔引查交食太陰寔行表淂月一小時寔行置恒星經度於九十度限之宮度分內減之為限大則星在西若不及減于星經度內減去九十度限之宮度分為限小則在東所餘為星距限度置月離內正交經度以減九十度限宮度若九十度限不足減加十二宮以減之即淂較數以較數查交食大陰距度表淂月寔緯北加南減于限高度淂其高度以真高度及月距地半徑查交食時氣差簡法表淂地平差即地平上
