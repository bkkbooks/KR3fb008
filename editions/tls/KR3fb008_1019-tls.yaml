body:
  text: 二十三分三十秒自行為二百五十九度四十二分二十秒時太陽視經躔星紀二十三度三十分四十秒如圖甲為地心庚丙為自行距最卑之餘依前法作本輪均輪求淂丙甲乙初均角十度三十三分三十秒以加平行淂一百四十八度五十七分為火星經度與太陽視經相減淂三百二度二十六分二十秒為歲輪上合沖已弧星在已又以星寔經與所測視行相減淂四十度十九分即乙甲已次均角也用甲乙已形求
