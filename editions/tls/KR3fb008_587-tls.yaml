body:
  text: 見地影之大法作巳辛線或辛己癸直角形淂辛巳癸角為人目所窺地影之大天度之分依法己癸與癸辛若全数與巳角之切線求弧淂巳角為月在癸之地影半徑如在最𤰞戊求壬巳戊角為月最𤰞之影半徑而壬巳戊角必大于癸巳辛角求地影視半徑依上法求月各距地之影半徑然測之于天徃徃未合推淂之影恒大于所測之影如月在最髙推淂影半徑為四十四分五十秒而寔測止四十三分在最𤰞推淂四十八分三十秒而寔測止四十七分測数恒小于推数比其故非由于日月地三骵而由于太陽之光何則試思大圓之中四周皆日光炤爍而地影獨一暗骵居其内且影為虗形四面受日光圍廹其影必
  hash: sha256:37b2c4edcb84b5bb5440eb8f212ac9c3b3d4d883380cc8649e8c9c8bac7ea23e
