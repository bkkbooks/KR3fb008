body:
  text: 為地半徑一角為月視髙角之加角本角外加一象限一為視差角法求視餘角之結邊淂月距地黃如啚甲地心子地面人目甲丙寔地平子戊視地平己為日心月食時在地平下自庚辛日邊出兩線切地球于午亥而過之相遇于申淂午申亥角骵之形為地影丁為月在影中與甲己作一直線為全食次引長甲丁至癸淂癸甲丙角為月之寔髙次作子丁夘視線淂夘子戊角為所測視髙子是用甲子丁形有子甲丁角寔髙之餘有甲子丁角戊子夘視髙角加戊子甲直角所淂有子甲求甲丁邊為月距地之髙三法用日全食如啚甲地心乙地面人目庚天頂己月心丙日心自乙過己過丙至丁丁為恒星之人作一直線為全食淂庚乙丁角為視高之餘次作甲己戊線淂庚甲戊角為月寔髙之餘作甲丙午線淂庚甲午角為日寔高之餘子是月用甲乙己形求甲己邊日用甲乙丙形求甲丙邊各為距地之逺
