body:
  text: 清蒙氣差表清蒙氣差表分兩叚列之第一叚自初度至二十二度第二叚自二十三度至四十五度皆地平之高度其所對之数則逐度之蒙氣差也用表之法如測淂七政或恒星高四十度求蒙氣差則察四十度所對之数為一十秒卽所求之蒙氣差與視高四十度相減餘三十九度五十九分五十秒為實高如先推淂實高三十九度五十九分五十秒則以蒙氣差一十秒與實高相加淂四十度為視高
