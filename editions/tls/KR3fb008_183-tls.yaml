body:
  text: 餘戊乙弧必三十度而乙甲戊為三十度用甲乙庚丁既平行甲戊線截二線于子即內外角等而丁子戊角亦三十度戊子已角亦三十度是丁子己為六十度角也丁與全子全巳三角等于兩直角則于中減全子角六十度餘丁已兩全角必一百二十度而此兩角既等即各淂六十度則此形之三邊三角俱等矣夫丁己己子兩線等則己癸垂線所分之丁癸子癸両直角亦等而已癸同腰則丁癸與癸子必等丁癸為丁子之半丁壬為丁已之半全線等則所分必等是丁癸與丁壬等與壬己亦等也依此凡象限內先淂正弦六十率用此即淂其餘三十率簡法二有兩弧不等之各正弦又有其各餘弦而求兩弧相并又相減弧之各正弦法以兩正餘弦互乘為寔半徑為法除之相加淂總弧之正弦相較為減弧之正弦如啚寅巳未圈甲為心寅巳為一象限設寅巳弧內有已辛弧為前弧乂有已戊弧小于己辛為後弧戊子為後弧正弦子甲其餘弦午辛為前弧正弦午甲其餘弦次取辛丑弧與己戊後弧等則己戊丑為前後兩弧之并弧丑亥即并弧之正弦次作丑壬線為丑辛弧正弦與戊子等其餘弦壬甲亦與子甲等辛壬亦與子巳等法用甲午辛甲壬丁二相似形以後弧之餘弦壬甲乘前弧之正弦辛午金數甲辛除之淂壬丁為初數夘亥每次用甲辛午丑壬
