body:
  text: 日有大小之分大者為晝夜小者為時辰時辰者十二分日之一也盖常静天之上有二大圈皆過両極而分赤道為四平分其一過頂即子午圈其一過東西㸃即赤道交地平㸃為東西之最中即夘酉圈從夘至午其間又有二圈为辰为已从午至酉其间亦有二圈为未为申此六圈終古不動凡太陽至某圈上即為某時也其起算亦有四法或用子午或用夘酉又時之下有刻每一時分為八刻一日共九十六刻東西所同用也舊法每日百刻析之為時分未免竒零矣時憲暦日法赤道左旋三百六十一度弱為一平日平者對定而言見後卷凡測候七政根數及歲月日時皆用平日一日分為十二時自子至亥名曰大時每一時赤道左旋三十度又二十四分之名曰小時為立表所用每一小時赤道左旋一十五度每一大時分為八刻一小時為四刻一日共九十六刻每一刻為十五分每分六十秒微纎以下並同凡大時前四刻為初後四刻為正四刻共六十分日分從子正起算至明日子正為一日平日年月年月之立算有二其一以太陽三百六十五日二十四刻二十一分行天一周為一歲謂之太陽年起筭以二分或二至為界太陽
