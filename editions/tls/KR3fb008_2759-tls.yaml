body:
  text: 火星地半徑差表火星地半徑差表分最高中距最卑三限列之其前列實高度火星引數自十宮一十五度至一宮一十五度為最高限自一宮一十五度至四宮一十五度自七宮一十五度至十宮一十五度皆為中距限自四宮一十五度至七宮一十五度為最卑限表內分秒卽三限實高度所生之地半徑差也用表之法如火星引數當最高限推淂實高五十三度求地半徑差則察最高限實高五十三度所對之數為四十秒卽所求之地半徑差與實高五十三度相減餘五十二度五十九分二十秒為本時火星之
