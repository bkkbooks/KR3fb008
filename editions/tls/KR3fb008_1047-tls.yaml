body:
  text: 也因知歲輪止交本道而與黃道為平行面也向使非平行與本道為一面何以輪心當大距度能加減本道上之緯耶即斜交本道或其面不與黃道平行何以輪心在交上星在輪周無緯在他宮亦不與黃道交耶蓋惟平行輪心在交點則歲輪面與黃道面合為一在大距合伏緯角小沖日緯角大能加減本道之緯也但歲輪心旋居於本天之周而星在歲輪所生緯角隨仕不等勢不能逐一為表今置歲輪心距交九十度點算歲輪上一百八十度之緯名為緯限以距日度為引數又作表時三星歲輪適皆在本道之南故即置輪心在南大距推算所列緯限皆向南之數若輪心到北半周則用北加減分以加減之為向北之緯限也
