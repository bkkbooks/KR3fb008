body:
  text: 減距弧得時視相當近小數本行上頂格所書時數録之即是其餘數再如法查取得時之分秒依上法以相當近小數取之並所查數為距時距時隨定其加減號兩均同加者日大則加日小則減兩均同減者日大則減日小則加兩均一加一減者加減從日三求寔引以距時之時及分查四行時表太陽平行兩數兩數謂時分下同並之為日引弧依距時加減號置太陽平引以日引弧加減之為日寔引以距時之時分查四行時表內太陰平引兩數並之為月引弧依距時加減號
