body:
  text: 弦加九宮減本日太陰寔行餘為三率求淂四率為距子正之分數盖以太陰距太陽一日之寔行與一日之分數為比同於本日子正太陰距合朔弦望度分與距子正之分數為比也乃以六十分妝為一小時十五分妝為一刻淂合朔弦望時刻如本日太陰寔行與太陽寔行適當合朔弦望限度而無相距度分則合朔弦望即為本日子正初刻也推交宮時刻法太陰遇宮為交宮本日民遇宮為交宮次日求時刻之法以本日太陰寔行與次日太陰寔行相減餘為一率一千四百四十分為二率本日太陰寔行度不用宮與三十度相減餘為三率求淂四
