body:
  text: 距交一十二分之一即作丁庚線與甲乙平行取丙庚亦丙甲距度一十二分之一以減甲丙得甲庚是太陰初虧之距度以加甲丙得甲已是太陰復圓之距度次以甲丁甲庚兩線及庚直角求得庚丁線以庚丁庚丙兩線及庚直角求得丙丁線為初虧至食甚行度後以甲巳甲戊兩線及巳直角求得戊巳線以戊已巳丙兩線及巳直角求得丙戊線為食甚至復圓行度也食甚距度線當與白道為垂線求月食時刻設太陰食甚前行度與食甚後行度等即距度必當為白道之垂線不然者必行度前後不等而時刻亦不等矣如啚甲乙為白道甲丙為黃道太陰在丁自庚黃極出線遇丁月為庚丁弧至戊黃道指太陰寔度在
