body:
  text: 五星犯恒星以本年所推五星經緯度與恒星鈐表之恒星經度及南北緯度相距一度內取用次以五星本日經度內減次日經度化分為一率日法一千四百四十為二率又置恒星經度內減本日五星經度淂較化分為三率如法求得淩犯時刻為四率若五星退行者以五星經度內減恒星經度為三率月與星一度為犯十七分以內為淩同緯為掩若五星與星一度為犯三分以內為淩同緯為掩定上下以北為上南為下月緯星緯同在北以月緯多者在上少者在下月緯星緯同在南則以月緯多為在下少為在上其兩緯兩減若星月一南一北則以月南為在下月北為在上兩緯相加視淩
