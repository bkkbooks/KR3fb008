body:
  text: 角也以戊角為前啚黃赤道交觀之求乙甲邊法為丙甲之割線與丙乙之割線若半徑與甲乙之割線求弧得甲乙邊此用甲乙丙正形以丙角代前啚黃赤相交之角觀之一率丙甲割線一度三五四一二率乙丙割線二度六一八二三率半徑全數四率乙甲割線二度求弧得六十茺為甲乙邊又法丙甲之餘弦即戊丙正弦與乙丙之餘弦即丙丁正弦若全數與甲乙之餘弦即戊角甲已之正弦此用戊丙丁次形元形有乙丙甲丙即此形有戊丙丁丙也以戊角為前啚黃赤相交之角觀之第二法有一角兩邊其邊連直角求餘角餘邊甲乙丙直角形有甲直角有甲丙邊四十度有甲乙邊六十度求丙乙丙角及乙丙邊求乙角法為甲乙之正弦與甲丙之切線若全數與乙角丁已弧之切線求弧淂乙角用甲乙丙本形算
