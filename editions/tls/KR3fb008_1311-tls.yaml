body:
  text: 古則置中積分減氣應淂通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考徃古則以所餘轉與紀法六十相減餘為天正冬至日分求積日置中積分加氣應分六五六三七四九二六不用日減本年天正冬至分亦不用日淂積是上考徃古則置中積分減氣應分加本年天正冬至分淂積日積日者曆元甲子年天正冬至子正初刻至所求本年天正冬至子正初刻之日數也日躔自正冬至起算故止用天正冬至不用躔日月離自天正冬至次日子正初刻起算故必兼用積日求太陰年根
