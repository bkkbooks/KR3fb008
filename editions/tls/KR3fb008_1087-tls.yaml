body:
  text: 徵木星正交行古測在鶉首宮一度二十一分今測在本宮六度五十三分行差為五度三十二分如前中積而一淂一年之行為十三秒三十六微土星正交古測在鶉首宮三度二十一分今測在本宮二十度二十三分行差為十七度二分以前中積為法而一淂一年之行為四十一秒五十三微金星正交與最高約為同行恒在最高前十六度水星正交與最高為同行處無異已上諸測乃萬曆二十八年所定也依此淂新法曆元諸應
