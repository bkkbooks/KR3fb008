body:
  text: 廣逺無不可求然以測天尚未周偹新暦有三角形諸法凡銳鈍角諸斜形無不可求又審其平面球面曲線襍線之別知天為圓體宜測以弧宿曜逺近諸道互交宜測以多類之弧遂生多煩之弧三角形互設三以求餘三是謂以圓齊圓于法為善又圓徑相求雖分秒之弧盡可得其圓度由是輪次之髙下半徑之大小經緯之互交行度之斜直一一得其真跡以此測天庶宻合而無遁情矣測器諸曜運行非測候無以淂其度分則測器為要也古暦所記原有數種今靈臺所存止有圭表景符簡儀渾象新法所增置曰象限儀百游儀地平經緯儀弩儀天環天球紀限儀渾盖儀簡平儀黃赤道全儀日晷星晷望逺鏡諸器或用求髙下或用審經緯或用測極或用求時皆暦學名家多歴年所酌量增修始歸精當至于時辰尤測候所取準古法不分方土第用時牌揆景以定不知大地之廣時非合一新法製晷湏預定本方北極出地之度随時随處雖垣墻正側皆可製造又能于一晷之面視太陽所躔節氣宮次度分及定日之高度并黃道各時出沒其稱最者則地平晷立晷百游晷通光晷數種他若柱晷瓦晷碗晷十字晷等不下百種此外又有星晷與測月之器以為夜中測時之需若遇隂雨則有自鳴鐘沙水等漏之製而水漏與古壺漏異古或以水入壺而時箭
