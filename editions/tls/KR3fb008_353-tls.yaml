body:
  text: 十三分三十秒在赤道南十四度二分今以所測求角宿大星赤道經度如啚甲為赤道極大圈為赤道丙降圈為黃道降為春分丙為太陽丁丙為太陽距赤之緯黃丙其經乙為太白戊乙為太白距赤之緯乙丙為太白距太陽之度子為角宿大星子乙為角大星距太白之度丑子為星距赤道之緯法從甲北極作諸弧線相連成乙丙甲乙甲子二形先用乙甲丙形有丙甲有乙甲有乙丙距度求甲角得丁戊弧四十八度二十六分一八為太白與太陽赤道上両經度差次用子甲乙形有乙甲有子甲有子乙距度求甲角淂戊丑二十九度四四二二為太白與角大星赤道両經度差次以亥丁太陽赤經四度十四分四九查黃赤同升表加三象限淂太陽赤經二百七十四度十四分四九從春分起算內減丁戊星經淂降壽戊二百二十五度四十八分三一為太白赤道經度次以両測間太白行差赤道度三分四十七秒減之再減去戊丑經差淂降壽丑一百九十六度分二十三秒為角宿大星赤道經度測四大星以察周天之度依上測淂數大星之赤道經度今測四大星之赤經以合天周若各星經度并之恰滿三百六十度則所淂各星經緯為准如啚甲為赤極外圈為赤道下同庚為角宿大星測淂右距河鼓中星已
