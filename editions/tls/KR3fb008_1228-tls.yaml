body:
  text: 以本交角及月高下差如前法檢時氣差表得前時差以前時差與十二求真時差相減併得差分法恒用減若東西異號者則相併置月寔行以差分加減之為視行日在限西前時差大則加小則減日在限東前時差大則減小則加若差分用併者則恒減又若食甚真時交角滿象限無真時差可較即用前時差減或初虧交角滿象限無前時差即用真時差減並減寔行視行以本求視行化秒為一率一小時六十分為二率置日食月行分內減一分餘數化秒為三率求得四率數為初虧距時分滿六十分為一時置真時即食甚內減去初虧距時分即初虧時刻
