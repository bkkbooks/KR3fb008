body:
  text: 白道距黄道度又以距度推交周度定食限若日食則太陽與太陰相遇難兩周相切其两視半徑可定两道之距度為有視差必以之相加而得視距度故第論半徑則日食之二徑狭月食之二徑廣論日食之限反大于月食之限以視差故也太陰食限地影之半徑最大者測定四十七分太陰半徑最大者一十七分二十秒并之淂一度四分二十秒日月两道之距在此数以内可有月食可食者未定之辭也以此距度推其相值之交常淂十二度二十八分為月食推限法最大距度四度五十八分半與象限九十度若距度與交常之弧也其最小者地半影定四十三分月半徑一十
