body:
  text: 非可遽合也盖初用之引数其所指者中會之引数非寔會之引数則其加减度所推寔時特近于寔時非正寔時也夫中會與寔會之加减相差恒至数時加减最多至一十四時則日與月又各有其平行及自行度分法冝更求中寔會之間日月平行自行之度為次引数求其均数以淂二曜寔相距度化為時刻或加或减于中會時刻乃淂正寔時刻若欲更密湏三推之視终所淂時刻分秒不異于次淂即合天無疑舊法止等一次尚未為密耳寔會視時用次引数復求日月相距所淂會望時刻已合天矣然與人目所見猶未合也何則交食表内所用之日時皆為平日分則依此推
