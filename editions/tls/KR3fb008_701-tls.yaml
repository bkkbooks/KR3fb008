body:
  text: 曜蒙差桊以時令乃能立表推步其法湏累測交食之多寡早晏斟酌定之勿謂精于本法便可隨地隨時必無舛戾出若立差既定而臨食時氣候忽更此則難可預料然所失無幾矣此高差惟月食累遇之若日食則二曜之蒙氣差大畧相等高弧既同鮮有變昜徑可勿論也清蒙徑差史稱太陽全食畫晦星見此理所宜然若太陰全在日與人目之間而不能盡掩日體四周皆有餘光曆家謂之金環或有缺如鉤若依日月周徑本法則不應有此何者凡此一視徑或大或等于彼一視徑則以此體寘之人目與彼體之間無不全受掩蔽者今
