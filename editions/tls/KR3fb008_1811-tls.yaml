body:
  text: 甲為全数立筭以所差甚㣲而大小之比例仍同故耳金水二星緯度金水二星緯度皆生于次輪即伏建倫盖因其本道即黃道本輪心循黃道右旋均輪次輪亦隨之而右旋次輪心雖不在黃道然當黃道之平面自地心計之與在黃道等故無初緯其次輪則與黃道斜交半周在南半周在北乃生緯度今亦名之曰次緯次緯當地心之角即星距黃道之緯度今亦名之曰視緯立法先以星距次輪正交之度以星距次輪最遠度與次輪心距黃道正交度相加即淂次輪上星距交度求淂次緯即以次輪半徑與次緯之正弦為比例而淂星距黃道線又叉用三角形法求淂星体距地心之速以與星距黃道線為比例而淂視緯
