body:
  text: 形甲丙乙角負乙丙甲半圈為負圈角三圖甲乙丁圈分從丙作丙甲丙乙兩線甲丙乙角乘甲乙圈分為乘圈角凢在圈心者為分圈角在圈界者為乘負圈角然兼與負止分弧之上下無二理也十三負半圈角必為直角負大分角小于直角負小分角大于直角如甲丙戊圈丁為心甲丙為全徑分全圈為兩平分設甲乙丙角負丙乙甲半圈分乙必為直角戊乙甲角負戊乙甲小半圈分乙必為鈍角已乙甲角負巳乙甲大半圈分乙必為銳角十四負圈角與分圈角所負所分之圈分等而負圈角必為分圈角之半反之分圈角必倍大于負圈角如甲乙丙圈其心丁有乙丁丙分圈角乙甲丙負圈角其甲乙邉過丁心仝用乙丙圈分而乙甲丙角為乙丁丙角之半何則試從丁向丙作丁丙線成甲丁丙形夫甲丁丙形之甲丙兩內角并與乙丁丙角等而丁甲丁丙兩腰又等即甲丙兩角亦等則乙甲丙角必為乙丁丙角之半而乙丁丙角倍大于个角或甲乙邉不過丁心如二啚乙丁丙分圈角乙甲丙負圈角同以乙丙為底而甲角亦必半于丁角何則試從甲過
