body:
  text: 寅作寅甲線成寅乙甲形求乙寅甲角為火星次均數甲乙寅角為火星遇沖日度之餘其法不以婁為太陽而以乙地心為太陽不以地為火星平等之心而以乙日為火星平行之心皆與前逈別而所淂次均數卻復相等故臣梅文鼎曰第穀寅乙甲形算次均亦是用兩邊乙甲歲輪半徑寅乙距心線一角寅乙甲角以求餘角乙寅甲角然不正作申乙寅視差角而反作乙寅甲為視差角故亦不正作申寅乙星遇沖日角而作寅乙甲為星距沖日角其用上正法者惟寅乙一線而不知既有寅乙一線為主又有寅乙甲為星距沖日角有乙寅甲為視差角則乙寅甲形全與寅乙申形等又同用乙寅邊其二邊亦必皆等此蓋倒
