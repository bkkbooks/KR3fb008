body:
  text: 上申寅亢角同一以甲為地心而圈周分十二宮何也曰此借象也其法妙在作甲巳線與寅乙平行何則先依寅乙線作寅甲乙三角形其寅甲必與申乙平行因申寅甲乙兩半徑等故今巳甲又與寅乙平行則寅甲巳角與甲寅乙角等因而與申乙寅角亦等蓋不惟等度而且等勢矣由是而以申當地心作春秋分線冬夏至線即與乙心所作大圈上降婁壽星諸線悉為平行而勢等橫直各自為下行則其勢等於是而均分十二宮無一不與房丙圈上等夫十二宮既與大圈等勢而寅甲巳角又與大圈之申乙寅角等度等勢則巳甲線即指星寔經度甲寅線即指星視經度而可以命其宮度悉與大圈上不爽矣推
  hash: sha256:ee4da61fc1446229c477759f24f4c401ca1e750f8ab1f754d7bd591d6d0394f2
