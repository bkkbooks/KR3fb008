  text: 太陽地半徑差表太陽地半徑差表分最高中距最卑三限列之其前列實高度太陽引数自四宮一十五度至七宮一十五度為最高限自一宮一十五度至四宮一十五度自七宮一十五度至十宮一十五度皆為中距限自十宮一十五度至一宮一十五度為最卑限表內分秒卽三限實高度所生之地半徑差也用表之法如夏至後太陽引数當最高限推淂午正太陽實高七十三度求地半徑差則察最高限寔高七十三度所對之数為五十一秒卽所求之地半徑差與寔高七十三度相減餘七十二度五十九分零
