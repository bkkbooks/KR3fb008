body:
  text: 水星均數表水星均數表以引數宮度求初均及中分以伏見實行宮度求次均及較分初宮至五宮依次順列於前六宮至十一宮依次逆列於後表名初均者乃水星本輪均輪所生之均數順度為減逆度為加中分者則逐宮逐度次輪心距地心與最高距地心之較為六十分中之幾分也求中分之法以水星次輪心在最高距地心之一六八二一五五與水星次輪心在最卑距地心之九五四七一九相減餘一一三五四六為一率六十分為二率逐宮逐度次輪心距地心與最高距地心相減餘為三率求淂四率卽逐宮逐度之中分也求次輪心
