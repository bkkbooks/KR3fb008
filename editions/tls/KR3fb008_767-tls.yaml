body:
  text: 丙乙圈氣外切邊之光復合于邜是為全影透氣之光自丙至戊因戊以上所焰必聚而止于地面無從透逹也則光至丙為太陽之外邊所焰光至戊乃其近中體所焰以丙較戊更斜從庚而來入氣處更曲從辛未之光已透氣而復出更直故令丙丁線割戊已線于壬為丁已壬角形是為次光又為初影其角形周遭為環體抱滿影而居全影之中也丁已壬角形既畫于壬而又展開至癸左右相交至丑寅愈遠愈拓復出乎影矣則丁已壬以內壬丑寅以內皆初影之所居也因此設月體為子入影正初影展括之處月食既正在其中將復光亦如之是故兩時皆顯赤色食甚離于次影入于滿影乃變青黑矣
