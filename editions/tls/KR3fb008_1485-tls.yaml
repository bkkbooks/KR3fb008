body:
  text: 推初杅復圓時刻苐十求初杅復圓距弧用交食月行表以併徑分及食甚距緯分察其所對之分秒淂初杅復圓距弧求初杅復圓距時以月距日實行化秒為一率三千六百秒為二率初杅復圓距弧化秒為三率求得四率為妙以時分妝之淂初杅復圓距時求初杅時刻置食甚時刻減初杅復圓距時淂初杅時刻不足減者加二十四時減之初杅即在前一日命時之法典平望同
