body:
  text: 黃赤距度表黃赤距度表按二分二至分順逆列之二分後之各宮列于上降婁大梁實沈三宮係春分後為北緯壽星大火析木三宮係秋分後為南緯其數同二至後之各宮列于下鶉首鶉火鶉尾三宮係夏至後為北緯星紀元枵娵訾三宮係冬至後為南緯其数同太陽實行在上六宮者用順度太陽實行在下六宮者用逆度用表之法以實行之宮對實行之度分其縱橫相遇
