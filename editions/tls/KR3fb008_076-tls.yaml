body:
  text: 辰亥兩矩形亦等夫寅丑即甲丙甲乙兩邊之并寅辛其較辛庚即壬寅亦即庚丙辰戍即乙丁丁丙兩分邊之并辰未其較辰未即辰午亦即戊丙今兩矩既等故以已丙與庚丙相乘所淂之丑辛矩形代乙丙乘戊丙之辰亥矩而以乙丙除之即戊辰淂辰未亦即戊丙勾較也于是元形三邊其搃與較相比為乙丙與已丙若庚丙與丙戊成互相視之比例既淂丙戊自有乙丁與丁丙兩邊而元形所分甲丁丙形內有甲丙丁丙兩邊及丁直角可求丙甲二角甲丁乙形內有甲乙丁乙二邊及丁直角可求乙用両角末以兩甲角并之為丙甲乙鈍角一率乙丙大邊八丈六尺三寸八分三厘二率巳丙兩邊并十丈五又九寸六分三厘三率庚丙両邊較四丈五尺九寸六分三厘四率丙戊較邊五丈六尺三寸八分三厘既淂丙戊用減丙乙大邊存三丈為戊乙半之淂乙丁一丈五尺轉減乙丙存七丈一尺三寸八分三厘為丁丙于是依直角形法求淂丙角二十度乙角六十度甲角一百度凡直線形有三邊可求三角若有三角不能求三邊止可淂其比例故直線無三角求三邊法附三角形內容外切等法三角形內容圓甲乙丙三角形求容圓法均分甲乙丙三角之
