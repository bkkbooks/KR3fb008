body:
  text: 丁上半周受光為明丁丙下半周彂影為暏恒以一半受光于彼靣一半射影于此靣而相反一明暗两骵任一運動影随之移如甲為明骵戊為暗骵甲發光射戊生巳影設以戊暗骵移至丙則為丁影若以甲明骵移至乙則為辛影任一轉動影必随之一影心與明暗两骵之心為一直線如一圖影心戊必與明暗两骵之心甲乙為一直缐一明骵小暗骵大發光以大半受光以
