  text: 以積日與火星每日平行一千八百八十六秒六七三五八相乘滿周天一百二十九萬六千秒去之餘為積日火星平行加火星平行應二宮一十三度三十九分五十二秒一十五微淂火星年根上攷徃古則置火星平行應減積日火星平行淂火星年根求最高年根以積日與火星最高每日平行十分秒之一又八三四三九九相乘淂數為積日最高平行加火星最高應八宮初度三十三分一十一秒五十四微淂最高年根上攷徃古則置火星最高應減積日最高平行淂最高年根
