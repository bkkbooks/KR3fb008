body:
  text: 窺筩諸器即分秒可得若諸星骵微光渺測候頗難月骵大矣而去地甚近視差甚大無由得其真度分古今法考月離經度者必因其食甚時刻考太陽之經度加半周天得太隂之經度故自昔名暦家先測太陽定其行度經度次及月五星恒星之行度經緯度以為定法故日行者諸行之本也今以太陽經緯行度諸義著於篇為推步之準則焉測太陽歲寔及平行太陽行天一周之月日時刻名為歲實其起算之㸃有二一從某節某㸃二分二至之類皆名節或亦稱㸃行天一周而復於元節元㸃名太陽之節氣歲一以太陽會於某星行天一周復與元星會名太陽之恒星歲但恒星有本行自西而東詳後恒星篇如今年春分太陽會某恒星至來年春分此星已行過春分若干太陽至春分已滿節氣歲之寔而尚未及元星若干分又湏行若干時刻逐及於元星而與之會乃滿恒星歲之寔故恒星歲寔必多於節氣歲寔今暦家所用以節氣歲寔為主但古法以冬至為界新法則用春分盖冬至時日軌極低蒙氣甚盛且去離赤道一日止十三秒測器之上最難得其真時刻若春分時日軌漸髙蒙氣漸散其緯行甚大每日約二十四分測算易見真確其法先㝎本地北極髙度訖次於春分或秋分前後三四日內用大儀器於午正初刻連測得日軌髙度比例推求以得入交㸃真時刻又用前世寔測前後相較則歲寔可㝎今
