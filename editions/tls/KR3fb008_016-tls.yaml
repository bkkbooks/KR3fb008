body:
  text: 如甲乙丙形乙丙為底甲丙甲乙為兩腰大凡三角形大角對大邉小角對小邉反之大邉對大角小邉對小角如甲乙丙形乙角大于丙角則對乙角之甲丙邉必大于對丙角之甲乙邉而丙角又大于甲角則對丙角之甲乙邉亦必大于對甲角之乙丙邉七凡三角形之兩邉并必大于一邊如上啚甲乙丙乙兩邉并必大于甲丙邉甲丙乙丙両邉并必大于甲乙邉甲丙甲乙兩邉并必大于乙兩邉八両三角形若相當之両腰各等兩底之等則兩形之三角必等九兩三角形有二邉一角或二角一邉等則兩形必等十兩三角形其三邉不等而三角相等為相似形如啚甲乙丙三角形試作戊丁線與乙丙平行以兩腰引出之遇于戊于丁復成一甲戊丁形而甲戊丁形之三角與甲乙丙形之三角等何則戊丁既與乙丙平形則甲乙丙角與甲丁戊角等乙丙甲角與甲戊丁角等甲又為交角則兩形之三角必等而三邉則不等名為相似形或如三啚戊巳庚形與甲乙丙形其三邉俱而両平行則
