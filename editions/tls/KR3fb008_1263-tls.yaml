body:
  text: 其宿鈐每年加歲差五十一秒如寔經度小于宿鈐不及減改前宿以月寔經度查黃道赤同升表對度取之得所變食甚時月赤道宮度記寫宮名以所入宿黃道宮度並其宿南北緯度入儀象其宿赤道度置所得食甚時赤道宮度以本宿赤道宮度減之餘為食甚時赤道宿度或用弧三角法求之更密定月食方位視食十分已上者初虧正東食既正西生光正東復圓正西不及十分者看月距黃緯號在南者初虧東北食甚正北復圓西北黃緯號在北者初虧東南食甚正南復圓西南月距黃緯寔交周宮至五宮為緯北六宮至十一宮為緯南
