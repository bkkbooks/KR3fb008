body:
  text: 寔會中會以地心為主日月會望雖在黄道而寔以地心所出宜線上至黄道者為主如會望時日月之骵两居此線之上則寔會也即南北相距非仝一點而搃在此線正對之過黄極圈亦為寔會過黄極圈者過黄道之两極而交于黄道分黄道為四直角者也盖于後旁視之雖地心各出一線南北異緯徔黄極視之即見地心所出二線東西同是南北正對如一線也故謂之實會若日月各居其本輪之周地心所出線上至黄道而两本輪之心即日月平行所至俱當此線之上則為日與月之中會鳥如圖甲為地心亦為黄道心亦即太隂平行天心乙為太陽本天心與地不同心小圈為月本輪設太陽平行在丁作甲壬線與丁乙平行即太陽
