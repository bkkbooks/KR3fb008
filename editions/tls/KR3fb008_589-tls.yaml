body:
  text: 為倾銷而減大為小故側数恒少而寔影非人目所及見也令測淂日在最髙月亦在最髙其視影半徑為四十三分若日在最髙月在最𤰞視徑為四十七分大小之差四分準此以求月髙𤰞各度之視半徑如圖己甲子為寔地影巳癸子為視地影外子甲巳癸皆侵去之数子癸巳為食月之影求之法以月最髙距地所測壬乙辛視影角四十三分與最𤰞距地午乙戊視影角四十七分相較淂午乙壬角四分為搃影差次用壬乙辛形求乙壬線以與
