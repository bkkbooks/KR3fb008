body:
  text: 十二度二十八分最小一十度十六分平望之食限為十五度六分平望距定望最遠淂二度三十八分者以太陽之均数最大者二度三分十五秒太陰均数最大者四度五十八分二十七秒并淂七度一分四十二秒為两交時日月以寔度相距極遠之弧也徙太陰逐及于日行訖七度二分此時間太陽又自行三十二分二十八秒太陰又湏逐及更行三十二分此時間太陽又行三分弱共為三十五分以加太陽均度淂二度三十八分為日月之寔會望距平望也如圖甲乙為地心所出過本輪心直線至黄道乙指中會即平會太陰寔行在丙太陽寔行在丁搃丙丁弧七
