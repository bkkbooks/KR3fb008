body:
  text: 分三十七秒四十五微過最髙加周歲四分之一九十一日七時二十七分一十一秒一十五微淂秋分後丙午日己正一刻一十三分四十九秒過中矩在黃道應從最髙子行九十度至寅為辰宮七度四十四分三十六秒四十八微而在本天則從最髙庚行九十度至辛當黃道之申令以寔測求其𦀇度在辰宮五度四十一分二十七秒零八微即申点之度不及中距二度三分九秒四十微即甲寅弧當辛甲庚角與甲辛己角䓁檢其正切淂三五八四一六為己甲两心差與暦書所載同若用春秋分立夏三即氣寔測相距日時依法求两心差及最髙所在皆與永年表不合矣最髙行及本輪均輪半径
