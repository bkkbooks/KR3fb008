body:
  text: 大火宮十九度五十六分半水星最高在壽星六度五分則引數為四十三度五十一分半又平視兩行相減淂十七度二十一分半如圖甲地心庚最高庚乙巳丙為引數依法求淂乙甲丁初均角一度三十三分丁甲邊一三九二以初均與乙甲辛角十七度二十一分相減淂丁甲辛角次丁甲辛形有丁辛丁甲二邊有丁甲辛角求辛丁甲角淂辛午弧三十一度三十三分加半周淂癸午辛弧二百十一度三
