body:
  text: 一率鈍角正弦九八四八一二率丙乙八丈六尺三寸三三率丙角二十度正弦三四二二四率甲乙邊三丈求甲丙邊法甲鈍角正弦與乙丙邊之比例若乙角之正弦以両直角一百八十度減去甲鈍角一百度再減去丙角二十度餘六十度為乙角與丙甲邊凡直線形有両角即有其三然入算仍用二角後倣此一率鈍角正弦九八甲八一二率丙乙八丈六尺三八三三率乙角六十度正弦八六六三四率丙甲七丈子尺九六三求乙角用減弧法淂六十度為甲乙丙角第四法有兩角一邊其連連兩角求餘角餘邊甲乙丙鈍角形有甲鈍角一百度有乙角六十度有甲乙邊三丈求丙乙邊法置両直角與所有甲乙兩角相減餘為乙丙甲角次丙角之正法與甲乙邊若甲角之正弦與丙乙邊一率丙角二十度正弦三四二二二率甲乙三丈三率甲鈍角正弦九八四八一四率丙乙八丈六尺三寸八分三厘若不先求丙角用分形法後甲向乙丙邊作甲丁垂線分本形為甲丁丙甲丁乙兩直角形先用乙甲丁形形有丁直角有甲乙邊有乙角求甲丁全數與乙角之正弦若甲乙邊與甲丁邊再求乙
