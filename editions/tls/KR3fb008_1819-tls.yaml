body:
  text: 五星視差生于地半徑其測筭之法並與太陽太陰同土木二星距地極遠地半徑與本天半徑之比例土星為一與一萬九百五十三木星為一與五千九百一十八其最大之視差俱不滿一分可以不計火星在㝡高之比例為一與三千一百二十三其㝡大之視差為一分六秒在中距之比例為一與一千七百四十四其最大之視差為一分五十八秒在最卑之比例為一與四百一十其最大之視差為八分三十二秒金星在最高之比例為一與一千九百八十三其㝡大之視差為一分四十四秒在中距與太陽同在最卑之比例為一與三百一㝡大之視差為十一分二十五秒水星在最高之比例為一與一千六百三十三其最大視差為二分六秒在中距與
