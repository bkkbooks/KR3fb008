body:
  text: 為影心內圈為地影甲丙為距度小圈為月太陰心至丁為初虧壬點至乙為食既未點至甲與影心正相對為食甚至亥為生光午點至子為復圓丑點其丁甲與乙甲為初虧食既行度亦即所歷時分也甲子為復圓時分甲亥為生光時分如太陰不全食止有初虧復圓兩限而無食既生光也月在影之光色月既暗骵當全食時一入地影遂應失其借光非復人目可見盖可見之物悉無原光必借外光以顯其象無外光即無從見有此
