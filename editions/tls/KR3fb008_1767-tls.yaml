body:
  text: 定日食方位歷來曆書定日食初虧復圓方位月在黃道北初虧西北復圓東北月在黃道南初虧西南復圓東南食八分巳上初虧正西復圓正東比東西南北主黃道之經緯言與人目所見地平經度之南北東西頗不相合今亦如月食法㝎初虧復圓之點在日體之上下左右乃于仰觀為親切也法從天頂作高弧遇日心至地平即分日體為左右兩半周又平分為上下兩象限即成左上左下右上右下四象限乃視月距黃道之南北與距黃平象限在東西及交角之大小而初虧復圓之點可㝎矣如月在黃道上無緯度又在黃道象限上而交角滿九十度則初虧正右復圓正左在黃平
