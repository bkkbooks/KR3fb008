body:
  text: 弦求之全數與壬災正弦若壬己距午度餘弦即己甲弧正弦與己辛度六八二四四查弧潯四十三度有竒即太陽太己點未正時高弧也己正同求太陽距赤道南北即酉時高弧壬子為赤道壬癸為距北緯度癸辰為締北距等圈締北高弧書夜所歷一周之乾跡與赤道為距等圈壬丙為距男締度丙丑為締南距等圈其壬癸壬丙南北兩距度設相等如清明締北距度與驚蟄締南距夌相等夫太陽在締北癸線交地平于潯書線癸辛大夜線辛辰小緯南丙線交地平于未潯丙未書線小夜線未丑太癸壬丙三點俱為午正而癸辛與未丑等丙未與辛辰等盖太陽南北距度同則書夜相反而等也如冬至之書與夏至之夜正等今欲求太陽南北締度各刻
