body:
  text: 者有六大圈亦分天元球為十二舍地平已上常見者六舍最要者地平與南北圈也其次序從東地平起為初舍入東一舍為第一入東二舍為第二至南北圈之底起第四西地平上起第七南北之頂起第十此法為用甚大醫家農家及行海者所重頼也如啚丙丁壬為東西侶圈甲乙為兩極甲丁乙為地平圈甲戊乙甲庚乙諸圈皆過極大圈也其用之則發尤啚甲乙丙丁為地平甲為東地平起一舍已為底極起四丙為西地平起七戊為頂極起十也又東西圈平分天球為南北二方以定正夘酉赤道出入交地平造日晷必用之赤道天元赤道者繫于常静之天平分天骵者也各圈各有心天元赤道之心即大寰之心也即地心也各圈各有極天元赤道之極之軸即大寰之極之軸也亦即地之極之軸也天元赤道之左右各有距等圈以度論則九十為天元緯圈其前後各有過極圈以度論則一百八十為天元經圈過極圈者所以定經度容緯度者也如啚甲乙為中圈其上五經圈為甲丙有兩過極圈以限之丁甲戊限其首丁丙戊限其尾甲丙在其中是大圈所容之六經度也又如丙已為過極圈上四緯圈則首尾兩㸃有兩距等圈以限之
