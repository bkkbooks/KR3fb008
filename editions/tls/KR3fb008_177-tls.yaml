body:
  text: 丁乙戊丙乙甲丙三形皆相似形甲乙與乙丙若乙丙與丙戊又乙丙與丙戊若丙戊與戊丁成四率相連之比例合之甲乙與乙丙亦若丙戊與戊丁甲乙為首率乙丙二率丙戊三率戊丁四率夫甲乙即乙庚也庚已已丁戊丁三線即乙丙也是乙庚一率中有二率之三倍而少一戊丁四率今以乙庚一千萬分為首率作相連比例使四率與一率相加等于二率之三倍用益積歸餘法算之淂乙丙二率三百四十七萬二千九百六三五五為乙丙三十度之弦若作圈內九等邊內切形每邊四十度即從十八邊形求之如前五等邊由于十等邊之理宗率總表邊弧度三一百二十一七三二五八四九十一四一四二一九六五七十二一一七五五七四六六十一十三十六六一八三四十五二十四四一五八二三四十八二十三四七二九六三即淂各弧之全數半之即各半弧之正弦此為割圓之根求各弧度之正弦
