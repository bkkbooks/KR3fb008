body:
  text: 與寔行合為一線本天與黃道皆平分為两半周太陽歴半周歲而適行半周天其度分即髙卑所在自最卑歴周歲四分之一至中距應行九十度其寔行至過于九十度者即積盈之度自最髙歴周歲四分之一至中矩亦應行九十度其寔行之不及九十度者即積縮之度檢其正切即两心差之数也今以丁酉年逐日寔測日躔度分求淂最髙過夏至最卑過冬至各七度四十四分三十六秒四十八微又自太陽過最髙之日分加周歲四分之十求其時刻之寔行不及中距二度三分九秒四十微檢其正切淂三五八四一六皆與暦書所載相合是故用两心差之全数以推盈縮惟中距與寔測合其餘冣髙前後两象限則失之小最卑前
