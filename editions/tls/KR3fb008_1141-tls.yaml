body:
  text: 次以距至日入周歲平行表查星平行與年根數相加淂星平行及平引若有時分再查時刻平行表取數并入以平引查加減表相較得初均或自行均記加減號隨于初均下録取中分初均依號加減于平行引數在前六宮為減後六宮為加五星皆同得寔經以本日太陽寔經度日躔條求淂數內減去星寔經為及減加十二宮減之為星距日次引以次引入加減表查次均相較得數隨即于次均下其較分并記次均加減號凡查表數俱俱用中比例法以作表乃整度而引數必有零分故也他倣此次以較分化秒為二率中分化秒為三率取一度化三千六百秒
