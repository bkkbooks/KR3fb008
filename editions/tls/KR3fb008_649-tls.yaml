body:
  text: 之經緯皆非人目所見之数矣故必以南北差加減距度乃得人目所見之距緯以東西差變為時刻加減寔會時刻乃得人目見太陰掩日之時刻以為視會盖髙下差變昜其髙度從天頂圈上看南北差變昜其緯度從黄極圈上看東西差變昜其經度為黄道上之弧筽視差必以三者為宗以求各差如面設日食在午東甲為天頂丙為地心甲寅為子午圈子庚為月天巳癸為黄道辛為中限辰邜為地面戊未與申壬為過黄極大圈甲丑為髙弧圈辰為人目丙辰為地半徑乙為月體丁為日體在丙丁一直線上丁點為寔會使人從地心丙視之見日月同經同緯而會于丁今人目不居丙而居辰從辰視太陰乙則見太陰在壬尚與太陽有丁
