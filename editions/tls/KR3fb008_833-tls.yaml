body:
  text: 食所向之方矣古定日食俱以初虧向正西或西南或西北復圓即向正東或東南或東北或食初虧向東復圓即向西或偏東偏西此定法也細攷之殊多不然蓋初虧復圓兩向相反者此非一食可有之事必兩食而日月體不全食或有之所以然者黃道隨天左運斜升斜降太陰行陰陽曆又迤斜而虧與復必不仝也至日食方位之變不但以黃道之升降即視差亦有之蓋虧與復高弧各不仝則視差之偏南北喲異因而方向亦昜也測太陰食之時日月食起復之間光為影所損而態之變遷其形無數今大都以
  hash: sha256:5fa345acb19da788cb8d6e3b926a8c231f96568438ef7f75b3b38c6bc68f8e9b
