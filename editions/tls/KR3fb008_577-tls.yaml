body:
  text: 距地線算初均三角形内之第三邊今用變與地半徑為同類以求視差法月最高距地線一度二九為一率五十八度八分為二率測淂月本輪最高距地為五十八地半徑又八分本輪某度距地心線為三率求四率淂月距地数推太陽距地法同地影半徑月之有食生于地影必詳求影之骵勢影之長短以及影徑之大小而後一切食分多寡虧復遲速皆淂其真但地影變昜多端亦有寔徑視徑之異而月食時人目所見則皆視地影之徑也一明暗两骵相遇則生影如圖甲為明骵乙為暗骵甲骵必徔己徔庚發光射乙切其周于丙于丁以生丁戊丙之影乙骵之丙
