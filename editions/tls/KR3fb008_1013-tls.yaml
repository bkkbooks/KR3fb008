body:
  text: 此而作卑辛線與丙沖平行辛即為星最高指線又作平甲線與壬乙平行亦得其平經一一皆與大圈等又以乙為日骵何也曰太陽寔行降婁宮度原在黃道大圈其離降婁之度為乙角心降弧今太陽指線遇乙至甲則甲角乙春弧與乙角等度而乙點在次圈甲心所作之圈上距春分之度乙春大圈等璧婁即太陽真經度則乙亦可命之為日骵矣且寅乙甲角元為星遇沖日之度與申寅乙等而甲巳又與寅乙平行則巳甲未角又與寅乙甲角等而已亥弧與歲輪上申亢同為申距日沖之弧使以已為合伏則已亥乙弧即太陽天上張角婁弧亦即歲輪上戌亢申弧可見以乙為是骵以次圈命為太陽之天而乙心所作大圈以
  hash: sha256:799d11feea175a95e12d81d1b7bc4595eeb5dc0cd257b2e98c86931fc46f24db
