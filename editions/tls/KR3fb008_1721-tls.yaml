body:
  text: 黄道爲宻今法以白平象限爲本推日食三視差白平象限即白道在地平上半周折中之豦東西距地平各一象限然求白平象限諸数必由黄平象限諸数而淂今將黄白两道象限之不同作圖明之甲爲天頂外大圈爲地平離坎爲子午圈丁爲赤極震兑爲赤道從丁按黄赤大距二十三度二九三如丁壬作辛壬負黄極圈設癸點爲黄極則黄丑平象道自黃極癸遇天頂甲作癸甲寅遇黃極經圈則已點為黃平象限丑爲黄道出地平黄爲黄道入地平黄已丑已皆九十度已寅爲中限偏于午東盖黄平象限之高已因黄極癸繞赤極左旋故赤道之中常在戊而黄道之中限已則偏左偏右也夫黄極既一日繞赤極一周則白極随天左旋一日亦繞黄極一周今從癸按朔望之黄白大距四
