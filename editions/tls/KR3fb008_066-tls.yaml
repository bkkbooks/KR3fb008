body:
  text: 正弦與角對邊之比例等則丙角之正弦與甲乙邊若乙角之正弦與甲丙邊更之丙角之正弦與乙角之正弦若甲乙邊與甲丙邊夫丙角正弦夘丁也乙角正弦乙戊也則夘丁與乙戊若乙甲與甲丙而丁夘乙戊已兩形為相似夘丁與乙戊若夘已與乙已則夘甲即甲乙與甲丙若夘已與已乙矣今以乙甲即夘甲甲丙兩邊相加為夘丙又相減為寅丙甲寅與甲乙等甲丙內減甲寅存寅丙而夘已已乙兩弦相加為夘乙又相減為午已乙午與夘已等乙已內減乙午存午已則夘丙丙邊搃與夘乙兩弦之搃若寅丙丙邊之較與午已兩弦之較更之夘丙與寅丙若夘乙與已午夫夘辰為夘乙之半已辰為已午之半依全與全之比例若分與分則夘丙與寅丙亦若夘辰與已辰而夘辰與已辰又若癸庚與辛庚庚甲癸辰甲夘兩形相似故則夘丙與寅丙亦若癸庚辛庚矣故以夘丙為一率寅丙為二率庚癸半外角切線為三率求四率庚辛切線得庚壬為乙丙兩角之較弧用以減庚夘半弧得壬夘弧為元形丙角之度加乙庚半弧得乙壬弧為元形乙角之度一率夘丙十丈五尺九寸六分三厘二率寅丙四丈五尺九寸六分三厘三率庚癸半外角四十度之切線度八三九一四率庚辛切線度三六三九七求弧得庚壬弧二十度以加乙庚四十度得乙壬六十度乙角也減庚夘四十度得壬夘二十度丙角也
