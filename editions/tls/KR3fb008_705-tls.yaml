body:
  text: 驗多在北海之濱北極高五十六度累年密測終不見太陰盡掩太陽盡晦星現是則日光恒盈月魄恒縮又將疑捲之不盡為恒事矣迨萬曆庚子六月朔于內地北極高五十度測得日食五分有半依本地原推正應四分較多一分有半則又日光縮月魄盈也又萬曆辛丑十一月朔日全食第谷門人于本地北極高六十餘度測得食甚時見金環四周皆廣一分有半太陽徑十二分萬曆戊申七月朔日食西土內地北極高五十一度測食甚時得二分正同時向北更四度論高視差宜減一分猶宜見食一分而密測乃不見食此兩測者皆日光居盈且盈甚也而皆無雲綜其大都極出地甚高近海或大澤食時多雲氣則月光贏測數少于推數極
