body:
  text: 淂子亥為東西差未申同亥辛為南北差距北淂癸壬為東西差午未同丑壬為南北差其申午两點則指太陰黄道上視經度也太陰有距度求南北東西差太陰有距度求南北東西差其法稍繁然日食時月距黄道甚少即以無距度筭若欲細求之如啚甲巳丙為子午圈甲乙丙為地平丁乙為黄道天頂在巳太陰在子則子邜為髙弧子癸為髙差辛為北極戊庚圈負黄道極戊自戊出大圈之弧戊壬過丑指太陰寔經度而丑子為寔距度又出一大圈弧戊癸至太陰視度癸徔癸作垂線至壬淂
