body:
  text: 甲為地心醜辰為星本天辰為交置伏見輪在醜作子午伏見輪丙為合伏以伏見輪斜交於本道故沖為退合醜丙醜戊角為伏見輪與本道之交角丙邜弧測淂金星為三度二十九分水星五度四十一分丙醜線在伏見輪面邜亥線在黃道面丙戊線丙醜戊角之正弦變與伏見輪半徑為同類金星為度四三九水星度三八一八醜甲為輪心距地心線即求初均時均輪上距地心線設星伏見寔行為兩乙弧星在乙求前緯法從乙作乙癸垂線至徑上即丙乙弧正弦癸醜其余弦又作癸甲線成癸甲醜形形有醜甲有癸醜有癸醜甲角丙醜戊之餘角求淂癸甲線次用癸甲乙形癸為直角有癸甲有癸乙求淂就甲星骵距地心線次用乙丁庚形此形與丙醜戊形相似其丁庚線在黃道面上與戊醜平行庚為直角全數與丙戊若乙丁伏見行余弦與乙
