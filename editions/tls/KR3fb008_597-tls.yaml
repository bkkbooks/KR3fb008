body:
  text: 年庚子三月其地距順天府西八十一度夘初時淂見食于時太隂交周淂九度二十分距黄道北四十八分三十秒食全徑十二分之三又周景王二十二年戊寅六月里差同工順天府寅初時淂見食于時太陰交周淂七度四十二分距黄道南四十分四十秒食十二分之六如圖巳乙戊丙為地影丁與戊為两食太陰所過巳甲丙線為黄道第一食月在丁次食在戊各依食分入影為巳辛為戊庚其太陰之距度為甲丁四十八分三十秒甲戊四十分四十秒而甲戊與甲巳必等則甲丁減甲戊餘巳七分五十秒又巳丁為月徑四分之一而先淂月
