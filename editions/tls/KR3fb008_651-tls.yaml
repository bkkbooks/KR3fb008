body:
  text: 壬之差未見同度而丁壬即高𤰞差也壬丑為視髙丁丑為寔高夫實會時太陰既在壬則前所推寔會時刻丁點非人目見食之時法于黄極上作申壬大圈過太陰壬截黄道于午則寔會時人目見太陰之黄道經度為癸午並不與太陽之黄經癸丁同度其差為午丁乃東西差也若欲得視會湏以壬太陰進退之使掩丁日如本啚則應以午丁弧化時減前寔會時刻使太陽與太陽同度在戊未圈上其所退之
