body:
  text: 步五星推土星用數康熙二十三甲子年天正冬至為曆元周天三百六十度入算化作一百二十九萬六千秒周日一萬分周歲三百六十五日二四二一八七五紀法六十土星每日平等一百二十秒小餘六二二五五一土星每日平行二分三十六微八纎七忽六芒以秒法通之即淂土星最高每日平行十分秒之二又一九五八三土星最高每歲平行一分
