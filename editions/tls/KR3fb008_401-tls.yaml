body:
  text: 後第谷更立新法不用不同心圈竟用兩小輪推算其一代不同心圈其一代大均圈所淂均數與歌白泥法等而立圖更為簡當今新法用之如啚㨿前歌白泥法甲為地心子甲為兩心差之全取子甲八之六為甲己己為心己丑全數為度作丑夘載均輪之圈設自行度為丑丁即以丁為心子己兩心差八之二為半經作小均輪于輪上取未戊弧與丑丁等作戊丁線成丁甲戊己丁甲二形求得甲丁二角并之為丑丁弧之均數今第谷法則不然以甲地心為心甲辛前數為度甲辛與己丁等作酉辰為引數平行圈前設自行為丑丁弧今子酉辰圈上取酉辛自行與丑丁等次以自行所至辛㸃為心兩心差八之六為半徑作庚壬圈名為本輪或曰自行圈又作丁辛線恒與丑甲平行即丁辛庚角與酉甲辛角等庚丁弧即酉辛自行也自行止丁次以丁為心兩心差八之二子己為半徑作乙戊小均輪乙為最近最近于本輪心辛也從乙取庚丁弧之倍右行至戊小均輪從最近右旋淂七政骵在戊次作丁戊辛戊丁甲等線戊丁辛戊辛甲戊二形求得辛甲戊角為酉辛弧之均數夫同一張數丑丁與酉辛等歌白泥以丁甲戊己丁甲
