body:
  text: 分每分各為九十度如啚甲乙為赤道極丙丁為赤道戊已為黃道庚為二道之交則甲庚乙為極分交圈甲丙已丁為極至交圈測黃赤道相距不用黃道之緯度經緯線相交為直角一名廣度而用赤道之緯度從黃道出線與黃道為斜角至赤道作直角名偏度如降娄宮三十度若用廣度則相距十三度今用偏度則十二度半所以然者為黃道斜迤若用廣度則分及一象限無法可分不若用赤道之平直四象皆通也本以黃道之三十度立算而用赤道之侶圈且與赤道為直角與黃道為斜角故名為赤道上之黃道偏度非從赤道目為偏度也其在赤道自名旁度侶度黃道一象限九十度各有其偏度最逺者二十三度有竒不言三百六十者餘三象限皆同理故也如啚甲丙為黃道弧若廣度則值甲乙偏度則值甲丁即作庚丙丁辛去離圈丙丁在其上為距度測黃道弧之經度亦不用黃道經度而用赤道之經度如降娄宮本三十度以赤道測之則二十七度為此宮之黃道斜而長赤道直而狹故不命降娄一次黃道之長度曰三十而命赤道上之黃道升度曰二十七也本以黃道之三十度立筭而用赤道之經度二十七其去離圈亦與赤道為直角名為赤道上之黃道升度非從赤道目為升度也在赤道自名上度
