body:
  text: 本大于甲乙而壬日去地壬丁甚逺人徔丁視日骵則為丙丁辛角之已戊弧不過天度七百二十之一其寔丙辛大于甲乙五倍餘丙辛為寔徑已戊弧為視徑天度之分一月視徑與日視徑如等月骵小于日二十倍而其視徑及若加大于日者如圖子丑月寔徑本天于辰夘日寔徑但月之距地癸丁甚近人視之淂子丁丑角午壬弧為視徑若日之距地辛丁甚逺人視之為辰丁夘角未戊弧為視徑而未戊反小于午壬故恒淂日月两視徑如等一日月本輪高𤰞昜視徑之大小日月因距地極逺以寔徑昜
  hash: sha256:a1f9b616d14a1c0943866363c7b3ebfbbe23c7dfec5a46de79bd1e0337ee4171
