body:
  text: 乗滿周天一百二十九萬六千秒去之餘為積𦍤太隂引数加首𦍤太隂引数應九宫一十八度三十四分二十六秒一十六㣲得首𦍤太隂引数上放徃古則置首𦍤太隂引数應減積𦍤太隂引数淂首𦍤太隂引数求首𦍤太隂交周以積𦍤典太隂交周𦍤策一十一萬四百一十四秒一六五七四相乗滿周天一百二十九萬六千秒去之餘為積𦍤太隂交周加首𦍤太隂交周應六宫初度三十分五十五秒一十四㣲淂首𦍤太隂交周上放往古則置首𦍤太隂交周應減積𦍤太隂交周淂首𦍤太隂交周宫度
