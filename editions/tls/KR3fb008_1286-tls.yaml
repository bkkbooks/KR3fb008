body:
  text: 為三率求淂四率為秒以分妝之淂年根年根者乃所求本年天正冬至次日子正初刻太陽距冬至之平行經度也求紀日以天正冬至干支加一日淂紀日紀日者乃所求本年天正冬至次日之干支也故加一日求值宿置中積分加宿應五日六五六三七四九二六為通積宿其日滿宿法二十八去之外加一日為值宿日分上考徃古則置中積分減宿應為通積宿其日滿宿法去之餘數轉與宿法二十八相減外加一日為值宿日分自初日角宿起算淂值日值宿乃冬至次日之宿故外加一日求日數
