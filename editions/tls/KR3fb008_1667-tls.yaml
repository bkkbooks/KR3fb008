body:
  text: 而時刻為之進退盖以髙卑為加減之限也一周赤道之升度而時刻為之消長盖以分至為加減之限也新法暦書合二者以立表名曰日差然髙卑每年有行分則均数必不能相同歲久即不可用今分作二表加減两次庶于法為宻又新法暦書日躔與交食两表未能畫一其升度與均数相減併之理亦未清椘盖日差表乃西國古法即西人近日亦已棄而不用矣如圖甲為地心乙為本輪心冬至后本輪心平行一百一十八度餘至乙太陽從本輪最卑自行一百一十一度餘至丙従地心甲作寔行線至丙割黃道于丁丁乙弧即平行寔行之差設推淂某日申正太陽平行乙未到酉宮尚一度餘因行盈暦寔行大于平
