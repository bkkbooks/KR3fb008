body:
  text: 行故平行乙雖未至酉宮而寔行丁己交酉宮若以平行乙所臨之時刻為交宮之時刻則為申正太陽入酉宮是為平時然平行乙雖臨于申正而太陽丙寔在其東一度餘即丁乙弧故必此一度餘變時約淂五分為時差以減申正淂申初三刻十分太陽入酉宮是為用時也故凡最卑後半周寔行皆大于平行則用時在平時東其時差冝減最髙後半周寔行皆小于平行則用時在平時两其時差宜加此以最髙卑為時差加減之限黃道上事也然時刻以赤道為主黃道上之用時猶非赤
