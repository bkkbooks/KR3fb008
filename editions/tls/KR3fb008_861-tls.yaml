body:
  text: 欲求其黃道之經度等者謂兩測時太陽亦在元經度先測次測皆在一度則太陽無高卑遲疾之差且同經度則星亦在本圈之故處矣距本圈之最高或最卑既等即兩測之時星為同類之行而滿其周率倘後測時或星未至其故處法約計其一日一時之平行用以補之如少一度於本時加一度相當之時若差多次日測之又測日次之求淂一時之星行度分補之以合於元經度若兩留時之中積則不可用何則星既再留而複於故處則其行亦滿一周然逆行之率有大有小前留與後留不能滿率又留時星無視動尤難定其進退之界或用星之初伏初見難定其定氣清濁則所淂伏見之度未真且正升斜升宮數不等即距日之時不等二者俱不可用也
