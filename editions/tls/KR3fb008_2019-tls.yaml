  text: 黃白升度差表黃白升度差表亦按兩交前後分順逆列之兩交後六宮列于上兩交前六宮列于下前後列距交白道度分順逆以別加減中列逐宮逐度之黃白升度差太陰距交寔行在上六宮者用順度其號為減太陰距交寔行在下六宮者用逆度其號為加用表之法以距交實行之宮對距交寔行之度其縱橫相遇卽所求之升度差也設太陰距交寔行為二宮六度求黃白升度羌則察二宮六度所對之数為
