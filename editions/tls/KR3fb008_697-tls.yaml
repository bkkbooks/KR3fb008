body:
  text: 升視之巳在赤道上迨太陽近午出蒙氣外復測之始以寔行交于赤道為真春分秋分友是而晨夕所測皆清蒙所生之視度也又此清蒙之氣隨地隨時各不同第谷測定清蒙諸差太陽與太陰大約相等而與諸星則不等其五星所得之差又與恒星不等因此推知致差之因不在距地遠近其差大小皆氣之所為也氣厚簿時之所為也氣距地遠近地之所為也凡攷七曜之蒙差皆候其高弧至于無蒙之處得其寔度而以較于有蒙之處得其視差幾何如第谷所居北極高五十五度冬至日夏至夜皆甚短其測候太陽之蒙差必於百月太陽出蒙氣之上乃可得之測恒星之蒙差又于冬月若夏測星冬測日則盡日盡夜緣在蒙氣中無法可
