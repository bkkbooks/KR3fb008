body:
  text: 六四二一其與地半径之比為一與一千一百四十二最卑距地九八二七九二本天半径減本輪半径加均輪半径其與地半径之比為一與一千一百二十一太陰在最髙朔望時距地心一一七二五本天半径加負圈半径減均輪半径減次輪半径又減次均輪半径即淂其與地半径之比例為一與五十八又百分之一十六中距𦍤望時距地心九九二二七三求初均数時並求太陰距地心之邊內減次均輪半径即淂其與地半径之比為一與五十六又百分之七十二最卑𦍤望時距地心九五九二五本天半径減負圈半径加均輪半径又加次輪半径減次均輪半径即淂其與地半径之比為一與五十四又百分之八十四如求太陽最髙前後四十度距地心線則以太陽最髙距地一一七九二八與一千一百六十二之比
