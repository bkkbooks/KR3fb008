body:
  text: 以日寔引檢日食月行表分三表查五六七宮在最高限取二三四八九十宮在中距限取一十一宮在高沖限取如日寔引滿十五度進一宮查之法以月寔引宮檢直行如月寔引十五度亦進一宮查之又以月視黃緯分檢上橫行取縱橫相遇之數淂所求為日食行度分此數復圓同用以十二求真搃時內減一時為前搃時以前搃時入九十度表查日距限記東西號若真時在限西而初虧限東則為異號及限距地並以前搃時如法求之置真時內減一時如前法以日赤緯檢高弧表求淂日距地高以九求月距地及本求日距地高如前法入視差表查月高下差以本求日距限及限距地檢交角表淂交角度
