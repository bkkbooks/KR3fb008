body:
  text: 次查恒年表本年下平行年根隨録本年高沖度分以距至日入周歲平行表查距至日平行隨録高行若有時分查周日時對準日行表得時分之平行高行加入高沖為本日高沖度分年根日數時分三平行數相加得本日時太陽距冬至平行平行內減去高沖為引數以引數查加減表相較以引數本度下所淂均數與下行相減餘分化秒為二率引數小餘化秒為三率以一度化三千六百秒為一率求得四率數視下行均數多用加少則用減以或加或減于本度均數為所求均數此名中比例法後同得均數隨記加減號太陽初宮至六宮為加六宮至十二宮為減月五星反是均數依號加減于平行得寔行
