body:
  text: 用上根數于大圓中求淂七弧之通弦若各度之弦尚無從可淂爰立三種公法轉輾推求以淂象限內各度之正弦而割圓表資之以成名曰三要法要法一前後兩弦上方形并與半徑上方形等如圖乙已象限內乙丁為正弦丙丁為其弦丁已為乙丁之餘弦從丁向甲已半徑作丁戊垂線為丙丁之餘弦其甲已上所截之甲戊與丙丁等則用丁戊甲勾股形以丁甲弦上方減去甲戊勾上方餘為丁戊上方求丁戊餘弦此為有一弧之正弦而求其餘弦也要法二有各弧之前後兩弦求倍本弧之正弦如圖設甲戊弧三十五度其正弦戊已餘弦乙已今以此二弦求倍甲戊弧甲丁之正弦丁癸法以半徑為一率戊己正弦為二率乙壬餘弦乙壬與己乙等為三率求淂四率壬庚與辛癸等倍之淂丁癸為甲丁七十度之正弦何則乙戊已乙壬甲兩三角形相等則乙己與乙壬等而戊己與甲壬亦等乙己與乙壬等故乙壬亦為餘弦而乙壬庚乙戊己兩形相似故第四率為壬庚壬庚與辛癸同為直角形之邊故等又丁壬戊戊壬甲同為直角則甲戊戊丁兩弧等甲壬壬丁兩弦亦等而丁辛與壬庚亦等故倍辛癸淂丁癸也又丁辛壬壬庚甲兩形之三邊俱等依勾股
