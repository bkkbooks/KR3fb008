body:
  text: 輪能加減本道之緯若僅用本道尚未立定星之緯行也設距合伏為合沖巳弧星在巳求緯限法先用丁甲庚直角形形有丁甲庚交角有丁甲歲輪心距地心線曆元時南大距土星在降婁宮二十度三十八分木得在降婁七度八分火星在元枵十八度七分因淂輪心距地心線土星為度九七五九三木星度九五二三火星度八九九求淂丁庚線次從巳作巳乙垂線至歲輪徑又從乙作乙甲丁形形有丁甲有乙丁甲角即丁甲庚角有丁乙以巳沖弧余弦因丁沖歲輪半徑而淂用變率法求淂乙甲邊次用巳乙甲直角形乙為直角有乙甲有巳乙沖巳弧正弦因歲輪半徑而得求淂巳甲邊為星骵歲輪周真距地心線末用戊甲癸形形有癸直角有
