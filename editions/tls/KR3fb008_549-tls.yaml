body:
  text: 庚一線內直指黄道淂丙則為日月寔相望之度若太陽在辛太隂在癸則日月两平行雖仝度子甲壬一線而寔度一在辛一在丑壬辛為太陽减均壬丑為太隂加均搃淂丑辛為平會時月距日之弧則宜以月行丑辛弧相當之時分减平會時刻淂丑月退至辛而與日同度于辛甲一線為寔會也儿丑辛弧所曆時刻月在日前則减月在日後则加搃以月後日由月行疾于日故也太陽本天加减差太陽行度有本天之高早以生加减則中會時平行度分尚非寔骵所在法冝推其加减之差以求寔度如圖甲為地心外圈為黄道已為冬至內圈為日本天丙為最高乚為本天之心甲乙為两
