body:
  text: 為最髙辛為最卑如七政在最髙壬則在壬甲一直線內酉夘乙平行即實行無均數若距最髙至戊則乙甲戊角為均數或乙子弧人目見七政骵在乙平行之後七政在本輪戊與在平行圈上子㸃不異以總在甲戊一線內故也應以乙子均數減平行淂酉夘子為寔行故凡引數在壬己辛半周寔行俱在平行之後恒用減若至最卑辛亦在壬甲一線內無均數過最卑上行如至丙則乙甲丙角為均數或己午弧午寔行在乙平行之前應以酉夘乙平行加乙午淂酉夘午為寔行故凡引數過最卑在辛丙壬半周寔行俱在平行之前恒用加今七政初均引數從壬最髙起初宮向戊歴辛左行故前六宮為減後六宮為加惟太陽引數從辛最卑起初宮故前六宮辛丙壬半周為加後六宫壬己辛半周為減其理一也若如五星次均以壬己辛本輪當年歲輪看在金水為伏見輪其距日度從壬合伏起初宮向丙歴辛過己右行故次均前六宮為加後六宮為減與初均恒相反要之加減之向皆行度自然之理奉表初次兩均加減之號悉依此定之最大均數不在三九宮初度凡七政最大均數宜右中距今恒在中距丁者何故曰凡均數最大處以人目視小輪周之切線所到為限如啚甲為地心從人目甲作甲丁線切小輪于丁則乙甲
