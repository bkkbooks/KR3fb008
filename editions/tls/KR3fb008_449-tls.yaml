body:
  text: 啚甲為黃極戊己為黃道戊庚為白道戊為正交設太隂距交為戊丁即從黃極甲作甲丁乙弧過月骵至乙成戊丁乙曲線直角形形有戊丁距交度有戊角五度八分有乙直角法全數興戊角之餘弦若丁戊之切線與乙戊弧之切線查淂乙戊弧與戊丁相減淂同升差為乙戊少于丁戊之數也測太隂地半徑差求距地心度前論太陽有地半徑差太隂亦然但月天與地甚近其視差更大測法與日躔同第谷測淂太隂當出入地平時在本輪最髙為五十六分二十一秒在最卑為六十六分六秒各家微有不同既有視差即可用以求月距地心度如啚甲為地心小圈為地球乙丙為視地平乙甲為地半徑乙丙甲角為視差六十六分六秒乙為直角乙甲半徑為度命為全數一度求月距地心之甲丙法為全數與乙甲一度若丙角之餘割線與甲丙淂五十二又十萬分之二萬一千二十五是月極近距地為五十二地半徑有竒若用最髙視差五十六分二十一秒推淂六十一又十萬分之二千七百八十一是月最髙距地為六十一地半徑有竒既定甲乙乙丙之比例若有月距天頂之
