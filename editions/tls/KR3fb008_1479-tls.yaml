body:
  text: 交周升度差并記加減號月離黃白升度差表乃以白道經度求黃道升度差若以黃道經度察表則所淂為白道升度差今寔望寔交周典地影心距交之黃道度等故察表即得交周白道升度差也求食甚交周寔望寔交周加減交周升度差淂食甚交周求月距日寔行用交食月距日寔行表以太隂寔引宮度察其所對分秒淂月距日寔行求食甚距時以月距日寔行化秒為以率三千六百秒為二率交周升度差化秒為三率求淂四率為秒以分妝之淂食甚距時交周升度差為
