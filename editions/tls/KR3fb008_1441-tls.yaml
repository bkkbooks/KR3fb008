body:
  text: 太陽本輪半徑二十六萬八千八百一十二太陽均輪半徑八萬九千六百四太隂本天半徑一千萬太隂本輪半徑五十八萬太隂均輪半徑二十九萬太隂次均輪半徑一十一萬七千五百太陽光分半徑六百三十七命地半徑為一百分立算下同太隂寔半徑二十七太陽最高距地一千一十七萬九千二百八與地半徑之比例為一十一萬六千二百
