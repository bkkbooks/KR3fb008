body:
  text: 本道之緯又有增損故欲淂緯度之真宜合距交及距日兩種行度求之夫所謂本道交黃道者三星之行不由黃道不由白道自有其道斜交於黃其相交兩點亦名正交中交當星在交上則無緯度兩交中處則大緯所謂歲輪交交本道者星之歲輪心旋居於本天周上歲輪之周則斜交於本天第其面又卻與黃道為平行面何以徵之凡星歲輪心當距交九十度此時星距合伏在三九兩宮則恰如本道緯若合伏時歲輪最高其緯則小於本道退沖歲輪最卑則大於本道又輪心在交點任星在歲輪周何度分俱無緯度又此歲輪雖見其加減本道之緯不能變南北之向如本道在黃道或南或北歲輪之緯亦在或南或北蓋星本道在黃道南北則歲輪全骵亦在或南或北
