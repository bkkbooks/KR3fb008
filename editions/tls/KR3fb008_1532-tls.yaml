body:
  text: 乘滿周天一百二十九萬六千秒去之餘為積朔太隂引数加首朔太隂引数應九宮一十八度三十四分二十六秒一十六㣲淂首朔太陰引数上攷往古則置首朔太隂引数應減積朔太隂引数淂首朔太隂引数求首朔太隂交周以積朔典太隂交周朔策一十一萬零四百一十四秒一六五七四相乘滿周天一百二十九萬六千秒去之餘為積朔太隂交周加首朔太隂交周應六宮初度三十分五十五秒一十四㣲淂首朔太陰交周上考往古則置首朔太隂交周應減積朔太陰交周淂首朔太隂交周
