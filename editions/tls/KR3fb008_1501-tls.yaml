body:
  text: 初杅緯差角求復圓緯差角用交食緯差角表以併徑分及復圓距緯分察其所對之度分淂復圓緯差角求初杅㝎交角太隂在限東者初杅緯南則以初杅緯差角典黃道高弧交角相加初杅緯北則以初杅緯差角典黃道高弧交角相減淂初杅㝎交角太陰在限西者初杅緯南則以初杅緯差角典黃道高弧交角相減初緯北則以初緯差角典黃道高弧交角相加淂初杅㝎交角如初杅無距緯則無初杅緯差角而黃道高弧交角即
