body:
  text: 九度五十五分視行為一百四度四十三分一測至二測之視經度差相較淂四度四十八分為均數平行大視行小星必在本輪下半周逆行後二測中積為四百二日七時平行三十三度二十八分視行三十六度二十九分相較淂三度三分為均數平行大視行小星亦在本輪之下半弧作圖與上星同法甲乙丙為三測丁為黃道心作丙丁戊甲甲丁乙甲諸線成多三角形先求甲戊弧之度一戊乙丁形有乙戊丁角十六度四十三分乘乙丙弧為後二測木星平行度有戊丁乙角一百四十三度三十一分乙丁丙角為後二測木星視行度戊丁乙角為其餘
