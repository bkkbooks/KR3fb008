body:
  text: 為三十一分夏至三十分太陰本輪最高時三十二分最三十四分皆約為天周七百二十之一此人目所見日月之两徑也視徑有大有小因其本天有高知故觧見後推日月寔徑及距地之遠依上所測視徑合以前論知人目所見日月皆視大小之骵而其寔象則相去懸殊其徴有亡何則所測視徑時見大時見小必非實像而為視象一徴也即有時等而日在上去人遠月在下去人近則日之寔徑必大二徴也月掩日下土所見九服各異如此方此時日全食南北相去四五度即不見全食東西仝時亦不見全食則是月視地球為小地視日亦小月視日更小三徴也地影短不䏻食荧惑何况星已上則地必
