body:
  text: 陽平行朔策者乃逐月平朔距首朔之太陽平行求逐月太陽平行朔策法以太陽平行朔策二十九度零六分二十四秒一十八微一十六纎累加之即得逐月太陽平行朔策太陽平行望策者乃逐月平望距首朔之太陽平行也求逐月太陽平行望策法以太陽平行望策一十四度三十三分一十二秒零九微零八纎與逐月太陽平行朔策相加即得逐月太陽平行望策太陽引数太陰引数太陰交周皆倣此用表之法如求首朔後第五月之朔策則察本表月数五所對各朔策之数録之其朔策為一百四十七日一十五時四十分一十六秒其太陽平行朔策為
