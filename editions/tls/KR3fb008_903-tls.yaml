body:
  text: 辛弧三十七度三十五分次以辛壬辛丙辛丙為丙戊弧之半並之淂一百十二度七分以減半周淂丙庚弧五十七度四十三分乃第三測土星距最高之度以丙庚減乙丙餘乙庚十九度五十一分乃土星第二測距最高之度又甲乙弧減去乙庚餘甲庚五十五度五十二分為土星第一測自行距最高之度十前第一測土星在壽星宮一度十三分又依法算淂視行距最高五十一度四十七分有第一測土星距最高自行度求其均數加減之即淂兩數並淂大火宮二十三度乃土星最高經度所在也後第穀等更加測算定土星兩心差為一萬一千六百二十八分分之本輪半徑為八千七百二十一均輪半徑二千九百七其
