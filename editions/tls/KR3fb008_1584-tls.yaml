body:
  text: 置食甚實緯加減真時南北差淂食甚視緯白平象限在天頂南者實緯在黃道南則加而視緯仍為南寔緯在黃道北則減而視緯仍為北若寔緯在黃道北而南北差大于寔緯則反減而視緯即變為南白平象限在天頂北者寔緯在黃道北則加而視緯仍為北寔緯在黃道南則減而視緯仍為南若寔緯在黃道南而南北差大于寔緯則反減而視緯即變為北求太陽半徑用交食視半徑表以太陽寔引宮度察其典日半徑相對之分秒淂太陽半徑求太陰半徑
