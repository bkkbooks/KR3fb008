body:
  text: 五周平行與太陽同今以天周化度為寔積年變日為法而一淂各星一日距太陽之行土星二萬一千五百五十一日十八分中積変日之數日法六十分下仝行二萬五百二十度五十七周化度之數除之得一日距太陽之行五十七分四十三秒四十一微四十三纎四十芒木星二萬五千九百二十七日又三十七分行二萬三千四百度除之淂一日距太陽之行五十五分九秒二微四十六纎二十七芒火星二萬八千八百五十七日又五十三分行一萬三千三百二
