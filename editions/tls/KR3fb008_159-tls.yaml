body:
  text: 戊為其餘弦較弦也倒弦者餘弦與全數之較本名為矢矢有二有大有小如圖甲丙徑以乙丁正半弦分徑為二分一為甲丁一為丁丙其丁丙即乙丁正半弦之倒弦亦名乙丙弧之矢又甲丁為大矢與甲乙弧相當丁丙為小矢與乙丙弧相當也矢加于餘半弦即半徑如上圖乙己為乙丁正弦之餘弦以加丁丙即半徑為乙己與丁戊等故切線者弧之外有線為徑一端之垂線以半徑為底而交與截弧之弦線弦線即下文割線如啚戊丙弧乙丙為半徑從丙出垂線至丁又從乙出線截戊丙弧于戊而與丁丙線交于丁即丁丙為切線與戊丙弧相當也割線者從心過弧之一端而交于切線如啚乙戊丁線為割線與戊丙弧相當也故戊丙弧在三角形內其勾為半徑其股為切線其弦為割線皆與戊丙弧相當之直線則戊丙一弧其相當之直線有四一丁丙切線一乙丁割線一戊已正半弦一已丙正矢合其餘共為八線故名八線割圓此八線無論各弧
