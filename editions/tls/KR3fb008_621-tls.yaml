body:
  text: 高弧必先定夘酉兩時高弧之正弦盖太陽在赤道夘酉時甲點正出入地平言締北夘酉時申點在地平上為申午締南夘酉時酉點則在地平下為酉己而申午與己酉乃日締南北與在赤道上相差之正弦求之于壬乙赤道高加壬癸潯癸乙弧取其正弦癸氐即午正時高弧正弦人于壬乙减壬丙潯丙乙弧取其正弦丙災而丙災與辰夘等以于丁壬乙兩弧本等內各减相等之壬丙子辰所餘丙乙與辰丁必等因潯丙災辰夘亦等次以癸氐與丙災即夘辰亦即氐寅相加潯癸寅半之于亢潯癸亢申點為癸辰之半則亢點必為癸寅之半用减癸氐正弦有亢氐即申午亦即己酉也為太陽南北距締夘酉時高弧之正弦潯夘酉
