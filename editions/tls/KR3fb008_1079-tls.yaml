body:
  text: 度淂二度三十三分水星後緯距合伏九十度為一度三十分最大處在距合伏一百十二度為一度四十八分金水前緯當合伏丙最小退合沖則最大在子午兩留際即正在黃道面無緯以此時無乙庚線故也後緯當合伏丙與退沖星正在黃道無緯以此時無辛邜線故也若在巳與亥有最大後緯以此時戊巳線為最大故皆與前緯相反勢使然也金水二星無北加減分者以金星兩心之差甚微伏見輪心在最高與最卑緯度不見大差可不算至水星前緯其正中交即在本天最高卑二處則兩交中伏見輪心距地線必相等若後緯則有四表以輪心置最高即正交算二表伏見輪上一南一北下同又置最卑即中交算
