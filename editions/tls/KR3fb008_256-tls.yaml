body:
  text: 為陽北為內為陰其亘于天中也終古不易推步者必頼之為準其規列度三百有六十辰十有二刻九十有六天骵一日一周之運于是焉紀晝夜刻分之永短于是焉定黃道出入之廣狹于是焉齊春秋二分之晷影于是焉限南北緯算于是焉起大地全圓于是焉度凡此皆其用也黃道規者從太陽旋周一歲之界而設也盖太陽行矣一歲所周軌迹旋以成規是名黃道本規斜絡于赤道其半在南最南界為冬至其半在北最北界為夏至二道相交之兩㸃為春秋分以故四平分之為象限限各九十度是即二分二至之限也搃計為三百六十度十二剖之為宮二十四剖之為節氣七十二剖之為候盖用以節七曜列宿之行用以審日月交食之限至較著也子午規者從諸曜升降度適中之界而設也太陽一日旋天一周見于陳方漸升至髙為正午此地平以上東半晝分過午向西漸底地平是為西半晝分乃謂之降他曜皆然于此升降度之中界立有一規名為子午諸曜際此謂在子在午是規透過赤道與兩極及地平而偕赤道地平相交為直角也恒然不動但人在地面南北遷此規惟一東西遷則随在各異也與地平同已上四規所係非小暦象一切測候及求七政行度會望等法舍是則無從布算也地平圈常静天下測候諸曜行度欲知各㸃所在與各㸃之道及各道之
