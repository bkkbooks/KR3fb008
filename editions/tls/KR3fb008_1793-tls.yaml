body:
  text: 與其設次輪于地心不如設次輪于本天之為便也由是观之五星之本天皆以地為心可知矣新法曆書又言舊説有謂七政之左旋非七政之行乃地自西徂東日行一周治暦之家以為非理故無取焉而近日又有復理其説者殆欲以地之東行而齊諸曜之各行耳究之諸曜之行終不能齊何若以一靜而騐諸動之易明乎西法古圖五星各有本天重包褁土木火三星常在日上名為上三星金水常在日下名為下二星今考五星惟土木二星常在日上火金水三星能在日上亦能在日下則重包裹之説特其大槩此古圖不如新圖之宻也其新圖五星皆以日為心土木二
  hash: sha256:ba2af05b3e873f6e551ff68d2687ad431af5a323b226c6b986be5ae59033e9e2
