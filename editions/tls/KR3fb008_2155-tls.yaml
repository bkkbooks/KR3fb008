body:
  text: 数為二十九秒三十四微其所對為一十二分又以二十九秒三十四微與餘數相減餘五十九微零八纎復察太陽平行表內與五十九微零八纎相近畧小之數餘數恰合其所對為二十四秒合計三次所得五時一十二分二十四秒即所求之時分秒也餘倣此
