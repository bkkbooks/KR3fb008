body:
  text: 與日叅居一線之上也其有視食也人自與月與日叅居一線之上也人目居地面之上與地心相距之差為天地之半徑則人所見日食與天上寔食恒偏左偏右分為两直線各至于宗動天其所指不淂同度分是生視差而人目所叅對之線不淂為寔會而改為寔會如圖甲為地心乙為地面丙為天頂若丁為日戊為月在甲丙一直線上則寔會即為視會因地心與人目無分線故也若日在辛必月至壬方與地面乙作一線為視會矣若月至巳與地心甲作一線則寔會也夫交食惟以日見為憑故日食全論視會若昕居地面不同即食分多寡加時畀晏亦随之異也又視會寔會在日月夲天皆無度分可指而勸依宗動天之黄道圈度分
