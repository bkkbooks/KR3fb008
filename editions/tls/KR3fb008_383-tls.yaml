body:
  text: 條畫分明以步太隂經緯諸度悉合天行而推算比舊暦較省工力兹以其運行之理布算之法偹著于篇以為後世考測之資焉測太隂各種平行度分太隂麗天其行度用為暦元者有三一曰平行一曰自行一曰距交行平行者太隂每日東行若干從其宮次或某節氣為界測其某時刻在某㸃待行一周復至元㸃計若干時日每日該東行幾度分也自行者太隂每日東行之度時疾時遲日日不等古因想月平行天上當有一本輪其心循平行天右旋而月骵在本輪周則向最髙左旋其行從冣髙㸃起算待滿一周復至最髙每日該距最髙若干度分也距交行者太隂所行不由赤道不由黃道自有其道斜交于黃道內外半比半南出入各五度有竒古暦謂之九道授時縂名白道為是其兩交之二㸃一名正交一名中交又謂之羅計太隂循本道右行測其某日在交㸃歴若干時復至交㸃每日該距交若干度分也此三種行度為太隂運行之根他如正交行最髙行距日行等皆從此三根求出今求月離湏先測此三種行度然測之最難其故有六其一月天冣小距地甚近即地球與其本天有小大之比例乃測噐之心不居地心而居地面則所得月軌髙乃地面之視髙非地心之實髙也其二有地球與月天之比例乃可推地半徑差既淂地半徑差乃以加所測之髙定其寔髙不先淂此無由淂彼其三凡淂各曜之髙必減清蒙之髙以定實髙各曜
