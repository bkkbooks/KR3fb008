  text: 用距弧度分於四行時表月距日橫行內檢取相當或近小數以減距弧得時視相當距小數本行上頂格所書時數録之即是其餘數再如法取之得時之分秒依上法用相當近小數取之並所得數為距時距時隨定其加減號兩均同減者日大則減日小則加兩均同加者日大則加日小則減兩均一加一減者加減從日依日之加減號三求寔引以距時之時及分入四行時表取太陽平行兩數兩數謂時及分下同并之為日引弧依距時加減號置太陽平引以日引弧加減之為日寔引以距時之時分檢四行時表時分下太陰平引兩數并之為月引
