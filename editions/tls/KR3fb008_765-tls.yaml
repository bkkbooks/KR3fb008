body:
  text: 設從滿影之角已出切線至地球辰得乙已辰直三角形則固乙已辰角一度二十分乙已辰角比乙已未角差數甚微畧得四十八秒故以算影之長不論為數如前比例得地滿影之心長于地半徑四十三倍比月最卑之入影處近地一十一地半徑也月最卑入影五十四最高入影五十八今圖月在影之形勢地球為甲乙丙圈其四周有氣為
