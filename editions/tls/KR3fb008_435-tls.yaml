body:
  text: 谷置次輪在下所以避之耳今令辰午次輪徑與申丑平行則次輪復置在上而所淂次均悉與次輪在心等如此俱用小輪以求初次兩均似為畫一而理亦更明顯矣求太隂第三均數夫用次輪以齊月行可得太隂寔經度矣乃細細測候惟朔望與兩弦則合其餘弦前後及次輪正半中半距日四十五度俱與所測不符其大差約為四十餘分因知太隂行度次輪而外當有一又次輪以生第三均數雖所差不及一度然必用此一輪乃為合天子是次輪而外復加一又次輪以消息乎次輪上之均數如啚癸為地心甲丑為自行度作本輪均輪月居午淂丑癸午為初均角次以午為最近取己午次輪徑四十三百四十八分與戊丑平行設月倍離為午丁弧月在丁作午丁丁癸二線淂午癸丁角為第二均數月次輪倍離止丁又以丁為心取十萬分之一千一百七十二三均大差四十分之正弦為丁亥又次輪半徑作亥乙又次輪圈其心循次輪周順行月骵在又次輪上從亥㸃循周右行亥為最逺亢為最近謂逺近于地心周上之行度即倍離之度一日順行二十四度有竒一月二周從亥㸃最逺起向亢歴井而復于亥為一周約十四有竒俱與次輪同法朔望時月在亥無三均兩弦則在亢亦無三均俱在丁癸一線內故朔望與兩弦止用次輪己足若弦前後或在乙或在井則有最大之三均求之如倍離為午丁弧則子又次輪上從亥取亥乙
