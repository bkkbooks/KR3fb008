body:
  text: 黃赤升度表黃赤升度表黃道宮度與赤道宮度並列之皆自冬至星紀宮起初宮卽宮元枵宮為一宮以太陽經度為次用宮数不用宮名者太陽當交宮之際帷二分二至黃赤同度其餘恒不同宮故用宮数以便列表用表之法以太陽實行察黃道宮度其所對之赤道宮度卽所求之赤道升度也表以逐度為率若實行有零分者按中比例法求之設太陽寔行在黃道降娄宮五度二十四分求赤道升度自星紀宮起初宮
