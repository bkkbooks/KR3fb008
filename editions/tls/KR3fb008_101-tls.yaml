body:
  text: 三直線形之各邊能當半徑曲線形各邊否四直線形之角每形止有一直角一鈍角不淂有兩直兩鈍其邊雖有長短不變其類曲線形否五直線形可作平行線曲線形無平行圈若平形必距等小圈六直線形之三角并必等兩直角曲線形之三角并無定數要其極三角并不足六直角五百四十度三邊并不足四直角三百六十度如甲乙丙鈍角形三角皆鈍其三角俱將滿一百八十度然少不足若竟滿六直角即不成形矣故三角并不能滿五百四十度其三邊如甲乙甲丙二邊亦將滿一百八十度然不足乙丁與丁丙兩邊而乙丙邊必小于丁乙丁丙兩邊并是三邊并不能滿三百六十度若滿四直角亦不成形矣七直線形有兩角即淂其三曲線形否八兩直線形等角即兩形之邊有比例曲線形等角形之邊必等九直線形有三角不能求三邊止可淂其比例曲線形有三角可推三邊試觀甲乙丙丁戊己兩直線形其三角俱等而三邊則不等若執角之度以求邊求淂甲乙丙形之邊乎抑求淂戊丁丙形之邊乎必不能矣惟以各角之全弦淂三邊大小之比例若曲線形三邊皆大圈所
