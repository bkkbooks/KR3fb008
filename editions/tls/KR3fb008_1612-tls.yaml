  text: 置食甚交周加初杅復圓距弧淂復圓交周求初杅寔緯用交食黃白距度表以初杅交周宮度察其所對之度分秒淂初杅實緯并記南北號求初杅視緯置初杅實緯加減初杅南北差得初杅視緯加減之法典食甚視緯同求復圓實緯用交周黃白距度表以復圓交周宮度察其所對之度分秒淂復圓實緯并記南北號求復圓視緯
