body:
  text: 地球火星寔徑為地球徑六十分之二十五強其骵小於地球為十三分之一弱木星寔徑與地徑為十二與五則其骵大於地球為十四倍土星寔徑為二地球徑又十分之一則其骵大於地球為二十四倍皆第穀所定各家略不同五星光色五星之骵亦借光於太陽與太陰同但其光色又非一致蓋天下之物皆受太陽之光而其所發之次光又從其本骵之質恒變為他色如大光炤黑骵其所發之光為紅色如火星炤淡紅骵所發之光色如木星炤白骵所發之光色如土星若黃骵其發光如金星若青骵發光如水星今所見五星光色各不同其骵或非純質
