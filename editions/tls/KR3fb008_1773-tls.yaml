body:
  text: 點乃為食甚而此時月心與影心相距甚近食分為最深也如圖甲乙為黃道甲丙為白道甲為交點丙為實望之度丁戊巳圈為地影乙為影心甲乙與甲丙等丙乙為寔望時距緯癸點為食甚癸乙為食甚距緯較丙乙為近乙癸弧引長必遇白極與白道成直角求之用乙甲癸弧三角形有癸直角有甲角有甲乙黃道度與甲丙交周度等求淂甲癸弧與甲丙相減淂癸丙差變時為食甚距寔望時分以加減寔望之時淂食甚時刻㝎月食方位
