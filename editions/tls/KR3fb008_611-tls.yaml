body:
  text: 頂即邜甲本方極高丁乙為黄道某經度之距度以丁乙與乙癸相加淂丁癸為午位黄道距天頂若距度在北則减乙癸淂丁癸壬丁癸角為黄道與子午圈之交角見日躔表則丁壬癸形有两角一邉求丁壬法全数與丁角之餘弦若丁癸之切線與丁壬之切線中限距子午度分又求壬癸全数與丁角之正弦若丁癸之正弦與壬癸之正弦淂限距天頂度中限随時分變易欲求中限必先淂午位黄道度盖黄道一日左旋一周在午位之宫度各不等因中限之偏左偏右亦不等必旋滿二十四時則黄道十二宫遍歷一周中限之差亦遍過一次故湏用時分然左旋之度在黄道而時分則主赤道故用同升度
