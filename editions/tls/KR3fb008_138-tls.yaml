body:
  text: 未辛之距等圈從丙作丙丑從戊作戊丑各為酉丁之垂線則丙戊小圈之半徑即丁丙腰之正弦即酉丙弧正弦次從丙作丙午線為丙戊小圈弧之正弦其矢為午戊又從乙取乙寅弧與乙丙底弧等丙寅為距等小圈以乙為極即寅辰為底弧之正弦寅辰底弧正弦必穿過午㸃以渾球觀之自見辰乙其矢乙戊為丁戊即丁丙丁乙兩腰之較弧戊亥即較弧正弦乙其矢房乙為丁乙小腰正弦與庚巳等法以兩腰正弦相因者戊丁大腰即丁丙正弦丑戊丑亢等與乙丁小腰即庚酉正弦己庚即房乙相因淂亢癸也甲庚已與丑亢癸丙直角形相似甲庚全數與庚已小腰正弦若丑亢大腰正弦與亢癸乙為兩腰較弧之矢辰乙為底弧之矢則辰為兩矢之較也未辛為丁角之弧未夘其正弦丙戊為未辛之距等圈弧丙午其正弦而丙與未兩㸃俱在酉丁圈上則丙丑戊角丙戊小圈弧必與未甲辛角未辛弧等而午與夘又俱直角丙午為丑戊之垂線未夘為甲辛之垂線則丙午丑未夘甲兩形為相似其比例丙丑與丑午若未甲與甲夘而丙丑即戊丑正弦也丑戊丑丙皆為距等圈之半徑必等未甲即辛甲半徑
