body:
  text: 戊癸即庚丁有戊甲即巳甲令戊甲與之等求戊甲癸角即星在巳點之緯限也置星在戊與在輪周巳所淂緯角無二為表中合沖巳弧下相當之數餘倣此求之火星丁沖歲輪半徑立表時為六萬五千九十五分求土木火三星北加減分緯限之外又有北加減分者以歲輪心距地之丁甲線有遠近不等故也如輪心在南交點其距地為丁甲若輪心行至北交點其距地必不與丁甲等以本天有高卑故也則歲輪上之緯角亦悉為之變故先置輪心于南交點算歲輪上一周之緯次置輪心在北交點又算其一周之緯與南相較淂輪心在北緯限或大或小於在南若幹為北加減分也若經度有較分之意如圖甲地心癸甲為黃道面
