body:
  text: 新法暦書載多祿某于漢陽嘉永和間推得本輪半径為八千七百六月過冣髙三百一十四度一十七分陽嘉二年三月望歌白泥又于明正德嘉靖間推淂本輪半径為八千六百四月過最髙一百八十三度五十一分正德六年九月望迨後第谷定本輪半径為八千七百月離表㝎崇禎戊辰年天正冬至次日子正月過最髙二百五度三十二分一十六秒交食表定崇禎戊辰年首朔月過最髙三十七度三十四分三十四秒其年首朔距天正冬至次日子正一十四日一十六時二十六分四十六秒以交食表所定首朔月過最髙之度推其年天正冬至次日子正月過最髙之度應淂二百五度四十二分四十九秒比月離表所定多一十分三十三
