  text: 大距交角較五十一分二秒水星次輪心在中交當黃道南交角四度五十五分三十二秒其與大距交角較四十四分二十八秒氣應七日六五六三七四九二六水星平行應二十分一十九秒一十八㣲與暦元甲子年天正冬至次日子正初刻太陽平行度同水星最高應十一宮三度三分五十四秒五十四㣲水星伏見應十宮一度一十三分一十一秒十七㣲推金星水星法求積年
