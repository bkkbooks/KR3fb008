body:
  text: 最高所在設太陰平行在丙距最高引数為庚丙丙為心作戊子本輪即于本輪上取戊丁弧與庚丙等作丙丁線與庚甲平行次以丁為心取丁丙之半為半徑作已辛小均輪已為最近徔已取戊丁之倍度為已乙月止乙作丁乙丙乙甲乙諸線成丁丙乙丙甲乙两三角形其丙甲乙角為加减差法先用丁丙乙形有丁已本輪半徑五千八百有丁乙均輪半徑二千九百有丙丁乙角倍自行之度求淂丁丙乙角及丙乙邊次用丙甲乙形有丙甲十萬全数有丙乙有乙丙甲角丁丙甲角為戊丙丁角自行之餘内减去丁丙乙角餘為乙丙甲角也
