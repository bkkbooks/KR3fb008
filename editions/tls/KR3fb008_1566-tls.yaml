body:
  text: 其所對之数為太陽地半徑差又用月離太隂地半徑差表以用時太陰高弧按太陰距地限察其所對之数為太陰地半徑差西地半徑差相減餘為用時高下差求用時東西差用交食東西南北差表以用時白道高弧交角及用時高下差察其典東西差所對之数淂用時東西差求近時距分以月距日寔行化秒為一率三千六百秒為二率用時東西差化秒為三率求淂四率為秒以時分收之淂近時距分用時月距限西為加月距限東為減以用時白道高弧交角變限不變限為㝎
