body:
  text: 一遇真高一遇視高兩經圈可截黃道度即寔經度與視經度之較是為東西差兩經圈之較即實緯度與視緯度之較是為南北差三差相交成正弧三角形宜角對高下差黃道高弧交角恒對南北差餘角恒對東西差故欲求三視差必先求淂黃平象限及黃道高弧交角而三差乃可次苐求馬今按太陰之經度為白道經度食甚是緯又與白道成直角則東西差乃白道上之經差非黃道之經差也南北差乃白道上之緯差非黃道之緯差也三差相交成成弧三角亦白道與白道經圈及高弧可成之三角形非黃道與黃道經圈及高弧可成之三角形也曆書因日食近兩交二道之相距不遠故止用黃道為省筭耳究之必用白道方為合天今
