body:
  text: 求五星交宮時刻以本星一日之實行為一率一千四百四十分為二率本星實行距某宮初度之度分為三率順行者以本日寔行與三十度相減逆行者即用本日寔行求淂四率為距子正之分數以時刻收之淂交宮時刻求五星同度時刻以兩星一日之寔行相加減為一率兩星皆順行或皆逆行者則相減一順一逆者則相加一千四百四十分為二率兩星相距為三率求淂四率為距子正之分數以時刻收之淂同度時刻
