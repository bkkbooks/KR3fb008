body:
  text: 地居夏至之南目視丙月則偏北故太隂之寔度在黄道南為本道上之乙與太陽之寔度丁甚相遠却以南北視差移而就近及以甲乙為食限二曜相掩必未至甲也若其過寔甲甲至已在黄道北則因南北差見月更在北與太陽相距更遠不復能相掩矣太陽太隂越六月皆能再食越六月者如寅月有食申月淂再食也盖前食在正交後食在中交矣如啚甲丙乙丁為白道两交黄道于甲于乙甲丙乙為距北半圈乙丁甲為距南半圈已庚戊辛皆爲食限依前㝎中會時甲巳
