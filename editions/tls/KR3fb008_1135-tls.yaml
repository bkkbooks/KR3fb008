body:
  text: 以寔行入距宿鈐表按宮度減宿次得本日太陽所躔某宿度分宿鈐以曆元戊辰年為主每年應加星行五十一秒加此數方可與寔行相減以寔行查黃赤距度表得本日時太陽在赤道或南或北之緯度分求太陰經緯度先查二百恒年表本年下太陰四種年根月距至平行月自行月孛行正交行獨正交行加六宮為根數次以距至日入太陰周歲平行表查四種平行度俱與年根數相加淂三平行月平行月自行月孛行而正交行則與年根數相減為正交平行在本日太陽寔經度查月離日差表得數記加減號按日差分數
