body:
  text: 影之底大小依遠近如圖外巳壬辛大圈為定周分度數共作四象限用以取食之方位見下文中有乙戊丙丁小圈以甲為軸能轉動此乃受光形之圈故以丁戊指太陽全徑以甲心及孔之中心與太陽中心正對本圖上安量尺即戊丁中空以兩旁與圈徑平行其尖銳直至大圈以能指度為用量尺上仍有方尺為乙丙中間一小陷道以合于下前後可任進退將用渾器對太陽時便轉中圈令其徑平分餘光之角隨以方尺就之其交徑之點必用號以識之有光無光之邊交徑點亦然即以此定乙甲丙弧分食與不食之形不湏別點如二圖設乙丙丁戊為太陽食形得心在甲丙
