body:
  text: 掩而食今冬至南北差甚大太隂之視行循內乙視道尚在已距甲遠即已切太陽周入日食之限後太陽丁行黄道至乚與太隂視道相遇是為視交即二曜以兩心會合䏻全食若更前至辛日月亦未及寔交甲太隂寔未過黄道南而視行則已過太陽之南即丙不䏻掩日亦不䏻切日而不食矣可見太隂寔距北在已為順天府同緯地最大食限浔十七度有竒至辛遂出食限之外况過甲而後寔距南其視度距太陽甚遠安浔尚有食乎再于本界中論地論其極高十八度者先設日月在冬至星紀宮初度寔會在正午淂高弧四十
