body:
  text: 星之視高也如先測得金星視高三十八度五十七分四十秒則以地半徑差二分二十秒與視高相加淂三十九度為本時金星之實高也高度有零分者滿三十分以上則進作一度不用中比例因逐度地半徑差所差甚微故也
