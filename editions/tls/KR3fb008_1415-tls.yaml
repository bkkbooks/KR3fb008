body:
  text: 以伏見寔行與距交寔行相加加全周去之用其餘淂距次交寔行伏見輪上之距交也金星初宮至五宮為黃道北六宮至十一宮為黃道南水星初宮至五宮為黃道南六宮至十一宮為黃道北求星距黃道線用金星距黃道表以距次交寔行宮度察其所對之數淂星距黃道線並記南北號水星先用水星距限表以距交寔行宮度按黃道南北察其所對之度分秒淂寔交角水星距限表乃以交角差加減交角而淂者求交角之法半徑全數與大距交角較之比即同於距交寔行之正距弦與交角差之比以交角差加減正中交南北各交角淂水星限立表次用水星距黃道表以距次交寔行宮度按寔交角相近者察其所對之數淂星距黃道線金水二星星距黃道線乃以次輪半徑與次緯正弦比例之數與上
