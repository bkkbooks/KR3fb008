body:
  text: 影設月在最高距地為癸己則辛子為最高時影在最𤰞距地為戊己則壬丑為最𤰞時影而壬丑必大于辛子求之以丙己地半徑一度減戊乙日半徑五度二十五分第谷所㝎淂戊丁丁丙與乙己平行次用戊丁丙丙己甲两相似形戊丁與丁丙丁丙即乙己日距地数若丙己與己甲淂搃影之長次以己癸最高月距地数與己甲影長相減淂癸甲次甲己與己丙若甲癸與癸辛倍之淂辛子為月在最高之影徑但辛子乃地影之寔徑與戊乙丙己諸線為同類而非人目所
