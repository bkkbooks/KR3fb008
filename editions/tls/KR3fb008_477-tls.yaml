body:
  text: 之望當望時月行近于兩交必入地影古名問虛此乃月日同在一線而地居其中日光為地所阻不能炤射月骵則月失其借光而為月食此二食者躔度有恒持籌推步分秒確然而暦家各法之踈密于此徵馬夫黃白二道之交一名正交一名中交日月行及二交為同度同度則為有食然而又當論限即及交而在限內則食限外則不食顧此限度又諸方不同以太陽各方地平高度不一而隂陽二暦之食限亦異論煖帶下之地二暦互相受變如白道向南拯半周有時在天頂及黃道之中勢必及為陰曆白道向北半周是時在黃道外勢必及為陽曆故其下日食之限莫可潯而定他域更近于北必陰曆限多陽曆限少更近于南必陽曆限少陰曆
