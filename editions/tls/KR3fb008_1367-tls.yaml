  text: 火星正交每日平行十分秒之一又四四九七二三火星正交每歲平行五十二秒五十七㣲以周歲除之淂每日平行八㣲四十一纎五十四忽一芒以秒法通之即淂火星本天半徑一千萬火星本輪半徑一百四十八萬四千火星均輪半徑三十七萬一千火星最小次輪半徑六百三十萬二千七百五十本天高卑大差二十五萬八千五百太陽高卑大差二十三萬五千火星本道與黃道交角一度五十分氣應七日六五六三七四九二六
