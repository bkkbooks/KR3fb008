body:
  text: 小于日月過地影則食食時見月小于地影則月必更小于日四徴也七政各有性情䏻力施暨下土其勢略等乃其視行有疾有遲行遲者其天周大人見為遲本行自疾所以然者遠故也近者行疾其天周小如舟行大水遠見行遲近見行疾因是䏻力所施近而疾者其見功亟遠而遲者其見功緩五徴也月距日九十度其光已過半圈則必發光之骵大而受光之骵小六徴也因是古今治曆名家先用測次用推筽淂地之骵周圍九萬里其全徑為二萬八千六百三十餘里太陽實徑為地全徑者五倍又百分之四十三太陰全徑為千分地全徑之
  hash: sha256:7041217445ae88b65d4c47211ac9229c88ac3f227d81a541b08c94ea0a254a5b
