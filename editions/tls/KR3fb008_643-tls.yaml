body:
  text: 太陽太隂高畀視差生于地之半徑以天頂為宗而差之大小則係于日月距地心遠近及地平上高弧之多寡夫太陽行不同心天距地遠近各殊太隂因行两小輪其距地更多寡不一當在本輪最高次輪最遠則距地為極遠約為六十个地半徑本輪最高次輪最近距地為次遠約為五十八个地半徑本輪最畀次輪最遠距地為最近約五十二个地半徑本輪最畀次輪最近距地為次近約五十四个地半徑又本輪自最高至最畀一百八十度中間次輪皆得逓居具遠近又各不同所生視差悉為之變今朔望時無次輪之行惟用本天髙畀以求視差如圖乙為地心乚癸為地半徑癸丑為地球甲為天頂甲巳為宗動天癸為人日丙午為
