body:
  text: 今約淂一等大星一十七二等五千七三等一百八十五四等三百八十九五等三百二十三六等二百九十五共一千二百六十六星為有名位之星餘皆無名星矣然而可圖者止此若依仰觀法恒星其寔無數晴明之夜比蒙昧之夜更多晦朔之夜比弦望之夜更多以秋冬比春夏以利眼比鈍眼則更多故知其無數也又恒星之去地甚逺更在鎮星之上故其行極遲六十九年一百九十一日七十三刻而行一度凡二萬五千二百二年九十一日二十五刻而行天一周終古恒然恒星圖像新法所列恒星與舊圖稍異凡骵勢明大足為經緯之用者維舊圖示載亦一一增入或舊圖所有而細微隱約人目不能見者畧之免致煩亂如舊圖所載南天田六甲天柱等皆依稀茫昧不成位座至如天理天廟器府八魁等按圖索之渺不可淂其近處不過多有微星以經緯度聯之又不合今概缺之不敢餙無為有又古圖于近南極諸星皆缺漏今逺西從各方考驗見近南極數十度內諸星燦然亦圖其形像定其經緯如波斯孔雀蛇首馬腹十字架等星共有三十六座今一一補入而周天星位于以全矣恒星暦元新法恒星經緯表黃道經度從春分降婁宮初秒起算緯度從黃赤二道起算各星之黃經黃緯赤經黃緯并大小等第緯向南北
