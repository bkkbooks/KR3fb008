body:
  text: 時太陽高度甚少清蒙之氣甚大古來嵗寔難淂確準此其故也求兩心差及冣高新法暦書用春分秋分立夏三蓈氣相距日時推淂太陽兩心差為三五八四一六冣高在夏至後五度三十分然而未詳何年月日永年表載康熙丁酉年最卑在冬至後七度四十三分四十九秒今以丁酉年寔測蓈氣時刻依法推筽法見前日躔卷淂兩心差為三五八九七七最卑在冬至後八度三十八分二十五秒五十五㣲皆典原数不合盖今之春秋兩分皆不正當中距之度立夏亦不在兩限之間用兩心差以推其時刻典寔測不合則用寔測之時刻以推兩心差及最高卑所在亦必典原数不合矣因思太陽之行在最高最卑二點平行
