body:
  text: 確準也求土木火三星緯度新法曆書求土木火三星緯度置次輪心于大距處筭次輪上一周之視緯名為緯限餘處則用中分法以括之今法依歲輪心所居隨時推筭如圖甲為地心辰庚戊酉為黃道辰坎戌申為行本道乾為黃極酉申庚坎為遇二極經圈星本道之辰申戌半周在黃道比戌庚辰半周在黃道南辰為正交戌為中交設歲輪心在乙距正交為辰乙辛子
