body:
  text: 二百七十六弱約之淂月一地三倍有半強再以周徑法推之知日天比月天其大約二十餘倍此日月地三骵大小之比例也又求其遠近淂太陽在本天中距時其距為一千一百四十二地半徑大陰中距時為五十八地半徑以較日之去地日更遠十九倍弱此日月地三骵遠近比例也推算日月寔徑及距地等法見前論發光生影之原日月之有食不外光與影之两端而光及影之體勢又非一致今明其理如左一有光之體體之各分皆能發光如太陽為純陽之體通明透徹其發光之力最厚月與地皆為寔球不能透光止能受光故太
  hash: sha256:07c4d550304cc3bad1fbcef86d5ba0f75ad4d75110fc0eef5867927ae7802f86
