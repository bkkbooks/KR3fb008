body:
  text: 日星寔行與本日星實行相減餘為星一日之實行乃乙太陽一日之寔行與星一日之寔行相加為一率太陽順行星逆行則相距為兩寔行之和故相加為一率一千四百四十分為二率本日星寔行加六宮減本日太陽寔行餘為三率求淂四率為距子正之分數以時刻收之淂退沖時刻求土木火三星晨夕伏見叚日土木火三星合伏後距日漸遠為晨見東方順行星漸差而西日出前即可見順行漸遲遲而忽退為㽞退初古名前㽞亦名順㽞距日半周為退沖退沖之次日為夕見星在東方日入時即可見退行漸遲遲而忽順為㽞順初古名後㽞亦名退㽞順行漸疾復近合伏為夕不見求土木火三星晨夕復見限度
