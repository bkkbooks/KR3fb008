body:
  text: 法曰半徑上作理分中末線其大分即十等邊形之一邊理分中末線法如啚任作甲戊線兩平分之于乙以甲戊線自之作戊夘方從乙平分䖏向丁作乙丁線次以甲戊引至庚令乙庚與乙丁等于乙庚上作乙丙方又取庚子與戊庚等作癸子線分戊丁子已則戊已為戊丁元線之大分已丁為小分戊己丁己戊丁三線成連比例戊丁與戊已若戊已與已丁而戊己為中率戊丁為首率已丁為末率理分中末線之所以然理分中末線即西所謂神分也其用甚大按幾何二卷甲庚線偕戊庚矩形及乙戊即甲乙上方形并元與乙庚上方等今乙庚線既令與乙丁等則乙丁上方亦與乙庚上方等是甲庚偕戊庚矩形及乙戊上方并與乙丁上方等而乙丁上方與乙戊丁戊上兩方之并等此二率者共用乙戊上方試以此二率各減去乙戊上方則所存之戊夘方與甲子矩形必等矣夫戊夘方既與甲子矩形等又共用甲已矩形試各減去甲已矩形則所存戊子方與夘已矩形必等夘己與戊子兩矩形既等又以己直角相連則兩形之邊為互相似之比例癸已與己子若戊丁與己丁夫癸己即戊丁也則戊丁與戊己若戊己與己丁為連比例而戊己為中率戊己上方二三率與戊丁一率偕己丁四率矩形等戊丁全線為首率戊己大分為中率減
