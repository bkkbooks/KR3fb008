body:
  text: 以本日日出或日入時分典食甚真時相減餘為𢃄食距時𢃄食距時者太陽出入地平距食甚之時也各省食以各省日出入時刻及各省食甚真時筽之求𢃄食距弧以初杅復圓距時化秒為一率初杅復圓視行化秒為二率𢃄食在食甚前用初杅視行𢃄食在食甚後用復圓視行𢃄食距時化秒為三率求淂四率為秒以度分收之淂𢃄食距弧𢃄食距弧者太陽出入地平距食甚之行度也求𢃄食兩心相距以半徑一千萬為一率𢃄食距弧之餘切線為二率食甚視緯之餘弦緯三率求淂四率為兩心相距之餘切線檢表淂𢃄食兩心相距𢃄食兩心相距者𢃄食時太陰心典太陽心相距之度也
