body:
  text: 啚戊已庚戊壬辛兩形相似則戊巳與巳庚若戊壬與壬辛四啚戊巳庚壬辛戊兩形相似則戊壬與壬辛若戊庚與庚已俱為斷比例也十六兩相似形成四率比例其二三率相乘矩內形與一四率相乘矩內形等因淂第四率如甲乙丙已丙丁兩形相似其甲乙與乙丙若丙丁與丁巳為斷比例則乙丙為二率丙丁為三率甲乙為一率丁巳為四率試以二三率相乘淂丁乙矩形一甲乙即辛丙四巳丁即壬丙率相乘淂庚丙矩形此兩矩形必等故有甲乙乙丙丙丁三率用二三相乘代庚丙矩形如辛丙一率而一淂壬丙四率即所求巳丁邉也十六両平行線內同底作兩三角形其形必等其底上兩方亦等如甲乙兩平行線任取丙丁為底同底任作甲丁丙丙巳丁兩三角形此兩形必等等者指容積而言非邉角相等也其丙丁底上巳丁戊丙兩方亦必等又此兩方之矩積必為甲丙丁巳丁丙二形之倍何則試觀庚丙方形巳丁為對角線必平分丙庚方為兩平分而巳丁丙三角乃丙庚方之半依顯戊丙方倣此又凡三角形若平分其底向對角作線必分本形為兩平分如甲乙丙形平分乙丙底于丁向
