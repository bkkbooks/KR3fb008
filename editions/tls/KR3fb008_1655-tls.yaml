body:
  text: 分戊在最卑後有加差時刻早故秋分至春分小于半周歲今未宮七度至丑宮七度大于半周歲未宮八度至丑宮八度小于半周歲即知未宮七度在最髙前如辰未宮八度在最髙後如己丑宮七度在最卑前如午丑宮八度在最卑後如丑今以大于半周歲之一時一十七分五十四秒二十六微與小于半周歲之二十六分五十二秒一十微相并淂一時四十四分四十六
