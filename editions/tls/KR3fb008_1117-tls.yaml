body:
  text: 也五星旁新星土星向耒止見一星今用遠鏡見有三星中一大星是土星之骵兩旁各一小星環行於土星之上下左右有時不見蓋與土星相蝕也又見土星骵非渾圓兩旁有附骵如鼻若木星見有五星木星為心旁有四小星常環行其上下左右時相近時相遠時四星皆在一方時一或二或三在一方餘在他方時一或二不見其行皆右旋在上順行在下逆行近木星則疾行距遠遲行順行與木星會則不見為木星所食逆行不食盖以木星為環行之心其圈又不與木星本道同面也當木星沖日及在本輪最卑或晨昏
