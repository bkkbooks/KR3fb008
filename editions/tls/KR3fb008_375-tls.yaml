body:
  text: 及性情若金若水土之類俱一一偹載黃經以戊辰天正冬至為暦元以後每年逓加五十一秒淂各年星之黃道經度至赤道經緯湏用三角形法随時算之天漢渾天衆圈皆成圈線皆與地為同心若天漢者論其界不可謂圈凡圈以圓線為界此則以廣面為界論其心寔與黃赤二道相等不可謂非大圈盖其心必同地心且両交黃道両交赤道旁過二極皆一一相對正與黃道相反斜絡天骵平分為二故也欲測其廣無㝎數大約両至之外廣于両至之中從天津又分為二至尾宿復合為一過夏至圈以井宿距星為限正切鶉首初度過北極西距二十三度半前過冬至圈則星紀初度約居其中又轉至南極東距亦二十三度半而復就夏至縂為過両至與黃道相反之斜圈也故西史多禄某測其両涯所過星宿與近世不異在赤道北則從四凟始南三星當其中北一星不與焉次水府次井西四星切其左邊天關一星五車口切其右更前積水在左大陵從北第二星在右王良所居在其中若洲渚然次天津橫截之両端平出其左右河鼓中星在右其對邊為天市垣齊星此赤道北両涯所経之星也在赤道南者以天弁東星為界次斗第三星次箕南二星其對邊則天市垣宋星尾宿第一星而入于常隱之界迨過南極以來復起于天稷過弧矢天狼以至赤道此為赤道南所經
