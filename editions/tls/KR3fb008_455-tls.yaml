body:
  text: 表相距之幾丈尺與全數若甲丙與視角之切線依此候淂冬至日徑為三十一分半夏至減一分有竒為三十分第谷之表間一丈四尺淂冬至為三十一分若測月徑光淡難分則上表之孔特宜加大刻白爾所測為月中距時少至二十九分半強多至三十一分十二秒光淡難㝎故極近距地時少至三十二分強多至三十四分十八秒後第谷等㝎月在本輪最髙為三十分三十秒本輪最卑為三十四分四十秒凢入目視大小之度在瞳心之視角角之度分即對弧之度分人目在大圜之中則天上度分為目所㝎視大小之度故論日月視徑皆用周天度又月去人近先淂月之視徑及其視差乃可求日之大小逺近故湏先求月之視徑也測月距地之髙一法兩地並測設一人在北如順天府北極出地三十九度五十五分平度測時月在正午淂其距天頂為四十三度十三分又一人在南與順天府之地經度等數地球有南北度如云北極出地若干度南行二百五十里而減一度北行加一度是也名曰地緯度若兩地同時刻而見月食是兩地同在一子午圈下是東西同經也赤道下兩地亦相去二百五十里而差一度是名地經度如廣州府順天府經度約在廣州之東為五分刻之三在赤道經度上相去三度因髙數甚大所差無碍北極出地二十二度十二分測時月在正午淂其距天頂二十五度十九分如啚丙為地心夘乙丑為地面辛己丁為子午
