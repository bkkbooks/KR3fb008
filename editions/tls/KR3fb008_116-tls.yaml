body:
  text: 又法全數與甲丙之餘弦即辛角甲庚正弦若甲乙之餘弦即辛乙正弦與乙丙之餘弦即乙壬正弦淂甲乙邊此用辛乙壬次形元形有甲乙甲丙次形有辛角及乙辛邊也第三法有兩角一邊其邊對直角求餘角餘邊甲乙丙形有甲直角有乙角四十四度六分有乙丙邊六十七度二十九分求丙角及甲乙甲丙二邊求甲乙邊法為全數與乙角之餘弦若丙乙之切線與乙甲之切線淂乙甲邊用甲乙丙本形算一率半徑全數二率乙角餘弦七一八一四三率丙乙切線二度四一一八八四率乙甲切線一度七三二五淂乙甲邊六十度又法乙角之餘弦即戊丁正弦與乙丙之餘切若全數與甲乙之餘切即戊角己甲正切淂甲乙邊此用戊丁丙次形元形有乙角與乙丙邊次形有戊丁丙丁兩邊也求甲丙邊法全數與乙角之正弦若乙丙之正弦與丙甲之正弦淂丙甲邊用甲乙丙本形算一率全數三率乙丙正弦九二三六七五四率丙甲正弦六四二七九淂四
