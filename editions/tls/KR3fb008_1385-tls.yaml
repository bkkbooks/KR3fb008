body:
  text: 置初寔行減正交平行淂距交寔行求升度差以半徑一千萬為一率本道與黃道交角一度五十分之餘弦為二率距交寔行之正切線為三率求淂四率為黃道之正切線檢表淂黃道度與距交寔行相減餘為升度差距交寔行不遇象限為減遇象限為加遇二象限為減遇三象限為加求黃道寔行置本道寔行加減升度差淂黃道寔行求星距黃道線用火星距黃道表以距交寔行宮度察其所對之數淂星距黃道
