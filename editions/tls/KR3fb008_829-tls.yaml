body:
  text: 乙角加于丙甲已角減于丙甲戊角因太陽壬之上角在丙甲已內即午前在丙甲戊外即午後故得搃或餘角以定日食向蓋遇兩心之圈恒指向位又恒隨高弧高級高弧與子午圈全合為一必遇心圈以直角交者所指向位在正東食復圓時或正西食初虧時若斜交則因角大小不等食形所向度距東西遠近亦不等其高弧不正與子午圈合而相距在其左右則遇兩心圈雖以直角交猶隨高弧距正東西左右若斜交則本圈更距東西不等蓋以此兩故求其距度直至與高弧合則惟高弧定距度也測月食方位冶銅為一匾圈約寬二三寸許周分三百六十度其圈內俱開空
