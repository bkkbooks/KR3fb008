body:
  text: 秒又察其正交行度两表差至二十餘分今以交食表推步月食其時刻之早晚食分之淺深俱與天行頗合則月過最髙之度宜以交食表為準但月之本輪半径用目下三月食推之或徴大或微小皆不能合八千七百之数盖用本輪以推寔望惟自行當三九两宮初度之一點方合而目下所測月食其自行皆不正當三九宮初度之数夫用本輪半径以推寔望既與寔測不合則用寔測之寔望以推本輪半径亦必與原数不合矣以朔望時太陰体在均輪之周不在本輪上故也其八千七百之数今仍用之求太陰二三均数太陰之加減差朔望以外用者名為二均三均数其二均数之生
