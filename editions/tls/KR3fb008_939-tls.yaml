body:
  text: 戊角與晨測甲丁巳角等則甲癸兩平行折中之處如庚如辛必為金星之最高或最卑何則巳丁甲癸丁戊兩大距角既等其壬丁兩丁二距心線必等而兩平行甲癸二點之距最高或最卑必等其初均之丙丁甲癸丁壬二角亦等其兩平行距最高卑或不等則伏見輪上之大距度晨夕必不能等以丁壬與丁丙二線不等故也
