body:
  text: 平象限距地平之度即丑角也設太陽黄道寳径度在子即子壬爲太陽距黄平象限之度子邜爲太陽高弧丑子卯爲黄道高弧交角法用甲壬癸直角形求得壬癸为限距子午度壬甲爲限距天頂度又用甲壬子直角形求得甲子壬爲黄道高弧交角而推高弧則用丑子邜直角形有卯直角有子丑太陽距黄平象限之餘度有丑角壬寅弧求子邜即本時所求太陽之高弧也今依各方壬寅限距地之高下及子壬太陽距限之逺近随時算之立表白平象限舆黄平象限不同新法暦書推算日食三差以黄平象限爲本今按三差並生于太隂而太隂之経緯俱白道上経緯度則三差之数用白道較之用
