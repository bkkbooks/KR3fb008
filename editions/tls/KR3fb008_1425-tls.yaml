body:
  text: 土星限為一十一度地平緯度也木火金水做此木星限為一十度火星限為一十一度三十分合伏前後某日太陽寔行與本星寔行相距近此限度即以本日本星寔行宮度察五星伏見距日黃道度表取其與本星相對之數為距日黃道度又以本日本星寔行宮度察五星伏見距日加減差表取其與本星緯度相對之數為距日加減差乃以距日加減差與距日黃道度相加減緯南則加緯北則減淂伏見限度合伏前某日太陽寔行與星寔行相距近此限度即為某日夕不見合伏後某日近此限度即為某日晨見求金水二星合伏時刻金水二星黃道寔行與太陽寔行同宮同度為合伏皆以星寔行
