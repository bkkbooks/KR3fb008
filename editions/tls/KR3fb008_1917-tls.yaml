body:
  text: 九秒為本日午正太陽之視高也如先測得午正太陽視高七十二度五十九分零九秒則以地半徑差五十一秒與視高相加淂七十三度為本日午正太陽之寔高也蓋寔高乃地心之度視高乃地面之度寔高所生之地半徑羌與視高所生之地半徑差應有不同然所差甚微故本表雖以寔高求視高而視高求寔高亦可同用高度有零分者亦按中比例法求之
