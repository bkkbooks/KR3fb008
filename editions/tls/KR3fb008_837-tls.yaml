body:
  text: 食之前測大角星在正午考時得亥初三刻八分三十秒刻漏指亥初一十二分三十秒亥正一十分即亥正三刻四分木星居正午高二十四度三十二分極高五十度亥正十八分亥正三刻一十四分初虧向位在東南距高弧自徑線下起算四十五度三十分亥正二十三分子初四分向位距四十二度前此太陰未食約四刻時與心宿大星仝高弧此已離去距西蓋因視差故亥正二十九分半子初一十分向位距三十九度三十分從土星對月影兩心得一直線遇亥正四十二分子初一刻九分周星天市垣者至正午向位三十三度三十分食四分一十秒先所遇土星今反距其下矣亥正五十一分子初二刻二分向位距二十八度稍遲得食五分子初二分半子初二刻七分土星在正午高二
