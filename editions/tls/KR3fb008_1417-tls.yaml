body:
  text: 三星不同求星距地用金水距地表以伏見寔行宮度察其與星距地所對之數淂星距地求距地差用金水距地表以引數宮度察其與距地差所對之數淂距地差求星距地用數置星距地減距地差淂星距地用數星距地用數者求視緯所用次輪上星距地心之數也表中所列星距地數乃設次輪心在最高所淂星距地邊而次輪心距地心寔有高卑則星距地心之差亦與次輪心距地之差等故以引數宮度求淂次輪心距地心之邊與最高距地心相減餘為距地差於星距地數內減之方為星寔距地之數也
  hash: sha256:48c9ee604ed71f527788cb206051e274f6c5fdb1d933efcd3855ad9ef903f3de
