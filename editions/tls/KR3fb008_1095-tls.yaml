body:
  text: 測恒定而不動甲角隨黃道交地平有大有小甲角大則甲癸小甲角小則甲癸大故表中甲癸距日隨黃道宮度不同上所求甲癸弧乃星正在黃道上見伏之限若有緯度或南或北又非甲癸所能定如星在午有午甲北緯其黃經原為甲邜黃道上距日元為癸甲但因緯北斯時午星巳久見地平上勢力星至巳午巳設與黃道平行始為伏見之界而星在午所限之黃道距日則為癸辛而非甲癸辛癸乃緯北見伏之限也與在黃道上相差為甲辛求之用甲辛巳形甲午巳形同有甲角辛直角巳辛緯度巳辛與與甲等求淂甲辛即表次頁緯度下所書之數以減甲癸淂癸辛為午甲北緯相當見伏之限次視距日度在癸辛巳上為見巳下為伏
