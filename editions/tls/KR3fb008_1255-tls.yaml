body:
  text: 以月寔引查視半徑表得太陰半徑又以月寔引查視半徑表太陰半徑下層得地影半徑以日寔引加減六宮查視半徑表得地影差地影半徑丙減去地影差為寔影以寔影與月半徑相並淂並徑置並徑以月距黃緯減之淂並徑減距分如距緯大於並徑不及減則不食九求食分以並徑減距及月全徑查食分表並徑減距從右月全徑從上橫直相遇淂月食分秒又法以月半徑倍之為一率並徑減距為二率月食十分化秒為三率求得四率妝之淂食分
