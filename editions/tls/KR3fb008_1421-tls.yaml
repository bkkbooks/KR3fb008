body:
  text: 實行未及星實行為合伏本日已遇星實行為合伏次日求時刻之法以本日太陽實行與次日太陽寔行相減餘為太陽一日之寔行以本日星寔行與次日星寔行相減餘為星一日之寔行乃於太陽一日之寔行內減星一日之寔行餘為一率一千四百四十分為二率本日星寔行內減本日太陽寔行餘為三率求淂四率為距子正之分數以時刻收之淂合伏時刻求土木火三星退沖時刻土木火三星黃道實行與太陽寔行相距六宮為退沖皆以相距未及六宮為退沖本日已遇六宮為退沖次日求時刻之法以本日太陽寔行與次日太陽寔行相減餘為太陽一日之寔行以次
