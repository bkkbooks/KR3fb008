body:
  text: 六求寔交周以寔距時查四行時表時分下交周平行兩數並之為交周距弧依寔距時加減號置交周平行以交周距弧加減之得交周次平行凡加者滿三十度進一宮滿十二宮去之為宮減者遇所減度數反小則加三十度退一宮減之宮度不及減則加十二宮然後減之置月寔均記加減號以加減交周次平行得寔交周度分七求月距黃緯以寔交周查太陰距度表用中比例法得月距黃緯視寔交周在宮至五宮韋在北六宮至十一宮月緯在南八求徑距較數
