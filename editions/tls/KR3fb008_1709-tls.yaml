body:
  text: 在中距之地影視半径四十四分四十三秒爲凖求太陽之光分命地半径甲已爲一百分則太隂在中距朔望時距地心之甲丑爲五千六百七十二丑甲寅角即爲四十四分四十三秒用甲丑寅直角形求淂丑寅爲七十三小餘七八甲寅爲五千六百七十二小餘四八又用甲已寅直角三角形已爲直角求淂已甲寅角爲八十八度五十九分二十四秒于象限内减去已甲寅角又减去丑
