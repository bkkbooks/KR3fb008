body:
  text: 視半徑表視半徑表按引数宮度分順逆列之初宮至五宮依次順列於前六宮至十一宮依次逆列於後表名日半徑者乃太陽自最卑至最高逐度之半徑分秒也月半徑者乃太陰自最高至最卑逐度之半徑分秒也月距地者乃太陰朔望時自最高至最卑距地之遠與地半徑比例之數也太陰兩弦時距地最遠為地半徑之六十二倍有餘距地最近為地半徑之五十三倍有餘表為交食而作故止列朔望時距地之數影半徑者乃太陽在最高所生之地影太陰自最高至最卑所
