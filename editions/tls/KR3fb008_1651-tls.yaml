body:
  text: 後两象限則失之大因晤太陽本天亦應用小均輪以消息其数方與寔測相符也用寔測最髙最卑中距求两心差及最髙所在康熙五十六年丁酉二至後暢春園逐日測午正太陽髙度求其精度用寔行推淂五月二十一日甲戌辰正一刻零四十秒四十五微交未宮七度五月二十二日乙亥己一刻一十四分五十七秒二十七微交未宮八度十一月二十七日丁丑子正一刻一十二分五十七秒四十一微交丑宮七度本日夜子初三刻一十二分二十七秒四十七微交丑宮八度夫未宮七度至丑宮七度歴一百八十二日一十六時一十六秒五十六微大于半歲周一時一十七分五十
