body:
  text: 癸丑為歲輪乙甲為輪心距地線乙甲午角為星本道之緯乙午弧丑子線與酉庚平行辛癸線與辰戌平行即丑子兩點為歲輪交本道之大距辛癸二點為歲輪與本道之兩交丙丁為遠近線丙為合伏時星當本道視線點辰為退沖時星當本道視線點又與黃道甲午徑線平行作寅未線淂合伏時星在寅低于丙丁遠近線之下退沖時星在未昂于丙丁遠近線之上其合伏寅點距辛交之寅辛恒與歲輪心距正交之乙辰弧等若輪心在交辰點即寅未辛癸兩線合為一距交九十度則兩線相交為直角今設星距合伏次引為寅邜星在邜求視線法先用乙辰午弧線直角形求初緯全数與辰交角之正弦如土星為二度三十一分若乙辰距交度之正弦即申酉泒也
  hash: sha256:e3de018fac4737cd3af8f10b0feb17bbba3088c20827ea55b9b9808fcd9b178b
