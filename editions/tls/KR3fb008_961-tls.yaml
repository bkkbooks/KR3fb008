body:
  text: 丙星在庚留際測淂丙甲庚角為二十三度十五分作諸線成巳戊甲丙庚甲二直角形戊甲巳形有甲角有巳直角自淂戊角有三角求其邊先設戊甲為全數淂戊巳為度三二六三九正弦甲丙庚形有甲角有庚直角自有丙角亦設甲丙為全數求丙庚淂度三九四七四正弦夫戊巳與丙庚兩半徑本等今有二數用變率法求甲丙丙庚與戊巳為同類法丙庚與戊巳若甲丙全數與甲丙八二六二五加甲戊淂戊丙半之淂戊壬九一三一二以減戊甲淂壬甲度八六八八為均輪心距地之差次用壬甲五平分之淂度一七四為乙壬小圈半徑乙甲兩心全差與乙壬之比若一與六此從日覆比試以合撱形而淂之以減戊壬淂戊乙度八九五七二次設戊乙本天
