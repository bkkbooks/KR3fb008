body:
  text: 窄曆書雲為邜形上寬下窄非是故測水星在本輪最卑左右兩宮內其與太陽大距度無甚大小因本天不為撱形故也蓋其兩心差之理元與四星無異特因本天圈之心即大均圈之心又附一小均輪上旋轉故其所歷一周之跡即大均圈遂成撱形與四星異耳今先依古圖觧之甲為地心申子邜為水星平行圈甲丙為兩心差於甲丙取六之一為乙丙半徑乙為心丙為界作丙癸小
