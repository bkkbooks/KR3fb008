body:
  text: 用表之法以距交實行之宮對距交實行之度其縱橫相遇卽所求之星距黃道線也設火星距交實行為初宮一十二度求星距黃道線則察初宮一十二度所對之數為六六五一六卽所求之火星距黃道線也若距交實行有零分者亦按中比例法求之
