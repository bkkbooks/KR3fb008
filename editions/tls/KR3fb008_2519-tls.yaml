body:
  text: 二十七分十十八秒其號爲減卽所求之初均其與中分所對之數爲三秒卽所求之中分也初宮在上故用順度又設星距日次引為十一宮二十五度求次均及較分則察十一宮二十五度與次均所對之數為二十六分五十五秒其號為減即所求之次均其與較分所對之數為二分五十五秒即所求之較分也十一宮在下故用逆度若引數或星距日次引有零分者按中比例法求之
