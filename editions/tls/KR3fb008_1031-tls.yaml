body:
  text: 均一度五十分淂辛壬弧三十七度十分加庚子壬半周淂三百十七度十分乃星骵在辛距庚平遠所行度數也依此可定金星伏見行之曆元若再用一測求伏見輪工之行以兩測中星行輪周度數為寔積年為法而一淂星每日伏見行度分測水星伏見行周赧王五十年丙申西十一月十五日邜初多祿某測淂水星視行在大火宮二度三十五分緯南二度二十分當時太最平行在
