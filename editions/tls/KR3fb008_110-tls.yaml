body:
  text: 一率乙丙正弦九二三六七五二率丙甲正弦六四二七九三率半徑全數四率乙角正弦六九五八八九查弧得四十四度六分弱為乙角又法乙丙之餘割即丙丁正割與全數若甲丙之餘割即戊丙正割與乙角之餘割即戊丁正割求弧得戊丁減戊已象限得丁已弧為乙角此用戊丙丁次形立算元形有乙丙甲丙二邊即次形有戊丙丁丙兩邊也以戊角為前啚黃赤道交角觀之前八線比例圖之乙角也後同求丙角法為丙甲之切線與丙乙之切線若全數與丙角之割線求弧淂庚壬弧為丙角此用甲乙丙正形以丙角代前啚黃赤道交角觀之一率丙甲切線八三九一二率丙乙切線二度四一一八八三率半徑全數四率丙角正割二度八七四二三求弧得丁已弧六十九度三十八分强為丙角又法丙甲之餘切即戊角甲丁正切與半徑若乙丙之餘切即乙已正切與丙角之餘弦即戊已之正弦查弧減象限得已丁為丙角度分次用乙戊已次形元形有乙丙甲丙二邊即次形有乙巳邊及戊
