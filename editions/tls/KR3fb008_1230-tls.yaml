body:
  text: 十五求復圓時刻用十二求真搃時加一時為後搃時以後搃時入九十度表如前法求之得日距限記東西號若真時在限東復在限西為異號及限距地高用真時加一時以日赤緯檢高弧表淂日距地高如前法以九求月距地及本求日距地高檢視差表得月高下差以本求日距限及限距地高查交角表得交角度以交角度及月高下差查時氣差表得後時差以後時差與真時差相減併提差分法同初虧置月寔行以差分加減之為視行
