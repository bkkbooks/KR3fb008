body:
  text: 橫相遇即所求之月行分秒和太陽太陰兩半徑之和三十二分食甚距緯一十二分求初虧至食甚之月行分秒則察兩徑和較三十二分與食甚距緯一十二分所對之數為二十九分四十秒即所求初虧至食甚之月行分秒又如太陰地影兩半徑之較三十分食甚距緯五分求食既至食甚之月行分秒則察兩徑和較三十分與食甚距緯五分所對之數為二十九分三十五秒即食既至食甚之月行分秒若距緯及兩徑和較皆有零秒者用中比例三次求之
