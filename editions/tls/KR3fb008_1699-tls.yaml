body:
  text: 本時太陽均数與升度差俱變為時分以加減寔朔望之時刻為朔望用時乃與測騐脗合暦書止用升度差今即用日躔時差表也求朔望時日月距地心度前求日月地半径差止用最髙最卑中矩三限而交食之日月視径以及影径影差則逐度不同且太陰在最髙两弦尤髙太陰在最卑两弦尤卑交食在朔望其髙卑皆不及两弦故欲求朔望日月遂度之髙必先定最髙最卑中矩之距地心線今依日月諸輪之行求淂太陽在最髙距地心一一七九二八本天半径加本輪半径減均輪半径其與地半径之比為一與一千一百六十二中距距地心一
