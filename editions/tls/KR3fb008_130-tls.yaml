body:
  text: 角之正弦取六十一度五十三分之正弦八八一九二為正弦若乙丁邊之正弦七八四八二與丙角之正弦六九五八九求弧淂四十四度六分弱為丙角此用邊角兩正弦比例之法也以乙戊丁餘形觀之自明戊角即丙角第二法有一鈍角兩邊其邊連鈍角求餘角餘邊乙丙丁鈍角形有乙鈍角一百十八度七分有乙丙邊六十七度二十九度有乙丁邊五十一度四十二分求丙丁兩角及丁丙邊法從丙角作丙甲垂弧補成丁甲丙直角形次用乙甲丙丁甲丙兩直角形算之乙丙兩角為異類垂弧在形外求丙角先用丙乙甲形有乙丙有乙角鈍角之餘依法求淂用直角第三法乙丙甲角五十四度二十四分弱甲乙邊四十八度四十分甲丙邊五十四度三十三分次用甲戊丙次形因丁丙邊在九十度外故若象限內即用丁甲丙直角形算有甲直角有丙甲甲戊二邊以甲乙減乙丁邊之餘乙戊淂甲戊求甲丙戊角用直角第二法淂八十一度三十分與前甲丙乙角相并用減兩直角淂四十四度六分為丙角求丁角先用甲丙乙形如前求淂丙甲乙甲次用丙甲戊次形有丙甲戊甲及甲直角求淂用直角第二法戊角五十五度分即丁角求丁丙邊用丙甲戊次形有甲直角有甲丙甲戊先用丙甲乙形所得求丙戊餘邊用直角第二法淂八十四度以減戊丙丁半圈存九十六度為丙
