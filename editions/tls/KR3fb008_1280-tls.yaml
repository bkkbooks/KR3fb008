body:
  text: 最卑每日平行十分秒之一又六七四六九最卑每歲平行以周歲除之即得如以微纎命之即為一十微二纎五十三忽一十八芒太陽本天半徑一千萬太陽本輪半徑二十六萬八千八百一十二太陽均輪半徑八萬九千六百零四氣應七日六五六三七四九二六氣應者曆元甲子年天正平冬至距甲子日子正初刻之日分乃辛未日申初三刻也宿應五日六五六三七四九二六宿應者曆元甲子年天正平冬至距角宿值日子正初刻之日分乃尾宿值日申初三刻也宿並帶零分者亦從子正起算也最卑應七度一十分一十一秒一十微最卑應者曆元甲子年天正平冬至次日子正初刻
