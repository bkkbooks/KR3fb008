body:
  text: 以太隂距黃極度為一邉太陰在黃道北則以黃道緯度典九十度相減在黃道南則以黃道緯度典九十度相加淂太陰距黃極度黃極距赤極二十三度二十九分三十秒為一邉太隂距冬至黃道經度為所夾之外角過半周者典全周相減用其用斜弧三角形知两邉一角而角在两邉之間求對邉之法求淂對邉為太隂距赤極之度過九十度者減去九十度餘為赤道南緯度不及九十度者典九十度相減餘為赤道北緯度又求的近赤極之角為太陰距赤道經度典恒星暦有黃道經緯求赤道經緯之法同求太陰赤道宿度依恒星暦求淂本年赤道宿鈐察太陰赤道經度足減本年赤道宿鈐內某宿度分則減之餘為太陰赤道宿度
