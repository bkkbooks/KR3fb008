body:
  text: 為視徑而視徑又復大小不同則以日月本天有最高𤰞故也盖在最高則視徑加大在最𤰞則視徑加小雖其寔徑原無大小之殊而人目視角必因之而有大小如圖大圈為本輪戊為最高乙為最𤰞設日月一在最高戊一在最𤰞乙两寔徑本等而人目徔甲視之高則為己甲庚角視徑小𤰞則為丁甲两角視徑大其餘自戊至乙一百八十度俱一一不等而漸次加大也一蒙氣能變視徑之大小上論視徑之大小由于本輪之高低此外又有两種變易其一由于蒙氣蒙氣者地上清蒙之氣乃次
  hash: sha256:8a29767260b04140d18842a03796d782d484603aa53f43716145185c390bbfaf
