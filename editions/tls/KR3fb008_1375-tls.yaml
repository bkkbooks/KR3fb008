body:
  text: 求正交年根以積日與火星正交每日平行十分秒之一又四四九七二三相乘得數為積日正交平行加火星正交應四宮一十七度五十一分五十四秒七㣲淂正交年根上攷徃古則置火星正交應減積日正交平行淂正交年根求火星日數以所設日數與火星每日平行一千八百八十六秒六七三五八相乘淂數為秒以宮度分收之淂火星日數求最高日數以所設日數與火星最高每日平行十分秒之一又八三四三九
