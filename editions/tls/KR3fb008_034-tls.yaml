body:
  text: 甲乙與丙乙之比例若丁已與戊已今分推甲乙之較甲丙與丙乙之比例若丁已之較丁戊與戊巳之比例為分理也十一有轉理以前為前以前之較為後如上啚甲乙與丙乙之比例若丁已與戊已今轉推甲乙與甲丙若丁巳與丁戊也十二有平理後比幾何各自三以上相為仝理之連比例則此之第一與三若後之第一與三又曰去其中取其首尾甲乙丙三幾何丁戊巳三幾何相為仝理之連比例者甲與乙若丁與戊乙與丙若戊與巳也今平推首甲與尾內若首丁與尾巳十三平理有二有平理之序者此之前與後若彼之前與後而此之後與他率若彼之後與他率有平理之錯者此數幾何彼數幾何此之前與後若彼之前與後而此之後與他率若彼之他率與其前如一圖甲與乙若丁與戊而後乙與他率丙若後戊與他率巳是序也今平推甲與丙若丁與巳也如次圖甲乙丙數幾何丁戊巳數幾
