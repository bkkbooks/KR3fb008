body:
  text: 望用朔望策弦策如後交食內定朔定望法求之亦可求月入宮法以月視行次日宮度分內減去本日宮度分餘度分化為一率本日未滿整宮之餘度分化分為二率一千四百四十為三率乘除得九妝之淂入宮時刻求月升法以朔日之月離宮度定之朔時月在子宮十五度至酉宮十五度為正升酉宮十五度至未宮初度為斜升未宮初度到寅宮十五度為橫升寅宮十五度至子宮十五度為斜升求五星伏見晨夕
