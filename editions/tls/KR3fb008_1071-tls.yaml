body:
  text: 如金星伏見行在前六宮午壬巳緯北後六宮子癸午緯南若在乙中交則伏見行在前六宮子癸午緯南後六宮午壬子緯北此後緯之向也其前緯既置輪心在丙距交三宮故金星伏見行自初宮至三宮醜子緯北三宮至九宮子癸午緯南九宮至十二宮午醜緯比若在戊北天距則自初宮至三宮酉午緯南三宮至九宮午巳子緯北九宮至十二宮子酉又緯南此前緯之向也若置輪心在他處伏見行南北之向雙變總以輪心所若不同則合伏點起處遂異而星行輪周俱為右旋故耳若水星伏見輪交本道南北之向與金星正相反故前後緯表之南北號悉反子金星而理則一也求金水二星前緯限
