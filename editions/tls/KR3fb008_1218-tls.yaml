body:
  text: 以前求得九求內月距地及本求日距地高度如前法查視差表得月高下差以日距限及限距地高如前法檢交角表得交角度用交角度及月高下差如前法檢時氣差表得近時差以近時差與先得時差相減為較若先得時差小以較減之若先得時差大以較加之即為視行又捷法倍先得時差內減去近時差得視行亦同以十求內先得時差化秒與近時距分化秒相乘為寔以視行化秒為法除之得真時距分置視朔以真時距分加減之為真時亦限西加限東減
