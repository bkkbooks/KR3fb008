body:
  text: 自暦元康熙二十三年甲子距所求之年共若干年減一年淂積年求中積分以積年與周歲三百六十五日二四二一八七五相乘淂中積分求通積分置中積分加氣應七日六五六三七四九二六淂通積分上攷徃古則置中積分減氣應淂通積分求天正冬至置通積分其日滿紀法六十去之餘為天正冬至分上攷徃古則以所餘轉與紀法六十相乘餘為天正冬至日分
