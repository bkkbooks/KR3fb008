body:
  text: 股行而以較白道所淂未乙南北差小于未申午乙東西差大于午申以黃白二道之高弧交角不調故也盖用白平象限其相差尤在近中限時黃道上東西差減者或反宜加加者或反應減南北差當黃平象限上亦不與高下差等惟月在白平象限南北差與高下差合為一而無東西差用是以推時刻食分皆與舊術不同而中夫用白道既合于天則如太陰在午其差在未自人視之巳遇食甚必以太陰由午退至酉點則寔高在酉視高在戌從白極癸至戊作經圈截白道于午截黃道于巳必遇日月兩心其視經度正當食甚用時午點故太陰行至酉點之時刻方為食甚真時而酉午為真時東西差午戌為真時南北差于午戌內減午巳寔
