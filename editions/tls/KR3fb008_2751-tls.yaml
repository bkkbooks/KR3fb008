  text: 火星距黃道表火星距黃道表亦按兩交前後分順逆列之兩交後之各宮列於上初宮至二宮係正交後在黃道北六宮至八宮係中交後在黃道南其數同兩交前之各宮列於下三宮至五宮係中交前在黃道北九宮至十一宮係正交前在黃道南其數同前後列距交本道度中列逐宮逐度之星距黃道數卽次輪心距黃道之數火星距交實行在上六宮者用順度火星距交實行在下六宮者用逆度
