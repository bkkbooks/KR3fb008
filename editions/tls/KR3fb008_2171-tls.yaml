body:
  text: 黃白距度表黃白距度表按兩交前後分順逆列之兩交後之各宮列於上初宮至二宮係正交後為北緯六宮至八宮係中交後為南緯其數同兩交前之各宮列於下三宮至五宮係中交前為北緯九宮至十一宮係正交前為南緯其數同太陰交周在上六宮者用順度太陰交周在下六宮者用逆度此即月離黃白距度表六分之一乃朔望時之大距專為交食之用故以十分逓析較月離加詳馬用表之法以交周之宮對交周之度分其縱橫相遇
