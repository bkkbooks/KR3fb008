body:
  text: 十二求考定真時復置搃時以真時距分加減之日在限西則加限東則減為真搃時以真搃時如前法求得日距限及限距地高與日距地高度並以真搃時查再如前法求得月高下差及兩圈交角以本求所淂交角及高下差入時氣差表如前法查淂時差并查得氣差以真距時分與月寔行化秒相乘為寔一小時化秒為法除之得數為真距度以所淂真距度與本求真時差相較若相等者即用真時為食甚之時如此即不用後條距較考定法
