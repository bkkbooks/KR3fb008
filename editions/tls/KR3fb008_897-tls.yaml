body:
  text: 三乙戊丁甲戊丁二形同用戊丁邊是戊丁邊有二數今以兩戊丁依變率法通為同類以求戊乙線法乙戊丁形之戊丁二六九四八與甲戊丁形之戊丁七二二六若乙戊丁形之乙戊五六七三六與後乙戊一五二二一是甲戊甲丁戊乙丁戊四線皆為同類四甲戊乙形有甲戊乙角乘甲乙弧三十七度五十一分半有甲戊乙戊兩邊依法求甲乙邊淂度九五九八五甲乙線有兩數一為甲乙弧七十五度四三之全弦一度二二
