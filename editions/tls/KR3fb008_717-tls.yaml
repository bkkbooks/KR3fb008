body:
  text: 之理也茲有蒙氣已上變昜之徵聊足觧此萬曆乙巳八月西國北極高四十度測太陰在最卑日全食亦全掩原光而其四方尚餘赤光如火廣數度依此地論必言蒙氣所生乃從此向西北一國北極高五十餘度同時測日不全食未盡一分三十餘秒日周以外太陰餘分甚多而此地尚見是大光豈兩地相遠如此尚當言蒙氣相同之故乎縱使相同而蒙氣距地面極高無遇二百里此不全食之地其交影之頂尚在二百里已上全出蒙氣本界之外則安得有本地面之蒙氣受焒為光且四周皆見乎彼所見滿影四周之光既不為蒙氣所生必為空氣所生矣假如甲為太陽乙為太陰丙為地丁戊為蒙氣界若全食則所生金環在丁戊之
