  text: 之交道丁得距黃道為丁丙即星距交在午歲輪在未相當之緯度也法丁醜六十兮與丁醜緯限若丁丙中兮與丁丙視緯上三星距正交在前六宮緯北後六宮緯南與朋離仝測金水二星緯度上三星之緯一由本道斜交黃道一由歲輪復斜交本道與黃道為平行面金水二星不然其緯皆由伏見輪斜本道而生與本道
