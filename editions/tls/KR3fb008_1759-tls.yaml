body:
  text: 為月辛點為初虧壬點為復圓月心在戊為食甚丁戊為食甚視緯法以丁巳日月兩半径相并為弦丁戊為股求淂巳戊勾為初虧至食甚距弧與復圓戊庚距弧等次以巳戊變時分減食甚真時淂巳點初虧用時加之淂庚點復圓用時也求日食初虧復圓真時日食初虧復圓真時即以初虧復圓用時求之而淂與求食甚真時又用近時者不同盖食甚已有東西差則可相較淂視行以為比
