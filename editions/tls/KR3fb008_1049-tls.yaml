body:
  text: 如圖甲為地心癸甲為黃道面上線丁甲為本道面上線丁甲癸為本道與黃道之交角土星測定二度三十一分木星一度二十分火星一度五十分丁點為本道南大距處置歲輪心小圈為歲輪其面與甲癸黃道平行合伏時星在合其緯角為庚甲合比本道庚甲丁為小退沖時星在沖其緯角為庚甲沖比本道庚甲丁為大可見歲
