body:
  text: 弧交角相減淂初杅定交角初杅月距限西者初杅視緯在南則以初杅緯差角典初杅黃道高弧交角相減初杅視緯在北則以初杅緯差角典初杅黃道高弧交角相加淂初杅㝎交角如初杅無視緯則無初緯差角而初黃道高弧交角即初杅㝎交角求復圓定交角復圓月距限東者復圓視緯在南則以復圓緯差角典復圓黃道高弧交角相減復圓視緯在北則以復圓緯差角典復圓黃道高弧交角相加淂復圓㝎交角復圓月距限西者復圓視緯在南則以復圓緯差角典復圓黃道高弧交角相加復圓視緯在北則以復圓緯差角典復圓黃道高弧交角相減淂復圓緯差角如復圓
