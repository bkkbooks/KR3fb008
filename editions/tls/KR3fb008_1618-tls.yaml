body:
  text: 無視緯則無復圓緯差角而復圓黃道高度交角即復圓㝎交角求初杅方位初杅月距限東者初杅㝎交角在四十五度已內為上偏右在四十五度以外為右偏上適足九十度為正右過九十度為右偏下初杅月距限西者初杅㝎交角在四十五度以內為下偏右在四十五度以外為右偏下適足九十度亦為正右過九十度為右偏上求復圓方位復圓月距限東者復圓㝎交角在四十五度以內為下偏左在四十五度以外為左偏下適足九十度為正左過九十度為左偏上
