body:
  text: 求諸望策用交食𦍤望策表察本月望策日時分秒淂望策察本月太陽平行望策宮度分秒淂太陽平行望策察本月太陽引数望策宮度分秒淂太陽引数望策察本月太隂引数望策宮度分秒淂太隂引数望策察本月太隂交周望策宮度分秒得太隂交周望策求平望以首𦍤根級日望策三数相加其日滿紀法六十去之淂不望自初日甲子起筽淂平望干支自初時起子正一時為丑初以次順数至二十三時為夜子初每十五分妆為一刻不足一刻者為零分淂平望時分秒求平望太陽平行以首𦍤太陽平行典太陽平行望策相加淂平望太陽平行求平望太陽引数以首𦍤太陽引数典太陽引数望策相加得平望太陽引数求平望太隂引数以首𦍤太隂引数典太陽引数望策相加淂平望太隂引数求平望太隂交周以首𦍤太隂交周典太隂交周望策相加淂平望太隂交周推日月相距第二求太陽均数
