body:
  text: 無與為蓋金水二星之本天不交黃道在黃道一平面無緯南緯北之分如大小多環各自旋轉不相撞遇其緯皆由伏見輪心緊于本天周上而輪周則斜交於本天半北斗南以生緯度此金水之緯全在伏見輪之一根也但輪心旋居於本天周所生緯角在在不等不能逐度作表故置心在距交線九十度處算輪上一周之緯名為前緯限又置輪心在交線算輪上一周之緯名為後緯限分前後二表餘度則用中分以該之如上三星法也如圖丁為地心大圈為黃道次圈為星道在黃道之平面諸小圈為伏見輪其心旋居於本天之周如在申則庚為合伏巳為退合在丙則醜為合伏巳為退合在乙則申為合伏在戊則酉為合伏在辛則寅與邜為合伏在未
