body:
  text: 日在陽曆以南北差加寔距度潯視距度在陽曆以南北差減寔距度潯視距離論東西差食在限東末潯寔會而先潯視會在限西既潯寔會尙為及視會而其根則皆本子地面地心之差無二理也求太隂一小時寔行度太隂有平行有寔行論平行萬古皆同而寔行為小論故時時不等當太隂在小論最高其行极運寔行不反平行在最畀其行極疾寔行大于平行在兩中距時適與平行相等外此最高上半周恒遲最畀下半周恒疾今欲求一小時寔行者為日食初虧後圓時差之用也法以太隂一日平行距日度十二度一十一分二十
