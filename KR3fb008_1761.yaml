body:
  text: 例也其法以初虧復圓兩用時各按法求其東西差同限者或同在限東同在限西以其東西差與食甚之東西差相減為差分以加食在限東初虧東西差小食甚東西差大或復圓東西差大食甚東西差小俱用加限西反是減食在限東初虧東西差大食甚東西差小或復圓東西差小食甚東西差大俱用減限西反是初虧復圓距食甚之度為初虧復圓時視行異限者一在限東一在限西以其東西差與食甚之東西差相并為差分以減初虧復圓距食甚之度為初虧復圓時視行乃以初虧復圓視行與初虧復圓用時距食甚時分之比即同于初虧復圓距食甚之度與初虧復圓真時距食甚時分之比以加復圓減初虧食甚真時即為初虧與復圓真時也如圖甲為天頂外圈為地平丁為白極丁甲乙為遇白極經圈巳
