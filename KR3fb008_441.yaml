body:
  text: 及交之度戊在乙交之前己在丁交之後前食用減法淂均數四度二十分減者月在自行之前半周平交行為甲乙庚減庚戊淂甲乙戊而戊為月所到之處取戊庚後食用加法淂均數四度一十八分加者月在自行之後半周平交行為甲丙辛加辛己淂甲丙己而己為月所到之處取己辛庚辛為兩食中積月距交之平行一百五十九度五五并庚戊辛己淂戊丙己兩距之實行一百六十八度四十三分其餘十一度十七分為乙戊丁己兩弧并半之淂五度三十九分為兩食時月距交之度乙庚淂九度五十九分若半交甲為界則甲乙庚淂九十九度五十九分是第一食時之交行根所謂交應也若他時他處求交應依此加減之求太隂黃白兩道距度白道交于黃道與黃道斜交赤道之理同但其大距度用渾儀纍測之恆大小不等朔望最小為四度五十八分三十秒兩弦最大為五度十七分三十秒半弦次之為五度十分餘各大小不等夫大距既不等則每大距所當距交九十之緯亦必不等今本表取六大距為主四度五八三五度分五度五分五度十分五度十五分五度十七分三以月距交宮度為引數求之其南北之向凡距交在前六宮緯北後六宮緯南初宮則從正交起算
