body:
  text: 所差時刻得其所差度分今姑依廣與圖計里畫方之法約畧定各省加減刻分若欲真切湏在本地親測考驗以定地之經度乃無悮耳盛京奉天府約加二刻江南江甯府及福建州府約加四分山東濟南府約加五分山東太原府約減一刻九分湖廣武昌府河南開封府約減一刻陝西安府廣西桂林府約減二刻四分浙江杭州府約加十二分江西南昌府約減十分廣東廣州約減一刻五分
