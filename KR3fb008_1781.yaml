body:
  text: 求淂庚辛弧為黃道距地平之邊乃以丁庚月距春分度與庚辛弧相加淂丁辛弧因用丁辛戊正弧三角形求丁角形有丁辛弧有辛角有戊直角即求淂丁角為黃道高弧交角也求緯差角緯差角者初虧復圓時月與地影兩心相距之線與黃道相交之角也如圖甲乙丙為黃道丁戊巳為白道乙為地影心庚戊辛皆為月心乙戊為距緯即食甚時兩心相距之数乙庚為并径即初虧時兩心相距之数壬庚為其距緯乙辛亦并径為復圓時兩心相距之数癸辛為其距緯如
