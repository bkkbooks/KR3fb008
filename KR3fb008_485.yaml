body:
  text: 金星則大于月何獨月能食日乎不知金水二星雖有時在日内其去人甚遠遠則視徑見小不能掩日百分之一二而日光甚盛所虧百之一二非目力所及且二星比月去日更近所出銳角之影更短不能及地靣若月骵之大雖不及太白而去地甚近去日甚遠一指足蔽忝山又何疑乎由是言之求一實不通光之骵全掩日骵者惟月為能又自西而東不及三十日而周其行較于諸天最為疾速故每定朔時皆仝經度皆能有食其不食者由距度不及交耳月食在望地影所隔月食在望緣日月相對其理易明但言食于地影驟言之或未之
  hash: sha256:78fc743d5c9d6d2e0f7441a33917e4f01f76f9afc9abfb57ccf984dc1f53cfca
