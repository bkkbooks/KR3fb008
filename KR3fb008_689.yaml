body:
  text: 求初虧復圓俱依視差算月食初虧至食甚與食甚至復圓前後時刻大約相等日食則不然雖太陰在食甚前後所行度數相等而所應之時刻鮮有不參差者蓋視差能變實行為視行有前得之時較後得為多亦有後得之時較前得為多此中種不一如啚甲為太陽乙丙丁皆為太陰甲乙或甲丙為兩曜視半徑之并甲丁為太陰食甚視距度則甲乙線之方數減甲丁線之方數餘開方得乙丁線為太陰自初虧至食甚所行之度與丁丙至復圓數略相等但太陰行遇乙丙線時除食甚正在九十度限前後未嘗相等故求之法必于前時以東西差求其視行則得初虧距食甚之時又一後時復以東西差求其視行乃得復圓與食甚相距之時然初虧與食甚或皆在九十度東則因初時之東西差大于後時之東西差其兩差不等之數減于太陰實行則得視行若初時之東西差反小于後時之東西差其兩差不等之數則加于太陰實行而得其視行或初虧與食甚皆在九十度西而初時之東西差大後時之東西差小其兩差不等之數用加如初時之東西差小後時之東西差大其兩差不等之數用減與前法相反此較初虧與食甚若較食甚與復圓皆為一理第其兩相比量俱以先東西差與次東西為主故求初虧則食
