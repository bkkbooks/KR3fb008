body:
  text: 乙甲丁角以甲角旁甲乙甲丁兩弧引出之各至半周一百八十度為甲丁丙甲乙丙則兩圈復相交于丙作乙丙丁角此角與元角乙甲丁等六定曲線角之度分以角旁兩弧各引至九十度作弧此弧度分即此角之大乙甲己丙兩弧交于乙作甲乙丙角今欲知乙角之度以乙甲乙丙兩弧各引至九十度為乙戊乙丁後丁後戊作丁戊弧即甲乙丙角之度分也何則試以乙丁乙戊再引至半周必遇于已淂已角與乙角等而丁戊弧居乙已形之最中乙已即丁戊圈之兩極乙戊己丁皆九十度故丁與戊俱為直角乙戊丁乙丁戊皆直角己戊丁己丁戊亦直角是乙角當丁戊弧而已角亦當丁戊也如以丁戊引出之亦必過乙丁已乙戊己兩圈之極故形中如癸壬辛庚諸弧甚多惟丁戊止有一不得有二是丁戊能度乙已兩角之大也若角旁兩弧過九十度如乙辛乙庚則退截九十度之一點如丁與戊作丁戊弧為乙角七曲線角之度分九十度為直角小為鋭大為鈍如丁丙壬角限甲己弧九十度則丙為直角丁丙庚角其甲乙弧不及九十度為鋭角丁丙癸角甲辛弧過九十度為鈍角凡欲作球上角之度以角點為極取九十度為半徑作圈次以
