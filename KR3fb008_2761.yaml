body:
  text: 視高也如先測得火星視高五十二度五十九分二十秒則以地半徑差四十秒與視高相加得五十三度為本時火星之實高也高度有零分者滿三十分以上則進作一度不用中比例因逐度地半徑羌所羌甚微故也
