body:
  text: 高弧必先定卯酉兩時高弧之正弦蓋太陽在赤道卯酉時甲點正出入地平言締北卯酉時申點在地平上為申午締南卯酉時酉點則在地平下為酉己而申午與己酉乃日締南北與在赤道上相差之正弦求之于壬乙赤道高加壬癸潯癸乙弧取其正弦癸氐即午正時高弧正弦人于壬乙減壬丙潯丙乙弧取其正弦丙災而丙災與辰卯等以于丁壬乙兩弧本等內各減相等之壬丙子辰所餘丙乙與辰丁必等因潯丙災辰卯亦等次以癸氐與丙災即卯辰亦即氐寅相加潯癸寅半之于亢潯癸亢申點為癸辰之半則亢點必為癸寅之半用減癸氐正弦有亢氐即申午亦即己酉也為太陽南北距締卯酉時高弧之正弦潯卯酉
