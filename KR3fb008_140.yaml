body:
  text: 也則戊丑與午丑亦若辛甲與卯甲轉之淂戊丑與戊午若辛甲與辛卯又丑亢癸戊午子兩形相似午子線即辰𠅆兩矢較與壬𠅆平行丑亢與亢癸若戊午與午子而丑亢即戊丑午子即辰𠅆亢癸即癸氏戊氏亢直角形丑癸線平分亢于丑亦必平分氏亢于癸也亦即壬𠅆則戊丑與壬𠅆亦若戊午與亥辰更之戊丑與戊午若壬𠅆與辰亥夫戊丑與戊午之比例若辛甲與辛卯今戊丑與戊午又若壬亥與辰亥則壬亥與辰亥亦必若辛甲與辛卯矢矣故壬亥為一率丙腰正弦相因之數辰亥二率丙矢之較辛甲三率半徑淂四率辛卯丁角之矢以減辛甲半徑淂甲卯為餘弦求弧淂未辛即丁用之度也又法角旁兩腰正弦相因為初數兩腰餘弦相因為次數以次數與底弧之餘弦相加減底弧九十度卯相減不及九十度相加為實于是一率物數二率實數三率半徑四率淂本角餘弦此徑求本角之餘弦也即用上啚解之兩腰正弦相因為初數即亢癸也兩腰餘弦相因者己甲為丁乙小腰餘弦即甲房甲丑為丁丙大腰餘弦因己甲庚丑甲壬兩形相似庚甲與甲己若丑甲與甲壬淂壬甲為次數也甲辰為乙寅底弧之餘弦加壬甲淂壬辰為實數夫前論壬亥即亢癸與辰亥兩矢較若辛甲半徑與辛卯矢轉之則壬亥一率與壬辰二率必若甲辛三率與甲卯四率即丁角餘弦也第六法有三角求三邊丁乙丙鈍角形有乙丁丙三角求乙丁丙丁丙乙三邊之度
