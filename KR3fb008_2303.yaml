body:
  text: 黃道高弧交角表黃道高弧交角表以日距限及限距地高縱橫列之日距限自一度至九十度分三段列于前每段三十度限距地高自二十度至八十九度分七段列于上每段一十度中列逐度之共道高弧交角用表之法以日距限之度對限距地高之度其縱橫相遇即所求之黃道高弧交角也設日距限三十度限距地高二十五度求黃道高弧交角則察日距限三十度與限距地高二十五度所對之數為七十六
