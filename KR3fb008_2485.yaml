body:
  text: 差角則察並徑三十四分與距緯三分所對之數爲五度零三分四十四秒卽所求之緯差角也若并徑及距緯有零秒者滿三十秒以上則進作一分不用中比例因逐分之緯差角雖有數度之差而定交食方位所差甚微故也
