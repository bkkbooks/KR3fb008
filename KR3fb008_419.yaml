body:
  text: 三角三角求三邊淂戊丙丁角之戊丁邊一度九九九九六戊丁丙角之戊丙邊度二二一二夫乙戊丁戊丙丁二形所淂有兩戊丁邊則用變率法以先淂乙戊戊丁之比例次淂戊丙戊丁之比例變為同類法用先淂之戊丁為主線以次淂之戊丙邊變與先淂戊丁為同比例戊丙既變則乙戊丁戊丙戊三線俱為同類之邊而後可用法求戊壬丙弧矣變戊丙線次戊丁一度九九九九六與先戊丁一度四七三九若次戊丙度二二一二與度一六三二三為與先戊丁同類之戊丙線也次求乙丙線用乙戊丙形有乙戊邊有戊丙一六三二有乙戊丙角四十度四八依分形法向乙戊邊作丙寅垂線分元形為兩直角形戊角之正弦度六五三四與戊丙若全數與丙寅度一六五二戊角之餘弦度七六八三與戊丙若全數與戊寅度一二五二五減乙戊存乙寅度一四二七三為股丙寅為勾求淂乙丙弦度一七八一前乙戊丙戊兩邊與先戊丁為同類今用乙戊戊丙所求之乙丙亦必與先戊丁為同類則乙戊乙丙戊丁戊丙四線俱為同類之線次以乙丙弧八十一度三六取其全弦一度三六八為乙戊丙角之乙丙線此線不與先戊丁為同類與本輪半徑己壬二萬為同類己壬先命為二己庚為全數用變率法以先淂之乙丙變與後得之乙丙
