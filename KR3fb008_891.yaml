body:
  text: 第二測漢順帝陽嘉三年癸酉六月初三日申正測淂土星經度在析木宮九度四十分太陽平行對沖在實沈九度四十分第三測漢順帝永和元年丙子西七月初八日午正測淂土星經度在星紀宮十四度十四分太陽平行對沖在鶉首十四度十四分前二測中積為二千二百六十日又二十二時依前所定平行率得土星平行七十五度四十三分今兩測視經度差為六十八度二十七分平視二行相減得七度十六分為均數平行大視行小星必在本圈上半弧逆行後二測中積為一千一百三十日二十時土星平行三十七
