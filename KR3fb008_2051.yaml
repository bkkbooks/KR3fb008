body:
  text: 恒星黃道經緯度表恒星黃道經緯度表以曆元康熙二十三年甲子之黃道經緯度列之上列星名次列黃道經度次列黃道緯度下列星等用表之法設康熙甲子年日躔黃道初宮八度求黃道宿度則察恒星黃道經緯度表斗宿第一星共道經度為初宮五度五十分取相近畧小者用與日躔黃道經度相減餘二度一十分卽太陽八斗宿二度一十分也若求曆元後各年之黃道宿度則以所求之年距
