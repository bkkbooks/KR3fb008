body:
  text: 四十三度三十五分丁乙丙角也二測永和五年庚辰西二月十八日歹擇卑大星比金星在降婁宮十三度十五分太陽平行在元枵宮二十五度半相較淂大距度四十八度二十分戊乙丁角也夫晨測金星在丙夕測在戊論其實行兩大距之戊乙甲兩乙甲二角必等以乙戊乙丙俱為切線故今算平行則兩大距數不等以有甲丁乙初均角在內故也法以晨夕兩測大距度並之淂戊乙丙角九十一度五十五分折半淂戊乙甲角四十五度五十七分以減夕測戊乙丁角淂甲乙丁角二度二十三分即星距最高九十度之最大初均也既淂乙角用甲乙丁形有乙丁全數有乙角有丁直角求甲丁淂度四三三即兩心之全差也蓋前置輪心在最高
