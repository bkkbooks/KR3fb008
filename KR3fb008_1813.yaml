body:
  text: 舊術亦用緯限中分法今依輪心所居隨時求次輪上視緯如圖甲為地心邜寅為星本道寅為正交寅甲為交線設伏見輪心在壬距正交為壬寅弧丙子癸丑為伏見輪子丑為樞線子為次正交丑為次中交次輪子丙丑半周在黃道南丑癸子半周在黃道北指金星言水星反是丙點為南大距庚點為北大距亥壬丙為次輪交本道之角如金星為三度二十九分壬甲為次輪心距地心線未乙為
