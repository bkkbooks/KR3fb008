body:
  text: 六曲線形三角之鋭鈍與常式不同每形有一直角兩鋭角或一直角兩鈍角或一直角餘一鈍角一鋭角甲乙丙圓球丁為心球面上有多大圈相交相割成諸三角形如甲乙戊形乙角直甲戊二角鋭為一直二鋭形甲丙戊形丙角直甲戊二角鈍為一直二印形乙角直未角鋭戊角印為一直一鋭一鈍形七有兩直角一鋭角或兩直角一鈍角或三角俱直角甲戊已形甲已二角俱直戊角鋭為兩直一鋭形己戊丁形己丁二角俱直戊角鈍為兩直一鈍形甲戊乙形甲乙戊三角俱直為直角全形凡形有兩直角其對直角之二邊必九十度如戊甲巳形甲巳二角直則戊甲戊巳兩弧必九十度而甲已邊即戊角度分若甲乙戊形三角俱直即甲乙甲戊乙戊三邊皆九十度邊即為角其三角互為三邊之極如甲戊弧之極在乙乙戊弧之極在甲乙甲弧之極在戊如依甲乙戊形剖全球必平分球骵為八平分亦平分球面為八平分也八有一鈍角兩鋭角兩鈍角一鋭角或三角俱鈍三角俱鋭甲乙丙角形乙角鈍甲丙二角鋭為一鈍二鋭形戊巳庚形巳庚二角鈍戊角鋭為二鈍一鋭形戊丙甲形甲戊丙三角皆鈍為三邊鈍
