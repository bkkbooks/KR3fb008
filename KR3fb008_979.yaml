body:
  text: 測土星歲輪半徑土星既有歲輪則當求其半徑第穀子萬曆十八年庚寅西三月初八日午正後三十四刻在本地測淂土星視經為寔沈宮七度三十二分時太陽寔行躔娵訾宮初度初分四十秒依表算淂土星平行距春分七十五度十分五秒自行一百六十八度五十一分四十秒如圖丁為地心庚壬為土星平行天壬為高沖壬未為自行之餘十一度九分如前法作本輪均輪星在丙求淂未丁丙初均角一度二十一分四十八秒以減平行得七十三度四十八分十七秒為星寔經度以與太陽寔經相減餘二百五十六庚十一分二三為歲輪上辛戊乙弧距合伏度在乙又以寔經與
