body:
  text: 即同于最髙前後四十一度之距地心一一三九八九八與一千一百五十七之比即所求距最髙四十度之距地心也求月距地之法同理此日月各距地数與新法暦書微不同而此較宻也日月視径日月之径為食分淺深之原所閔甚大数年來精推寔測淂太陽㝡髙之視径為二十九分五十九秒最卑之径為三十一分五秒比舊㝎日径最髙少一秒最卑多五秒𦍤望時太陰最髙之視径為三十一分四十七秒最卑之径為三十三分四十二秒比舊定月径最髙多一分一十七秒最卑少五十八秒而以日月髙平比例推算今数為宻依此立日月視径表
  hash: sha256:64ef03b7f8d68f1f1cb9fa6490cad9a841bbe310709d1d9b0a88a8ecc4b77ec6
