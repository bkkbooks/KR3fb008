body:
  text: 金星不旋地球若月骵以地為心乃淂齊見其光之盈縮如圖色庚為太陽平行天戊為日上圈為金星伏見輪以戊日為心下圈為月天月在太陽人目之間為丙則無光合朔時金星在太陽人目之間為乙亦無光退合時若地在戊日丁月之間則月自滿望時若太陽戊在金星甲地球之間則金星光滿若在左右則月及金星各有半光兩弦右稱金星在本輪上骵小光盛在本輪下骵大光淡在左右骵不甚大而光甚盛蓋星在伏見輪甲高時為望其骵遠則見小全透其光故盛也在乙卑時為晦不可淂見晦朔左右去地為近則骵見大哉生明故稍淡也在左右為上下弦所見半骵故不甚大遠近之間又見半光故甚盛也玩圖自明
  hash: sha256:a9814cf9685a12c225646c45d2e3c8cb589072ce2c6143a95fa524cd84ed1156
