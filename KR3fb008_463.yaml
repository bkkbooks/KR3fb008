body:
  text: 有半強若以周徑法求之則七與二十一若六十地半徑月天之半徑與月天之周淂一百九十地徑又七之一也如求太陽寔徑日距地為地全徑者五百八十九有半日視徑三十一分四十秒歌白泥術如上法算之淂五又千萬之四百三十萬二千三百八十二約淂日全徑為地全徑者五倍又百分之四十三也求月離日差日差者半日與視日之差也其理詳太陽日差表中但月離之日差不用太陽盈縮一根止用升度化時以為加減盖盈縮之差已用加減太陽平行為寔經度故也求之以黃赤二道同升之度相減淂升差化時即日差數其最大為九分五十六秒最大升差二度二十九分化時之數凡二分後赤道小于黃道必視日大于平日時用加二至後赤道大于黃道則平日大于視日時用減但本表加減之號則相反何則日差本為平時求視時而設而月離內則以視時反求平時曷為視時求平時如設某時刻欲求月離經度而設時必是用時凡推算皆是平時故先以視時改為半時然後用表以求其經緯也查表以本日太陽所躔經度為引數求之縁時刻以太陽所在為主故耳定太隂晦朔伏見太隂晦朔伏見古人立論踈宻逈殊漢儒洪範傳曰晦而月見西方謂之胐胐者政緩所致朔而月伏東方謂之測匿測匿者政急
