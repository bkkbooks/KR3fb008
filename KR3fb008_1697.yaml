body:
  text: 分之九十八為月在本天最髙距地心最遠之数又于月自行六宮初度月距日九十度測之淂五十三地半径又百分之七十一為月在本天最卑距地心最近之数于是自最近五十三至最遠六十二之十数逐度求其髙下差立表朔望用時太陽與太陰寔行相會相對為寔𦍤望但寔朔望之時刻按諸測騐猶有数分之差或早或遲差至一刻以其猶非用時也盖寔朔望固两㬬寔會寔對之度而推算時刻則仍以平行所臨之位為時皆依黃道而定今推平行與寔行既有盈縮差則時刻亦有增減又時刻以赤道為主而黃道赤道既有升度差則時刻亦有進退故必以
