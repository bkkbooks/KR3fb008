body:
  text: 求丙乙邊法作乙丁垂線補本形為乙丁丙直角形先用乙丁甲形形有甲乙邊有丁甲乙鈍角之餘有丁直角自有乙角求乙丁丁甲全數與甲角之正弦若乙甲與乙丁又全數與乙角之正弦若乙甲與丁甲次乙丁為勾丁甲加甲丙共丁丙為股求弦淂乙丙邊求乙丁一率半徑全數二率甲角八十度正弦九八四八一三率乙甲三丈四率乙丁二丈九尺五五四四三求丁甲一率半徑全數二率乙角十度正弦一七三六五三率乙甲三丈四率丁甲五尺二寸九厘五絲既淂乙丁丁甲依勾股术淂入丈六尺三寸八分三厘為乙丙邊第三法有兩角一邊其邊對一角求餘角餘邊甲乙丙鈍角形有甲鈍角一百度有甲丙乙角二十度有乙丙邊八丈六尺三寸八分三厘求甲乙甲丙二邊及乙角求甲乙邊法甲鈍角之正弦與乙丙邊相比若丙角之正弦與甲乙邊相比淂甲乙邊
