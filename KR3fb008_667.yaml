body:
  text: 壬子癸三角形而子壬為南北差壬癸為東西差丑壬寅癸兩弧丑小故壬癸可當寅求之先後天頂已連赤道極黃道極為巳戊辛三角形有兩極相距之弧辛戊有北極出地之餘弧巳辛有極至交圈交于子午圈之巳辛戊角求巳戊邊為黃極距天頂之度次用巳戊子三角形有巳戊弧有太陰髙弧之餘巳子有子戊為戊丑象限加實距度子丑之總弧距北則减求巳子戊角次子癸壬三角形有髙𤰞差弧子癸有壬子癸交角及壬直角求子壬弧為太陰南北差求癸壬弧為東西差謹按治曆一事交食為最而交食中難且劇者尤在視差苘幾微未協必至食分乖達時刻先後矣夫日食三差一曰髙𤰞一曰南北一日東西然差之名雖有三而其根則一地面地心之故蓋曆法所算周天交會宫度皆從地心出線人若從地心視之則所算之度即所見之度今人居于地面則從地心所算之交會較之地面所見之交會有此自面至心之差其差為地之半徑勢恆降高為畀使視度畀于實度隨人目所至皆有比差也令立法以天頂為宗作過天頂大圈從此圈上定其降高為畀之數則名高下差又以黃極為宗作黃道緯圈從此圈上定其降高為畀之數則名南北差又以中限為宗于黃道上定其自地平至中限各度降高為畀之數則名東西差夫三差既並降高為畀故論高下差恆以實高減下差而得視高論南北差
