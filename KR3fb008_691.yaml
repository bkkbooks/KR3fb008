body:
  text: 甚為後時而求復圓則食甚又為前時也或前後兩時不同在九十度之一邊如初虧在東食甚在西則求東西差必不止食甚前後之兩次因九十度而中分之則一視行求其時之多半又一視行求其時之餘乃合之為初時至後時太陰視會所行度分假如視會在鶉首宮初度午正後二刻距九十度西得東西差五分設得視行二十二分則太陰自九十度至本視會之度兩刻間視東行一十一分如前啚乙丁線為二十八分減一十一分所餘一十七分為太陰在九十度東自初虧至食甚時所行即因九十度前一小時以東西差得太陰視行二十一分故其行一十七分必湏時三刻四分乃自初食至正午此正午與九十度同故為太陰所行之時并午前後時搃得五刻四分為太陰自初虧到食甚遇乙丁線所行時分也外三差前論交食有東西南北高卑三差以變易日月寔度而三差之外復有三差不生于日月地之三徑而生于氣有輕重有厚薄各因地因時而視度為之變易三者何一曰清蒙高差是近于地平為地面所出清蒙之氣變易高下也二曰清蒙徑差亦因地上清蒙之氣而人自所見太陽本徑之大小為所變易也三曰本氣徑差本氣者四行之一地面巳上月天以下充塞太空之氣比于地上清蒙更為精微無形質而亦能變易太陽之光昭使目所見之
