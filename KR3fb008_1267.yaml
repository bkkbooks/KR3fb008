body:
  text: 之得數為帶食距心徑法寔俱化秒妝數淂分求帶食分秒月全徑化秒為一率月食十分化秒為二率置並徑內減帶食距心徑餘數化秒為三率推得四率即月出入時帶食分秒凡帶食分必小於食分食既者帶食必不滿十分若滿十分為帶食既也入其減餘必大於月全徑一法置帶食距心徑內減徑較月半徑影半徑之較餘數化秒為三率如上法求之淂未食餘光分秒以轉減月食十分為帶食分秒如帶食距心徑小於徑較不及減者為帶食既出入其帶食距時必小於食既距時分辨食分進退凡月出入時刻即日出入時刻在食甚前其所帶食分為進帶食在朝者為但見初虧不見食甚復圓在暮者為不見初虧但見食甚復圓若食既者在朝為見初虧不見食既或見食既
