body:
  text: 角旁兩邊各引之抵圈界視其所限弧度即本角之度分如丁丙庚角甲乙弧為其度餘倣此八一大圈與兩大圈相交若俱作直角則此大圈之極必在兩大圈之交㸃如上啚甲戊大圈與丙甲未丙乙未兩大圈相交其交處俱作丙甲乙丙乙甲直角則甲戊圈之兩極必在丙乙未丙甲未兩圈之交處未與丙而未丙即甲戊圈之兩極也論三角形十二則一三大圈相交則成形形有三邊容有三角為球上三角形二球上三角形其三邊皆為大圈不用小圈三曲線三角形有三邊等有二邊等有三邊俱不等四三角形若三邊等即三角亦等二邊等二角亦等三邊俱不等三角亦不等反之三角等即三邊等二邊等二角亦等三邊俱不等三角亦不等五三角形容角之弧為兩腰對角之弧為底甲乙丙三角形甲乙丙乙兩弧容乙角則甲乙丙乙為兩腰甲丙邊為底若甲角則甲乙甲丙為兩腰乙丙為底他倣此
  hash: sha256:e3e4aab83dab55a4de60dd633bcba47d133898da2efa9cc51fc1f820558e4e5b
