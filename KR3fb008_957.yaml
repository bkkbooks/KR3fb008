body:
  text: 度為二十六度半與前等乃以前後兩測平行折半淂壽星宮十度十五分或降婁宮十五度十五分為兩心線所在後用他則反覆比試見水星近壽星大距則小近降婁大距則多因定壽星為最高降數為最卑求兩心之差及伏見輪半徑測淂水星伏見輪心在最高卑兩處之大距即可推其兩心之差一測多祿某於總積四千八百四十七年西十月初三日晨測淂水星伏見輪心近最高大距度為十九度三分太陽平行在壽星宮九度十五分此時最高在大火二度此測猶未到最高少二十三度因水星天之象最高卑左右前後一宮距地無遠近大差故用之解見上文二測次年四月初五日
