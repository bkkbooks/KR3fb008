body:
  text: 赤道北二十二度三十八分三十秒丁卯戊左距已室宿大星三十四度三十七分十五秒戊已在赤道北二十一度二十八分三十秒戊辰已左距庚河鼓中星四十七度四十九分二十秒已庚在赤道北十三度分四十秒午己庚左距角大星九十七度五十分庚乙在赤道北七度五十一分二十秒庚未左旋一周成諸三角形湊甲心星者六角諸形兩腰俱為星距赤緯之餘其底俱為所測兩星之距依法求乙甲丙形淂甲角子丑弧四十九度十九分二十秒丙甲丁形淂甲角丑卯弧五十七度四分十秒丁甲戊形淂甲角卯辰弧六十三度二十八分三十秒戊甲乙形淂甲角午辰弧四十四度五十八分已甲庚形淂甲角未午弧四十八度二十五分庚甲乙形淂甲角未子弧九十六度四十五分十秒已上六經差并之恰三百六十度如是則所淂各星之赤經度為密合矣有赤道經緯求黃道經緯依前法求淂諸星之赤道經緯度今由其赤道經緯以求其黃道上經緯度如啚己丑為赤極子丙為黃極甲為春秋分壬為冬至設一星在赤道北丁其赤經為庚乙赤緯為乙丁次從黃極丙作丙戊弧過星骵即壬戊為星黃經丁戊為黃緯求之用丙已丁形有丁已赤緯之餘有丙已丁角赤道經度有已丙兩極之距二十
