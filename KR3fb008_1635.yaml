body:
  text: 七七為乙子邊又以甲角典半周相減餘数半之得八十一度三十五分一十五秒為乙角亦即子角次用乙戊子三角形乙子過二九二五九七七有戊乙子角八十一度四十分四五二三半周內減去甲乙子角又減去庚乙戊角餘即戊乙子角有戊子乙角九十八度一十八分二三一二半周內減去甲子乙角又減去戊子丑角餘即戊子乙角即有乙戊子角五十一秒二十五㣲求淂戊子過一一六一三二二三八三九次用戊子甲三角形有戊子邊有子用邊有戊子甲之外角六分二十一秒四
