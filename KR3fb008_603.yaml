body:
  text: 限此點名為中限亦名黄平象限凡極出地二十四度己上徔東至到夏至半周限偏午東夏至到冬至半周限偏午西若極出地二十四度己下夏至左右中限所在恒有数度東西相反且驟東驟西距天頂南者亦交而距北以北拯出地二十三度半下夏至太陽在赤道北二十三度餘則反在天頂之北故也又中限拯出地愈多其偏左偏右愈甚限之距天頂度亦愈遠故中限所在必依各方北拯高度求之然欲㝎比中限者為日食時地半徑三差之故高下差南北差東西差為三視差其根皆生于地半徑詳見後盖三視差恒垂向下而使月度偏南高下差變太陰之高度以天頂為宗下至地平為直角南北差變太陰之緯度以黄極為宗下至黄道為直角東西差變太陰
