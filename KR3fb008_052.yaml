body:
  text: 角悉與本形相當可借以求本形之三角三邊也直線直角三角形總圖甲乙丙直角形為元形甲為直角先後甲向乙丙邊作甲丁垂線分丁㸃為直角次從丙作戊丙為乙丙之垂線引長乙甲邊于戊增丙為直角又于乙作巳乙為丙乙之垂線引長丙甲邊于已增乙為直角如是共成直角形凡有六焉一分元形為二直角形甲丁乙直角形其甲角與元形丙角等甲丁丙直角形甲角與元形乙角等一增元形為二直角形已乙丙直角形已角與元形乙角等乙丙戊直角形戊角與元形丙角等又外附二直角形乙甲已直角形乙角與元形丙角等丙甲戊直角形丙角與元形乙角等此六形皆與元形相似而比例同也直線直角形算法第一法有一直角兩邊其一邊對直角求餘角餘邊甲乙丙直角形設有乙丙邊三丈有甲丙邊二丈五尺九寸八分九毫有甲直角求乙甲邊及乙丙兩角各幾何
