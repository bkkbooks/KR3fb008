body:
  text: 日食畫晦星見前史記日食畫晦必因全食若星則不全食而見者有之如晨昏中分日已出已入矣明昧之交正似太陽未全食之光也而大星見也故曆家下推將來雖得全食其見星與否未可預定蓋見星不見星之緣不畫在于食分多因蒙氣與陰晴耳若食時遇氣甚清人目先見最光而習之忽爾失光雖日不全食亦似向晦星乃得見如從大光中暫焉入室見為甚暗也若食時遇氣甚厚或多雲霧則目先習是次光後見失光不以為異又醲厚之氣受返焒之光亦不能甚失日雖全食未及甚晦正如浮雲在天雖太陽已沒朦朧宜畫而尚有餘明星不可見矣自此之外更有太陽正
