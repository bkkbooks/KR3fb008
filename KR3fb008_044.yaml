body:
  text: 乙甲角與乙甲丁角等乙戊甲角與丁甲丙角等夫元形內所分兩甲角本等今乙戊二角既皆與之等則甲戊乙為兩邉等形甲戊邉與乙甲等夫戊甲與甲丙若乙丁與丁丙則乙甲與甲丙亦必若乙丁與丁丙矣二十三兩相似形于形內復作相似形其兩分元邉之比例若元形邉之比例甲乙丙戊已庚兩相似形于形內作甲丁戊辛兩線各分元形為二其所分甲乙丁形令復與戊庚辛形相似因得甲丁丙戊辛已兩形亦相似則此兩形之邉庚辛與乙丁之比例若戊已與甲丙何則庚辛與辛戊若乙丁與丁甲更之庚辛與乙丁若辛戊與丁甲而辛戊與丁甲又若戊已與甲丙則庚辛與乙丁亦若戊已與甲丙矣或庚辛與庚已若乙丁與乙丙庚辛與辛已若乙丁與丁丙理同二十四三角形內任依一邉作平行線于此邉任取一㸃向對角作直線則所分兩平行線比例等甲乙丙角形內作丁戊線與乙丙平行次于乙丙邊任取已㸃向對角甲作直線分丁戊于庚其所分乙已與已丙之比例若丁庚與庚戊或乙已與丁庚若已丙與庚戊亦若甲丙與甲戊比例俱等
  hash: sha256:5ee70b6c9465f0808f079a8b3606dd42150bb06e6a9914c9aa677361a976f2c5
