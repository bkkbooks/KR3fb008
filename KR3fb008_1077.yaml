body:
  text: 求金水二星後緯限置伏見輪心在辰圈見前作丙沖伏見輪丙為合伏沖為退合設伏是寔行為丙辛弧星在辛求後緯法從辛作辛丙弧之正弦辛醜與巳辰平行巳為伏見輪上大距伏見行九丙宮三壬辰巳為伏見輪與本道之交角數見上巳戊即前緯之丙戊線次従醜作醜邜線與壬辰平行醜邜線在黃道面上成辛邜醜直角形邜為直角此形與巳戊形相似辰法全數與巳戊若辛醜正弦與辛邜線次用辛甲邜形邜為直角有辛邜有辛甲伏見輪上距地心線前算次均時所求求辛甲邜角淂午庚弧即星在辛之緯度也表于丙辛弧下書之名為後緯金星後緯在距合伏九十度為二度三分其最大處距合伏一百三十七
