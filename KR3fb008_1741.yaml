body:
  text: 在白平象限之東而視經度申更差而東太陰實高午在黃道北而視高未反在黃道南北三差成未午申正弧三角形申為直角對高下差未午申白道高弧交角對未申南北差午未申餘角對午申東西差是為太陰白道上之寔差也若以黃道論之從黃極戊作戊午戊未兩弧一遇寔高午一遇視高未又作子午弧與黃道平行淂辰午子為黃道高弧交角辰午子角與辰巳辛角等淂午乙為東西差未乙為南北差與高下差為乙午未勾
