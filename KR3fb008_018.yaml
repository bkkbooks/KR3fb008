body:
  text: 兩形之三角等亦為相似十一凡三角形之三角并等于兩直角兩角并與餘一角之外角等如啚甲乙丙鋭角形其甲乙丙之三角相并與兩直角等何則試以丙角為心丙乙為半徑作乙庚丁半圈又作巳丙垂線為巳丙丁巳丙乙兩直角再作戊丙線與甲乙平行夫戊丙既與甲乙平行則戊丙丁角與甲乙丙角等戊丙甲角與丙甲乙角等則試以丁丙戊戊丙甲兩角與元形之甲丙乙角并必等于兩直角半圈分而丁丙戊角即元形乙角戊丙甲角即元形甲角是丙乙甲之三角并等于兩直角也凡三角形皆如是又丙甲乙甲乙丙兩角并與餘一角甲丙乙角之外角甲丙丁角等亦依前論可明以凡兩線相交其內外兩角并必等兩直角而三角形之三角并亦必等于兩直角故也十二凡自圈心出兩線抵圈界其所作角為分圈角自圈界出兩線所作角負半圈者為負圈角乘半圈者為乘圈角如甲乙戊圈丙為心從心作丙甲丙乙兩線分甲乙圈分則甲丙乙為分圈角二啚甲乙丁圈分取甲乙為底從丙作丙甲丙乙兩線成甲乙丙
