body:
  text: 皆不作周圈而為螺旋圈則所定夘酉尚未真也欲得真線如後法三法用地平經緯儀取最近北極一星測其東西行所至兩經度中分之即正北方也今用勾陳大星夏至子時在極東冬至子時在極西或用勾陳第五星冬至酉時在極西夘時在極東各平分之得子午真線若無本器用一定表一游表以繩聯之先以二表與星叅相直若星漸移而東則遷游表随之至不復東而止移西亦如之末于游表所止之二䖏聯以直線而平分之即正南北也或以推繫垂線可嘗表但湏推末極銳與垂線相應以切地平定㸃北極定北極髙度凡步日躔月離五星交食以及一切測騐推算皆以本方北極出地之度分為根若測候未確如春秋分所測午正日軌髙或差一分則以求太陽經度必差至二分半以推太陽之最髙必差一度有竒即日躔行度未為真矣以此定冬夏至時刻等無不差忒故此法最宜詳宻者也一法用象限儀取北極附近一星測其最髙最低之數相差折半用以加最低之數得北極出地度分內冝減去清蒙差
