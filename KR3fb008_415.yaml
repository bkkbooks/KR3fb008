body:
  text: 三會食月行圖平兩行之差平行小視行大月必未至最髙在本輪下半順行二會至三會本輪上自行相距度為八十一度三十六分如啚外大圈為白道小圈為太隂本輪第一會月之視行在子平行小輪心在丁庚丑線在丑視行大必在前第二會月之視行在午平行在丑平行大必在前第三會月視行在未平行在丑其一會月在甲二會月在乙三會月在丙本輪上甲乙丙諸㸃乃各會自行相距之度今以月自行度及視平兩行之差求月最髙所在及本輪半徑如啚即前大圖中之小輪分圖丁為地心子午為黃道弧庚為本輪心己壬圈為本輪月在本輪上從甲向乙左旋二十七日有竒而一周日行十三度三分即轉周也第一會月在甲去甲一百十度二一而至乙兩會自行相距之度乙者第二會食之月雖自行度也甲乙之間平行多視行小乙必在本輪之右又乙行遲叚月必在本輪之上弧其兩會間視平之差七度四十二分即黃道上子午弧也又去乙八十一度二一而至丙二會至三會之自行度丙者第三會之自行所至也乙丙之間視行比平行差少丙亦必在小輪之右又丙行疾叚必在本輪
