body:
  text: 卯二相似形甲辛午形之辛角與丑乙辛角等因丑壬乙為直角其丑壬卯角亦與丑乙壬角等則亦與甲辛午角等又二形之午卯俱為直角則兩形相似甲辛與甲午若丑壬與丑卯則以前弧之餘弦甲午乘後弧之正弦丑壬全數辛甲除之淂丑卯為次數末以丑卯次數與初數卯亥相并淂丑亥為已戊丑兩弧相并之正弦若求兩弧相較之正弦法以後弧丑壬正弦引長之抵圈界于癸則丑癸為丑辛癸弧之通弦因壬點為直角其癸壬與丑壬必等因淂丑辛癸辛兩弧亦等夫丑辛弧原與戊己後弧等則辛癸與戊已弧亦等即以辛癸減辛已前弧淂癸己為兩弧之較癸庚即較弧之正弦癸酉其餘弦法用丑辰癸形其形內之癸申壬丑卯壬二直角形相等丑癸辰勾股形丑癸弦既平分于壬則從壬作壬卯壬申二垂線亦必平分丑辰勾于卯癸辰股于申而癸申壬丑卯壬兩形必等因淂壬申即丑卯次數壬申等卯辰卯辰即丑卯用以減初數壬丁存申丁即癸庚也為較弧癸已之正弦亦與戊辛弧正弦等若兩弧相并在象限外如次圖已寅丑弧理亦同經記同一圖謹按有不等兩弧之正餘弦而求兩弧相并及相減之正弦係古西士多懼某法大測篇正載算術未著其理謹具此圖以明立
