body:
  text: 又法乙角之切線即交角辛乙壬角切線與全數若丙角之餘切即辛壬正切與乙丙之餘弦即壬乙正弦淂乙丙邊此用辛乙壬次形壬為直角元形有乙丙二角次形有乙角及辛壬邊也求甲丙邊法丙角之正弦即子癸弧之正弦子癸與丙角壬庚弧等與乙角之餘弦即已癸正弦若全數與丙甲之餘弦即子角甲庚弧正弦淂丙甲邊此用子己癸次形己為直角元形有乙丙二角次形有子癸己癸兩邊也一率丙角正弦九三七四九二率乙角餘弦七一八一四三率半徑四率丙甲餘弦七六六四淂四十度為甲丙邊又法丙角之正弦即卯午辰角正弦午角與元形丙角等與全數若乙角之餘弦即卯辰弧正弦卯辰與丁己等與丙甲之餘弦即卯午弧正弦卯午與丙甲等淂丙甲邊此用卯辰午次形辰為直角元形有乙丙二角次形有午角及卯辰邊也求甲乙邊法乙角之正弦即卯癸之正弦與丙角之餘弦即庚癸正弦庚癸為丙角壬庚弧之餘若全數與乙甲之餘弦即庚卯癸角甲己弧之正弦此用庚卯癸次形庚為直角元形有丙乙二角次形有庚癸卯癸兩邊也一率乙角正弦六九五八八九二率丙角餘弦三四七九五三率半徑全數四率乙甲餘弦五淂六十度為乙甲邊又法乙角之正弦即子寅丑角正弦寅角與元形乙角等與全數若丙角之餘弦即丑子弧正弦丑子與庚癸等為丙角壬庚弧之餘與甲乙之餘弦即子寅弧正弦子寅與己甲等為甲乙邊之餘
