body:
  text: 又必過甲而北至黃則為距赤道北二十三度半則向之在南者今反而在北又丙為星正在赤道行一周必離赤道圈漸至癸而行愈逺去赤道亦愈逺至已必距赤道四十七度則向之正當赤道者今相距為四十七度若星在辛距赤道丙緯北二十度至子行愈逺距亦愈逺子甲至戊淂戊赤六十七度為本圈距赤最逺之界餘星倣此可見星距赤之緯時時不等距南者或反而距北距近者或變而距逺也若星行至赤極丁距赤道滿九十度丁赤若在黃極乙即其距度乙丙與乙赤終古不易矣此差亦不係子星行而係于黃道之斜交赤道也二十八宿黃道距度二十八宿距星中西皆同西惟觜宿不用用天關耳古測各宿距度未免稍踈今用大渾儀宻測定各宿之黃道距度若其赤道上相距古今逺近不一未可預為定率也角十度三十五分亢十度四十分氐十七度五十四分房四度四十六分心七度三十三分尾十五度三十六分箕九度二十分東方七宿共七十六度二十四分斗二十三度五十一分牛七度四十一分女十一度三十九分
