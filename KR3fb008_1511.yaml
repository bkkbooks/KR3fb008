body:
  text: 者太隂出入地平距食甚之時刻也月食日月相對日出時刻即月入之時刻日入時刻即月出時刻也求𢃄食距弧以三千六百秒為一率一小時月距日寔行化秒為二率即推月食所用月距日寔行也𢃄食距時化秒為三率求淂四率為秒以度分𢃄之淂食距弧𢃄食距弧者太陰出入平距食甚之行度也求𢃄食两心相距以半徑一千萬為一率𢃄食距弧之餘切線為二率食甚距緯之弦為三率求淂四率為兩心相距之餘且線檢表淂𢃄食两心相距𢃄食两心相距者𢃄食時太陰心典地影心相距之度也求𢃄食分秒
