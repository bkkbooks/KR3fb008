body:
  text: 以積日與太陰每是平行四萬七千四百三十五秒零二一一七七相乘滿周天一百二十九萬六千秒去之餘為積日太陰平行加太陰平行應一宮零八度四十分五十七秒一十五微淂太陰年根上考徃古則置太陰平行應減積日太陰平行淂太陰年根太陰年根者乃所求本年天正冬至次日子正初刻太陰距冬至之平行經度也求月孛年根以積日與月孛每日平行四百零一秒零七七四七七相乘滿周天一百二十九萬六千秒去之餘為積日月孛平行加月孛應三宮零四度四十九分五十四秒零七微淂月孛年根上攷徃古則置月孛應減積日月孛平行淂月孛年根
