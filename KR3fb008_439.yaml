body:
  text: 測太隂距交行度前擇兩月食以定交周所以求交終日時之數尚不知月距交幾何度分今欲審太隂某時距交若干以定交應亦用兩月食湏距太陽之逺近等兩食分等兩食之在隂暦陽暦正交中交等既各率俱等則距交必等因而折中取數則淂本時正交所躔度分矣第一食漢順帝陽嘉三年甲戊十月二十四日子正後十七刻順天府時刻下同十分月食十二分之十在黃道南初虧東北于時日躔壽星宮二十五度十分月自行為六十四度三十分用減法淂均數四度二十分第二食弘治十三年庚申十一月某日子正後三十一刻正月食十二分之十在黃道南日躔大火宮二十三度十一分兩食之中積時為一千三百六十六年其間太陽最髙行十六度有竒以減日躔兩度差二十八度淂十二度為前後日距最髙之差日在最髙旁近其距地之差甚微地影如一月自行為二百九十一度三十五分用加法淂均數四度三十八分兩食時月本輪最髙前後等距前過最髙六十四度後未至最髙六十九度其較五度距地之差甚微食分大小等初虧方位等則兩食之月距交等度中積為一千三百六十六平年三百五十八日一十七刻九分此時自行滿交周外其距交為一百五十九度五十五分以距交平行乘中積所淂如啚甲乙丙丁為白道乙丁為正中二交甲為北為隂暦丙為南為陽暦乙戊己丁為距交等之兩弧是兩食時月骵一過交一不
