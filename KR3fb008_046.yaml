body:
  text: 二十五三角形內任依一邊作兩平行線其所截兩邊之比例若兩全邊之比例甲丁戊角形內作乙庚丙已二線俱與丁戊平行則兩線所截之乙丙與庚已兩分之比例必若甲丁與甲戊兩全邊之比例或乙丙與庚巳若甲乙與甲庚亦若丙丁與已戊或乙丙與庚已若甲丙與甲已亦若乙丁與庚戊比例俱等直線三角形與八線相當直角形之三邊皆可為半徑甲乙丙直角形乙為直角設以甲乙邊為圈之半徑作乙戊象限弧則丙乙為甲丙乙丁弧之切線甲丙為其割線若二啚用丙乙邊為半徑作乙戊象限則乙甲為丙角乙丁弧之切線丙甲為割線三啚以甲丙大邊為半徑作丁戊象限則丙乙為甲角丁丙弧之正弦乙甲為其餘弦四啚以甲丙弦半于戊戊為心作丙乙甲半圈則丙甲為全徑丙乙為甲角丙乙弧之通弦甲乙為丙角乙甲弧之通弦是直角形之三邊皆與割圓八線比例相等故立算以本形之邊角與八線連為四率而互相比例也
