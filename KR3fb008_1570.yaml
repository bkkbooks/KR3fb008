body:
  text: 内時分相近者取其典黃平象限相對之数淂近時黃平象限宮度又置太陽黃道經度加減用時東西差近時距分加者亦為加近時距分減者亦為減淂近時太陰黃道經度两数相減餘為近時月距限度太陰黃道經度大于近時黃平象限宮度者為限東小于近時黃平象限宮度者為限西求近時黃平象限用交食北極高四十度黃平象限表以近時春分距午時分察表內時分相近者取其典限距地高相對之数淂近時限距地高求近時太陰高弧用交食太陽高弧表以近時月距限及近時限距地高之度察其
