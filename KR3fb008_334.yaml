body:
  text: 躔于外天恆星宗動常靜皆是已壬已弧為地平上之視髙然從地心測之則壬戊為其地平上之實髙兩髙之差為戊丁已角或乙丁甲角若日行髙沖丙從地心測其實髙仍在戊與在最髙丁等而從地面視之見日躔于外天庚從乙丙庚線定視髙為壬庚較前視髙壬已為小故太陽之實髙等因距地髙卑不同所見視髙遂不等其視差亦不等求法如日骵在丁用甲乙丁直線斜角形形有乙甲地半徑一度有甲丁日距地度有乙甲丁髙弧之餘角乙甲丁為丁甲辛髙度之餘角依法求乙丁甲角或戊已弧即視差也若太陽在地平辛則乙甲丁為直角形丁角最大至天頂子則乙丁甲丁兩邊合為甲子一直線無丁角今立算以最髙中距最卑三處距地度為宗算壬至子各度髙弧之差列表求清蒙氣差清蒙氣者地面上之遊氣也第谷細測太陽髙度恆與所推不合乃造大渾儀一具于黃道上加極細窺筒夏至午正測之又時時測諸經緯度分乃知真髙在視髙之下因悟差髙之緣蓋清蒙之氣所為也清蒙氣者地中浮遊之氣時時上升深夜為多水上更多其質輕浮略似澄清之水其於物骵不能隔礙人目使之隱蔽却能映小為大升卑為髙故日月出入人從地平上視之比于中天則大星座出入人從地平上望之比之中天則廣又日食時月視徑不能小于日視徑而日四周每顯金環廣寸許此映小為大
