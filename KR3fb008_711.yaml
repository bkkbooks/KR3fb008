body:
  text: 徑之大小差矣本氣徑差金環又有二種一為虛環人目所見其內規如上圖之癸為最光向外漸微至外規如上圖之壬則似次光此為地上肖蒙之氣所生上文所説是也一為實環若內若外悉是最光此所見者必為太陽原光矣所以然者太陰在最高太陽在最卑則太陰之視徑略小于太陽之視徑上文所云六十分之一者是也但實環既為原光在太陽之周非復向之虛環從蒙氣中隱映而得者則人居月影之中何自得見之即在影之偏際亦宜見左失右何自得全見之日此亦因太陽出光折焒至于人目雖正在影中猶得見之折焒之由
