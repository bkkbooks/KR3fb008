body:
  text: 月小亦不食矣求中會實會中會者日月之兩平行同度也實會者其兩實行同度也夫日天大而行遲月天小而行疾以月較日月每日離太陽十二度十一分二十七秒至二十九日五十刻一十四分三秒而月逐及于日與之同度謂之朔策斯時日月之兩平行俱同宫同度是為平會但日月非平行各有本天盈縮遲疾之差則平會時二曜之平行雖同度而其實行或在平行之前或在平行之後必以平會時二曜本天字差相消相息以淂日月實度相距之弧用以變時或加或減于平會時刻乃淂二曜實行同度之時分是名實會也
  hash: sha256:c23b97dee4524c1628ed7349227ba4125beaa0a5a8bd9acea1d830f7a213af62
