body:
  text: 命分十分為二率視距減餘為三率得四率日食之分日徑平分十分之分如啚戊為黃道巳為視白道甲為大陽心甲乙為太陽視半徑丁為太陰心丁壬為太陰視半徑丙甲為日月兩半徑之并取丙乙與壬丁月半徑等丁甲為視距度午丙甲內減去丁甲餘丙丁即乙丑也何則丁丑與乙丙等同用乙丁則丙乙與乙丑必等而乙丑為月掩日骵之分次以乙辛日全徑命為十分用三率法得乙丑若干分為日食分數其壬丑月全徑與乙辛日全徑大小相似設兩心同在甲點亦止能食既不能如月入地影之食盡有餘也
