body:
  text: 則丙壬半徑為最極大與甲亥半徑相較淂本天上高低之差測法先設太陽在最卑歲輪心亦在最卑免太陽之差測淂此時歲輪半徑次設太陽仍在最卑歲輪心在最高又測其半徑相較淂本天上最大高低之差今測淂為萬二千五百八十五分乃火星從本天之差也與從太陽高卑之差其比例若十一與十依上論火星歲輪半徑之大小有二根欲淂其真徑必以日躔本天兩差加減之如圖設歲輪心在本天最高庚先取庚壬最小半
