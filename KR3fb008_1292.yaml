body:
  text: 加得所求本年黃道宿鈐察寔行足減本年黃道宿鈐內某宿度分則減之餘為某宿度分宿度者乃所求本日子正初刻太陽所躔之黃道宿度也推節氣時刻及節氣用時黃道十二宮每十五度為一節氣皆以子正躔日未交節氣宮度者為交節氣本日已遇節氣宮度者為交節氣次日本日子正未交次日子正已遇則交節氣心在本日子正後次日子正前故未交為本日已遇為次日推時刻之法以本日寔行與次日寔行相減為一率一千四百四十分為二率本日寔行節氣宮度三十度或一十五度相減餘為三率求淂四率為距子正後之分數盖以一日之行度與一日之分數為比同於距節氣之度與距子正之分數為比也乃以六十分妝為一小時十五分妝為一刻
