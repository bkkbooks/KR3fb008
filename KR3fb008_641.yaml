body:
  text: 道九十度限偏左偏右而變經度淂東西差三也因東西視差故太陽與太陰會有先後遲速之變二曜之會在黃平象限度東即未淂實會而先淂視會若在黃平象限西則先淂實會而後淂視會所謂中前宜减中後宜加者也因南北視差故太隂距度有廣狹食分有大小之變如人在夏至之北測太隂淂南北視差即以加于太隂實距南度以减于實距北度又東西南北兩視差皆以黃平象限為主蓋正當九十度限絶無東西差而反淂最大南北差距九十度限漸遠南北差漸小東西差漸大至最遠乃全與高畀差合為一也三差恆合為勾股形高畀其弦南北其股東西其勾至極南則弦與股合至極東極西則弦與勾合也今先論高𤰞差如左
