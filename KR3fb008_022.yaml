body:
  text: 丁心作甲戊線其戊丁丙分圈角與戊甲丙負圈角同以戊乙丙圈分為底如前論丁甲丙負圈角半于戊丁丙分圈角依顯戊甲乙負圈角亦半于戊丁乙分圈角次于戊丁丙角減法戊丁乙角戊甲丙角減去戊甲乙角則所存乙甲丙角必半于乙丁丙角乙丁丙角倍大于乙甲丙角十五負圈角所負之圈分同其角俱等如甲乙丙丁圈其心戊于丁甲乙丙圈分內任作丁甲丙丁乙丙兩角此兩角必等何則試從甲從乙過戊作甲巳乙庚兩線更從戊作戊丁戊丙兩線其丁戊已分圈角既倍大于丁甲巳負圈角依顯丙戊巳分圈角亦倍大于丙甲已負圈角而丁戊庚庚戊已兩角與丁戊巳一角等則丁戊庚庚戊巳巳戊丙三角必倍大于丁甲丙依顯此三角亦倍大于丁乙丙則丁甲丙丁乙丙兩角自相等十六三角形在圈內其三角俱抵圈界則三角所當之弧成全圈三邉即圈分之弦如從心作線分弦為兩平分亦必分圈為兩平分而分處為直角如甲乙丙圈其心丁有甲乙丙三角形在圈內其三角俱切圈界則甲乙丙三角所乘之圈分并之必成全圈其乙丙丙甲甲乙三邉為三分圈之弦如從丁作丁庚線平分乙丙邉于戊亦必平分乙丙弧于
