body:
  text: 二十秒一十二微以周歲除之淂每日平行一十三微一十纎二十九忽二十一芒以秒法通之即淂土星正交每日平行十分秒之一又一四六七二八土星正交每歲平行四十一秒五十三微以周歲除之淂每日平行微五十二纎四十九忽一十九芒以秒通之即淂土星本天半徑一千萬土星本輪半徑八十六萬五千五百八十七土星均輪半徑二十九萬六千四百一十三土星次輪半徑一百四萬二千六百土星本道與黃道交角二度三十一分氣應七日六五六三七四九二六土星平行應七宮二十三度一十九分四十四秒五十五微
