body:
  text: 五星伏見各異凡星夕伏者星比太陽行遲星後太陽故夕初伏不見如土木火三星及金水退合時晨伏者星比太陽行疾星遂太陽故晨初伏不見如太陰晦前及金水順合時夕見者得行疾於太陽遇合而先行故夕見如太陰及金水順合後晨見者星行遲行太陽遇合而星追日故晨見如土木火三星及金水逆行合太陽後是也五星行度遲疾五星在小輪最高行度極遲在最卑則極疾其最遲最疾之日行分依初次均加減表可淂之算淂土星順夕一日為八分九秒逆疾為五分十三秒火星順疾十四分二十四秒逆疾七分四十四
  hash: sha256:9c9566da92ac026087320b7dd361cc5fc9ce4b6b87ec3939449201c7084c64f6
