body:
  text: 求引數置火星平行減最高平行淂引數求初均及次輪心距地用火星均數表以引數宮度分察其與初均所對之度分秒淂初均察其所對之次輪心距地數淂次輪心距地並記初均加減號求本天次輪半徑用火星均數表以引數宮度分察其所對之次輪半徑本數淂夲天次輪半徑求太陽高卑差用火星均數表以本日太陽引數宮度分加減六宮不及六宮則加六宮遇六
