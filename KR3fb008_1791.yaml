body:
  text: 輪非本天也土木火三星以日為心者乃次輪上星行距日之跡亦非本天也土木火之三星次輪半徑最大與日天半徑畧等星距次輪最遠之度又與次輪心距日之度等以星行距日之跡观之即成大圈而為繞日之形其理與日躔連本輪行度成不同心天者相似然星之自行又有高卑其距日不無遠近謂其成繞日之形則可謂其成不同心天則不可也雖暦家巧筭之術以次輪設于本天與以次輪設于地心或不同心天者理本相通然必次輪半徑與日距地半徑等方可以日為心作不同心天立筭今土木二星之次輪半徑有㝎数而日距地則有高卑火星次輪半徑雖有太陽高卑差而又有本天高卑差終與日距地半徑不等則
