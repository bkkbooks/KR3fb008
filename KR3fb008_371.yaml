body:
  text: 虛九度五十九分危二十度七分室十五度四十一分壁十三度十六分北方七宿共一百二度十四分奎十一度二十九分婁十三度分胃十三度一分昂八度二十九分畢十三度五十八分參一度二十一分觜十一度三十三分西方七宿共七十二度五十一分井三十度二十四分鬼四度三十七分桞十七度分星八度二十三分張十八度四分翌十七度分軫十三度三分南方七宿共一百八度三十一分合之共三百六十度恆星等第恆性之數紛然不齊大小不一古人以弧線相連像官像物命為某星某宿或數十星為一座或一星獨為一座今新法又以其骵之大小分為六等第一如心宿中星大角天狼五車織女老人參宿其親徑二分大小數秒不論下同為第一等次如北斗上相北河等其視徑一分三十秒為第二等又次如婁箕尾三宿等星其視徑一分五秒為第三等又次如參旗桞宿玉井等星視徑四十五秒為第四等又次如內平東咸從官等星視徑三十秒為第五等又次如昂宿左更等視徑二十秒為第六等若最小在六等已下不算
