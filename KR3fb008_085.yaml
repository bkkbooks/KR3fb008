body:
  text: 不以球心為心乃小圈也五從大圈切球必過球心而分全球為兩平分小圈則否六凡大圈必分球面為兩平分小圈則否七球面上可作無數大圈及無數小圈如甲乙庚圓球其心丁以丁為心可作辛壬大圈亦可作戊庚大圈又可作已乙大圈倣此乃至無盡若夘未甲癸子丑等皆為小圈數亦無盡又球上大圈雖無盡必各自分球面為兩平分以共一球心故也八凡大圈皆等大小圈則否如前啚辛壬已乙庚戊諸大圈心皆等大以共一丁心之故小圈為外未子丑則各自不等九球面上大圈雖至無盡其圈心皆共一心皆與球全心十凢大圈在球面居大圈中心兩㸃名為兩拯若從兩極作直線必過球心此線為大圈之軸如赤道之南北二極乙已甲圓球其心丁設己丙庚戊大圈大球面其兩端居中二㸃如甲與乙為大圈之兩極大圈在二極之中二極距大圈如甲已乙已甲庚乙庚皆
