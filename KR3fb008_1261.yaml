body:
  text: 乘開方得食既距弧為三率以六十分化秒為二率月一小時寔行化秒為一率推得四率妝之為食既距時分初虧時刻置視望時分以初虧時分減之即初虧時刻復圓時刻置視望時刻以初虧距時分加之即復圓時刻食甚搃時復圓時刻內減去初虧時刻即搃時食既時刻置視望時刻以食既距時分減之即食既時刻生光時刻置視望時刻以食既距時分加之即生光時刻既限搃時生光時刻內減去食既時刻得既限搃時十三求宿度以月寔經度查黃道距宿鈐按宮減宿得食甚時月離黃道宿次
