body:
  text: 日月食虧復所向方位求日月失光之面向何方位則有兩縁其一從太陰非黃道度作大圈令遇太陽太陰兩心此日食也或太陰與地影兩心此月食也下至地平周遭移指交食所向之方也其二黃道斜交于地平日月隨之行遇食必有時向東南西北有時向東北西南也舊法袛以陰陽二暦分別南北殊為粗率今法悉推其分乃為密耳距度變日月食所向方位太陰食起復之間以本行屢遷其度分即作遇兩心月心影心大圈至地平時刻各異所向方位亦時刻各異欲畫推之其多無數故當求其初虧食既食甚生光復圓五向而止如圓甲為地影心甲乙為黃道戊丙為白道兩道之大距不遠故作平行線論初虧太陰在丙食既在丁食甚在戊即甲丙甲丁甲戊皆遇月地影兩心之弧因太陰漸近于地影心甲其距度遠近漸次不同而乙甲丙角乙甲丁角乙甲戊角之小大亦不同則太陰所向地平之方位度分亦不同故恒以本距度推本角如甲丙初虧之距為半影月半徑之并甲丁食既之距為半影減月半徑之餘甲戊食甚則為太陰之正距度也甲戊丁角可當直角其甲丙線與丙戊甲直角若甲戊線與甲丙戊對角而甲丙戊角與乙甲丙角相等又甲丁戊三角形依此法推甲丁戊角與乙甲丁角相等而食甚乙甲戊為直角故在甲諸角其
