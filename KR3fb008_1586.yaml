body:
  text: 用交食視半徑表以太陰寔引宮度察其典月半徑相對之分秒淂太陰半徑求并徑以太陽半徑典太陰半徑相加淂并徑求食分以太陽半徑倍之為一率十分為二率并徑內減食甚視緯餘為三率求淂四率即食分推初杅真時苐十二求初杅復圓距弧用交食月行表以并徑分及食甚視緯分察其所對之分秒淂初
