body:
  text: 四分亦全食三分之一也以月全徑三分之其一為十分二十七秒以加距度二十九分三十七秒亦淂視半影四十分四秒黃道九十度限黃赤二道亘于天中並以一百八十度居地平上顧其距地平東西各九十度之點則黃道與赤道不同論赤道恆在子午圈一㝎不移黃道惟冬夏二至謂丑未兩宫初度在子午圈上餘則或在午東或在午西恆不等以黃道斜交于赤道又因北極出地不同則黃道上距北平東西各九十度之一點不能與子午圈同度而自有其
