body:
  text: 甚至復圓之弧兩者略相等故求其一倍之得在影之總弧如面甲為影心躔甲乙黃道乙丙為白道太陰心至丁為初虧在丙為食甚復圓在戊丁戊者天周之弧也而所截弧極小可作直線用之又甲乙丙三角形也而乙角極小乙丙與乙甲略等可作平行線用之因而甲丙亦可為垂線其丁丙與兩戊亦可為等今自甲出兩直線為甲丁甲戊皆即太陰地影兩半徑之并而甲丙為太陰距度故甲丁戊三角形擬丙為直角以甲丁上方減甲丙上方開之得丁丙線為太陰初虧至食甚行遇太陽之弧次求食既至食甚如二
