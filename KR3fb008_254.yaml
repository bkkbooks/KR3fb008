body:
  text: 江西二十九度福建二十七度廣西二十七度貴州二十五度廣東二十三度半雲南二十四度朝鮮三十六度右北極髙度皆依各省城所測規界天骵渾淪穹然莫辨必也相形酌理判立界限而後推算之功可施則夫設立諸規以著象數為曆家之首務也新法總有四大規一曰地辛一曰赤道一曰黃道一曰子午四規為用甚大缺一不可地平規者從人足所麗極目四望之界而設也人附地面所可見者天之半耳其半恆繞于地下人不可得而見即此可見不可見之界而諸曜由是而出入晦明晝夜于是而分因設此規剖為四象以應四方象各限以九十度是為地平經度而各曜出入之方位以辨矣又自地平上至天頂設距等圈以為地平緯度而各曜漸升之度以明各曜出地離赤道之緯度并北極出地之數皆可淂而稽之矣赤道規者從南北二極相距正中之界而設也古曰天行健又曰天左旋左旋而行健則知南北必有其極矣極也者天骵永久不動之兩㸃周天倚為環動之樞者也極非星也云極星者蓋指其最近一星而命之耳如一極出地必一極入地其出入之度必均曆家乃于二極相距最中之界設有赤道一規平分天骵為南北南為外
