body:
  text: 測金水二星次均金水二星由伏見輪以生次均但伏見輪上之行非如土木火三星之距日度乃另有其行以其平行同乎太陽故也如圖甲為地心大圈為金水平行天即日本天庚為最高設金水自行距最高為庚戊即日亦在戊戊為心作兩小輪淂星在均輪癸水星三倍之求戊申癸角為初均次以癸為心作丙子伏見輪丙為最遠申為最近星行伏見輪從丙合伏向子而申右旋其伏見引行數則從邜點平最遠起算為伏見平行輪上作邜午線恒與已甲平行淂邜為平遠午為平遠近者非遠近於地心乃此平等為遠近也蓋星伏見輪周皆為平行如從丙點真最遠起算即非平度以輪心距地之乙甲線與戊甲乙初均角恒大小不同故也表中所列伏見行俱從甲平遠起算金星自邜點一日順行三十六分
