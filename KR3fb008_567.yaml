body:
  text: 本大于甲乙而壬日去地壬丁甚逺人徔丁視日骵則為丙丁辛角之已戊弧不過天度七百二十之一其實丙辛大于甲乙五倍餘丙辛為實徑已戊弧為視徑天度之分一月視徑與日視徑如等月骵小于日二十倍而其視徑及若加大于日者如圖子丑月實徑本天于辰卯日實徑但月之距地癸丁甚近人視之淂子丁丑角午壬弧為視徑若日之距地辛丁甚逺人視之為辰丁卯角未戊弧為視徑而未戊反小于午壬故恆淂日月兩視徑如等一日月本輪高卑昜視徑之大小日月因距地極逺以實徑昜
  hash: sha256:373a9f4c7af717a9d376012533fc46253465382b9a8fff9e45a0d56bfeaa2793
