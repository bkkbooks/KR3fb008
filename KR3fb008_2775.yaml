body:
  text: 初均其與中分所對之數為三十二秒即所求之中分也初宮在上故用順度又設伏見實行為二宮五度三十分求次均及較分則察二宮五度三十分與次均所對之數為二十六度三十四分五十三秒其號為加即所求之次均其與較分所對之數為三十分三十秒即所求之較分也二宮在上故用順度若引數或伏見實行有零分者按比例法求之
