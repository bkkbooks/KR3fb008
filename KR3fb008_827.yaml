body:
  text: 見日食餘光之上角在高弧及子午圈線中則遇心線之距加于高弧子午兩線之距此在午前後共法設甲乙丙丁為下輪盤之外圈分四象限各象限分九廿度甲為天頂甲丙線當高弧甲已甲戊皆子午線中小圈即太陰掩太陽者或食甚或初虧復圓時左其東西南北及中央皆一類天上向位在西圖中反下東諸方皆如此設庚為太陽遇兩心線為庚乙因以直角交甲丙線其至地平必兩相距正九十度故丙距已地平上算乙距正東之度皆等以設辛為太陽則遇兩心線與甲丙同為一線故甲丙所至地平度亦為太陽辛食所向之度也又設壬為太陽則以壬癸遇兩心線者得壬癸
