body:
  text: 壬寅年斗宿第一星之赤道經度也又以三十八年與斗宿一星緯度嵗差減二秒二十五微相乘得一分三十一秒五十微即赤道緯度應減之数與曆元甲子年斗宿第一星赤道緯度南二十七度一十二分相減餘二十七度一十分二十八秒一十微即所求壬寅年斗宿第一星之赤道南緯度也
