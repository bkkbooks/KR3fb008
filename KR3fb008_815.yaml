body:
  text: 徑度數之分之比例各本分或日或月推相應之半徑形中非真半徑與其半徑比較得差數因以復推食分加于測食分即得所食之實分矣如月萬曆庚寅七月朔西測日食見食六分正依十二徑分光影各半徑并得四十七分太陽近最高得半徑十五分二秒太陰距最高四十餘度得半徑十五分二十五秒兩半徑并為三十分二十七秒即與前四十七分等故一為法一為實求二十三分太陰或影任取之分相應度數之分若干算得十四分五十四秒此太陰視半徑差三十一秒而差數或加或減于太陽半徑則以真半徑為法當差數加也推得六分一十三秒孔小故受影正測之分比推算之分略近為真食分又法用遠鏡或于密室或在室外但在外者必以紙殼圈窺筒以
