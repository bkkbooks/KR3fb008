body:
  text: 線故而南北差自中限至地平四面俱無以未壬即與丁壬合一則無壬角也黃道在地平之地人目俯視黃道四周具有氣差且俱與地平上最大高下差等而東西差則四周俱無以黃道既無地平合一則無壬丁未角高弧與黃道相交俱為直角故而丁壬與未壬合為一線也蓋黃道在天頂全無南北差黃道在地平全無東西差餘處除中限無東西差外二差恆相隨以變實會為視會而隨地隨時不同也高弧正交黃道南北東西差以高弧與黃道相交之角分南北東西差可得其幾何蓋兩弧相交以直角則高弧正為距度弧不偏東西即絶無東西差而高畀
