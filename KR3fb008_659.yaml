body:
  text: 線故而南北差自中限至地平四面俱無以未壬即與丁壬合一則無壬角也黄道在地平之地人目俯視黄道四周具有氣差且俱與地平上最大高下差等而東西差則四周俱無以黄道既無地平合一則無壬丁未角高弧與黃道相交俱為直角故而丁壬與未壬合為一線也葢黄道在天頂全無南北差黃道在地平全無東西差餘處除中限無東西差外二差恒相隨以變寔會為視會而隨地隨時不同也高弧正交黄道南北東西差以高弧與黄道相交之角分南北東西差可得其幾何葢兩弧相交以直角則高弧正為距度弧不偏東西即絕無東西差而高畀
