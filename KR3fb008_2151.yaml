body:
  text: 周日諸平行表周日諸平行表以一日內之時分秒逓降列之其法與日躔月離周日平行表同表名太陽平行者即逐時逐分逐秒之太陽平行也月距日者乃逐時逐分逐秒之太陰平行內減去太陽平行之数也太陰引数者乃逐時逐分逐秒之太陰自行也太陰交周者乃逐時逐分逐秒之交周平行也用表之法如求五時一十二分二十四秒之太陽平行則察五時所對之太陽平行為一十二分一十九
