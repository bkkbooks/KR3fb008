body:
  text: 為難測又因其本天距地心於最高卑左右四十度內無甚遠近伏見輪到此各度其大距皆若相等不淂如金星折中為高卑處湏候星近兩中距時取晨夕兩大距等及前後多日各測之行相反並自平兩行有差乃可用兩平行折中為兩心線所在夫相反者一測之行為盈一測為縮必知在兩心線左右兩行有差者一測星在此無遠近處或測十日前後之行為等因可知引數為等也一測多祿某於漢永和三年戊寅西六月初四日夕測水星經度在鶉首宮七度用軒轅大星比時太陽平行在寔沈十度半即水星距太陽為二十六度半次測永和六年辛巳西二月初二日晨測水星在星紀宮十二度半用心大星比時太陽平行為元枵宮十度淂星大距
