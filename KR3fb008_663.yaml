body:
  text: 髙弧斜交黃道南北東西差髙弧斜交黃道太陰在交無距度求南北東西差如啚甲為黃極巳邜庚為黃道其斜交之髙弧為丁乙辰太陰無距度在乙其視髙差為乙戊用邜乙丁交角淂戊丙為南北差乙丙為東西差若太陰不在正交有距度或南或北丁未為過地平兩極之髙弧太陰距南在子距北在丑其黃經度在未從天頂淂丁子為太陰距南髙弧丁丑為距北髙弧因實度在子在丑視度在辛在癸淂于辛及丑癸為視髙差次徔黃極作甲辛甲午大圈過太陰視度距南
