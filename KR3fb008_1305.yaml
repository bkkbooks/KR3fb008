  text: 日平行以二十四時除之即淂月孛每日平行四百零一秒小餘零七七四七七月孛每日平行六分四十一秒零四微三十八纎五十四忽五十七芒以秒法通之即淂正交每日平行一百九十秒小餘六四正交每日平行三分一十秒三十八微二十四纎以秒法通之即淂太陰本天半徑一千萬太陰本輪半徑五十八萬太陰均輪半徑二十九萬太陰負圈半徑七十九萬七千次輪半徑二十一萬七千
