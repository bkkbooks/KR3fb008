body:
  text: 例相比成仝理四率之比例矣如甲與乙兩幾何大小之比例既若丙與丁両幾何大小之比例則以甲為前率乙丙為中率丁為後率四率連之以相比淂甲與乙比若丙與丁比若曰甲之幾倍大于乙猶丙之幾倍大于丁其理正相似耳又如次啚戊與巳兩幾何大小之比例若巳與庚兩幾何大小之比例其中率巳為前後二率之樞淂戊與巳比若巳與庚比則戊之大于巳猶巳之大于庚其理亦相似三幾何合之亦為同理之比例三用理之比例至少必三率凢仝理之比例相比亦有不同如甲乙丙丁四幾何甲與乙比若丙與丁比共四率以成比例而其居中乙丙兩率一取不再用不相連属名曰斷比例又如戊巳庚三幾何戊與巳比即若巳與庚比是三率成比例其中率巳既為戊之後又為庚之前相屬不斷必再用之乃成比例名曰連比例凡同理之比例止此二種多則四率少必三率四四幾何第一與第二之比例若第三與第四為斷比例又有両幾何此與彼之比例若斷比例之第三與第四之比例則亦若與其第一與第二之比例
