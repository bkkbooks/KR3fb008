body:
  text: 之光于此尤宜顯著乃今測之則在淺見盛在深見微可證食時所見非月體自有之光故應論定月能食于氣影如上所説矣然食時亦能變昜諸色何以獨言赤色試觀太陽下焰地面受之論其本然皓明無色日地之間或發清蒙之氣即地面所見時轉為黃時轉為赤皆因所遇之氣如玻璃映目色青見青色緑見緑也今日焰地旁焰光所遇清蒙之氣因于斜穿而成厚體月體所顯光色尤深成為赤色張試以視學明之視學家有公論凡象斜射次徹之體以垂線為主曲折通之初入則聚折而向于垂線既出則散折而離于垂線也何謂垂線蓋于徹體之面遇受形之點作線下垂則是折焰所向所離之線如圖
