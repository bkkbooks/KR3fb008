body:
  text: 等若作乙甲直線過兩極必過球心此線為己庚大圈之軸也十一極㸃作圈漸逺漸大至與球同心之圈極大自此又漸小至彼極復為一㸃其中與球同心者為大圈左右與大圈平行者為距等小圈乙庚己球丁為心于球上任取甲㸃為極作戊亥申未多平行圈必漸遠甲極漸大至己庚為極大其心即以丁為心自此如子丑午卯漸小至乙極為一㸃其中自甲至乙諸圈惟乙丙為大圈餘如戊亥子丑皆距等小圈不與球同心十二凡大圈之距兩極其遠近必等小圈則一逺一近小圈距等圈也後同十三一大圈必有兩極與一軸球上大圈無數其極與軸亦無數甲乙丙球設甲乙大圈則戊丙為其兩極戊丁丙為軸線壬癸大圈則辛庚為兩極庚丁辛為軸線戊午丙大圈子丑為兩極丑丁子為軸線倣此以至無盡蓋全球俱可為大圈亦俱可為極也十四兩極中可作多圈其數無盡而大圈止有一不淂有二左右小圈則無數十五凡兩大圈必相交不淂為平行圈若平行必距等小圈非大圈矣
